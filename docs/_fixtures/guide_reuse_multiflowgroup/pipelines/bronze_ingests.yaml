# Two source ingests packed into ONE file with the `flowgroups:` array syntax.
# The document-level `pipeline: sales` is inherited by every flowgroup below,
# so both land in the same `sales` pipeline. `presets`, `use_template`,
# `operational_metadata`, and `job_name` inherit the same way.
pipeline: sales

flowgroups:
  # Orders: stream raw CSV into a bronze streaming table.
  - flowgroup: orders_ingest
    actions:
      - name: load_orders_csv
        type: load
        source:
          type: cloudfiles
          path: "${landing_path}/orders/*.csv"
          format: csv
        target: v_orders_raw

      - name: write_orders_bronze
        type: write
        source: v_orders_raw
        write_target:
          type: streaming_table
          catalog: "${catalog}"
          schema: "${bronze_schema}"
          table: orders

  # Customers: stream raw CSV into a bronze streaming table.
  - flowgroup: customers_ingest
    actions:
      - name: load_customers_csv
        type: load
        source:
          type: cloudfiles
          path: "${landing_path}/customers/*.csv"
          format: csv
        target: v_customers_raw

      - name: write_customers_bronze
        type: write
        source: v_customers_raw
        write_target:
          type: streaming_table
          catalog: "${catalog}"
          schema: "${bronze_schema}"
          table: customers
