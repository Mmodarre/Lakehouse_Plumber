# Databricks Workflow job for the monitoring pipeline.
# Flat single-document YAML — no project_defaults wrapper, no job_name key.
# LHP deep-merges this over its defaults and token-substitutes it per environment.
max_concurrent_runs: 1
performance_target: STANDARD
queue:
  enabled: true
tags:
  managed_by: lakehouse_plumber
  environment: ${bundle.target}
