# A minimal bundle-project flowgroup: stream CSV files into a bronze
# streaming table. The point of this fixture is the DEPLOY path, so the
# pipeline itself is deliberately tiny: load (cloudFiles CSV) -> write.
pipeline: bronze_ingest
flowgroup: customer_ingest

actions:
  # 1. Load: stream CSV files from the landing volume with Auto Loader.
  - name: load_customers_csv
    type: load
    source:
      type: cloudfiles
      path: "${landing_path}/customers/*.csv"
      format: csv
    target: v_customers_raw

  # 2. Write: append the raw rows into the bronze streaming table.
  - name: write_customers_bronze
    type: write
    source: v_customers_raw
    write_target:
      type: streaming_table
      catalog: "${catalog}"
      schema: "${bronze_schema}"
      table: customers
