# One flowgroup with a reusable Python transform: stream raw order CSVs,
# canonicalize the free-text channel with a Python UDF, then append to a silver
# streaming table. The Python module lives in transformations/ and is the
# reusable library that travels inside the built wheel.
# Action chain: load (cloudFiles CSV) -> transform:python -> write.
pipeline: silver_orders
flowgroup: orders_normalize

actions:
  # 1. Load: stream raw order CSVs from the landing volume with Auto Loader.
  - name: load_orders_csv
    type: load
    source:
      type: cloudfiles
      path: "${landing_path}/orders/*.csv"
      format: csv
    target: v_orders_raw

  # 2. Transform (Python): canonicalize the free-text channel with a UDF.
  #    The module is copied into the pipeline's custom_python_functions package,
  #    which ships top-level inside the wheel.
  - name: normalize_orders
    type: transform
    transform_type: python
    source: v_orders_raw
    module_path: transformations/order_transforms.py
    function_name: normalize_orders
    parameters:
      default_channel: unknown
    readMode: stream
    target: v_orders_normalized

  # 3. Write: append the normalized rows into the silver streaming table.
  - name: write_orders_silver
    type: write
    source: v_orders_normalized
    write_target:
      type: streaming_table
      catalog: "${catalog}"
      schema: "${silver_schema}"
      table: orders
