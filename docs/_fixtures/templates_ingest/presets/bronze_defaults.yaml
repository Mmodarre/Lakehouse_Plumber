# Shared bronze-ingestion defaults, carried forward from the presets step.
# The template applies this preset to every table it stamps, so the bronze
# standard is set once — for all tables — in the template.
name: bronze_defaults
version: "1.0"
description: "Bronze ingestion standard: CSV Auto Loader options + streaming-table properties."
defaults:
  load_actions:
    cloudfiles:
      options:
        cloudFiles.rescuedDataColumn: "_rescued_data"
        cloudFiles.maxFilesPerTrigger: 200
  write_actions:
    streaming_table:
      table_properties:
        delta.enableChangeDataFeed: "true"
        quality: "bronze"
