# Two ingests packed into ONE file with the `flowgroups:` array syntax. The
# document-level `pipeline: bronze_ingest` is inherited by both flowgroups, so
# both land in the same `bronze_ingest` pipeline. Each writes a bronze table
# that the `silver` pipeline reads later.
pipeline: bronze_ingest

flowgroups:
  # Orders: stream raw CSV into a bronze streaming table.
  - flowgroup: orders_ingest
    actions:
      - name: load_orders_csv
        type: load
        source:
          type: cloudfiles
          path: "${landing_path}/orders/*.csv"
          format: csv
        target: v_orders_raw

      - name: write_orders_bronze
        type: write
        source: v_orders_raw
        write_target:
          type: streaming_table
          catalog: "${catalog}"
          schema: "${bronze_schema}"
          table: orders

  # Customers: stream raw CSV into a bronze streaming table.
  - flowgroup: customers_ingest
    actions:
      - name: load_customers_csv
        type: load
        source:
          type: cloudfiles
          path: "${landing_path}/customers/*.csv"
          format: csv
        target: v_customers_raw

      - name: write_customers_bronze
        type: write
        source: v_customers_raw
        write_target:
          type: streaming_table
          catalog: "${catalog}"
          schema: "${bronze_schema}"
          table: customers
