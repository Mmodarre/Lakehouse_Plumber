repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-added-large-files
        args: ['--maxkb=500']
      - id: check-merge-conflict

  - repo: https://github.com/psf/black
    rev: 26.3.1
    hooks:
      - id: black

  - repo: https://github.com/pycqa/isort
    rev: 5.13.2
    hooks:
      - id: isort

  - repo: https://github.com/pycqa/flake8
    rev: 7.1.1
    hooks:
      - id: flake8
        args: ['--config=.flake8']

  - repo: https://github.com/Yelp/detect-secrets
    rev: v1.5.0
    hooks:
      - id: detect-secrets
        args: ['--baseline', '.secrets.baseline']

  - repo: local
    hooks:
      - id: sync-claude-skill
        name: Verify .claude/skills/lhp matches src/lhp/resources/skills/lhp
        entry: bash -c 'diff -r src/lhp/resources/skills/lhp/ .claude/skills/lhp/ --exclude=__init__.py --exclude=__pycache__ --exclude=.lhp_skill_version'
        language: system
        pass_filenames: false
        files: ^(src/lhp/resources/skills/lhp/|\.claude/skills/lhp/)
