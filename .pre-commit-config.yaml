repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-added-large-files
        args: ['--maxkb=500']
      - id: check-merge-conflict

  - repo: https://github.com/psf/black
    rev: 26.3.1
    hooks:
      - id: black

  - repo: https://github.com/pycqa/isort
    rev: 5.13.2
    hooks:
      - id: isort

  - repo: https://github.com/pycqa/flake8
    rev: 7.1.1
    hooks:
      - id: flake8
        args: ['--config=.flake8']

  - repo: https://github.com/Yelp/detect-secrets
    rev: v1.5.0
    hooks:
      - id: detect-secrets
        args: ['--baseline', '.secrets.baseline']

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.7.0
    hooks:
      - id: ruff
        name: ruff (B904 + TRY400 + RUF013 — constitution §6, §7, §9)
        args: ['--select=B904,TRY400,RUF013', '--fix', '--exit-non-zero-on-fix']
        files: ^(src|tests)/.*\.py$

  - repo: local
    hooks:
      - id: sync-claude-skill
        name: Verify .claude/skills/lhp matches src/lhp/resources/skills/lhp
        entry: bash -c 'diff -r src/lhp/resources/skills/lhp/ .claude/skills/lhp/ --exclude=__init__.py --exclude=__pycache__ --exclude=.lhp_skill_version'
        language: system
        pass_filenames: false
        files: ^(src/lhp/resources/skills/lhp/|\.claude/skills/lhp/)

      - id: check-file-sizes
        name: Constitution §3.3/§9.3 — file size limits
        entry: python scripts/check_file_sizes.py
        language: system
        files: \.py$
        exclude: ^(tests/e2e/fixtures/|src/lhp/resources/|.*\.jinja2$)

      - id: check-placement
        name: Constitution §2/§9 — placement rules (validators, utils, CLI imports, facade reach-through, _by_field)
        entry: python scripts/check_placement.py
        language: system
        files: \.py$
        exclude: ^(tests/e2e/fixtures/|src/lhp/resources/)

      - id: check-stability-drift
        name: "Constitution §1.13/§4.11 — stability annotations on lhp.api"
        entry: python scripts/check_stability_drift.py
        language: system
        files: ^src/lhp/api/.*\.py$

  - repo: https://github.com/seddonym/import-linter
    rev: v2.11
    hooks:
      - id: import-linter
