# UC tags for uc_part_summary — table-level AND column tags on one FQN, migrated
# out of the inline write_target tags and schemas/uc_part.yaml. A tags_file
# substitutes ${...} only: layer uses ${gold_schema}, the key uses ${env}.
# `table:` is the write target's table (uc_part_summary), not the schema name.
version: 1.0.0
table: uc_part_summary
tags:
  layer: "${gold_schema}"
  "${env}_owner": platform
column_tags:
  - name: p_name
    tags:
      classification: confidential
