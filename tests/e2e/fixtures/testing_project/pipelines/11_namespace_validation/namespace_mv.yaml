pipeline: namespace_validation
flowgroup: namespace_mv
#job_name: j_namespace
actions:
  - name: ns_summary_sql
    type: load
    source:
      type: sql
      sql: |
        SELECT
          customer_id,
          name,
          market_segment
        FROM {catalog}.{silver_schema}.customer_dim
    target: v_ns_summary

  - name: write_ns_mv
    type: write
    source: v_ns_summary
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{gold_schema}"
      table: "namespace_validation_mv"
