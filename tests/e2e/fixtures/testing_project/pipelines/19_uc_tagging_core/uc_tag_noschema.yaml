# UC tagging E2E — column tags via tags_file with NO table_schema at all, proving
# column tagging works without a schema file. The write target declares no DDL;
# the column tag is sourced entirely from uc_tags/uc_region.yaml.
pipeline: uc_tagging_core
flowgroup: uc_tag_noschema
#job_name: j_two
actions:
  - name: load_region
    type: load
    readMode: stream
    source:
      type: delta
      database: "{catalog}.{raw_schema}"
      table: region_raw
    target: v_uc_region

  - name: write_region
    type: write
    source: v_uc_region
    write_target:
      type: streaming_table
      create_table: true
      catalog: "${catalog}"
      schema: "${bronze_schema}"
      table: uc_region
      tags_file: uc_tags/uc_region.yaml
