# B1 fixture — row_count test action
# Compares record counts between two sources with optional tolerance.
pipeline: 12_test_actions
flowgroup: ta_row_count
#job_name: j_test_actions

actions:
  - name: ta_row_count_raw_to_bronze
    type: test
    test_type: row_count
    source:
      - "${catalog}.${raw_schema}.customers"
      - "${catalog}.${bronze_schema}.customers"
    tolerance: 0
    on_violation: warn
    description: "Ensure no data loss from raw to bronze"
