# UC tagging E2E — negative case: taggable table, no tags anywhere, untagged schema.
# Emission is gated off, so no _uc_tagging_hook.py is produced.
pipeline: uc_tagging_none
flowgroup: uc_no_tags
#job_name: j_two
actions:
  - name: load_supplier
    type: load
    readMode: stream
    source:
      type: delta
      database: "{catalog}.{raw_schema}"
      table: supplier_raw
    target: v_uc_sup

  - name: write_supplier
    type: write
    source: v_uc_sup
    write_target:
      type: streaming_table
      create_table: true
      catalog: "${catalog}"
      schema: "${bronze_schema}"
      table: uc_supplier
