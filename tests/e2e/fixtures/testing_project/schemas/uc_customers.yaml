# Schema + UC tags for the uc_customers streaming table. This ONE unified file
# serves BOTH the write target's table_schema (column DDL) and its tags_file:
# c_email carries column tags; there are no table-level tags (absent != empty).
# Exercises an empty-string column tag value (masked: '').
name: uc_customers
version: "1.0"
description: "UC tagging E2E — customers table (column tags present)"

columns:
  - name: c_custkey
    type: BIGINT
    nullable: false
    comment: "Customer key - primary identifier"
  - name: c_name
    type: STRING
    nullable: true
    comment: "Customer name"
  - name: c_email
    type: STRING
    nullable: true
    comment: "Customer email"
    tags:
      classification: pii
      masked: ''

primary_key: [c_custkey]
