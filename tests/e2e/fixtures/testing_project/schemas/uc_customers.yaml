# Schema for the uc_customers streaming table. Per-column UC tags now live in
# tags/uc_customers.yaml (tags_file), not in this schema — this file is DDL only.
name: uc_customers
version: "1.0"
description: "UC tagging E2E — customers table (column tags present)"

columns:
  - name: c_custkey
    type: BIGINT
    nullable: false
    comment: "Customer key - primary identifier"
  - name: c_name
    type: STRING
    nullable: true
    comment: "Customer name"
  - name: c_email
    type: STRING
    nullable: true
    comment: "Customer email"

primary_key: [c_custkey]
