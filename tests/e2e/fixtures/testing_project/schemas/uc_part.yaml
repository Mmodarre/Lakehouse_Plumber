# Schema for the uc_part_summary materialized view. Per-column UC tags now live in
# uc_tags/uc_part.yaml (tags_file), alongside the table-level tags — proving table +
# column tags share one FQN through a single tags_file. This file is DDL only.
name: uc_part
version: "1.0"
description: "UC tagging E2E — part summary (column tags present)"

columns:
  - name: p_partkey
    type: BIGINT
    nullable: false
    comment: "Part key - primary identifier"
  - name: p_name
    type: STRING
    nullable: true
    comment: "Part name"
  - name: p_size
    type: INT
    nullable: true
    comment: "Part size"
