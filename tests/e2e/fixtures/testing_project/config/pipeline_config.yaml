# Pipeline configuration for E2E testing
# Tests non-serverless cluster configuration

project_defaults:
  serverless: true
  #environment:
  #  dependencies:
  #    - "msal=={msal_version}"
  #configuration:
  #  "pipelines.incompatibleViewCheck.enabled": "false"


---
pipeline: acmi_edw_raw
catalog: "{catalog}"
schema: "{raw_schema}"
serverless: false
clusters:
  - label: default
    node_type_id: "{cluster_node_type_id}"
    driver_node_type_id: "{cluster_driver_node_type_id}"
    autoscale:
      min_workers: "{cluster_autoscale_min_workers}"
      max_workers: "{cluster_autoscale_max_workers}"
      mode: "{cluster_autoscale_mode}"
photon: "{photon}"
edition: ADVANCED
channel: PREVIEW
continuous: "{continuous}"

---
pipeline: acmi_edw_bronze
catalog: "{catalog}"
schema: "{bronze_schema}"
serverless: false
clusters:
  - label: default
    node_type_id: Standard_D8ds_v5
    autoscale:
      min_workers: "{cluster_autoscale_min_workers}"
      max_workers: "{cluster_autoscale_max_workers}"
      mode: ENHANCED

---
# Environment dependencies E2E test pipelines
pipeline: env_deps_basic
catalog: "{catalog}"
schema: "{raw_schema}"
#environment:
#  dependencies:
#    - "msal==1.31.0"
#    - "requests>=2.28.0"

---
pipeline: env_deps_substitution
catalog: "{catalog}"
schema: "{raw_schema}"
#environment:
#  dependencies:
#    - "msal=={msal_version}"

---
# Pipeline with no environment — inherits from project_defaults when uncommented there
pipeline: env_deps_inherited
catalog: "{catalog}"
schema: "{raw_schema}"

---
# Configuration block E2E test pipelines
pipeline: config_basic
catalog: "{catalog}"
schema: "{raw_schema}"
#configuration:
#  "pipelines.incompatibleViewCheck.enabled": "false"
#  "spark.databricks.delta.minFileSize": "134217728"

---
pipeline: config_substitution
catalog: "{catalog}"
schema: "{raw_schema}"
#configuration:
#  "spark.databricks.delta.minFileSize": "{min_file_size}"

---
# Pipeline with no configuration — inherits from project_defaults when uncommented there
pipeline: config_inherited
catalog: "{catalog}"
schema: "{raw_schema}"

---
# Event log E2E test pipelines
pipeline: event_log_basic
catalog: "{catalog}"
schema: "{raw_schema}"

---
pipeline: event_log_override
catalog: "{catalog}"
