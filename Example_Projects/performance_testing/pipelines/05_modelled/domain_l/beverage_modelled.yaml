pipeline: perf_modelled
flowgroup: beverage_modelled
presets:
  - default_delta_properties
actions:
  - name: beverage_silver_source
    type: load
    readMode: batch
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{silver_schema}"
      table: beverage_dim
    target: v_beverage_silver
    description: "Load beverage from silver for modelling"

  - name: beverage_model_transform
    type: transform
    transform_type: sql
    readMode: batch
    source: v_beverage_silver
    target: v_beverage_modelled
    sql: |
      SELECT
        *,
        current_timestamp() as _modelled_at,
        'v1' as _model_version
      FROM v_beverage_silver

  - name: write_beverage_modelled
    type: write
    source: v_beverage_modelled
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{modelled_schema}"
      table: "beverage_modelled"
