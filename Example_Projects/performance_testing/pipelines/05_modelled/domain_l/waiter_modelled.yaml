pipeline: perf_modelled
flowgroup: waiter_modelled
presets:
  - default_delta_properties
actions:
  - name: waiter_silver_source
    type: load
    readMode: batch
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{silver_schema}"
      table: waiter_dim
    target: v_waiter_silver
    description: "Load waiter from silver for modelling"

  - name: waiter_model_transform
    type: transform
    transform_type: sql
    readMode: batch
    source: v_waiter_silver
    target: v_waiter_modelled
    sql: |
      SELECT
        *,
        current_timestamp() as _modelled_at,
        'v1' as _model_version
      FROM v_waiter_silver

  - name: write_waiter_modelled
    type: write
    source: v_waiter_modelled
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{modelled_schema}"
      table: "waiter_modelled"
