pipeline: perf_modelled
flowgroup: tip_modelled
presets:
  - default_delta_properties
actions:
  - name: tip_silver_source
    type: load
    readMode: batch
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{silver_schema}"
      table: tip_dim
    target: v_tip_silver
    description: "Load tip from silver for modelling"

  - name: tip_model_transform
    type: transform
    transform_type: sql
    readMode: batch
    source: v_tip_silver
    target: v_tip_modelled
    sql: |
      SELECT
        *,
        current_timestamp() as _modelled_at,
        'v1' as _model_version
      FROM v_tip_silver

  - name: write_tip_modelled
    type: write
    source: v_tip_modelled
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{modelled_schema}"
      table: "tip_modelled"
