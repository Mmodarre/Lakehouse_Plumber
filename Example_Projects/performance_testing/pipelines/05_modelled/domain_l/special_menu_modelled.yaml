pipeline: perf_modelled
flowgroup: special_menu_modelled
presets:
  - default_delta_properties
actions:
  - name: special_menu_silver_source
    type: load
    readMode: batch
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{silver_schema}"
      table: special_menu_dim
    target: v_special_menu_silver
    description: "Load special_menu from silver for modelling"

  - name: special_menu_model_transform
    type: transform
    transform_type: sql
    readMode: batch
    source: v_special_menu_silver
    target: v_special_menu_modelled
    sql: |
      SELECT
        *,
        current_timestamp() as _modelled_at,
        'v1' as _model_version
      FROM v_special_menu_silver

  - name: write_special_menu_modelled
    type: write
    source: v_special_menu_modelled
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{modelled_schema}"
      table: "special_menu_modelled"
