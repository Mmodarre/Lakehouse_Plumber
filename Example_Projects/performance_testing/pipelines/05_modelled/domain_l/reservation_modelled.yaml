pipeline: perf_modelled
flowgroup: reservation_modelled
presets:
  - default_delta_properties
actions:
  - name: reservation_silver_source
    type: load
    readMode: batch
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{silver_schema}"
      table: reservation_dim
    target: v_reservation_silver
    description: "Load reservation from silver for modelling"

  - name: reservation_model_transform
    type: transform
    transform_type: sql
    readMode: batch
    source: v_reservation_silver
    target: v_reservation_modelled
    sql: |
      SELECT
        *,
        current_timestamp() as _modelled_at,
        'v1' as _model_version
      FROM v_reservation_silver

  - name: write_reservation_modelled
    type: write
    source: v_reservation_modelled
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{modelled_schema}"
      table: "reservation_modelled"
