pipeline: perf_modelled
flowgroup: shift_schedule_modelled
presets:
  - default_delta_properties
actions:
  - name: shift_schedule_silver_source
    type: load
    readMode: batch
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{silver_schema}"
      table: shift_schedule_dim
    target: v_shift_schedule_silver
    description: "Load shift_schedule from silver for modelling"

  - name: shift_schedule_model_transform
    type: transform
    transform_type: sql
    readMode: batch
    source: v_shift_schedule_silver
    target: v_shift_schedule_modelled
    sql: |
      SELECT
        *,
        current_timestamp() as _modelled_at,
        'v1' as _model_version
      FROM v_shift_schedule_silver

  - name: write_shift_schedule_modelled
    type: write
    source: v_shift_schedule_modelled
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{modelled_schema}"
      table: "shift_schedule_modelled"
