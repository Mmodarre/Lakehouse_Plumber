pipeline: perf_modelled
flowgroup: dessert_modelled
presets:
  - default_delta_properties
actions:
  - name: dessert_silver_source
    type: load
    readMode: batch
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{silver_schema}"
      table: dessert_dim
    target: v_dessert_silver
    description: "Load dessert from silver for modelling"

  - name: dessert_model_transform
    type: transform
    transform_type: sql
    readMode: batch
    source: v_dessert_silver
    target: v_dessert_modelled
    sql: |
      SELECT
        *,
        current_timestamp() as _modelled_at,
        'v1' as _model_version
      FROM v_dessert_silver

  - name: write_dessert_modelled
    type: write
    source: v_dessert_modelled
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{modelled_schema}"
      table: "dessert_modelled"
