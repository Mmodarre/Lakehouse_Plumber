pipeline: perf_modelled
flowgroup: kitchen_modelled
presets:
  - default_delta_properties
actions:
  - name: kitchen_silver_source
    type: load
    readMode: batch
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{silver_schema}"
      table: kitchen_dim
    target: v_kitchen_silver
    description: "Load kitchen from silver for modelling"

  - name: kitchen_model_transform
    type: transform
    transform_type: sql
    readMode: batch
    source: v_kitchen_silver
    target: v_kitchen_modelled
    sql: |
      SELECT
        *,
        current_timestamp() as _modelled_at,
        'v1' as _model_version
      FROM v_kitchen_silver

  - name: write_kitchen_modelled
    type: write
    source: v_kitchen_modelled
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{modelled_schema}"
      table: "kitchen_modelled"
