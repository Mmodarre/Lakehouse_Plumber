pipeline: perf_modelled
flowgroup: chef_modelled
presets:
  - default_delta_properties
actions:
  - name: chef_silver_source
    type: load
    readMode: batch
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{silver_schema}"
      table: chef_dim
    target: v_chef_silver
    description: "Load chef from silver for modelling"

  - name: chef_model_transform
    type: transform
    transform_type: sql
    readMode: batch
    source: v_chef_silver
    target: v_chef_modelled
    sql: |
      SELECT
        *,
        current_timestamp() as _modelled_at,
        'v1' as _model_version
      FROM v_chef_silver

  - name: write_chef_modelled
    type: write
    source: v_chef_modelled
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{modelled_schema}"
      table: "chef_modelled"
