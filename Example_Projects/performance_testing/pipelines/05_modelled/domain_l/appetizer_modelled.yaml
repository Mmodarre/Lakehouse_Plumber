pipeline: perf_modelled
flowgroup: appetizer_modelled
presets:
  - default_delta_properties
actions:
  - name: appetizer_silver_source
    type: load
    readMode: batch
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{silver_schema}"
      table: appetizer_dim
    target: v_appetizer_silver
    description: "Load appetizer from silver for modelling"

  - name: appetizer_model_transform
    type: transform
    transform_type: sql
    readMode: batch
    source: v_appetizer_silver
    target: v_appetizer_modelled
    sql: |
      SELECT
        *,
        current_timestamp() as _modelled_at,
        'v1' as _model_version
      FROM v_appetizer_silver

  - name: write_appetizer_modelled
    type: write
    source: v_appetizer_modelled
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{modelled_schema}"
      table: "appetizer_modelled"
