pipeline: perf_modelled
flowgroup: ingredient_modelled
presets:
  - default_delta_properties
actions:
  - name: ingredient_silver_source
    type: load
    readMode: batch
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{silver_schema}"
      table: ingredient_dim
    target: v_ingredient_silver
    description: "Load ingredient from silver for modelling"

  - name: ingredient_model_transform
    type: transform
    transform_type: sql
    readMode: batch
    source: v_ingredient_silver
    target: v_ingredient_modelled
    sql: |
      SELECT
        *,
        current_timestamp() as _modelled_at,
        'v1' as _model_version
      FROM v_ingredient_silver

  - name: write_ingredient_modelled
    type: write
    source: v_ingredient_modelled
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{modelled_schema}"
      table: "ingredient_modelled"
