pipeline: perf_modelled
flowgroup: table_seat_modelled
presets:
  - default_delta_properties
actions:
  - name: table_seat_silver_source
    type: load
    readMode: batch
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{silver_schema}"
      table: table_seat_dim
    target: v_table_seat_silver
    description: "Load table_seat from silver for modelling"

  - name: table_seat_model_transform
    type: transform
    transform_type: sql
    readMode: batch
    source: v_table_seat_silver
    target: v_table_seat_modelled
    sql: |
      SELECT
        *,
        current_timestamp() as _modelled_at,
        'v1' as _model_version
      FROM v_table_seat_silver

  - name: write_table_seat_modelled
    type: write
    source: v_table_seat_modelled
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{modelled_schema}"
      table: "table_seat_modelled"
