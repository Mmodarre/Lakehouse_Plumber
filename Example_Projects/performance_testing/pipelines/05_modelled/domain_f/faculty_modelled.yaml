pipeline: perf_modelled
flowgroup: faculty_modelled
presets:
  - default_delta_properties
actions:
  - name: faculty_silver_source
    type: load
    readMode: batch
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{silver_schema}"
      table: faculty_dim
    target: v_faculty_silver
    description: "Load faculty from silver for modelling"

  - name: faculty_model_transform
    type: transform
    transform_type: sql
    readMode: batch
    source: v_faculty_silver
    target: v_faculty_modelled
    sql: |
      SELECT
        *,
        current_timestamp() as _modelled_at,
        'v1' as _model_version
      FROM v_faculty_silver

  - name: write_faculty_modelled
    type: write
    source: v_faculty_modelled
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{modelled_schema}"
      table: "faculty_modelled"
