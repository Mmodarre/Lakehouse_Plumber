pipeline: perf_modelled
flowgroup: program_modelled
presets:
  - default_delta_properties
actions:
  - name: program_silver_source
    type: load
    readMode: batch
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{silver_schema}"
      table: program_dim
    target: v_program_silver
    description: "Load program from silver for modelling"

  - name: program_model_transform
    type: transform
    transform_type: sql
    readMode: batch
    source: v_program_silver
    target: v_program_modelled
    sql: |
      SELECT
        *,
        current_timestamp() as _modelled_at,
        'v1' as _model_version
      FROM v_program_silver

  - name: write_program_modelled
    type: write
    source: v_program_modelled
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{modelled_schema}"
      table: "program_modelled"
