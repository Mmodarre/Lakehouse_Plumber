pipeline: perf_modelled
flowgroup: advisor_modelled
presets:
  - default_delta_properties
actions:
  - name: advisor_silver_source
    type: load
    readMode: batch
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{silver_schema}"
      table: advisor_dim
    target: v_advisor_silver
    description: "Load advisor from silver for modelling"

  - name: advisor_model_transform
    type: transform
    transform_type: sql
    readMode: batch
    source: v_advisor_silver
    target: v_advisor_modelled
    sql: |
      SELECT
        *,
        current_timestamp() as _modelled_at,
        'v1' as _model_version
      FROM v_advisor_silver

  - name: write_advisor_modelled
    type: write
    source: v_advisor_modelled
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{modelled_schema}"
      table: "advisor_modelled"
