pipeline: perf_modelled
flowgroup: instructor_modelled
presets:
  - default_delta_properties
actions:
  - name: instructor_silver_source
    type: load
    readMode: batch
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{silver_schema}"
      table: instructor_dim
    target: v_instructor_silver
    description: "Load instructor from silver for modelling"

  - name: instructor_model_transform
    type: transform
    transform_type: sql
    readMode: batch
    source: v_instructor_silver
    target: v_instructor_modelled
    sql: |
      SELECT
        *,
        current_timestamp() as _modelled_at,
        'v1' as _model_version
      FROM v_instructor_silver

  - name: write_instructor_modelled
    type: write
    source: v_instructor_modelled
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{modelled_schema}"
      table: "instructor_modelled"
