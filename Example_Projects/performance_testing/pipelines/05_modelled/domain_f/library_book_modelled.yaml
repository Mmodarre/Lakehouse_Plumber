pipeline: perf_modelled
flowgroup: library_book_modelled
presets:
  - default_delta_properties
actions:
  - name: library_book_silver_source
    type: load
    readMode: batch
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{silver_schema}"
      table: library_book_dim
    target: v_library_book_silver
    description: "Load library_book from silver for modelling"

  - name: library_book_model_transform
    type: transform
    transform_type: sql
    readMode: batch
    source: v_library_book_silver
    target: v_library_book_modelled
    sql: |
      SELECT
        *,
        current_timestamp() as _modelled_at,
        'v1' as _model_version
      FROM v_library_book_silver

  - name: write_library_book_modelled
    type: write
    source: v_library_book_modelled
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{modelled_schema}"
      table: "library_book_modelled"
