pipeline: perf_modelled
flowgroup: classroom_modelled
presets:
  - default_delta_properties
actions:
  - name: classroom_silver_source
    type: load
    readMode: batch
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{silver_schema}"
      table: classroom_dim
    target: v_classroom_silver
    description: "Load classroom from silver for modelling"

  - name: classroom_model_transform
    type: transform
    transform_type: sql
    readMode: batch
    source: v_classroom_silver
    target: v_classroom_modelled
    sql: |
      SELECT
        *,
        current_timestamp() as _modelled_at,
        'v1' as _model_version
      FROM v_classroom_silver

  - name: write_classroom_modelled
    type: write
    source: v_classroom_modelled
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{modelled_schema}"
      table: "classroom_modelled"
