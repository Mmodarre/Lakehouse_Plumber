pipeline: perf_modelled
flowgroup: course_modelled
presets:
  - default_delta_properties
actions:
  - name: course_silver_source
    type: load
    readMode: batch
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{silver_schema}"
      table: course_dim
    target: v_course_silver
    description: "Load course from silver for modelling"

  - name: course_model_transform
    type: transform
    transform_type: sql
    readMode: batch
    source: v_course_silver
    target: v_course_modelled
    sql: |
      SELECT
        *,
        current_timestamp() as _modelled_at,
        'v1' as _model_version
      FROM v_course_silver

  - name: write_course_modelled
    type: write
    source: v_course_modelled
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{modelled_schema}"
      table: "course_modelled"
