pipeline: perf_modelled
flowgroup: semester_modelled
presets:
  - default_delta_properties
actions:
  - name: semester_silver_source
    type: load
    readMode: batch
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{silver_schema}"
      table: semester_dim
    target: v_semester_silver
    description: "Load semester from silver for modelling"

  - name: semester_model_transform
    type: transform
    transform_type: sql
    readMode: batch
    source: v_semester_silver
    target: v_semester_modelled
    sql: |
      SELECT
        *,
        current_timestamp() as _modelled_at,
        'v1' as _model_version
      FROM v_semester_silver

  - name: write_semester_modelled
    type: write
    source: v_semester_modelled
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{modelled_schema}"
      table: "semester_modelled"
