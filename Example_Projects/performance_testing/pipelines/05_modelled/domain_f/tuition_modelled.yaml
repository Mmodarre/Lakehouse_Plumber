pipeline: perf_modelled
flowgroup: tuition_modelled
presets:
  - default_delta_properties
actions:
  - name: tuition_silver_source
    type: load
    readMode: batch
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{silver_schema}"
      table: tuition_dim
    target: v_tuition_silver
    description: "Load tuition from silver for modelling"

  - name: tuition_model_transform
    type: transform
    transform_type: sql
    readMode: batch
    source: v_tuition_silver
    target: v_tuition_modelled
    sql: |
      SELECT
        *,
        current_timestamp() as _modelled_at,
        'v1' as _model_version
      FROM v_tuition_silver

  - name: write_tuition_modelled
    type: write
    source: v_tuition_modelled
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{modelled_schema}"
      table: "tuition_modelled"
