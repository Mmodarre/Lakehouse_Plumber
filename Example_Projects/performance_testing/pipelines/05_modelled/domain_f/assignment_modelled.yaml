pipeline: perf_modelled
flowgroup: assignment_modelled
presets:
  - default_delta_properties
actions:
  - name: assignment_silver_source
    type: load
    readMode: batch
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{silver_schema}"
      table: assignment_dim
    target: v_assignment_silver
    description: "Load assignment from silver for modelling"

  - name: assignment_model_transform
    type: transform
    transform_type: sql
    readMode: batch
    source: v_assignment_silver
    target: v_assignment_modelled
    sql: |
      SELECT
        *,
        current_timestamp() as _modelled_at,
        'v1' as _model_version
      FROM v_assignment_silver

  - name: write_assignment_modelled
    type: write
    source: v_assignment_modelled
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{modelled_schema}"
      table: "assignment_modelled"
