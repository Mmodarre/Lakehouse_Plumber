pipeline: perf_modelled
flowgroup: audit_modelled
presets:
  - default_delta_properties
actions:
  - name: audit_silver_source
    type: load
    readMode: batch
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{silver_schema}"
      table: audit_dim
    target: v_audit_silver
    description: "Load audit from silver for modelling"

  - name: audit_model_transform
    type: transform
    transform_type: sql
    readMode: batch
    source: v_audit_silver
    target: v_audit_modelled
    sql: |
      SELECT
        *,
        current_timestamp() as _modelled_at,
        'v1' as _model_version
      FROM v_audit_silver

  - name: write_audit_modelled
    type: write
    source: v_audit_modelled
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{modelled_schema}"
      table: "audit_modelled"
