pipeline: perf_modelled
flowgroup: budget_modelled
presets:
  - default_delta_properties
actions:
  - name: budget_silver_source
    type: load
    readMode: batch
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{silver_schema}"
      table: budget_dim
    target: v_budget_silver
    description: "Load budget from silver for modelling"

  - name: budget_model_transform
    type: transform
    transform_type: sql
    readMode: batch
    source: v_budget_silver
    target: v_budget_modelled
    sql: |
      SELECT
        *,
        current_timestamp() as _modelled_at,
        'v1' as _model_version
      FROM v_budget_silver

  - name: write_budget_modelled
    type: write
    source: v_budget_modelled
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{modelled_schema}"
      table: "budget_modelled"
