pipeline: perf_modelled
flowgroup: journal_modelled
presets:
  - default_delta_properties
actions:
  - name: journal_silver_source
    type: load
    readMode: batch
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{silver_schema}"
      table: journal_dim
    target: v_journal_silver
    description: "Load journal from silver for modelling"

  - name: journal_model_transform
    type: transform
    transform_type: sql
    readMode: batch
    source: v_journal_silver
    target: v_journal_modelled
    sql: |
      SELECT
        *,
        current_timestamp() as _modelled_at,
        'v1' as _model_version
      FROM v_journal_silver

  - name: write_journal_modelled
    type: write
    source: v_journal_modelled
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{modelled_schema}"
      table: "journal_modelled"
