pipeline: perf_modelled
flowgroup: tax_modelled
presets:
  - default_delta_properties
actions:
  - name: tax_silver_source
    type: load
    readMode: batch
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{silver_schema}"
      table: tax_dim
    target: v_tax_silver
    description: "Load tax from silver for modelling"

  - name: tax_model_transform
    type: transform
    transform_type: sql
    readMode: batch
    source: v_tax_silver
    target: v_tax_modelled
    sql: |
      SELECT
        *,
        current_timestamp() as _modelled_at,
        'v1' as _model_version
      FROM v_tax_silver

  - name: write_tax_modelled
    type: write
    source: v_tax_modelled
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{modelled_schema}"
      table: "tax_modelled"
