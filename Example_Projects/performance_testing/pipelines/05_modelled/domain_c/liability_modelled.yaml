pipeline: perf_modelled
flowgroup: liability_modelled
presets:
  - default_delta_properties
actions:
  - name: liability_silver_source
    type: load
    readMode: batch
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{silver_schema}"
      table: liability_dim
    target: v_liability_silver
    description: "Load liability from silver for modelling"

  - name: liability_model_transform
    type: transform
    transform_type: sql
    readMode: batch
    source: v_liability_silver
    target: v_liability_modelled
    sql: |
      SELECT
        *,
        current_timestamp() as _modelled_at,
        'v1' as _model_version
      FROM v_liability_silver

  - name: write_liability_modelled
    type: write
    source: v_liability_modelled
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{modelled_schema}"
      table: "liability_modelled"
