pipeline: perf_modelled
flowgroup: compliance_modelled
presets:
  - default_delta_properties
actions:
  - name: compliance_silver_source
    type: load
    readMode: batch
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{silver_schema}"
      table: compliance_dim
    target: v_compliance_silver
    description: "Load compliance from silver for modelling"

  - name: compliance_model_transform
    type: transform
    transform_type: sql
    readMode: batch
    source: v_compliance_silver
    target: v_compliance_modelled
    sql: |
      SELECT
        *,
        current_timestamp() as _modelled_at,
        'v1' as _model_version
      FROM v_compliance_silver

  - name: write_compliance_modelled
    type: write
    source: v_compliance_modelled
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{modelled_schema}"
      table: "compliance_modelled"
