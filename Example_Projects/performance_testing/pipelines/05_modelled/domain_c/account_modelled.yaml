pipeline: perf_modelled
flowgroup: account_modelled
presets:
  - default_delta_properties
actions:
  - name: account_silver_source
    type: load
    readMode: batch
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{silver_schema}"
      table: account_dim
    target: v_account_silver
    description: "Load account from silver for modelling"

  - name: account_model_transform
    type: transform
    transform_type: sql
    readMode: batch
    source: v_account_silver
    target: v_account_modelled
    sql: |
      SELECT
        *,
        current_timestamp() as _modelled_at,
        'v1' as _model_version
      FROM v_account_silver

  - name: write_account_modelled
    type: write
    source: v_account_modelled
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{modelled_schema}"
      table: "account_modelled"
