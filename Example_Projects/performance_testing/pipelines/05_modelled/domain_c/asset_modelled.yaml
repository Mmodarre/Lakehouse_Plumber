pipeline: perf_modelled
flowgroup: asset_modelled
presets:
  - default_delta_properties
actions:
  - name: asset_silver_source
    type: load
    readMode: batch
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{silver_schema}"
      table: asset_dim
    target: v_asset_silver
    description: "Load asset from silver for modelling"

  - name: asset_model_transform
    type: transform
    transform_type: sql
    readMode: batch
    source: v_asset_silver
    target: v_asset_modelled
    sql: |
      SELECT
        *,
        current_timestamp() as _modelled_at,
        'v1' as _model_version
      FROM v_asset_silver

  - name: write_asset_modelled
    type: write
    source: v_asset_modelled
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{modelled_schema}"
      table: "asset_modelled"
