pipeline: perf_modelled
flowgroup: ledger_modelled
presets:
  - default_delta_properties
actions:
  - name: ledger_silver_source
    type: load
    readMode: batch
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{silver_schema}"
      table: ledger_dim
    target: v_ledger_silver
    description: "Load ledger from silver for modelling"

  - name: ledger_model_transform
    type: transform
    transform_type: sql
    readMode: batch
    source: v_ledger_silver
    target: v_ledger_modelled
    sql: |
      SELECT
        *,
        current_timestamp() as _modelled_at,
        'v1' as _model_version
      FROM v_ledger_silver

  - name: write_ledger_modelled
    type: write
    source: v_ledger_modelled
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{modelled_schema}"
      table: "ledger_modelled"
