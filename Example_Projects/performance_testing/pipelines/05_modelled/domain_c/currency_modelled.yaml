pipeline: perf_modelled
flowgroup: currency_modelled
presets:
  - default_delta_properties
actions:
  - name: currency_silver_source
    type: load
    readMode: batch
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{silver_schema}"
      table: currency_dim
    target: v_currency_silver
    description: "Load currency from silver for modelling"

  - name: currency_model_transform
    type: transform
    transform_type: sql
    readMode: batch
    source: v_currency_silver
    target: v_currency_modelled
    sql: |
      SELECT
        *,
        current_timestamp() as _modelled_at,
        'v1' as _model_version
      FROM v_currency_silver

  - name: write_currency_modelled
    type: write
    source: v_currency_modelled
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{modelled_schema}"
      table: "currency_modelled"
