pipeline: perf_modelled
flowgroup: transaction_modelled
presets:
  - default_delta_properties
actions:
  - name: transaction_silver_source
    type: load
    readMode: batch
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{silver_schema}"
      table: transaction_dim
    target: v_transaction_silver
    description: "Load transaction from silver for modelling"

  - name: transaction_model_transform
    type: transform
    transform_type: sql
    readMode: batch
    source: v_transaction_silver
    target: v_transaction_modelled
    sql: |
      SELECT
        *,
        current_timestamp() as _modelled_at,
        'v1' as _model_version
      FROM v_transaction_silver

  - name: write_transaction_modelled
    type: write
    source: v_transaction_modelled
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{modelled_schema}"
      table: "transaction_modelled"
