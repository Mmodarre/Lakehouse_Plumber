pipeline: perf_modelled
flowgroup: expense_modelled
presets:
  - default_delta_properties
actions:
  - name: expense_silver_source
    type: load
    readMode: batch
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{silver_schema}"
      table: expense_dim
    target: v_expense_silver
    description: "Load expense from silver for modelling"

  - name: expense_model_transform
    type: transform
    transform_type: sql
    readMode: batch
    source: v_expense_silver
    target: v_expense_modelled
    sql: |
      SELECT
        *,
        current_timestamp() as _modelled_at,
        'v1' as _model_version
      FROM v_expense_silver

  - name: write_expense_modelled
    type: write
    source: v_expense_modelled
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{modelled_schema}"
      table: "expense_modelled"
