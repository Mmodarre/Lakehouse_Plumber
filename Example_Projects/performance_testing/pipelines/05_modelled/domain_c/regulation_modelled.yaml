pipeline: perf_modelled
flowgroup: regulation_modelled
presets:
  - default_delta_properties
actions:
  - name: regulation_silver_source
    type: load
    readMode: batch
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{silver_schema}"
      table: regulation_dim
    target: v_regulation_silver
    description: "Load regulation from silver for modelling"

  - name: regulation_model_transform
    type: transform
    transform_type: sql
    readMode: batch
    source: v_regulation_silver
    target: v_regulation_modelled
    sql: |
      SELECT
        *,
        current_timestamp() as _modelled_at,
        'v1' as _model_version
      FROM v_regulation_silver

  - name: write_regulation_modelled
    type: write
    source: v_regulation_modelled
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{modelled_schema}"
      table: "regulation_modelled"
