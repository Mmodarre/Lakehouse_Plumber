pipeline: perf_modelled
flowgroup: deed_modelled
presets:
  - default_delta_properties
actions:
  - name: deed_silver_source
    type: load
    readMode: batch
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{silver_schema}"
      table: deed_dim
    target: v_deed_silver
    description: "Load deed from silver for modelling"

  - name: deed_model_transform
    type: transform
    transform_type: sql
    readMode: batch
    source: v_deed_silver
    target: v_deed_modelled
    sql: |
      SELECT
        *,
        current_timestamp() as _modelled_at,
        'v1' as _model_version
      FROM v_deed_silver

  - name: write_deed_modelled
    type: write
    source: v_deed_modelled
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{modelled_schema}"
      table: "deed_modelled"
