pipeline: perf_modelled
flowgroup: lease_modelled
presets:
  - default_delta_properties
actions:
  - name: lease_silver_source
    type: load
    readMode: batch
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{silver_schema}"
      table: lease_dim
    target: v_lease_silver
    description: "Load lease from silver for modelling"

  - name: lease_model_transform
    type: transform
    transform_type: sql
    readMode: batch
    source: v_lease_silver
    target: v_lease_modelled
    sql: |
      SELECT
        *,
        current_timestamp() as _modelled_at,
        'v1' as _model_version
      FROM v_lease_silver

  - name: write_lease_modelled
    type: write
    source: v_lease_modelled
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{modelled_schema}"
      table: "lease_modelled"
