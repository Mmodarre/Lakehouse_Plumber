pipeline: perf_modelled
flowgroup: appraisal_modelled
presets:
  - default_delta_properties
actions:
  - name: appraisal_silver_source
    type: load
    readMode: batch
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{silver_schema}"
      table: appraisal_dim
    target: v_appraisal_silver
    description: "Load appraisal from silver for modelling"

  - name: appraisal_model_transform
    type: transform
    transform_type: sql
    readMode: batch
    source: v_appraisal_silver
    target: v_appraisal_modelled
    sql: |
      SELECT
        *,
        current_timestamp() as _modelled_at,
        'v1' as _model_version
      FROM v_appraisal_silver

  - name: write_appraisal_modelled
    type: write
    source: v_appraisal_modelled
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{modelled_schema}"
      table: "appraisal_modelled"
