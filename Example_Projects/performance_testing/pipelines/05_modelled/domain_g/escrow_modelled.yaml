pipeline: perf_modelled
flowgroup: escrow_modelled
presets:
  - default_delta_properties
actions:
  - name: escrow_silver_source
    type: load
    readMode: batch
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{silver_schema}"
      table: escrow_dim
    target: v_escrow_silver
    description: "Load escrow from silver for modelling"

  - name: escrow_model_transform
    type: transform
    transform_type: sql
    readMode: batch
    source: v_escrow_silver
    target: v_escrow_modelled
    sql: |
      SELECT
        *,
        current_timestamp() as _modelled_at,
        'v1' as _model_version
      FROM v_escrow_silver

  - name: write_escrow_modelled
    type: write
    source: v_escrow_modelled
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{modelled_schema}"
      table: "escrow_modelled"
