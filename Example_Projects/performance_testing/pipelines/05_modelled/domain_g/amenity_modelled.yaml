pipeline: perf_modelled
flowgroup: amenity_modelled
presets:
  - default_delta_properties
actions:
  - name: amenity_silver_source
    type: load
    readMode: batch
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{silver_schema}"
      table: amenity_dim
    target: v_amenity_silver
    description: "Load amenity from silver for modelling"

  - name: amenity_model_transform
    type: transform
    transform_type: sql
    readMode: batch
    source: v_amenity_silver
    target: v_amenity_modelled
    sql: |
      SELECT
        *,
        current_timestamp() as _modelled_at,
        'v1' as _model_version
      FROM v_amenity_silver

  - name: write_amenity_modelled
    type: write
    source: v_amenity_modelled
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{modelled_schema}"
      table: "amenity_modelled"
