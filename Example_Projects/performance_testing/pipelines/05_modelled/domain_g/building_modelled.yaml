pipeline: perf_modelled
flowgroup: building_modelled
presets:
  - default_delta_properties
actions:
  - name: building_silver_source
    type: load
    readMode: batch
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{silver_schema}"
      table: building_dim
    target: v_building_silver
    description: "Load building from silver for modelling"

  - name: building_model_transform
    type: transform
    transform_type: sql
    readMode: batch
    source: v_building_silver
    target: v_building_modelled
    sql: |
      SELECT
        *,
        current_timestamp() as _modelled_at,
        'v1' as _model_version
      FROM v_building_silver

  - name: write_building_modelled
    type: write
    source: v_building_modelled
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{modelled_schema}"
      table: "building_modelled"
