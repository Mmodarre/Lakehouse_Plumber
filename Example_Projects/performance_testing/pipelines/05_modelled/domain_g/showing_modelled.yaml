pipeline: perf_modelled
flowgroup: showing_modelled
presets:
  - default_delta_properties
actions:
  - name: showing_silver_source
    type: load
    readMode: batch
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{silver_schema}"
      table: showing_dim
    target: v_showing_silver
    description: "Load showing from silver for modelling"

  - name: showing_model_transform
    type: transform
    transform_type: sql
    readMode: batch
    source: v_showing_silver
    target: v_showing_modelled
    sql: |
      SELECT
        *,
        current_timestamp() as _modelled_at,
        'v1' as _model_version
      FROM v_showing_silver

  - name: write_showing_modelled
    type: write
    source: v_showing_modelled
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{modelled_schema}"
      table: "showing_modelled"
