pipeline: perf_modelled
flowgroup: zoning_modelled
presets:
  - default_delta_properties
actions:
  - name: zoning_silver_source
    type: load
    readMode: batch
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{silver_schema}"
      table: zoning_dim
    target: v_zoning_silver
    description: "Load zoning from silver for modelling"

  - name: zoning_model_transform
    type: transform
    transform_type: sql
    readMode: batch
    source: v_zoning_silver
    target: v_zoning_modelled
    sql: |
      SELECT
        *,
        current_timestamp() as _modelled_at,
        'v1' as _model_version
      FROM v_zoning_silver

  - name: write_zoning_modelled
    type: write
    source: v_zoning_modelled
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{modelled_schema}"
      table: "zoning_modelled"
