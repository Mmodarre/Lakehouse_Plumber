pipeline: perf_modelled
flowgroup: closing_modelled
presets:
  - default_delta_properties
actions:
  - name: closing_silver_source
    type: load
    readMode: batch
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{silver_schema}"
      table: closing_dim
    target: v_closing_silver
    description: "Load closing from silver for modelling"

  - name: closing_model_transform
    type: transform
    transform_type: sql
    readMode: batch
    source: v_closing_silver
    target: v_closing_modelled
    sql: |
      SELECT
        *,
        current_timestamp() as _modelled_at,
        'v1' as _model_version
      FROM v_closing_silver

  - name: write_closing_modelled
    type: write
    source: v_closing_modelled
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{modelled_schema}"
      table: "closing_modelled"
