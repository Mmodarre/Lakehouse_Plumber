pipeline: perf_modelled
flowgroup: unit_modelled
presets:
  - default_delta_properties
actions:
  - name: unit_silver_source
    type: load
    readMode: batch
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{silver_schema}"
      table: unit_dim
    target: v_unit_silver
    description: "Load unit from silver for modelling"

  - name: unit_model_transform
    type: transform
    transform_type: sql
    readMode: batch
    source: v_unit_silver
    target: v_unit_modelled
    sql: |
      SELECT
        *,
        current_timestamp() as _modelled_at,
        'v1' as _model_version
      FROM v_unit_silver

  - name: write_unit_modelled
    type: write
    source: v_unit_modelled
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{modelled_schema}"
      table: "unit_modelled"
