pipeline: perf_modelled
flowgroup: cohort_modelled
presets:
  - default_delta_properties
actions:
  - name: cohort_silver_source
    type: load
    readMode: batch
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{silver_schema}"
      table: cohort_dim
    target: v_cohort_silver
    description: "Load cohort from silver for modelling"

  - name: cohort_model_transform
    type: transform
    transform_type: sql
    readMode: batch
    source: v_cohort_silver
    target: v_cohort_modelled
    sql: |
      SELECT
        *,
        current_timestamp() as _modelled_at,
        'v1' as _model_version
      FROM v_cohort_silver

  - name: write_cohort_modelled
    type: write
    source: v_cohort_modelled
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{modelled_schema}"
      table: "cohort_modelled"
