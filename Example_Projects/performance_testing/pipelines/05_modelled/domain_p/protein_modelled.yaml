pipeline: domain_p_modelled
flowgroup: protein_modelled
presets:
  - default_delta_properties
actions:
  - name: protein_silver_source
    type: load
    readMode: batch
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{silver_schema}"
      table: protein_dim
    target: v_protein_silver
    description: "Load protein from silver for modelling"

  - name: protein_model_transform
    type: transform
    transform_type: sql
    readMode: batch
    source: v_protein_silver
    target: v_protein_modelled
    sql: |
      SELECT
        *,
        current_timestamp() as _modelled_at,
        'v1' as _model_version
      FROM v_protein_silver

  - name: write_protein_modelled
    type: write
    source: v_protein_modelled
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{modelled_schema}"
      table: "protein_modelled"
