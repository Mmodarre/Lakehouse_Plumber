pipeline: perf_modelled
flowgroup: placebo_modelled
presets:
  - default_delta_properties
actions:
  - name: placebo_silver_source
    type: load
    readMode: batch
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{silver_schema}"
      table: placebo_dim
    target: v_placebo_silver
    description: "Load placebo from silver for modelling"

  - name: placebo_model_transform
    type: transform
    transform_type: sql
    readMode: batch
    source: v_placebo_silver
    target: v_placebo_modelled
    sql: |
      SELECT
        *,
        current_timestamp() as _modelled_at,
        'v1' as _model_version
      FROM v_placebo_silver

  - name: write_placebo_modelled
    type: write
    source: v_placebo_modelled
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{modelled_schema}"
      table: "placebo_modelled"
