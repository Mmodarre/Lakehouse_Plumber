pipeline: domain_p_modelled
flowgroup: alignment_modelled
presets:
  - default_delta_properties
actions:
  - name: alignment_silver_source
    type: load
    readMode: batch
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{silver_schema}"
      table: alignment_dim
    target: v_alignment_silver
    description: "Load alignment from silver for modelling"

  - name: alignment_model_transform
    type: transform
    transform_type: sql
    readMode: batch
    source: v_alignment_silver
    target: v_alignment_modelled
    sql: |
      SELECT
        *,
        current_timestamp() as _modelled_at,
        'v1' as _model_version
      FROM v_alignment_silver

  - name: write_alignment_modelled
    type: write
    source: v_alignment_modelled
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{modelled_schema}"
      table: "alignment_modelled"
