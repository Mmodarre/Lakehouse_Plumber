pipeline: domain_p_modelled
flowgroup: reagent_modelled
presets:
  - default_delta_properties
actions:
  - name: reagent_silver_source
    type: load
    readMode: batch
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{silver_schema}"
      table: reagent_dim
    target: v_reagent_silver
    description: "Load reagent from silver for modelling"

  - name: reagent_model_transform
    type: transform
    transform_type: sql
    readMode: batch
    source: v_reagent_silver
    target: v_reagent_modelled
    sql: |
      SELECT
        *,
        current_timestamp() as _modelled_at,
        'v1' as _model_version
      FROM v_reagent_silver

  - name: write_reagent_modelled
    type: write
    source: v_reagent_modelled
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{modelled_schema}"
      table: "reagent_modelled"
