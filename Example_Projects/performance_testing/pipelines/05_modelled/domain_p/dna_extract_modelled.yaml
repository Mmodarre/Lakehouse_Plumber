pipeline: domain_p_modelled
flowgroup: dna_extract_modelled
presets:
  - default_delta_properties
actions:
  - name: dna_extract_silver_source
    type: load
    readMode: batch
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{silver_schema}"
      table: dna_extract_dim
    target: v_dna_extract_silver
    description: "Load dna_extract from silver for modelling"

  - name: dna_extract_model_transform
    type: transform
    transform_type: sql
    readMode: batch
    source: v_dna_extract_silver
    target: v_dna_extract_modelled
    sql: |
      SELECT
        *,
        current_timestamp() as _modelled_at,
        'v1' as _model_version
      FROM v_dna_extract_silver

  - name: write_dna_extract_modelled
    type: write
    source: v_dna_extract_modelled
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{modelled_schema}"
      table: "dna_extract_modelled"
