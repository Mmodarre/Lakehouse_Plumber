pipeline: domain_p_modelled
flowgroup: variant_call_modelled
presets:
  - default_delta_properties
actions:
  - name: variant_call_silver_source
    type: load
    readMode: batch
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{silver_schema}"
      table: variant_call_dim
    target: v_variant_call_silver
    description: "Load variant_call from silver for modelling"

  - name: variant_call_model_transform
    type: transform
    transform_type: sql
    readMode: batch
    source: v_variant_call_silver
    target: v_variant_call_modelled
    sql: |
      SELECT
        *,
        current_timestamp() as _modelled_at,
        'v1' as _model_version
      FROM v_variant_call_silver

  - name: write_variant_call_modelled
    type: write
    source: v_variant_call_modelled
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{modelled_schema}"
      table: "variant_call_modelled"
