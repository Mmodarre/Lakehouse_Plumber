pipeline: perf_modelled
flowgroup: toxicology_modelled
presets:
  - default_delta_properties
actions:
  - name: toxicology_silver_source
    type: load
    readMode: batch
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{silver_schema}"
      table: toxicology_dim
    target: v_toxicology_silver
    description: "Load toxicology from silver for modelling"

  - name: toxicology_model_transform
    type: transform
    transform_type: sql
    readMode: batch
    source: v_toxicology_silver
    target: v_toxicology_modelled
    sql: |
      SELECT
        *,
        current_timestamp() as _modelled_at,
        'v1' as _model_version
      FROM v_toxicology_silver

  - name: write_toxicology_modelled
    type: write
    source: v_toxicology_modelled
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{modelled_schema}"
      table: "toxicology_modelled"
