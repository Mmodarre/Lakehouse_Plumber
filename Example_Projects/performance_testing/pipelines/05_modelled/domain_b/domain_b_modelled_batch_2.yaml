pipeline: domain_b_modelled
flowgroup: bonus_modelled
presets:
  - default_delta_properties
actions:
  - name: bonus_silver_source
    type: load
    readMode: batch
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{silver_schema}"
      table: bonus_dim
    target: v_bonus_silver
    description: "Load bonus from silver for modelling"

  - name: bonus_model_transform
    type: transform
    transform_type: sql
    readMode: batch
    source: v_bonus_silver
    target: v_bonus_modelled
    sql: |
      SELECT
        *,
        current_timestamp() as _modelled_at,
        'v1' as _model_version
      FROM v_bonus_silver

  - name: write_bonus_modelled
    type: write
    source: v_bonus_modelled
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{modelled_schema}"
      table: "bonus_modelled"
---
