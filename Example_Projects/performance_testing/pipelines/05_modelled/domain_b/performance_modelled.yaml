pipeline: perf_modelled
flowgroup: performance_modelled
presets:
  - default_delta_properties
actions:
  - name: performance_silver_source
    type: load
    readMode: batch
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{silver_schema}"
      table: performance_dim
    target: v_performance_silver
    description: "Load performance from silver for modelling"

  - name: performance_model_transform
    type: transform
    transform_type: sql
    readMode: batch
    source: v_performance_silver
    target: v_performance_modelled
    sql: |
      SELECT
        *,
        current_timestamp() as _modelled_at,
        'v1' as _model_version
      FROM v_performance_silver

  - name: write_performance_modelled
    type: write
    source: v_performance_modelled
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{modelled_schema}"
      table: "performance_modelled"
