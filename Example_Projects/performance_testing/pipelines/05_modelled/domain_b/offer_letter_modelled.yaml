pipeline: perf_modelled
flowgroup: offer_letter_modelled
presets:
  - default_delta_properties
actions:
  - name: offer_letter_silver_source
    type: load
    readMode: batch
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{silver_schema}"
      table: offer_letter_dim
    target: v_offer_letter_silver
    description: "Load offer_letter from silver for modelling"

  - name: offer_letter_model_transform
    type: transform
    transform_type: sql
    readMode: batch
    source: v_offer_letter_silver
    target: v_offer_letter_modelled
    sql: |
      SELECT
        *,
        current_timestamp() as _modelled_at,
        'v1' as _model_version
      FROM v_offer_letter_silver

  - name: write_offer_letter_modelled
    type: write
    source: v_offer_letter_modelled
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{modelled_schema}"
      table: "offer_letter_modelled"
