pipeline: perf_modelled
flowgroup: benefit_modelled
presets:
  - default_delta_properties
actions:
  - name: benefit_silver_source
    type: load
    readMode: batch
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{silver_schema}"
      table: benefit_dim
    target: v_benefit_silver
    description: "Load benefit from silver for modelling"

  - name: benefit_model_transform
    type: transform
    transform_type: sql
    readMode: batch
    source: v_benefit_silver
    target: v_benefit_modelled
    sql: |
      SELECT
        *,
        current_timestamp() as _modelled_at,
        'v1' as _model_version
      FROM v_benefit_silver

  - name: write_benefit_modelled
    type: write
    source: v_benefit_modelled
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{modelled_schema}"
      table: "benefit_modelled"
