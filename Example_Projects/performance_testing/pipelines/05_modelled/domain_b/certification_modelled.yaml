pipeline: perf_modelled
flowgroup: certification_modelled
presets:
  - default_delta_properties
actions:
  - name: certification_silver_source
    type: load
    readMode: batch
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{silver_schema}"
      table: certification_dim
    target: v_certification_silver
    description: "Load certification from silver for modelling"

  - name: certification_model_transform
    type: transform
    transform_type: sql
    readMode: batch
    source: v_certification_silver
    target: v_certification_modelled
    sql: |
      SELECT
        *,
        current_timestamp() as _modelled_at,
        'v1' as _model_version
      FROM v_certification_silver

  - name: write_certification_modelled
    type: write
    source: v_certification_modelled
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{modelled_schema}"
      table: "certification_modelled"
