pipeline: perf_modelled
flowgroup: onboarding_modelled
presets:
  - default_delta_properties
actions:
  - name: onboarding_silver_source
    type: load
    readMode: batch
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{silver_schema}"
      table: onboarding_dim
    target: v_onboarding_silver
    description: "Load onboarding from silver for modelling"

  - name: onboarding_model_transform
    type: transform
    transform_type: sql
    readMode: batch
    source: v_onboarding_silver
    target: v_onboarding_modelled
    sql: |
      SELECT
        *,
        current_timestamp() as _modelled_at,
        'v1' as _model_version
      FROM v_onboarding_silver

  - name: write_onboarding_modelled
    type: write
    source: v_onboarding_modelled
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{modelled_schema}"
      table: "onboarding_modelled"
