pipeline: perf_modelled
flowgroup: payroll_modelled
presets:
  - default_delta_properties
actions:
  - name: payroll_silver_source
    type: load
    readMode: batch
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{silver_schema}"
      table: payroll_dim
    target: v_payroll_silver
    description: "Load payroll from silver for modelling"

  - name: payroll_model_transform
    type: transform
    transform_type: sql
    readMode: batch
    source: v_payroll_silver
    target: v_payroll_modelled
    sql: |
      SELECT
        *,
        current_timestamp() as _modelled_at,
        'v1' as _model_version
      FROM v_payroll_silver

  - name: write_payroll_modelled
    type: write
    source: v_payroll_modelled
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{modelled_schema}"
      table: "payroll_modelled"
