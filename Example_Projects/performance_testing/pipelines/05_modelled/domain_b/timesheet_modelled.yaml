pipeline: perf_modelled
flowgroup: timesheet_modelled
presets:
  - default_delta_properties
actions:
  - name: timesheet_silver_source
    type: load
    readMode: batch
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{silver_schema}"
      table: timesheet_dim
    target: v_timesheet_silver
    description: "Load timesheet from silver for modelling"

  - name: timesheet_model_transform
    type: transform
    transform_type: sql
    readMode: batch
    source: v_timesheet_silver
    target: v_timesheet_modelled
    sql: |
      SELECT
        *,
        current_timestamp() as _modelled_at,
        'v1' as _model_version
      FROM v_timesheet_silver

  - name: write_timesheet_modelled
    type: write
    source: v_timesheet_modelled
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{modelled_schema}"
      table: "timesheet_modelled"
