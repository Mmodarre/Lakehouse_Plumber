pipeline: perf_modelled
flowgroup: candidate_modelled
presets:
  - default_delta_properties
actions:
  - name: candidate_silver_source
    type: load
    readMode: batch
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{silver_schema}"
      table: candidate_dim
    target: v_candidate_silver
    description: "Load candidate from silver for modelling"

  - name: candidate_model_transform
    type: transform
    transform_type: sql
    readMode: batch
    source: v_candidate_silver
    target: v_candidate_modelled
    sql: |
      SELECT
        *,
        current_timestamp() as _modelled_at,
        'v1' as _model_version
      FROM v_candidate_silver

  - name: write_candidate_modelled
    type: write
    source: v_candidate_modelled
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{modelled_schema}"
      table: "candidate_modelled"
