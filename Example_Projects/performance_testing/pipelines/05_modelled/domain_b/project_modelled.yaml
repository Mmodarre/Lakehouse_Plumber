pipeline: perf_modelled
flowgroup: project_modelled
presets:
  - default_delta_properties
actions:
  - name: project_silver_source
    type: load
    readMode: batch
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{silver_schema}"
      table: project_dim
    target: v_project_silver
    description: "Load project from silver for modelling"

  - name: project_model_transform
    type: transform
    transform_type: sql
    readMode: batch
    source: v_project_silver
    target: v_project_modelled
    sql: |
      SELECT
        *,
        current_timestamp() as _modelled_at,
        'v1' as _model_version
      FROM v_project_silver

  - name: write_project_modelled
    type: write
    source: v_project_modelled
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{modelled_schema}"
      table: "project_modelled"
