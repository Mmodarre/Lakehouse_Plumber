pipeline: perf_modelled
flowgroup: feedback_modelled
presets:
  - default_delta_properties
actions:
  - name: feedback_silver_source
    type: load
    readMode: batch
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{silver_schema}"
      table: feedback_dim
    target: v_feedback_silver
    description: "Load feedback from silver for modelling"

  - name: feedback_model_transform
    type: transform
    transform_type: sql
    readMode: batch
    source: v_feedback_silver
    target: v_feedback_modelled
    sql: |
      SELECT
        *,
        current_timestamp() as _modelled_at,
        'v1' as _model_version
      FROM v_feedback_silver

  - name: write_feedback_modelled
    type: write
    source: v_feedback_modelled
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{modelled_schema}"
      table: "feedback_modelled"
