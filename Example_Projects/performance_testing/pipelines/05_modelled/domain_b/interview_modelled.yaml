pipeline: perf_modelled
flowgroup: interview_modelled
presets:
  - default_delta_properties
actions:
  - name: interview_silver_source
    type: load
    readMode: batch
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{silver_schema}"
      table: interview_dim
    target: v_interview_silver
    description: "Load interview from silver for modelling"

  - name: interview_model_transform
    type: transform
    transform_type: sql
    readMode: batch
    source: v_interview_silver
    target: v_interview_modelled
    sql: |
      SELECT
        *,
        current_timestamp() as _modelled_at,
        'v1' as _model_version
      FROM v_interview_silver

  - name: write_interview_modelled
    type: write
    source: v_interview_modelled
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{modelled_schema}"
      table: "interview_modelled"
