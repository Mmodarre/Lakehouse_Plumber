pipeline: perf_modelled
flowgroup: job_posting_modelled
presets:
  - default_delta_properties
actions:
  - name: job_posting_silver_source
    type: load
    readMode: batch
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{silver_schema}"
      table: job_posting_dim
    target: v_job_posting_silver
    description: "Load job_posting from silver for modelling"

  - name: job_posting_model_transform
    type: transform
    transform_type: sql
    readMode: batch
    source: v_job_posting_silver
    target: v_job_posting_modelled
    sql: |
      SELECT
        *,
        current_timestamp() as _modelled_at,
        'v1' as _model_version
      FROM v_job_posting_silver

  - name: write_job_posting_modelled
    type: write
    source: v_job_posting_modelled
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{modelled_schema}"
      table: "job_posting_modelled"
