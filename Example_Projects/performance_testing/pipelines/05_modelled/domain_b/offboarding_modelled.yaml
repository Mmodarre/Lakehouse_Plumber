pipeline: perf_modelled
flowgroup: offboarding_modelled
presets:
  - default_delta_properties
actions:
  - name: offboarding_silver_source
    type: load
    readMode: batch
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{silver_schema}"
      table: offboarding_dim
    target: v_offboarding_silver
    description: "Load offboarding from silver for modelling"

  - name: offboarding_model_transform
    type: transform
    transform_type: sql
    readMode: batch
    source: v_offboarding_silver
    target: v_offboarding_modelled
    sql: |
      SELECT
        *,
        current_timestamp() as _modelled_at,
        'v1' as _model_version
      FROM v_offboarding_silver

  - name: write_offboarding_modelled
    type: write
    source: v_offboarding_modelled
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{modelled_schema}"
      table: "offboarding_modelled"
