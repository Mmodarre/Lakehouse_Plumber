pipeline: perf_modelled
flowgroup: escalation_modelled
presets:
  - default_delta_properties
actions:
  - name: escalation_silver_source
    type: load
    readMode: batch
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{silver_schema}"
      table: escalation_dim
    target: v_escalation_silver
    description: "Load escalation from silver for modelling"

  - name: escalation_model_transform
    type: transform
    transform_type: sql
    readMode: batch
    source: v_escalation_silver
    target: v_escalation_modelled
    sql: |
      SELECT
        *,
        current_timestamp() as _modelled_at,
        'v1' as _model_version
      FROM v_escalation_silver

  - name: write_escalation_modelled
    type: write
    source: v_escalation_modelled
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{modelled_schema}"
      table: "escalation_modelled"
