pipeline: perf_modelled
flowgroup: diagnostic_modelled
presets:
  - default_delta_properties
actions:
  - name: diagnostic_silver_source
    type: load
    readMode: batch
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{silver_schema}"
      table: diagnostic_dim
    target: v_diagnostic_silver
    description: "Load diagnostic from silver for modelling"

  - name: diagnostic_model_transform
    type: transform
    transform_type: sql
    readMode: batch
    source: v_diagnostic_silver
    target: v_diagnostic_modelled
    sql: |
      SELECT
        *,
        current_timestamp() as _modelled_at,
        'v1' as _model_version
      FROM v_diagnostic_silver

  - name: write_diagnostic_modelled
    type: write
    source: v_diagnostic_modelled
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{modelled_schema}"
      table: "diagnostic_modelled"
