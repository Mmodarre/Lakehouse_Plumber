pipeline: perf_modelled
flowgroup: anomaly_modelled
presets:
  - default_delta_properties
actions:
  - name: anomaly_silver_source
    type: load
    readMode: batch
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{silver_schema}"
      table: anomaly_dim
    target: v_anomaly_silver
    description: "Load anomaly from silver for modelling"

  - name: anomaly_model_transform
    type: transform
    transform_type: sql
    readMode: batch
    source: v_anomaly_silver
    target: v_anomaly_modelled
    sql: |
      SELECT
        *,
        current_timestamp() as _modelled_at,
        'v1' as _model_version
      FROM v_anomaly_silver

  - name: write_anomaly_modelled
    type: write
    source: v_anomaly_modelled
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{modelled_schema}"
      table: "anomaly_modelled"
