pipeline: perf_modelled
flowgroup: mqtt_topic_modelled
presets:
  - default_delta_properties
actions:
  - name: mqtt_topic_silver_source
    type: load
    readMode: batch
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{silver_schema}"
      table: mqtt_topic_dim
    target: v_mqtt_topic_silver
    description: "Load mqtt_topic from silver for modelling"

  - name: mqtt_topic_model_transform
    type: transform
    transform_type: sql
    readMode: batch
    source: v_mqtt_topic_silver
    target: v_mqtt_topic_modelled
    sql: |
      SELECT
        *,
        current_timestamp() as _modelled_at,
        'v1' as _model_version
      FROM v_mqtt_topic_silver

  - name: write_mqtt_topic_modelled
    type: write
    source: v_mqtt_topic_modelled
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{modelled_schema}"
      table: "mqtt_topic_modelled"
