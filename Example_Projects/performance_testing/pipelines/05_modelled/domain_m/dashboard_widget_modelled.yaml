pipeline: perf_modelled
flowgroup: dashboard_widget_modelled
presets:
  - default_delta_properties
actions:
  - name: dashboard_widget_silver_source
    type: load
    readMode: batch
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{silver_schema}"
      table: dashboard_widget_dim
    target: v_dashboard_widget_silver
    description: "Load dashboard_widget from silver for modelling"

  - name: dashboard_widget_model_transform
    type: transform
    transform_type: sql
    readMode: batch
    source: v_dashboard_widget_silver
    target: v_dashboard_widget_modelled
    sql: |
      SELECT
        *,
        current_timestamp() as _modelled_at,
        'v1' as _model_version
      FROM v_dashboard_widget_silver

  - name: write_dashboard_widget_modelled
    type: write
    source: v_dashboard_widget_modelled
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{modelled_schema}"
      table: "dashboard_widget_modelled"
