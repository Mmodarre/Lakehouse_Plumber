pipeline: perf_modelled
flowgroup: retention_policy_modelled
presets:
  - default_delta_properties
actions:
  - name: retention_policy_silver_source
    type: load
    readMode: batch
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{silver_schema}"
      table: retention_policy_dim
    target: v_retention_policy_silver
    description: "Load retention_policy from silver for modelling"

  - name: retention_policy_model_transform
    type: transform
    transform_type: sql
    readMode: batch
    source: v_retention_policy_silver
    target: v_retention_policy_modelled
    sql: |
      SELECT
        *,
        current_timestamp() as _modelled_at,
        'v1' as _model_version
      FROM v_retention_policy_silver

  - name: write_retention_policy_modelled
    type: write
    source: v_retention_policy_modelled
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{modelled_schema}"
      table: "retention_policy_modelled"
