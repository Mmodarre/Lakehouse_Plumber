pipeline: perf_modelled
flowgroup: firmware_modelled
presets:
  - default_delta_properties
actions:
  - name: firmware_silver_source
    type: load
    readMode: batch
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{silver_schema}"
      table: firmware_dim
    target: v_firmware_silver
    description: "Load firmware from silver for modelling"

  - name: firmware_model_transform
    type: transform
    transform_type: sql
    readMode: batch
    source: v_firmware_silver
    target: v_firmware_modelled
    sql: |
      SELECT
        *,
        current_timestamp() as _modelled_at,
        'v1' as _model_version
      FROM v_firmware_silver

  - name: write_firmware_modelled
    type: write
    source: v_firmware_modelled
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{modelled_schema}"
      table: "firmware_modelled"
