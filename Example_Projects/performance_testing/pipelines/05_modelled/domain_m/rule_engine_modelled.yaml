pipeline: perf_modelled
flowgroup: rule_engine_modelled
presets:
  - default_delta_properties
actions:
  - name: rule_engine_silver_source
    type: load
    readMode: batch
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{silver_schema}"
      table: rule_engine_dim
    target: v_rule_engine_silver
    description: "Load rule_engine from silver for modelling"

  - name: rule_engine_model_transform
    type: transform
    transform_type: sql
    readMode: batch
    source: v_rule_engine_silver
    target: v_rule_engine_modelled
    sql: |
      SELECT
        *,
        current_timestamp() as _modelled_at,
        'v1' as _model_version
      FROM v_rule_engine_silver

  - name: write_rule_engine_modelled
    type: write
    source: v_rule_engine_modelled
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{modelled_schema}"
      table: "rule_engine_modelled"
