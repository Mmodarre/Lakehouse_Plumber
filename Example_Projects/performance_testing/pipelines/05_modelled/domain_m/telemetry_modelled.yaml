pipeline: perf_modelled
flowgroup: telemetry_modelled
presets:
  - default_delta_properties
actions:
  - name: telemetry_silver_source
    type: load
    readMode: batch
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{silver_schema}"
      table: telemetry_dim
    target: v_telemetry_silver
    description: "Load telemetry from silver for modelling"

  - name: telemetry_model_transform
    type: transform
    transform_type: sql
    readMode: batch
    source: v_telemetry_silver
    target: v_telemetry_modelled
    sql: |
      SELECT
        *,
        current_timestamp() as _modelled_at,
        'v1' as _model_version
      FROM v_telemetry_silver

  - name: write_telemetry_modelled
    type: write
    source: v_telemetry_modelled
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{modelled_schema}"
      table: "telemetry_modelled"
