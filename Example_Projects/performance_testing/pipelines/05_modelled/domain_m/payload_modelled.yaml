pipeline: perf_modelled
flowgroup: payload_modelled
presets:
  - default_delta_properties
actions:
  - name: payload_silver_source
    type: load
    readMode: batch
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{silver_schema}"
      table: payload_dim
    target: v_payload_silver
    description: "Load payload from silver for modelling"

  - name: payload_model_transform
    type: transform
    transform_type: sql
    readMode: batch
    source: v_payload_silver
    target: v_payload_modelled
    sql: |
      SELECT
        *,
        current_timestamp() as _modelled_at,
        'v1' as _model_version
      FROM v_payload_silver

  - name: write_payload_modelled
    type: write
    source: v_payload_modelled
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{modelled_schema}"
      table: "payload_modelled"
