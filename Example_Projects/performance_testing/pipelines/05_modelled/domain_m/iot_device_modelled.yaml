pipeline: domain_m_modelled
flowgroup: iot_device_modelled
presets:
  - default_delta_properties
actions:
  - name: iot_device_silver_source
    type: load
    readMode: batch
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{silver_schema}"
      table: iot_device_dim
    target: v_iot_device_silver
    description: "Load iot_device from silver for modelling"

  - name: iot_device_model_transform
    type: transform
    transform_type: sql
    readMode: batch
    source: v_iot_device_silver
    target: v_iot_device_modelled
    sql: |
      SELECT
        *,
        current_timestamp() as _modelled_at,
        'v1' as _model_version
      FROM v_iot_device_silver

  - name: write_iot_device_modelled
    type: write
    source: v_iot_device_modelled
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{modelled_schema}"
      table: "iot_device_modelled"
