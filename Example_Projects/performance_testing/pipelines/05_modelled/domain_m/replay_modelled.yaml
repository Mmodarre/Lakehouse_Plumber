pipeline: domain_m_modelled
flowgroup: replay_modelled
presets:
  - default_delta_properties
actions:
  - name: replay_silver_source
    type: load
    readMode: batch
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{silver_schema}"
      table: replay_dim
    target: v_replay_silver
    description: "Load replay from silver for modelling"

  - name: replay_model_transform
    type: transform
    transform_type: sql
    readMode: batch
    source: v_replay_silver
    target: v_replay_modelled
    sql: |
      SELECT
        *,
        current_timestamp() as _modelled_at,
        'v1' as _model_version
      FROM v_replay_silver

  - name: write_replay_modelled
    type: write
    source: v_replay_modelled
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{modelled_schema}"
      table: "replay_modelled"
