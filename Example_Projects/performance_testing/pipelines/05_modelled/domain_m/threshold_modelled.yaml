pipeline: perf_modelled
flowgroup: threshold_modelled
presets:
  - default_delta_properties
actions:
  - name: threshold_silver_source
    type: load
    readMode: batch
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{silver_schema}"
      table: threshold_dim
    target: v_threshold_silver
    description: "Load threshold from silver for modelling"

  - name: threshold_model_transform
    type: transform
    transform_type: sql
    readMode: batch
    source: v_threshold_silver
    target: v_threshold_modelled
    sql: |
      SELECT
        *,
        current_timestamp() as _modelled_at,
        'v1' as _model_version
      FROM v_threshold_silver

  - name: write_threshold_modelled
    type: write
    source: v_threshold_modelled
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{modelled_schema}"
      table: "threshold_modelled"
