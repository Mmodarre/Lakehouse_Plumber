pipeline: perf_modelled
flowgroup: royalty_modelled
presets:
  - default_delta_properties
actions:
  - name: royalty_silver_source
    type: load
    readMode: batch
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{silver_schema}"
      table: royalty_dim
    target: v_royalty_silver
    description: "Load royalty from silver for modelling"

  - name: royalty_model_transform
    type: transform
    transform_type: sql
    readMode: batch
    source: v_royalty_silver
    target: v_royalty_modelled
    sql: |
      SELECT
        *,
        current_timestamp() as _modelled_at,
        'v1' as _model_version
      FROM v_royalty_silver

  - name: write_royalty_modelled
    type: write
    source: v_royalty_modelled
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{modelled_schema}"
      table: "royalty_modelled"
