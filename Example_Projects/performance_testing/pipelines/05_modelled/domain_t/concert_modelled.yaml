pipeline: perf_modelled
flowgroup: concert_modelled
presets:
  - default_delta_properties
actions:
  - name: concert_silver_source
    type: load
    readMode: batch
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{silver_schema}"
      table: concert_dim
    target: v_concert_silver
    description: "Load concert from silver for modelling"

  - name: concert_model_transform
    type: transform
    transform_type: sql
    readMode: batch
    source: v_concert_silver
    target: v_concert_modelled
    sql: |
      SELECT
        *,
        current_timestamp() as _modelled_at,
        'v1' as _model_version
      FROM v_concert_silver

  - name: write_concert_modelled
    type: write
    source: v_concert_modelled
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{modelled_schema}"
      table: "concert_modelled"
