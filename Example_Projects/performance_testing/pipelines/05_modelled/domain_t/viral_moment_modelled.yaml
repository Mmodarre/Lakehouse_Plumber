pipeline: perf_modelled
flowgroup: viral_moment_modelled
presets:
  - default_delta_properties
actions:
  - name: viral_moment_silver_source
    type: load
    readMode: batch
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{silver_schema}"
      table: viral_moment_dim
    target: v_viral_moment_silver
    description: "Load viral_moment from silver for modelling"

  - name: viral_moment_model_transform
    type: transform
    transform_type: sql
    readMode: batch
    source: v_viral_moment_silver
    target: v_viral_moment_modelled
    sql: |
      SELECT
        *,
        current_timestamp() as _modelled_at,
        'v1' as _model_version
      FROM v_viral_moment_silver

  - name: write_viral_moment_modelled
    type: write
    source: v_viral_moment_modelled
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{modelled_schema}"
      table: "viral_moment_modelled"
