pipeline: perf_modelled
flowgroup: songwriter_modelled
presets:
  - default_delta_properties
actions:
  - name: songwriter_silver_source
    type: load
    readMode: batch
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{silver_schema}"
      table: songwriter_dim
    target: v_songwriter_silver
    description: "Load songwriter from silver for modelling"

  - name: songwriter_model_transform
    type: transform
    transform_type: sql
    readMode: batch
    source: v_songwriter_silver
    target: v_songwriter_modelled
    sql: |
      SELECT
        *,
        current_timestamp() as _modelled_at,
        'v1' as _model_version
      FROM v_songwriter_silver

  - name: write_songwriter_modelled
    type: write
    source: v_songwriter_modelled
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{modelled_schema}"
      table: "songwriter_modelled"
