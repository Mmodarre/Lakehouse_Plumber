pipeline: domain_t_modelled
flowgroup: playlist_modelled
presets:
  - default_delta_properties
actions:
  - name: playlist_silver_source
    type: load
    readMode: batch
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{silver_schema}"
      table: playlist_fct
    target: v_playlist_silver
    description: "Load playlist from silver for modelling"

  - name: playlist_model_transform
    type: transform
    transform_type: sql
    readMode: batch
    source: v_playlist_silver
    target: v_playlist_modelled
    sql: |
      SELECT
        *,
        current_timestamp() as _modelled_at,
        'v1' as _model_version
      FROM v_playlist_silver

  - name: write_playlist_modelled
    type: write
    source: v_playlist_modelled
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{modelled_schema}"
      table: "playlist_modelled"
