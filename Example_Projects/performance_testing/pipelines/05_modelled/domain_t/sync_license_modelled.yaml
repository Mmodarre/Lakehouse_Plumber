pipeline: domain_t_modelled
flowgroup: sync_license_modelled
presets:
  - default_delta_properties
actions:
  - name: sync_license_silver_source
    type: load
    readMode: batch
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{silver_schema}"
      table: sync_license_dim
    target: v_sync_license_silver
    description: "Load sync_license from silver for modelling"

  - name: sync_license_model_transform
    type: transform
    transform_type: sql
    readMode: batch
    source: v_sync_license_silver
    target: v_sync_license_modelled
    sql: |
      SELECT
        *,
        current_timestamp() as _modelled_at,
        'v1' as _model_version
      FROM v_sync_license_silver

  - name: write_sync_license_modelled
    type: write
    source: v_sync_license_modelled
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{modelled_schema}"
      table: "sync_license_modelled"
