pipeline: perf_modelled
flowgroup: album_modelled
presets:
  - default_delta_properties
actions:
  - name: album_silver_source
    type: load
    readMode: batch
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{silver_schema}"
      table: album_dim
    target: v_album_silver
    description: "Load album from silver for modelling"

  - name: album_model_transform
    type: transform
    transform_type: sql
    readMode: batch
    source: v_album_silver
    target: v_album_modelled
    sql: |
      SELECT
        *,
        current_timestamp() as _modelled_at,
        'v1' as _model_version
      FROM v_album_silver

  - name: write_album_modelled
    type: write
    source: v_album_modelled
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{modelled_schema}"
      table: "album_modelled"
