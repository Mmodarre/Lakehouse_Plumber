pipeline: perf_modelled
flowgroup: music_track_modelled
presets:
  - default_delta_properties
actions:
  - name: music_track_silver_source
    type: load
    readMode: batch
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{silver_schema}"
      table: music_track_dim
    target: v_music_track_silver
    description: "Load music_track from silver for modelling"

  - name: music_track_model_transform
    type: transform
    transform_type: sql
    readMode: batch
    source: v_music_track_silver
    target: v_music_track_modelled
    sql: |
      SELECT
        *,
        current_timestamp() as _modelled_at,
        'v1' as _model_version
      FROM v_music_track_silver

  - name: write_music_track_modelled
    type: write
    source: v_music_track_modelled
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{modelled_schema}"
      table: "music_track_modelled"
