pipeline: domain_t_modelled
flowgroup: podcast_feature_modelled
presets:
  - default_delta_properties
actions:
  - name: podcast_feature_silver_source
    type: load
    readMode: batch
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{silver_schema}"
      table: podcast_feature_fct
    target: v_podcast_feature_silver
    description: "Load podcast_feature from silver for modelling"

  - name: podcast_feature_model_transform
    type: transform
    transform_type: sql
    readMode: batch
    source: v_podcast_feature_silver
    target: v_podcast_feature_modelled
    sql: |
      SELECT
        *,
        current_timestamp() as _modelled_at,
        'v1' as _model_version
      FROM v_podcast_feature_silver

  - name: write_podcast_feature_modelled
    type: write
    source: v_podcast_feature_modelled
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{modelled_schema}"
      table: "podcast_feature_modelled"
