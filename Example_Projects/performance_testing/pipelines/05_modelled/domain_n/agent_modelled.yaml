pipeline: perf_modelled
flowgroup: agent_modelled
presets:
  - default_delta_properties
actions:
  - name: agent_silver_source
    type: load
    readMode: batch
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{silver_schema}"
      table: agent_dim
    target: v_agent_silver
    description: "Load agent from silver for modelling"

  - name: agent_model_transform
    type: transform
    transform_type: sql
    readMode: batch
    source: v_agent_silver
    target: v_agent_modelled
    sql: |
      SELECT
        *,
        current_timestamp() as _modelled_at,
        'v1' as _model_version
      FROM v_agent_silver

  - name: write_agent_modelled
    type: write
    source: v_agent_modelled
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{modelled_schema}"
      table: "agent_modelled"
