pipeline: domain_n_modelled
flowgroup: catastrophe_modelled
presets:
  - default_delta_properties
actions:
  - name: catastrophe_silver_source
    type: load
    readMode: batch
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{silver_schema}"
      table: catastrophe_fct
    target: v_catastrophe_silver
    description: "Load catastrophe from silver for modelling"

  - name: catastrophe_model_transform
    type: transform
    transform_type: sql
    readMode: batch
    source: v_catastrophe_silver
    target: v_catastrophe_modelled
    sql: |
      SELECT
        *,
        current_timestamp() as _modelled_at,
        'v1' as _model_version
      FROM v_catastrophe_silver

  - name: write_catastrophe_modelled
    type: write
    source: v_catastrophe_modelled
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{modelled_schema}"
      table: "catastrophe_modelled"
