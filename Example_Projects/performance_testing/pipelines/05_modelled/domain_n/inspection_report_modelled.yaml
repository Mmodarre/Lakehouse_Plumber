pipeline: perf_modelled
flowgroup: inspection_report_modelled
presets:
  - default_delta_properties
actions:
  - name: inspection_report_silver_source
    type: load
    readMode: batch
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{silver_schema}"
      table: inspection_report_dim
    target: v_inspection_report_silver
    description: "Load inspection_report from silver for modelling"

  - name: inspection_report_model_transform
    type: transform
    transform_type: sql
    readMode: batch
    source: v_inspection_report_silver
    target: v_inspection_report_modelled
    sql: |
      SELECT
        *,
        current_timestamp() as _modelled_at,
        'v1' as _model_version
      FROM v_inspection_report_silver

  - name: write_inspection_report_modelled
    type: write
    source: v_inspection_report_modelled
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{modelled_schema}"
      table: "inspection_report_modelled"
