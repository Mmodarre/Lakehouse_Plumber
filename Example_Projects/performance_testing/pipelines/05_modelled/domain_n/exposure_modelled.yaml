pipeline: domain_n_modelled
flowgroup: exposure_modelled
presets:
  - default_delta_properties
actions:
  - name: exposure_silver_source
    type: load
    readMode: batch
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{silver_schema}"
      table: exposure_dim
    target: v_exposure_silver
    description: "Load exposure from silver for modelling"

  - name: exposure_model_transform
    type: transform
    transform_type: sql
    readMode: batch
    source: v_exposure_silver
    target: v_exposure_modelled
    sql: |
      SELECT
        *,
        current_timestamp() as _modelled_at,
        'v1' as _model_version
      FROM v_exposure_silver

  - name: write_exposure_modelled
    type: write
    source: v_exposure_modelled
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{modelled_schema}"
      table: "exposure_modelled"
