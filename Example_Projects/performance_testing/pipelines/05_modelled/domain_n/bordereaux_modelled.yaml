pipeline: perf_modelled
flowgroup: bordereaux_modelled
presets:
  - default_delta_properties
actions:
  - name: bordereaux_silver_source
    type: load
    readMode: batch
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{silver_schema}"
      table: bordereaux_dim
    target: v_bordereaux_silver
    description: "Load bordereaux from silver for modelling"

  - name: bordereaux_model_transform
    type: transform
    transform_type: sql
    readMode: batch
    source: v_bordereaux_silver
    target: v_bordereaux_modelled
    sql: |
      SELECT
        *,
        current_timestamp() as _modelled_at,
        'v1' as _model_version
      FROM v_bordereaux_silver

  - name: write_bordereaux_modelled
    type: write
    source: v_bordereaux_modelled
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{modelled_schema}"
      table: "bordereaux_modelled"
