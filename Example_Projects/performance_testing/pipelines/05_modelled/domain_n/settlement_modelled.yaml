pipeline: domain_n_modelled
flowgroup: settlement_modelled
presets:
  - default_delta_properties
actions:
  - name: settlement_silver_source
    type: load
    readMode: batch
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{silver_schema}"
      table: settlement_fct
    target: v_settlement_silver
    description: "Load settlement from silver for modelling"

  - name: settlement_model_transform
    type: transform
    transform_type: sql
    readMode: batch
    source: v_settlement_silver
    target: v_settlement_modelled
    sql: |
      SELECT
        *,
        current_timestamp() as _modelled_at,
        'v1' as _model_version
      FROM v_settlement_silver

  - name: write_settlement_modelled
    type: write
    source: v_settlement_modelled
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{modelled_schema}"
      table: "settlement_modelled"
