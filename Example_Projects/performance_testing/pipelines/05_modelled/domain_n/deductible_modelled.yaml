pipeline: domain_n_modelled
flowgroup: deductible_modelled
presets:
  - default_delta_properties
actions:
  - name: deductible_silver_source
    type: load
    readMode: batch
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{silver_schema}"
      table: deductible_dim
    target: v_deductible_silver
    description: "Load deductible from silver for modelling"

  - name: deductible_model_transform
    type: transform
    transform_type: sql
    readMode: batch
    source: v_deductible_silver
    target: v_deductible_modelled
    sql: |
      SELECT
        *,
        current_timestamp() as _modelled_at,
        'v1' as _model_version
      FROM v_deductible_silver

  - name: write_deductible_modelled
    type: write
    source: v_deductible_modelled
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{modelled_schema}"
      table: "deductible_modelled"
