pipeline: perf_modelled
flowgroup: adjuster_modelled
presets:
  - default_delta_properties
actions:
  - name: adjuster_silver_source
    type: load
    readMode: batch
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{silver_schema}"
      table: adjuster_dim
    target: v_adjuster_silver
    description: "Load adjuster from silver for modelling"

  - name: adjuster_model_transform
    type: transform
    transform_type: sql
    readMode: batch
    source: v_adjuster_silver
    target: v_adjuster_modelled
    sql: |
      SELECT
        *,
        current_timestamp() as _modelled_at,
        'v1' as _model_version
      FROM v_adjuster_silver

  - name: write_adjuster_modelled
    type: write
    source: v_adjuster_modelled
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{modelled_schema}"
      table: "adjuster_modelled"
