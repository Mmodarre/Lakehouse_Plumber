pipeline: perf_modelled
flowgroup: loss_report_modelled
presets:
  - default_delta_properties
actions:
  - name: loss_report_silver_source
    type: load
    readMode: batch
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{silver_schema}"
      table: loss_report_dim
    target: v_loss_report_silver
    description: "Load loss_report from silver for modelling"

  - name: loss_report_model_transform
    type: transform
    transform_type: sql
    readMode: batch
    source: v_loss_report_silver
    target: v_loss_report_modelled
    sql: |
      SELECT
        *,
        current_timestamp() as _modelled_at,
        'v1' as _model_version
      FROM v_loss_report_silver

  - name: write_loss_report_modelled
    type: write
    source: v_loss_report_modelled
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{modelled_schema}"
      table: "loss_report_modelled"
