pipeline: domain_n_modelled
flowgroup: treaty_modelled
presets:
  - default_delta_properties
actions:
  - name: treaty_silver_source
    type: load
    readMode: batch
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{silver_schema}"
      table: treaty_dim
    target: v_treaty_silver
    description: "Load treaty from silver for modelling"

  - name: treaty_model_transform
    type: transform
    transform_type: sql
    readMode: batch
    source: v_treaty_silver
    target: v_treaty_modelled
    sql: |
      SELECT
        *,
        current_timestamp() as _modelled_at,
        'v1' as _model_version
      FROM v_treaty_silver

  - name: write_treaty_modelled
    type: write
    source: v_treaty_modelled
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{modelled_schema}"
      table: "treaty_modelled"
