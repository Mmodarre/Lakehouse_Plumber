pipeline: perf_modelled
flowgroup: demand_modelled
presets:
  - default_delta_properties
actions:
  - name: demand_silver_source
    type: load
    readMode: batch
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{silver_schema}"
      table: demand_dim
    target: v_demand_silver
    description: "Load demand from silver for modelling"

  - name: demand_model_transform
    type: transform
    transform_type: sql
    readMode: batch
    source: v_demand_silver
    target: v_demand_modelled
    sql: |
      SELECT
        *,
        current_timestamp() as _modelled_at,
        'v1' as _model_version
      FROM v_demand_silver

  - name: write_demand_modelled
    type: write
    source: v_demand_modelled
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{modelled_schema}"
      table: "demand_modelled"
