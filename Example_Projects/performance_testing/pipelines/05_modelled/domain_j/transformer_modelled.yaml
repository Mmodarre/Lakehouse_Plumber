pipeline: perf_modelled
flowgroup: transformer_modelled
presets:
  - default_delta_properties
actions:
  - name: transformer_silver_source
    type: load
    readMode: batch
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{silver_schema}"
      table: transformer_dim
    target: v_transformer_silver
    description: "Load transformer from silver for modelling"

  - name: transformer_model_transform
    type: transform
    transform_type: sql
    readMode: batch
    source: v_transformer_silver
    target: v_transformer_modelled
    sql: |
      SELECT
        *,
        current_timestamp() as _modelled_at,
        'v1' as _model_version
      FROM v_transformer_silver

  - name: write_transformer_modelled
    type: write
    source: v_transformer_modelled
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{modelled_schema}"
      table: "transformer_modelled"
