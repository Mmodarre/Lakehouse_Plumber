pipeline: perf_modelled
flowgroup: grid_modelled
presets:
  - default_delta_properties
actions:
  - name: grid_silver_source
    type: load
    readMode: batch
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{silver_schema}"
      table: grid_dim
    target: v_grid_silver
    description: "Load grid from silver for modelling"

  - name: grid_model_transform
    type: transform
    transform_type: sql
    readMode: batch
    source: v_grid_silver
    target: v_grid_modelled
    sql: |
      SELECT
        *,
        current_timestamp() as _modelled_at,
        'v1' as _model_version
      FROM v_grid_silver

  - name: write_grid_modelled
    type: write
    source: v_grid_modelled
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{modelled_schema}"
      table: "grid_modelled"
