pipeline: perf_modelled
flowgroup: battery_modelled
presets:
  - default_delta_properties
actions:
  - name: battery_silver_source
    type: load
    readMode: batch
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{silver_schema}"
      table: battery_dim
    target: v_battery_silver
    description: "Load battery from silver for modelling"

  - name: battery_model_transform
    type: transform
    transform_type: sql
    readMode: batch
    source: v_battery_silver
    target: v_battery_modelled
    sql: |
      SELECT
        *,
        current_timestamp() as _modelled_at,
        'v1' as _model_version
      FROM v_battery_silver

  - name: write_battery_modelled
    type: write
    source: v_battery_modelled
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{modelled_schema}"
      table: "battery_modelled"
