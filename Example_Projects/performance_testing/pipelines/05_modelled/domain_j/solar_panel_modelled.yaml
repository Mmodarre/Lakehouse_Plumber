pipeline: perf_modelled
flowgroup: solar_panel_modelled
presets:
  - default_delta_properties
actions:
  - name: solar_panel_silver_source
    type: load
    readMode: batch
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{silver_schema}"
      table: solar_panel_dim
    target: v_solar_panel_silver
    description: "Load solar_panel from silver for modelling"

  - name: solar_panel_model_transform
    type: transform
    transform_type: sql
    readMode: batch
    source: v_solar_panel_silver
    target: v_solar_panel_modelled
    sql: |
      SELECT
        *,
        current_timestamp() as _modelled_at,
        'v1' as _model_version
      FROM v_solar_panel_silver

  - name: write_solar_panel_modelled
    type: write
    source: v_solar_panel_modelled
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{modelled_schema}"
      table: "solar_panel_modelled"
