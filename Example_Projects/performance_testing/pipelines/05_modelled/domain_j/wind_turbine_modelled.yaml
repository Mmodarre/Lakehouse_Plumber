pipeline: perf_modelled
flowgroup: wind_turbine_modelled
presets:
  - default_delta_properties
actions:
  - name: wind_turbine_silver_source
    type: load
    readMode: batch
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{silver_schema}"
      table: wind_turbine_dim
    target: v_wind_turbine_silver
    description: "Load wind_turbine from silver for modelling"

  - name: wind_turbine_model_transform
    type: transform
    transform_type: sql
    readMode: batch
    source: v_wind_turbine_silver
    target: v_wind_turbine_modelled
    sql: |
      SELECT
        *,
        current_timestamp() as _modelled_at,
        'v1' as _model_version
      FROM v_wind_turbine_silver

  - name: write_wind_turbine_modelled
    type: write
    source: v_wind_turbine_modelled
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{modelled_schema}"
      table: "wind_turbine_modelled"
