pipeline: perf_modelled
flowgroup: billing_cycle_modelled
presets:
  - default_delta_properties
actions:
  - name: billing_cycle_silver_source
    type: load
    readMode: batch
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{silver_schema}"
      table: billing_cycle_dim
    target: v_billing_cycle_silver
    description: "Load billing_cycle from silver for modelling"

  - name: billing_cycle_model_transform
    type: transform
    transform_type: sql
    readMode: batch
    source: v_billing_cycle_silver
    target: v_billing_cycle_modelled
    sql: |
      SELECT
        *,
        current_timestamp() as _modelled_at,
        'v1' as _model_version
      FROM v_billing_cycle_silver

  - name: write_billing_cycle_modelled
    type: write
    source: v_billing_cycle_modelled
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{modelled_schema}"
      table: "billing_cycle_modelled"
