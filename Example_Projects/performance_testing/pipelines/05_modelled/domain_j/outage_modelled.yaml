pipeline: perf_modelled
flowgroup: outage_modelled
presets:
  - default_delta_properties
actions:
  - name: outage_silver_source
    type: load
    readMode: batch
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{silver_schema}"
      table: outage_dim
    target: v_outage_silver
    description: "Load outage from silver for modelling"

  - name: outage_model_transform
    type: transform
    transform_type: sql
    readMode: batch
    source: v_outage_silver
    target: v_outage_modelled
    sql: |
      SELECT
        *,
        current_timestamp() as _modelled_at,
        'v1' as _model_version
      FROM v_outage_silver

  - name: write_outage_modelled
    type: write
    source: v_outage_modelled
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{modelled_schema}"
      table: "outage_modelled"
