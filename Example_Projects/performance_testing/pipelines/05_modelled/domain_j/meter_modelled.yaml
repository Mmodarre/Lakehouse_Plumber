pipeline: perf_modelled
flowgroup: meter_modelled
presets:
  - default_delta_properties
actions:
  - name: meter_silver_source
    type: load
    readMode: batch
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{silver_schema}"
      table: meter_dim
    target: v_meter_silver
    description: "Load meter from silver for modelling"

  - name: meter_model_transform
    type: transform
    transform_type: sql
    readMode: batch
    source: v_meter_silver
    target: v_meter_modelled
    sql: |
      SELECT
        *,
        current_timestamp() as _modelled_at,
        'v1' as _model_version
      FROM v_meter_silver

  - name: write_meter_modelled
    type: write
    source: v_meter_modelled
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{modelled_schema}"
      table: "meter_modelled"
