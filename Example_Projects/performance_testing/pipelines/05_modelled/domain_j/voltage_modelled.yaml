pipeline: perf_modelled
flowgroup: voltage_modelled
presets:
  - default_delta_properties
actions:
  - name: voltage_silver_source
    type: load
    readMode: batch
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{silver_schema}"
      table: voltage_dim
    target: v_voltage_silver
    description: "Load voltage from silver for modelling"

  - name: voltage_model_transform
    type: transform
    transform_type: sql
    readMode: batch
    source: v_voltage_silver
    target: v_voltage_modelled
    sql: |
      SELECT
        *,
        current_timestamp() as _modelled_at,
        'v1' as _model_version
      FROM v_voltage_silver

  - name: write_voltage_modelled
    type: write
    source: v_voltage_modelled
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{modelled_schema}"
      table: "voltage_modelled"
