pipeline: perf_modelled
flowgroup: peak_usage_modelled
presets:
  - default_delta_properties
actions:
  - name: peak_usage_silver_source
    type: load
    readMode: batch
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{silver_schema}"
      table: peak_usage_dim
    target: v_peak_usage_silver
    description: "Load peak_usage from silver for modelling"

  - name: peak_usage_model_transform
    type: transform
    transform_type: sql
    readMode: batch
    source: v_peak_usage_silver
    target: v_peak_usage_modelled
    sql: |
      SELECT
        *,
        current_timestamp() as _modelled_at,
        'v1' as _model_version
      FROM v_peak_usage_silver

  - name: write_peak_usage_modelled
    type: write
    source: v_peak_usage_modelled
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{modelled_schema}"
      table: "peak_usage_modelled"
