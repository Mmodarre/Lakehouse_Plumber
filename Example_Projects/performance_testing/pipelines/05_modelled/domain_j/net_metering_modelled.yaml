pipeline: perf_modelled
flowgroup: net_metering_modelled
presets:
  - default_delta_properties
actions:
  - name: net_metering_silver_source
    type: load
    readMode: batch
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{silver_schema}"
      table: net_metering_dim
    target: v_net_metering_silver
    description: "Load net_metering from silver for modelling"

  - name: net_metering_model_transform
    type: transform
    transform_type: sql
    readMode: batch
    source: v_net_metering_silver
    target: v_net_metering_modelled
    sql: |
      SELECT
        *,
        current_timestamp() as _modelled_at,
        'v1' as _model_version
      FROM v_net_metering_silver

  - name: write_net_metering_modelled
    type: write
    source: v_net_metering_modelled
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{modelled_schema}"
      table: "net_metering_modelled"
