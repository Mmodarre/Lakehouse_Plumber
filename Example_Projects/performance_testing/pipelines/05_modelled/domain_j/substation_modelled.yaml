pipeline: perf_modelled
flowgroup: substation_modelled
presets:
  - default_delta_properties
actions:
  - name: substation_silver_source
    type: load
    readMode: batch
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{silver_schema}"
      table: substation_dim
    target: v_substation_silver
    description: "Load substation from silver for modelling"

  - name: substation_model_transform
    type: transform
    transform_type: sql
    readMode: batch
    source: v_substation_silver
    target: v_substation_modelled
    sql: |
      SELECT
        *,
        current_timestamp() as _modelled_at,
        'v1' as _model_version
      FROM v_substation_silver

  - name: write_substation_modelled
    type: write
    source: v_substation_modelled
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{modelled_schema}"
      table: "substation_modelled"
