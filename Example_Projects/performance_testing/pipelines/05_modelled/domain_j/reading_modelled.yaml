pipeline: perf_modelled
flowgroup: reading_modelled
presets:
  - default_delta_properties
actions:
  - name: reading_silver_source
    type: load
    readMode: batch
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{silver_schema}"
      table: reading_dim
    target: v_reading_silver
    description: "Load reading from silver for modelling"

  - name: reading_model_transform
    type: transform
    transform_type: sql
    readMode: batch
    source: v_reading_silver
    target: v_reading_modelled
    sql: |
      SELECT
        *,
        current_timestamp() as _modelled_at,
        'v1' as _model_version
      FROM v_reading_silver

  - name: write_reading_modelled
    type: write
    source: v_reading_modelled
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{modelled_schema}"
      table: "reading_modelled"
