pipeline: perf_modelled
flowgroup: fleet_modelled
presets:
  - default_delta_properties
actions:
  - name: fleet_silver_source
    type: load
    readMode: batch
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{silver_schema}"
      table: fleet_dim
    target: v_fleet_silver
    description: "Load fleet from silver for modelling"

  - name: fleet_model_transform
    type: transform
    transform_type: sql
    readMode: batch
    source: v_fleet_silver
    target: v_fleet_modelled
    sql: |
      SELECT
        *,
        current_timestamp() as _modelled_at,
        'v1' as _model_version
      FROM v_fleet_silver

  - name: write_fleet_modelled
    type: write
    source: v_fleet_modelled
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{modelled_schema}"
      table: "fleet_modelled"
