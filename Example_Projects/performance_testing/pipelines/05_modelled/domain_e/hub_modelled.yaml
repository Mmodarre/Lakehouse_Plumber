pipeline: perf_modelled
flowgroup: hub_modelled
presets:
  - default_delta_properties
actions:
  - name: hub_silver_source
    type: load
    readMode: batch
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{silver_schema}"
      table: hub_dim
    target: v_hub_silver
    description: "Load hub from silver for modelling"

  - name: hub_model_transform
    type: transform
    transform_type: sql
    readMode: batch
    source: v_hub_silver
    target: v_hub_modelled
    sql: |
      SELECT
        *,
        current_timestamp() as _modelled_at,
        'v1' as _model_version
      FROM v_hub_silver

  - name: write_hub_modelled
    type: write
    source: v_hub_modelled
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{modelled_schema}"
      table: "hub_modelled"
