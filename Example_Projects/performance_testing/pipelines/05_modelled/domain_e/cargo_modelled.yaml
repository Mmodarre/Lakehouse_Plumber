pipeline: perf_modelled
flowgroup: cargo_modelled
presets:
  - default_delta_properties
actions:
  - name: cargo_silver_source
    type: load
    readMode: batch
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{silver_schema}"
      table: cargo_dim
    target: v_cargo_silver
    description: "Load cargo from silver for modelling"

  - name: cargo_model_transform
    type: transform
    transform_type: sql
    readMode: batch
    source: v_cargo_silver
    target: v_cargo_modelled
    sql: |
      SELECT
        *,
        current_timestamp() as _modelled_at,
        'v1' as _model_version
      FROM v_cargo_silver

  - name: write_cargo_modelled
    type: write
    source: v_cargo_modelled
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{modelled_schema}"
      table: "cargo_modelled"
