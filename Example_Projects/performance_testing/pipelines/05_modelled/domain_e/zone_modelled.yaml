pipeline: perf_modelled
flowgroup: zone_modelled
presets:
  - default_delta_properties
actions:
  - name: zone_silver_source
    type: load
    readMode: batch
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{silver_schema}"
      table: zone_dim
    target: v_zone_silver
    description: "Load zone from silver for modelling"

  - name: zone_model_transform
    type: transform
    transform_type: sql
    readMode: batch
    source: v_zone_silver
    target: v_zone_modelled
    sql: |
      SELECT
        *,
        current_timestamp() as _modelled_at,
        'v1' as _model_version
      FROM v_zone_silver

  - name: write_zone_modelled
    type: write
    source: v_zone_modelled
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{modelled_schema}"
      table: "zone_modelled"
