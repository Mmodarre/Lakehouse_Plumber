pipeline: perf_modelled
flowgroup: maintenance_modelled
presets:
  - default_delta_properties
actions:
  - name: maintenance_silver_source
    type: load
    readMode: batch
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{silver_schema}"
      table: maintenance_dim
    target: v_maintenance_silver
    description: "Load maintenance from silver for modelling"

  - name: maintenance_model_transform
    type: transform
    transform_type: sql
    readMode: batch
    source: v_maintenance_silver
    target: v_maintenance_modelled
    sql: |
      SELECT
        *,
        current_timestamp() as _modelled_at,
        'v1' as _model_version
      FROM v_maintenance_silver

  - name: write_maintenance_modelled
    type: write
    source: v_maintenance_modelled
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{modelled_schema}"
      table: "maintenance_modelled"
