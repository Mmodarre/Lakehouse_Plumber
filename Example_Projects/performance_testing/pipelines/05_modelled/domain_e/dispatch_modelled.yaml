pipeline: perf_modelled
flowgroup: dispatch_modelled
presets:
  - default_delta_properties
actions:
  - name: dispatch_silver_source
    type: load
    readMode: batch
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{silver_schema}"
      table: dispatch_dim
    target: v_dispatch_silver
    description: "Load dispatch from silver for modelling"

  - name: dispatch_model_transform
    type: transform
    transform_type: sql
    readMode: batch
    source: v_dispatch_silver
    target: v_dispatch_modelled
    sql: |
      SELECT
        *,
        current_timestamp() as _modelled_at,
        'v1' as _model_version
      FROM v_dispatch_silver

  - name: write_dispatch_modelled
    type: write
    source: v_dispatch_modelled
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{modelled_schema}"
      table: "dispatch_modelled"
