pipeline: perf_modelled
flowgroup: delivery_modelled
presets:
  - default_delta_properties
actions:
  - name: delivery_silver_source
    type: load
    readMode: batch
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{silver_schema}"
      table: delivery_dim
    target: v_delivery_silver
    description: "Load delivery from silver for modelling"

  - name: delivery_model_transform
    type: transform
    transform_type: sql
    readMode: batch
    source: v_delivery_silver
    target: v_delivery_modelled
    sql: |
      SELECT
        *,
        current_timestamp() as _modelled_at,
        'v1' as _model_version
      FROM v_delivery_silver

  - name: write_delivery_modelled
    type: write
    source: v_delivery_modelled
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{modelled_schema}"
      table: "delivery_modelled"
