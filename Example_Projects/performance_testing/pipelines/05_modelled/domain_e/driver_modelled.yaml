pipeline: perf_modelled
flowgroup: driver_modelled
presets:
  - default_delta_properties
actions:
  - name: driver_silver_source
    type: load
    readMode: batch
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{silver_schema}"
      table: driver_dim
    target: v_driver_silver
    description: "Load driver from silver for modelling"

  - name: driver_model_transform
    type: transform
    transform_type: sql
    readMode: batch
    source: v_driver_silver
    target: v_driver_modelled
    sql: |
      SELECT
        *,
        current_timestamp() as _modelled_at,
        'v1' as _model_version
      FROM v_driver_silver

  - name: write_driver_modelled
    type: write
    source: v_driver_modelled
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{modelled_schema}"
      table: "driver_modelled"
