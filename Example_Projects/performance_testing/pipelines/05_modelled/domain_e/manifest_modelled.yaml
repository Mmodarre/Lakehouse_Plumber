pipeline: perf_modelled
flowgroup: manifest_modelled
presets:
  - default_delta_properties
actions:
  - name: manifest_silver_source
    type: load
    readMode: batch
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{silver_schema}"
      table: manifest_dim
    target: v_manifest_silver
    description: "Load manifest from silver for modelling"

  - name: manifest_model_transform
    type: transform
    transform_type: sql
    readMode: batch
    source: v_manifest_silver
    target: v_manifest_modelled
    sql: |
      SELECT
        *,
        current_timestamp() as _modelled_at,
        'v1' as _model_version
      FROM v_manifest_silver

  - name: write_manifest_modelled
    type: write
    source: v_manifest_modelled
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{modelled_schema}"
      table: "manifest_modelled"
