pipeline: perf_modelled
flowgroup: toll_modelled
presets:
  - default_delta_properties
actions:
  - name: toll_silver_source
    type: load
    readMode: batch
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{silver_schema}"
      table: toll_dim
    target: v_toll_silver
    description: "Load toll from silver for modelling"

  - name: toll_model_transform
    type: transform
    transform_type: sql
    readMode: batch
    source: v_toll_silver
    target: v_toll_modelled
    sql: |
      SELECT
        *,
        current_timestamp() as _modelled_at,
        'v1' as _model_version
      FROM v_toll_silver

  - name: write_toll_modelled
    type: write
    source: v_toll_modelled
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{modelled_schema}"
      table: "toll_modelled"
