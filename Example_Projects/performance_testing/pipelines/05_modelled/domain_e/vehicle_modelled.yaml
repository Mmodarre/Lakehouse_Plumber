pipeline: perf_modelled
flowgroup: vehicle_modelled
presets:
  - default_delta_properties
actions:
  - name: vehicle_silver_source
    type: load
    readMode: batch
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{silver_schema}"
      table: vehicle_dim
    target: v_vehicle_silver
    description: "Load vehicle from silver for modelling"

  - name: vehicle_model_transform
    type: transform
    transform_type: sql
    readMode: batch
    source: v_vehicle_silver
    target: v_vehicle_modelled
    sql: |
      SELECT
        *,
        current_timestamp() as _modelled_at,
        'v1' as _model_version
      FROM v_vehicle_silver

  - name: write_vehicle_modelled
    type: write
    source: v_vehicle_modelled
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{modelled_schema}"
      table: "vehicle_modelled"
