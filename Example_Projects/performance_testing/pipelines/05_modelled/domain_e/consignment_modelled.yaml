pipeline: perf_modelled
flowgroup: consignment_modelled
presets:
  - default_delta_properties
actions:
  - name: consignment_silver_source
    type: load
    readMode: batch
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{silver_schema}"
      table: consignment_dim
    target: v_consignment_silver
    description: "Load consignment from silver for modelling"

  - name: consignment_model_transform
    type: transform
    transform_type: sql
    readMode: batch
    source: v_consignment_silver
    target: v_consignment_modelled
    sql: |
      SELECT
        *,
        current_timestamp() as _modelled_at,
        'v1' as _model_version
      FROM v_consignment_silver

  - name: write_consignment_modelled
    type: write
    source: v_consignment_modelled
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{modelled_schema}"
      table: "consignment_modelled"
