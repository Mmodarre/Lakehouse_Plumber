pipeline: perf_modelled
flowgroup: fuel_log_modelled
presets:
  - default_delta_properties
actions:
  - name: fuel_log_silver_source
    type: load
    readMode: batch
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{silver_schema}"
      table: fuel_log_dim
    target: v_fuel_log_silver
    description: "Load fuel_log from silver for modelling"

  - name: fuel_log_model_transform
    type: transform
    transform_type: sql
    readMode: batch
    source: v_fuel_log_silver
    target: v_fuel_log_modelled
    sql: |
      SELECT
        *,
        current_timestamp() as _modelled_at,
        'v1' as _model_version
      FROM v_fuel_log_silver

  - name: write_fuel_log_modelled
    type: write
    source: v_fuel_log_modelled
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{modelled_schema}"
      table: "fuel_log_modelled"
