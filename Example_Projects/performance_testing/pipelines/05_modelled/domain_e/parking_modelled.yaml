pipeline: perf_modelled
flowgroup: parking_modelled
presets:
  - default_delta_properties
actions:
  - name: parking_silver_source
    type: load
    readMode: batch
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{silver_schema}"
      table: parking_dim
    target: v_parking_silver
    description: "Load parking from silver for modelling"

  - name: parking_model_transform
    type: transform
    transform_type: sql
    readMode: batch
    source: v_parking_silver
    target: v_parking_modelled
    sql: |
      SELECT
        *,
        current_timestamp() as _modelled_at,
        'v1' as _model_version
      FROM v_parking_silver

  - name: write_parking_modelled
    type: write
    source: v_parking_modelled
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{modelled_schema}"
      table: "parking_modelled"
