pipeline: perf_modelled
flowgroup: tariff_modelled
presets:
  - default_delta_properties
actions:
  - name: tariff_silver_source
    type: load
    readMode: batch
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{silver_schema}"
      table: tariff_dim
    target: v_tariff_silver
    description: "Load tariff from silver for modelling"

  - name: tariff_model_transform
    type: transform
    transform_type: sql
    readMode: batch
    source: v_tariff_silver
    target: v_tariff_modelled
    sql: |
      SELECT
        *,
        current_timestamp() as _modelled_at,
        'v1' as _model_version
      FROM v_tariff_silver

  - name: write_tariff_modelled
    type: write
    source: v_tariff_modelled
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{modelled_schema}"
      table: "tariff_modelled"
