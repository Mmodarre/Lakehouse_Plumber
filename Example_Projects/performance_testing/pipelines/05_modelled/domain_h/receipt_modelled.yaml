pipeline: perf_modelled
flowgroup: receipt_modelled
presets:
  - default_delta_properties
actions:
  - name: receipt_silver_source
    type: load
    readMode: batch
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{silver_schema}"
      table: receipt_dim
    target: v_receipt_silver
    description: "Load receipt from silver for modelling"

  - name: receipt_model_transform
    type: transform
    transform_type: sql
    readMode: batch
    source: v_receipt_silver
    target: v_receipt_modelled
    sql: |
      SELECT
        *,
        current_timestamp() as _modelled_at,
        'v1' as _model_version
      FROM v_receipt_silver

  - name: write_receipt_modelled
    type: write
    source: v_receipt_modelled
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{modelled_schema}"
      table: "receipt_modelled"
