pipeline: perf_modelled
flowgroup: markdown_modelled
presets:
  - default_delta_properties
actions:
  - name: markdown_silver_source
    type: load
    readMode: batch
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{silver_schema}"
      table: markdown_dim
    target: v_markdown_silver
    description: "Load markdown from silver for modelling"

  - name: markdown_model_transform
    type: transform
    transform_type: sql
    readMode: batch
    source: v_markdown_silver
    target: v_markdown_modelled
    sql: |
      SELECT
        *,
        current_timestamp() as _modelled_at,
        'v1' as _model_version
      FROM v_markdown_silver

  - name: write_markdown_modelled
    type: write
    source: v_markdown_modelled
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{modelled_schema}"
      table: "markdown_modelled"
