pipeline: perf_modelled
flowgroup: register_modelled
presets:
  - default_delta_properties
actions:
  - name: register_silver_source
    type: load
    readMode: batch
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{silver_schema}"
      table: register_dim
    target: v_register_silver
    description: "Load register from silver for modelling"

  - name: register_model_transform
    type: transform
    transform_type: sql
    readMode: batch
    source: v_register_silver
    target: v_register_modelled
    sql: |
      SELECT
        *,
        current_timestamp() as _modelled_at,
        'v1' as _model_version
      FROM v_register_silver

  - name: write_register_modelled
    type: write
    source: v_register_modelled
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{modelled_schema}"
      table: "register_modelled"
