pipeline: perf_modelled
flowgroup: gift_card_modelled
presets:
  - default_delta_properties
actions:
  - name: gift_card_silver_source
    type: load
    readMode: batch
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{silver_schema}"
      table: gift_card_dim
    target: v_gift_card_silver
    description: "Load gift_card from silver for modelling"

  - name: gift_card_model_transform
    type: transform
    transform_type: sql
    readMode: batch
    source: v_gift_card_silver
    target: v_gift_card_modelled
    sql: |
      SELECT
        *,
        current_timestamp() as _modelled_at,
        'v1' as _model_version
      FROM v_gift_card_silver

  - name: write_gift_card_modelled
    type: write
    source: v_gift_card_modelled
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{modelled_schema}"
      table: "gift_card_modelled"
