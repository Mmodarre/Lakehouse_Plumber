pipeline: perf_modelled
flowgroup: reorder_modelled
presets:
  - default_delta_properties
actions:
  - name: reorder_silver_source
    type: load
    readMode: batch
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{silver_schema}"
      table: reorder_dim
    target: v_reorder_silver
    description: "Load reorder from silver for modelling"

  - name: reorder_model_transform
    type: transform
    transform_type: sql
    readMode: batch
    source: v_reorder_silver
    target: v_reorder_modelled
    sql: |
      SELECT
        *,
        current_timestamp() as _modelled_at,
        'v1' as _model_version
      FROM v_reorder_silver

  - name: write_reorder_modelled
    type: write
    source: v_reorder_modelled
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{modelled_schema}"
      table: "reorder_modelled"
