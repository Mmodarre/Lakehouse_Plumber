pipeline: perf_modelled
flowgroup: vendor_modelled
presets:
  - default_delta_properties
actions:
  - name: vendor_silver_source
    type: load
    readMode: batch
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{silver_schema}"
      table: vendor_dim
    target: v_vendor_silver
    description: "Load vendor from silver for modelling"

  - name: vendor_model_transform
    type: transform
    transform_type: sql
    readMode: batch
    source: v_vendor_silver
    target: v_vendor_modelled
    sql: |
      SELECT
        *,
        current_timestamp() as _modelled_at,
        'v1' as _model_version
      FROM v_vendor_silver

  - name: write_vendor_modelled
    type: write
    source: v_vendor_modelled
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{modelled_schema}"
      table: "vendor_modelled"
