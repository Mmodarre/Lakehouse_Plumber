pipeline: perf_modelled
flowgroup: product_listing_modelled
presets:
  - default_delta_properties
actions:
  - name: product_listing_silver_source
    type: load
    readMode: batch
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{silver_schema}"
      table: product_listing_dim
    target: v_product_listing_silver
    description: "Load product_listing from silver for modelling"

  - name: product_listing_model_transform
    type: transform
    transform_type: sql
    readMode: batch
    source: v_product_listing_silver
    target: v_product_listing_modelled
    sql: |
      SELECT
        *,
        current_timestamp() as _modelled_at,
        'v1' as _model_version
      FROM v_product_listing_silver

  - name: write_product_listing_modelled
    type: write
    source: v_product_listing_modelled
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{modelled_schema}"
      table: "product_listing_modelled"
