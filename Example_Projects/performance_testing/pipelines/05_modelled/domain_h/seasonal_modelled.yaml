pipeline: perf_modelled
flowgroup: seasonal_modelled
presets:
  - default_delta_properties
actions:
  - name: seasonal_silver_source
    type: load
    readMode: batch
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{silver_schema}"
      table: seasonal_dim
    target: v_seasonal_silver
    description: "Load seasonal from silver for modelling"

  - name: seasonal_model_transform
    type: transform
    transform_type: sql
    readMode: batch
    source: v_seasonal_silver
    target: v_seasonal_modelled
    sql: |
      SELECT
        *,
        current_timestamp() as _modelled_at,
        'v1' as _model_version
      FROM v_seasonal_silver

  - name: write_seasonal_modelled
    type: write
    source: v_seasonal_modelled
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{modelled_schema}"
      table: "seasonal_modelled"
