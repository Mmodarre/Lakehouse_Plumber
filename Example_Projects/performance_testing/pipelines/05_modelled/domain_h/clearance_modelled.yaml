pipeline: perf_modelled
flowgroup: clearance_modelled
presets:
  - default_delta_properties
actions:
  - name: clearance_silver_source
    type: load
    readMode: batch
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{silver_schema}"
      table: clearance_dim
    target: v_clearance_silver
    description: "Load clearance from silver for modelling"

  - name: clearance_model_transform
    type: transform
    transform_type: sql
    readMode: batch
    source: v_clearance_silver
    target: v_clearance_modelled
    sql: |
      SELECT
        *,
        current_timestamp() as _modelled_at,
        'v1' as _model_version
      FROM v_clearance_silver

  - name: write_clearance_modelled
    type: write
    source: v_clearance_modelled
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{modelled_schema}"
      table: "clearance_modelled"
