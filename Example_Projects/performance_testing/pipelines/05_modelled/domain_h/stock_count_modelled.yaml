pipeline: perf_modelled
flowgroup: stock_count_modelled
presets:
  - default_delta_properties
actions:
  - name: stock_count_silver_source
    type: load
    readMode: batch
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{silver_schema}"
      table: stock_count_dim
    target: v_stock_count_silver
    description: "Load stock_count from silver for modelling"

  - name: stock_count_model_transform
    type: transform
    transform_type: sql
    readMode: batch
    source: v_stock_count_silver
    target: v_stock_count_modelled
    sql: |
      SELECT
        *,
        current_timestamp() as _modelled_at,
        'v1' as _model_version
      FROM v_stock_count_silver

  - name: write_stock_count_modelled
    type: write
    source: v_stock_count_modelled
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{modelled_schema}"
      table: "stock_count_modelled"
