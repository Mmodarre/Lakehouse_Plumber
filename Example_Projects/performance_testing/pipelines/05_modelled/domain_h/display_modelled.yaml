pipeline: perf_modelled
flowgroup: display_modelled
presets:
  - default_delta_properties
actions:
  - name: display_silver_source
    type: load
    readMode: batch
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{silver_schema}"
      table: display_dim
    target: v_display_silver
    description: "Load display from silver for modelling"

  - name: display_model_transform
    type: transform
    transform_type: sql
    readMode: batch
    source: v_display_silver
    target: v_display_modelled
    sql: |
      SELECT
        *,
        current_timestamp() as _modelled_at,
        'v1' as _model_version
      FROM v_display_silver

  - name: write_display_modelled
    type: write
    source: v_display_modelled
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{modelled_schema}"
      table: "display_modelled"
