pipeline: perf_modelled
flowgroup: price_tag_modelled
presets:
  - default_delta_properties
actions:
  - name: price_tag_silver_source
    type: load
    readMode: batch
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{silver_schema}"
      table: price_tag_dim
    target: v_price_tag_silver
    description: "Load price_tag from silver for modelling"

  - name: price_tag_model_transform
    type: transform
    transform_type: sql
    readMode: batch
    source: v_price_tag_silver
    target: v_price_tag_modelled
    sql: |
      SELECT
        *,
        current_timestamp() as _modelled_at,
        'v1' as _model_version
      FROM v_price_tag_silver

  - name: write_price_tag_modelled
    type: write
    source: v_price_tag_modelled
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{modelled_schema}"
      table: "price_tag_modelled"
