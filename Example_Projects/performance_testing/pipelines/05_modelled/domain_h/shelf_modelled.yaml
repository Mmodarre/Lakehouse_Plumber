pipeline: perf_modelled
flowgroup: shelf_modelled
presets:
  - default_delta_properties
actions:
  - name: shelf_silver_source
    type: load
    readMode: batch
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{silver_schema}"
      table: shelf_dim
    target: v_shelf_silver
    description: "Load shelf from silver for modelling"

  - name: shelf_model_transform
    type: transform
    transform_type: sql
    readMode: batch
    source: v_shelf_silver
    target: v_shelf_modelled
    sql: |
      SELECT
        *,
        current_timestamp() as _modelled_at,
        'v1' as _model_version
      FROM v_shelf_silver

  - name: write_shelf_modelled
    type: write
    source: v_shelf_modelled
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{modelled_schema}"
      table: "shelf_modelled"
