pipeline: perf_modelled
flowgroup: cashier_modelled
presets:
  - default_delta_properties
actions:
  - name: cashier_silver_source
    type: load
    readMode: batch
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{silver_schema}"
      table: cashier_dim
    target: v_cashier_silver
    description: "Load cashier from silver for modelling"

  - name: cashier_model_transform
    type: transform
    transform_type: sql
    readMode: batch
    source: v_cashier_silver
    target: v_cashier_modelled
    sql: |
      SELECT
        *,
        current_timestamp() as _modelled_at,
        'v1' as _model_version
      FROM v_cashier_silver

  - name: write_cashier_modelled
    type: write
    source: v_cashier_modelled
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{modelled_schema}"
      table: "cashier_modelled"
