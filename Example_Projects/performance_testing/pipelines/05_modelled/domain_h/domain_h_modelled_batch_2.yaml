pipeline: domain_h_modelled
flowgroup: planogram_modelled
presets:
  - default_delta_properties
actions:
  - name: planogram_silver_source
    type: load
    readMode: batch
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{silver_schema}"
      table: planogram_dim
    target: v_planogram_silver
    description: "Load planogram from silver for modelling"

  - name: planogram_model_transform
    type: transform
    transform_type: sql
    readMode: batch
    source: v_planogram_silver
    target: v_planogram_modelled
    sql: |
      SELECT
        *,
        current_timestamp() as _modelled_at,
        'v1' as _model_version
      FROM v_planogram_silver

  - name: write_planogram_modelled
    type: write
    source: v_planogram_modelled
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{modelled_schema}"
      table: "planogram_modelled"
---
