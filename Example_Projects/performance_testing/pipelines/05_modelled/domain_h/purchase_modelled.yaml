pipeline: perf_modelled
flowgroup: purchase_modelled
presets:
  - default_delta_properties
actions:
  - name: purchase_silver_source
    type: load
    readMode: batch
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{silver_schema}"
      table: purchase_dim
    target: v_purchase_silver
    description: "Load purchase from silver for modelling"

  - name: purchase_model_transform
    type: transform
    transform_type: sql
    readMode: batch
    source: v_purchase_silver
    target: v_purchase_modelled
    sql: |
      SELECT
        *,
        current_timestamp() as _modelled_at,
        'v1' as _model_version
      FROM v_purchase_silver

  - name: write_purchase_modelled
    type: write
    source: v_purchase_modelled
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{modelled_schema}"
      table: "purchase_modelled"
