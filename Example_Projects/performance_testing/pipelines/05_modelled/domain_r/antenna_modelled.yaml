pipeline: perf_modelled
flowgroup: antenna_modelled
presets:
  - default_delta_properties
actions:
  - name: antenna_silver_source
    type: load
    readMode: batch
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{silver_schema}"
      table: antenna_dim
    target: v_antenna_silver
    description: "Load antenna from silver for modelling"

  - name: antenna_model_transform
    type: transform
    transform_type: sql
    readMode: batch
    source: v_antenna_silver
    target: v_antenna_modelled
    sql: |
      SELECT
        *,
        current_timestamp() as _modelled_at,
        'v1' as _model_version
      FROM v_antenna_silver

  - name: write_antenna_modelled
    type: write
    source: v_antenna_modelled
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{modelled_schema}"
      table: "antenna_modelled"
