pipeline: perf_modelled
flowgroup: mission_modelled
presets:
  - default_delta_properties
actions:
  - name: mission_silver_source
    type: load
    readMode: batch
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{silver_schema}"
      table: mission_dim
    target: v_mission_silver
    description: "Load mission from silver for modelling"

  - name: mission_model_transform
    type: transform
    transform_type: sql
    readMode: batch
    source: v_mission_silver
    target: v_mission_modelled
    sql: |
      SELECT
        *,
        current_timestamp() as _modelled_at,
        'v1' as _model_version
      FROM v_mission_silver

  - name: write_mission_modelled
    type: write
    source: v_mission_modelled
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{modelled_schema}"
      table: "mission_modelled"
