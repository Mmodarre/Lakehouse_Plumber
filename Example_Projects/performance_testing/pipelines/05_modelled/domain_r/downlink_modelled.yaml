pipeline: perf_modelled
flowgroup: downlink_modelled
presets:
  - default_delta_properties
actions:
  - name: downlink_silver_source
    type: load
    readMode: batch
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{silver_schema}"
      table: downlink_dim
    target: v_downlink_silver
    description: "Load downlink from silver for modelling"

  - name: downlink_model_transform
    type: transform
    transform_type: sql
    readMode: batch
    source: v_downlink_silver
    target: v_downlink_modelled
    sql: |
      SELECT
        *,
        current_timestamp() as _modelled_at,
        'v1' as _model_version
      FROM v_downlink_silver

  - name: write_downlink_modelled
    type: write
    source: v_downlink_modelled
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{modelled_schema}"
      table: "downlink_modelled"
