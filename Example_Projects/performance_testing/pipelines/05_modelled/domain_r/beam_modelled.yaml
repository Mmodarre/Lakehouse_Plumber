pipeline: perf_modelled
flowgroup: beam_modelled
presets:
  - default_delta_properties
actions:
  - name: beam_silver_source
    type: load
    readMode: batch
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{silver_schema}"
      table: beam_dim
    target: v_beam_silver
    description: "Load beam from silver for modelling"

  - name: beam_model_transform
    type: transform
    transform_type: sql
    readMode: batch
    source: v_beam_silver
    target: v_beam_modelled
    sql: |
      SELECT
        *,
        current_timestamp() as _modelled_at,
        'v1' as _model_version
      FROM v_beam_silver

  - name: write_beam_modelled
    type: write
    source: v_beam_modelled
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{modelled_schema}"
      table: "beam_modelled"
