pipeline: perf_modelled
flowgroup: radiation_dose_modelled
presets:
  - default_delta_properties
actions:
  - name: radiation_dose_silver_source
    type: load
    readMode: batch
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{silver_schema}"
      table: radiation_dose_dim
    target: v_radiation_dose_silver
    description: "Load radiation_dose from silver for modelling"

  - name: radiation_dose_model_transform
    type: transform
    transform_type: sql
    readMode: batch
    source: v_radiation_dose_silver
    target: v_radiation_dose_modelled
    sql: |
      SELECT
        *,
        current_timestamp() as _modelled_at,
        'v1' as _model_version
      FROM v_radiation_dose_silver

  - name: write_radiation_dose_modelled
    type: write
    source: v_radiation_dose_modelled
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{modelled_schema}"
      table: "radiation_dose_modelled"
