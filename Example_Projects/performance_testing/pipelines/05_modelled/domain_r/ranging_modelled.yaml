pipeline: perf_modelled
flowgroup: ranging_modelled
presets:
  - default_delta_properties
actions:
  - name: ranging_silver_source
    type: load
    readMode: batch
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{silver_schema}"
      table: ranging_dim
    target: v_ranging_silver
    description: "Load ranging from silver for modelling"

  - name: ranging_model_transform
    type: transform
    transform_type: sql
    readMode: batch
    source: v_ranging_silver
    target: v_ranging_modelled
    sql: |
      SELECT
        *,
        current_timestamp() as _modelled_at,
        'v1' as _model_version
      FROM v_ranging_silver

  - name: write_ranging_modelled
    type: write
    source: v_ranging_modelled
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{modelled_schema}"
      table: "ranging_modelled"
