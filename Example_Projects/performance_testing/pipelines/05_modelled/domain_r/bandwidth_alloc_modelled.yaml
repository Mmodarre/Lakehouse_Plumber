pipeline: perf_modelled
flowgroup: bandwidth_alloc_modelled
presets:
  - default_delta_properties
actions:
  - name: bandwidth_alloc_silver_source
    type: load
    readMode: batch
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{silver_schema}"
      table: bandwidth_alloc_dim
    target: v_bandwidth_alloc_silver
    description: "Load bandwidth_alloc from silver for modelling"

  - name: bandwidth_alloc_model_transform
    type: transform
    transform_type: sql
    readMode: batch
    source: v_bandwidth_alloc_silver
    target: v_bandwidth_alloc_modelled
    sql: |
      SELECT
        *,
        current_timestamp() as _modelled_at,
        'v1' as _model_version
      FROM v_bandwidth_alloc_silver

  - name: write_bandwidth_alloc_modelled
    type: write
    source: v_bandwidth_alloc_modelled
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{modelled_schema}"
      table: "bandwidth_alloc_modelled"
