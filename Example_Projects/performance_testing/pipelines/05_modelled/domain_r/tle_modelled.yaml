pipeline: perf_modelled
flowgroup: tle_modelled
presets:
  - default_delta_properties
actions:
  - name: tle_silver_source
    type: load
    readMode: batch
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{silver_schema}"
      table: tle_dim
    target: v_tle_silver
    description: "Load tle from silver for modelling"

  - name: tle_model_transform
    type: transform
    transform_type: sql
    readMode: batch
    source: v_tle_silver
    target: v_tle_modelled
    sql: |
      SELECT
        *,
        current_timestamp() as _modelled_at,
        'v1' as _model_version
      FROM v_tle_silver

  - name: write_tle_modelled
    type: write
    source: v_tle_modelled
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{modelled_schema}"
      table: "tle_modelled"
