pipeline: perf_modelled
flowgroup: assembly_modelled
presets:
  - default_delta_properties
actions:
  - name: assembly_silver_source
    type: load
    readMode: batch
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{silver_schema}"
      table: assembly_dim
    target: v_assembly_silver
    description: "Load assembly from silver for modelling"

  - name: assembly_model_transform
    type: transform
    transform_type: sql
    readMode: batch
    source: v_assembly_silver
    target: v_assembly_modelled
    sql: |
      SELECT
        *,
        current_timestamp() as _modelled_at,
        'v1' as _model_version
      FROM v_assembly_silver

  - name: write_assembly_modelled
    type: write
    source: v_assembly_modelled
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{modelled_schema}"
      table: "assembly_modelled"
