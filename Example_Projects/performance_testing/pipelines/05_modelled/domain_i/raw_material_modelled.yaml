pipeline: perf_modelled
flowgroup: raw_material_modelled
presets:
  - default_delta_properties
actions:
  - name: raw_material_silver_source
    type: load
    readMode: batch
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{silver_schema}"
      table: raw_material_dim
    target: v_raw_material_silver
    description: "Load raw_material from silver for modelling"

  - name: raw_material_model_transform
    type: transform
    transform_type: sql
    readMode: batch
    source: v_raw_material_silver
    target: v_raw_material_modelled
    sql: |
      SELECT
        *,
        current_timestamp() as _modelled_at,
        'v1' as _model_version
      FROM v_raw_material_silver

  - name: write_raw_material_modelled
    type: write
    source: v_raw_material_modelled
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{modelled_schema}"
      table: "raw_material_modelled"
