pipeline: perf_modelled
flowgroup: tooling_modelled
presets:
  - default_delta_properties
actions:
  - name: tooling_silver_source
    type: load
    readMode: batch
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{silver_schema}"
      table: tooling_dim
    target: v_tooling_silver
    description: "Load tooling from silver for modelling"

  - name: tooling_model_transform
    type: transform
    transform_type: sql
    readMode: batch
    source: v_tooling_silver
    target: v_tooling_modelled
    sql: |
      SELECT
        *,
        current_timestamp() as _modelled_at,
        'v1' as _model_version
      FROM v_tooling_silver

  - name: write_tooling_modelled
    type: write
    source: v_tooling_modelled
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{modelled_schema}"
      table: "tooling_modelled"
