pipeline: perf_modelled
flowgroup: downtime_modelled
presets:
  - default_delta_properties
actions:
  - name: downtime_silver_source
    type: load
    readMode: batch
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{silver_schema}"
      table: downtime_dim
    target: v_downtime_silver
    description: "Load downtime from silver for modelling"

  - name: downtime_model_transform
    type: transform
    transform_type: sql
    readMode: batch
    source: v_downtime_silver
    target: v_downtime_modelled
    sql: |
      SELECT
        *,
        current_timestamp() as _modelled_at,
        'v1' as _model_version
      FROM v_downtime_silver

  - name: write_downtime_modelled
    type: write
    source: v_downtime_modelled
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{modelled_schema}"
      table: "downtime_modelled"
