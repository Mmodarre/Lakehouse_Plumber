pipeline: perf_modelled
flowgroup: bom_modelled
presets:
  - default_delta_properties
actions:
  - name: bom_silver_source
    type: load
    readMode: batch
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{silver_schema}"
      table: bom_dim
    target: v_bom_silver
    description: "Load bom from silver for modelling"

  - name: bom_model_transform
    type: transform
    transform_type: sql
    readMode: batch
    source: v_bom_silver
    target: v_bom_modelled
    sql: |
      SELECT
        *,
        current_timestamp() as _modelled_at,
        'v1' as _model_version
      FROM v_bom_silver

  - name: write_bom_modelled
    type: write
    source: v_bom_modelled
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{modelled_schema}"
      table: "bom_modelled"
