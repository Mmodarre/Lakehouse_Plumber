pipeline: perf_modelled
flowgroup: machine_modelled
presets:
  - default_delta_properties
actions:
  - name: machine_silver_source
    type: load
    readMode: batch
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{silver_schema}"
      table: machine_dim
    target: v_machine_silver
    description: "Load machine from silver for modelling"

  - name: machine_model_transform
    type: transform
    transform_type: sql
    readMode: batch
    source: v_machine_silver
    target: v_machine_modelled
    sql: |
      SELECT
        *,
        current_timestamp() as _modelled_at,
        'v1' as _model_version
      FROM v_machine_silver

  - name: write_machine_modelled
    type: write
    source: v_machine_modelled
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{modelled_schema}"
      table: "machine_modelled"
