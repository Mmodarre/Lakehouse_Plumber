pipeline: perf_modelled
flowgroup: calibration_modelled
presets:
  - default_delta_properties
actions:
  - name: calibration_silver_source
    type: load
    readMode: batch
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{silver_schema}"
      table: calibration_dim
    target: v_calibration_silver
    description: "Load calibration from silver for modelling"

  - name: calibration_model_transform
    type: transform
    transform_type: sql
    readMode: batch
    source: v_calibration_silver
    target: v_calibration_modelled
    sql: |
      SELECT
        *,
        current_timestamp() as _modelled_at,
        'v1' as _model_version
      FROM v_calibration_silver

  - name: write_calibration_modelled
    type: write
    source: v_calibration_modelled
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{modelled_schema}"
      table: "calibration_modelled"
