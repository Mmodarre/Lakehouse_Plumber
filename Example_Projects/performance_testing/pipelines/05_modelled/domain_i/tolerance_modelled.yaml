pipeline: perf_modelled
flowgroup: tolerance_modelled
presets:
  - default_delta_properties
actions:
  - name: tolerance_silver_source
    type: load
    readMode: batch
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{silver_schema}"
      table: tolerance_dim
    target: v_tolerance_silver
    description: "Load tolerance from silver for modelling"

  - name: tolerance_model_transform
    type: transform
    transform_type: sql
    readMode: batch
    source: v_tolerance_silver
    target: v_tolerance_modelled
    sql: |
      SELECT
        *,
        current_timestamp() as _modelled_at,
        'v1' as _model_version
      FROM v_tolerance_silver

  - name: write_tolerance_modelled
    type: write
    source: v_tolerance_modelled
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{modelled_schema}"
      table: "tolerance_modelled"
