pipeline: perf_modelled
flowgroup: scrap_modelled
presets:
  - default_delta_properties
actions:
  - name: scrap_silver_source
    type: load
    readMode: batch
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{silver_schema}"
      table: scrap_dim
    target: v_scrap_silver
    description: "Load scrap from silver for modelling"

  - name: scrap_model_transform
    type: transform
    transform_type: sql
    readMode: batch
    source: v_scrap_silver
    target: v_scrap_modelled
    sql: |
      SELECT
        *,
        current_timestamp() as _modelled_at,
        'v1' as _model_version
      FROM v_scrap_silver

  - name: write_scrap_modelled
    type: write
    source: v_scrap_modelled
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{modelled_schema}"
      table: "scrap_modelled"
