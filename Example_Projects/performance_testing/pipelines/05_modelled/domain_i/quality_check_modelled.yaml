pipeline: perf_modelled
flowgroup: quality_check_modelled
presets:
  - default_delta_properties
actions:
  - name: quality_check_silver_source
    type: load
    readMode: batch
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{silver_schema}"
      table: quality_check_dim
    target: v_quality_check_silver
    description: "Load quality_check from silver for modelling"

  - name: quality_check_model_transform
    type: transform
    transform_type: sql
    readMode: batch
    source: v_quality_check_silver
    target: v_quality_check_modelled
    sql: |
      SELECT
        *,
        current_timestamp() as _modelled_at,
        'v1' as _model_version
      FROM v_quality_check_silver

  - name: write_quality_check_modelled
    type: write
    source: v_quality_check_modelled
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{modelled_schema}"
      table: "quality_check_modelled"
