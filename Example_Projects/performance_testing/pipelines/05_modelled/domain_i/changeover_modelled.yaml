pipeline: perf_modelled
flowgroup: changeover_modelled
presets:
  - default_delta_properties
actions:
  - name: changeover_silver_source
    type: load
    readMode: batch
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{silver_schema}"
      table: changeover_dim
    target: v_changeover_silver
    description: "Load changeover from silver for modelling"

  - name: changeover_model_transform
    type: transform
    transform_type: sql
    readMode: batch
    source: v_changeover_silver
    target: v_changeover_modelled
    sql: |
      SELECT
        *,
        current_timestamp() as _modelled_at,
        'v1' as _model_version
      FROM v_changeover_silver

  - name: write_changeover_modelled
    type: write
    source: v_changeover_modelled
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{modelled_schema}"
      table: "changeover_modelled"
