pipeline: perf_modelled
flowgroup: batch_modelled
presets:
  - default_delta_properties
actions:
  - name: batch_silver_source
    type: load
    readMode: batch
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{silver_schema}"
      table: batch_dim
    target: v_batch_silver
    description: "Load batch from silver for modelling"

  - name: batch_model_transform
    type: transform
    transform_type: sql
    readMode: batch
    source: v_batch_silver
    target: v_batch_modelled
    sql: |
      SELECT
        *,
        current_timestamp() as _modelled_at,
        'v1' as _model_version
      FROM v_batch_silver

  - name: write_batch_modelled
    type: write
    source: v_batch_modelled
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{modelled_schema}"
      table: "batch_modelled"
