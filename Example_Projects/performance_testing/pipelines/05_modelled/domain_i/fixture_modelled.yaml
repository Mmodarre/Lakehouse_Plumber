pipeline: perf_modelled
flowgroup: fixture_modelled
presets:
  - default_delta_properties
actions:
  - name: fixture_silver_source
    type: load
    readMode: batch
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{silver_schema}"
      table: fixture_dim
    target: v_fixture_silver
    description: "Load fixture from silver for modelling"

  - name: fixture_model_transform
    type: transform
    transform_type: sql
    readMode: batch
    source: v_fixture_silver
    target: v_fixture_modelled
    sql: |
      SELECT
        *,
        current_timestamp() as _modelled_at,
        'v1' as _model_version
      FROM v_fixture_silver

  - name: write_fixture_modelled
    type: write
    source: v_fixture_modelled
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{modelled_schema}"
      table: "fixture_modelled"
