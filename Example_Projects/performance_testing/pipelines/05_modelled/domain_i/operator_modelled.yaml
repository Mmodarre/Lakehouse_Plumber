pipeline: perf_modelled
flowgroup: operator_modelled
presets:
  - default_delta_properties
actions:
  - name: operator_silver_source
    type: load
    readMode: batch
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{silver_schema}"
      table: operator_dim
    target: v_operator_silver
    description: "Load operator from silver for modelling"

  - name: operator_model_transform
    type: transform
    transform_type: sql
    readMode: batch
    source: v_operator_silver
    target: v_operator_modelled
    sql: |
      SELECT
        *,
        current_timestamp() as _modelled_at,
        'v1' as _model_version
      FROM v_operator_silver

  - name: write_operator_modelled
    type: write
    source: v_operator_modelled
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{modelled_schema}"
      table: "operator_modelled"
