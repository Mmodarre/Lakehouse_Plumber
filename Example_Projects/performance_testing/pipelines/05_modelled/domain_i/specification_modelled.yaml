pipeline: perf_modelled
flowgroup: specification_modelled
presets:
  - default_delta_properties
actions:
  - name: specification_silver_source
    type: load
    readMode: batch
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{silver_schema}"
      table: specification_dim
    target: v_specification_silver
    description: "Load specification from silver for modelling"

  - name: specification_model_transform
    type: transform
    transform_type: sql
    readMode: batch
    source: v_specification_silver
    target: v_specification_modelled
    sql: |
      SELECT
        *,
        current_timestamp() as _modelled_at,
        'v1' as _model_version
      FROM v_specification_silver

  - name: write_specification_modelled
    type: write
    source: v_specification_modelled
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{modelled_schema}"
      table: "specification_modelled"
