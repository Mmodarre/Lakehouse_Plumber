pipeline: perf_modelled
flowgroup: defect_modelled
presets:
  - default_delta_properties
actions:
  - name: defect_silver_source
    type: load
    readMode: batch
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{silver_schema}"
      table: defect_dim
    target: v_defect_silver
    description: "Load defect from silver for modelling"

  - name: defect_model_transform
    type: transform
    transform_type: sql
    readMode: batch
    source: v_defect_silver
    target: v_defect_modelled
    sql: |
      SELECT
        *,
        current_timestamp() as _modelled_at,
        'v1' as _model_version
      FROM v_defect_silver

  - name: write_defect_modelled
    type: write
    source: v_defect_modelled
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{modelled_schema}"
      table: "defect_modelled"
