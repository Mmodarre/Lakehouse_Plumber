pipeline: perf_modelled
flowgroup: category_modelled
presets:
  - default_delta_properties
actions:
  - name: category_silver_source
    type: load
    readMode: batch
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{silver_schema}"
      table: category_dim
    target: v_category_silver
    description: "Load category from silver for modelling"

  - name: category_model_transform
    type: transform
    transform_type: sql
    readMode: batch
    source: v_category_silver
    target: v_category_modelled
    sql: |
      SELECT
        *,
        current_timestamp() as _modelled_at,
        'v1' as _model_version
      FROM v_category_silver

  - name: write_category_modelled
    type: write
    source: v_category_modelled
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{modelled_schema}"
      table: "category_modelled"
