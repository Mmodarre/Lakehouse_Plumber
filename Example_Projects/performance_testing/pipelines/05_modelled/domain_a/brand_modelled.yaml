pipeline: perf_modelled
flowgroup: brand_modelled
presets:
  - default_delta_properties
actions:
  - name: brand_silver_source
    type: load
    readMode: batch
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{silver_schema}"
      table: brand_dim
    target: v_brand_silver
    description: "Load brand from silver for modelling"

  - name: brand_model_transform
    type: transform
    transform_type: sql
    readMode: batch
    source: v_brand_silver
    target: v_brand_modelled
    sql: |
      SELECT
        *,
        current_timestamp() as _modelled_at,
        'v1' as _model_version
      FROM v_brand_silver

  - name: write_brand_modelled
    type: write
    source: v_brand_modelled
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{modelled_schema}"
      table: "brand_modelled"
