pipeline: perf_modelled
flowgroup: customer_modelled
presets:
  - default_delta_properties
actions:
  - name: customer_silver_source
    type: load
    readMode: batch
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{silver_schema}"
      table: customer_dim
    target: v_customer_silver
    description: "Load customer from silver for modelling"

  - name: customer_model_transform
    type: transform
    transform_type: sql
    readMode: batch
    source: v_customer_silver
    target: v_customer_modelled
    sql: |
      SELECT
        *,
        current_timestamp() as _modelled_at,
        'v1' as _model_version
      FROM v_customer_silver

  - name: write_customer_modelled
    type: write
    source: v_customer_modelled
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{modelled_schema}"
      table: "customer_modelled"
