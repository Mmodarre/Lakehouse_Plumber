pipeline: perf_modelled
flowgroup: contact_modelled
presets:
  - default_delta_properties
actions:
  - name: contact_silver_source
    type: load
    readMode: batch
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{silver_schema}"
      table: contact_dim
    target: v_contact_silver
    description: "Load contact from silver for modelling"

  - name: contact_model_transform
    type: transform
    transform_type: sql
    readMode: batch
    source: v_contact_silver
    target: v_contact_modelled
    sql: |
      SELECT
        *,
        current_timestamp() as _modelled_at,
        'v1' as _model_version
      FROM v_contact_silver

  - name: write_contact_modelled
    type: write
    source: v_contact_modelled
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{modelled_schema}"
      table: "contact_modelled"
