pipeline: perf_modelled
flowgroup: coupon_modelled
presets:
  - default_delta_properties
actions:
  - name: coupon_silver_source
    type: load
    readMode: batch
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{silver_schema}"
      table: coupon_dim
    target: v_coupon_silver
    description: "Load coupon from silver for modelling"

  - name: coupon_model_transform
    type: transform
    transform_type: sql
    readMode: batch
    source: v_coupon_silver
    target: v_coupon_modelled
    sql: |
      SELECT
        *,
        current_timestamp() as _modelled_at,
        'v1' as _model_version
      FROM v_coupon_silver

  - name: write_coupon_modelled
    type: write
    source: v_coupon_modelled
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{modelled_schema}"
      table: "coupon_modelled"
