pipeline: perf_modelled
flowgroup: order_modelled
presets:
  - default_delta_properties
actions:
  - name: order_silver_source
    type: load
    readMode: batch
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{silver_schema}"
      table: order_dim
    target: v_order_silver
    description: "Load order from silver for modelling"

  - name: order_model_transform
    type: transform
    transform_type: sql
    readMode: batch
    source: v_order_silver
    target: v_order_modelled
    sql: |
      SELECT
        *,
        current_timestamp() as _modelled_at,
        'v1' as _model_version
      FROM v_order_silver

  - name: write_order_modelled
    type: write
    source: v_order_modelled
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{modelled_schema}"
      table: "order_modelled"
