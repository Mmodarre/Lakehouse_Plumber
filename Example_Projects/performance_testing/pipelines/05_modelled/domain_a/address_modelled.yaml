pipeline: perf_modelled
flowgroup: address_modelled
presets:
  - default_delta_properties
actions:
  - name: address_silver_source
    type: load
    readMode: batch
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{silver_schema}"
      table: address_dim
    target: v_address_silver
    description: "Load address from silver for modelling"

  - name: address_model_transform
    type: transform
    transform_type: sql
    readMode: batch
    source: v_address_silver
    target: v_address_modelled
    sql: |
      SELECT
        *,
        current_timestamp() as _modelled_at,
        'v1' as _model_version
      FROM v_address_silver

  - name: write_address_modelled
    type: write
    source: v_address_modelled
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{modelled_schema}"
      table: "address_modelled"
