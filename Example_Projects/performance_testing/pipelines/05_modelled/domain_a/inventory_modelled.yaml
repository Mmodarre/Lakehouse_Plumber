pipeline: perf_modelled
flowgroup: inventory_modelled
presets:
  - default_delta_properties
actions:
  - name: inventory_silver_source
    type: load
    readMode: batch
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{silver_schema}"
      table: inventory_dim
    target: v_inventory_silver
    description: "Load inventory from silver for modelling"

  - name: inventory_model_transform
    type: transform
    transform_type: sql
    readMode: batch
    source: v_inventory_silver
    target: v_inventory_modelled
    sql: |
      SELECT
        *,
        current_timestamp() as _modelled_at,
        'v1' as _model_version
      FROM v_inventory_silver

  - name: write_inventory_modelled
    type: write
    source: v_inventory_modelled
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{modelled_schema}"
      table: "inventory_modelled"
