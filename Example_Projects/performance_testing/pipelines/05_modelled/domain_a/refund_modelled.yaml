pipeline: perf_modelled
flowgroup: refund_modelled
presets:
  - default_delta_properties
actions:
  - name: refund_silver_source
    type: load
    readMode: batch
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{silver_schema}"
      table: refund_dim
    target: v_refund_silver
    description: "Load refund from silver for modelling"

  - name: refund_model_transform
    type: transform
    transform_type: sql
    readMode: batch
    source: v_refund_silver
    target: v_refund_modelled
    sql: |
      SELECT
        *,
        current_timestamp() as _modelled_at,
        'v1' as _model_version
      FROM v_refund_silver

  - name: write_refund_modelled
    type: write
    source: v_refund_modelled
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{modelled_schema}"
      table: "refund_modelled"
