pipeline: perf_modelled
flowgroup: supplier_modelled
presets:
  - default_delta_properties
actions:
  - name: supplier_silver_source
    type: load
    readMode: batch
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{silver_schema}"
      table: supplier_dim
    target: v_supplier_silver
    description: "Load supplier from silver for modelling"

  - name: supplier_model_transform
    type: transform
    transform_type: sql
    readMode: batch
    source: v_supplier_silver
    target: v_supplier_modelled
    sql: |
      SELECT
        *,
        current_timestamp() as _modelled_at,
        'v1' as _model_version
      FROM v_supplier_silver

  - name: write_supplier_modelled
    type: write
    source: v_supplier_modelled
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{modelled_schema}"
      table: "supplier_modelled"
