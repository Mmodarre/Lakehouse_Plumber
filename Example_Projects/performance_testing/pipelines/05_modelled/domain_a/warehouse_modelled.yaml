pipeline: perf_modelled
flowgroup: warehouse_modelled
presets:
  - default_delta_properties
actions:
  - name: warehouse_silver_source
    type: load
    readMode: batch
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{silver_schema}"
      table: warehouse_dim
    target: v_warehouse_silver
    description: "Load warehouse from silver for modelling"

  - name: warehouse_model_transform
    type: transform
    transform_type: sql
    readMode: batch
    source: v_warehouse_silver
    target: v_warehouse_modelled
    sql: |
      SELECT
        *,
        current_timestamp() as _modelled_at,
        'v1' as _model_version
      FROM v_warehouse_silver

  - name: write_warehouse_modelled
    type: write
    source: v_warehouse_modelled
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{modelled_schema}"
      table: "warehouse_modelled"
