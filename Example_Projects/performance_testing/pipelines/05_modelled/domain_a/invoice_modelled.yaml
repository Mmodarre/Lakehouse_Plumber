pipeline: perf_modelled
flowgroup: invoice_modelled
presets:
  - default_delta_properties
actions:
  - name: invoice_silver_source
    type: load
    readMode: batch
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{silver_schema}"
      table: invoice_dim
    target: v_invoice_silver
    description: "Load invoice from silver for modelling"

  - name: invoice_model_transform
    type: transform
    transform_type: sql
    readMode: batch
    source: v_invoice_silver
    target: v_invoice_modelled
    sql: |
      SELECT
        *,
        current_timestamp() as _modelled_at,
        'v1' as _model_version
      FROM v_invoice_silver

  - name: write_invoice_modelled
    type: write
    source: v_invoice_modelled
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{modelled_schema}"
      table: "invoice_modelled"
