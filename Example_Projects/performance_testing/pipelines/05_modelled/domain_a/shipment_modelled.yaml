pipeline: perf_modelled
flowgroup: shipment_modelled
presets:
  - default_delta_properties
actions:
  - name: shipment_silver_source
    type: load
    readMode: batch
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{silver_schema}"
      table: shipment_dim
    target: v_shipment_silver
    description: "Load shipment from silver for modelling"

  - name: shipment_model_transform
    type: transform
    transform_type: sql
    readMode: batch
    source: v_shipment_silver
    target: v_shipment_modelled
    sql: |
      SELECT
        *,
        current_timestamp() as _modelled_at,
        'v1' as _model_version
      FROM v_shipment_silver

  - name: write_shipment_modelled
    type: write
    source: v_shipment_modelled
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{modelled_schema}"
      table: "shipment_modelled"
