pipeline: perf_modelled
flowgroup: wishlist_modelled
presets:
  - default_delta_properties
actions:
  - name: wishlist_silver_source
    type: load
    readMode: batch
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{silver_schema}"
      table: wishlist_dim
    target: v_wishlist_silver
    description: "Load wishlist from silver for modelling"

  - name: wishlist_model_transform
    type: transform
    transform_type: sql
    readMode: batch
    source: v_wishlist_silver
    target: v_wishlist_modelled
    sql: |
      SELECT
        *,
        current_timestamp() as _modelled_at,
        'v1' as _model_version
      FROM v_wishlist_silver

  - name: write_wishlist_modelled
    type: write
    source: v_wishlist_modelled
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{modelled_schema}"
      table: "wishlist_modelled"
