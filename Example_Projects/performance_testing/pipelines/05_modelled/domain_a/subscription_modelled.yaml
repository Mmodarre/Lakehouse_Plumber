pipeline: perf_modelled
flowgroup: subscription_modelled
presets:
  - default_delta_properties
actions:
  - name: subscription_silver_source
    type: load
    readMode: batch
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{silver_schema}"
      table: subscription_dim
    target: v_subscription_silver
    description: "Load subscription from silver for modelling"

  - name: subscription_model_transform
    type: transform
    transform_type: sql
    readMode: batch
    source: v_subscription_silver
    target: v_subscription_modelled
    sql: |
      SELECT
        *,
        current_timestamp() as _modelled_at,
        'v1' as _model_version
      FROM v_subscription_silver

  - name: write_subscription_modelled
    type: write
    source: v_subscription_modelled
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{modelled_schema}"
      table: "subscription_modelled"
