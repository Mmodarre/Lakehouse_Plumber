pipeline: perf_modelled
flowgroup: cart_modelled
presets:
  - default_delta_properties
actions:
  - name: cart_silver_source
    type: load
    readMode: batch
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{silver_schema}"
      table: cart_dim
    target: v_cart_silver
    description: "Load cart from silver for modelling"

  - name: cart_model_transform
    type: transform
    transform_type: sql
    readMode: batch
    source: v_cart_silver
    target: v_cart_modelled
    sql: |
      SELECT
        *,
        current_timestamp() as _modelled_at,
        'v1' as _model_version
      FROM v_cart_silver

  - name: write_cart_modelled
    type: write
    source: v_cart_modelled
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{modelled_schema}"
      table: "cart_modelled"
