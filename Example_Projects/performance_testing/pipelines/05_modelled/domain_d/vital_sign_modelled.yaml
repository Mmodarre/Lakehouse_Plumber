pipeline: perf_modelled
flowgroup: vital_sign_modelled
presets:
  - default_delta_properties
actions:
  - name: vital_sign_silver_source
    type: load
    readMode: batch
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{silver_schema}"
      table: vital_sign_dim
    target: v_vital_sign_silver
    description: "Load vital_sign from silver for modelling"

  - name: vital_sign_model_transform
    type: transform
    transform_type: sql
    readMode: batch
    source: v_vital_sign_silver
    target: v_vital_sign_modelled
    sql: |
      SELECT
        *,
        current_timestamp() as _modelled_at,
        'v1' as _model_version
      FROM v_vital_sign_silver

  - name: write_vital_sign_modelled
    type: write
    source: v_vital_sign_modelled
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{modelled_schema}"
      table: "vital_sign_modelled"
