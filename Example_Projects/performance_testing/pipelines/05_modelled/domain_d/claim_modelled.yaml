pipeline: perf_modelled
flowgroup: claim_modelled
presets:
  - default_delta_properties
actions:
  - name: claim_silver_source
    type: load
    readMode: batch
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{silver_schema}"
      table: claim_dim
    target: v_claim_silver
    description: "Load claim from silver for modelling"

  - name: claim_model_transform
    type: transform
    transform_type: sql
    readMode: batch
    source: v_claim_silver
    target: v_claim_modelled
    sql: |
      SELECT
        *,
        current_timestamp() as _modelled_at,
        'v1' as _model_version
      FROM v_claim_silver

  - name: write_claim_modelled
    type: write
    source: v_claim_modelled
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{modelled_schema}"
      table: "claim_modelled"
