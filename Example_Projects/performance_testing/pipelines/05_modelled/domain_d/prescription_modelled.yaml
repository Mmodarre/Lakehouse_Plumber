pipeline: perf_modelled
flowgroup: prescription_modelled
presets:
  - default_delta_properties
actions:
  - name: prescription_silver_source
    type: load
    readMode: batch
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{silver_schema}"
      table: prescription_dim
    target: v_prescription_silver
    description: "Load prescription from silver for modelling"

  - name: prescription_model_transform
    type: transform
    transform_type: sql
    readMode: batch
    source: v_prescription_silver
    target: v_prescription_modelled
    sql: |
      SELECT
        *,
        current_timestamp() as _modelled_at,
        'v1' as _model_version
      FROM v_prescription_silver

  - name: write_prescription_modelled
    type: write
    source: v_prescription_modelled
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{modelled_schema}"
      table: "prescription_modelled"
