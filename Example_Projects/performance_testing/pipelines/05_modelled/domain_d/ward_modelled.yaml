pipeline: perf_modelled
flowgroup: ward_modelled
presets:
  - default_delta_properties
actions:
  - name: ward_silver_source
    type: load
    readMode: batch
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{silver_schema}"
      table: ward_dim
    target: v_ward_silver
    description: "Load ward from silver for modelling"

  - name: ward_model_transform
    type: transform
    transform_type: sql
    readMode: batch
    source: v_ward_silver
    target: v_ward_modelled
    sql: |
      SELECT
        *,
        current_timestamp() as _modelled_at,
        'v1' as _model_version
      FROM v_ward_silver

  - name: write_ward_modelled
    type: write
    source: v_ward_modelled
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{modelled_schema}"
      table: "ward_modelled"
