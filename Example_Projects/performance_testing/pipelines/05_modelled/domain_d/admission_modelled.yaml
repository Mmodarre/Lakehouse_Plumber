pipeline: perf_modelled
flowgroup: admission_modelled
presets:
  - default_delta_properties
actions:
  - name: admission_silver_source
    type: load
    readMode: batch
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{silver_schema}"
      table: admission_dim
    target: v_admission_silver
    description: "Load admission from silver for modelling"

  - name: admission_model_transform
    type: transform
    transform_type: sql
    readMode: batch
    source: v_admission_silver
    target: v_admission_modelled
    sql: |
      SELECT
        *,
        current_timestamp() as _modelled_at,
        'v1' as _model_version
      FROM v_admission_silver

  - name: write_admission_modelled
    type: write
    source: v_admission_modelled
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{modelled_schema}"
      table: "admission_modelled"
