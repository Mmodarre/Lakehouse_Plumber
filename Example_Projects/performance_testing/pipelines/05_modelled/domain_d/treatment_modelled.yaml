pipeline: perf_modelled
flowgroup: treatment_modelled
presets:
  - default_delta_properties
actions:
  - name: treatment_silver_source
    type: load
    readMode: batch
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{silver_schema}"
      table: treatment_dim
    target: v_treatment_silver
    description: "Load treatment from silver for modelling"

  - name: treatment_model_transform
    type: transform
    transform_type: sql
    readMode: batch
    source: v_treatment_silver
    target: v_treatment_modelled
    sql: |
      SELECT
        *,
        current_timestamp() as _modelled_at,
        'v1' as _model_version
      FROM v_treatment_silver

  - name: write_treatment_modelled
    type: write
    source: v_treatment_modelled
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{modelled_schema}"
      table: "treatment_modelled"
