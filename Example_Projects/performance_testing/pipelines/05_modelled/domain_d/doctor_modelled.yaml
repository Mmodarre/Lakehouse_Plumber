pipeline: perf_modelled
flowgroup: doctor_modelled
presets:
  - default_delta_properties
actions:
  - name: doctor_silver_source
    type: load
    readMode: batch
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{silver_schema}"
      table: doctor_dim
    target: v_doctor_silver
    description: "Load doctor from silver for modelling"

  - name: doctor_model_transform
    type: transform
    transform_type: sql
    readMode: batch
    source: v_doctor_silver
    target: v_doctor_modelled
    sql: |
      SELECT
        *,
        current_timestamp() as _modelled_at,
        'v1' as _model_version
      FROM v_doctor_silver

  - name: write_doctor_modelled
    type: write
    source: v_doctor_modelled
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{modelled_schema}"
      table: "doctor_modelled"
