pipeline: perf_modelled
flowgroup: discharge_modelled
presets:
  - default_delta_properties
actions:
  - name: discharge_silver_source
    type: load
    readMode: batch
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{silver_schema}"
      table: discharge_dim
    target: v_discharge_silver
    description: "Load discharge from silver for modelling"

  - name: discharge_model_transform
    type: transform
    transform_type: sql
    readMode: batch
    source: v_discharge_silver
    target: v_discharge_modelled
    sql: |
      SELECT
        *,
        current_timestamp() as _modelled_at,
        'v1' as _model_version
      FROM v_discharge_silver

  - name: write_discharge_modelled
    type: write
    source: v_discharge_modelled
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{modelled_schema}"
      table: "discharge_modelled"
