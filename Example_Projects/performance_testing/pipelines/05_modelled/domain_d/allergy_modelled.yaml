pipeline: perf_modelled
flowgroup: allergy_modelled
presets:
  - default_delta_properties
actions:
  - name: allergy_silver_source
    type: load
    readMode: batch
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{silver_schema}"
      table: allergy_dim
    target: v_allergy_silver
    description: "Load allergy from silver for modelling"

  - name: allergy_model_transform
    type: transform
    transform_type: sql
    readMode: batch
    source: v_allergy_silver
    target: v_allergy_modelled
    sql: |
      SELECT
        *,
        current_timestamp() as _modelled_at,
        'v1' as _model_version
      FROM v_allergy_silver

  - name: write_allergy_modelled
    type: write
    source: v_allergy_modelled
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{modelled_schema}"
      table: "allergy_modelled"
