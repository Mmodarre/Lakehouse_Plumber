pipeline: perf_modelled
flowgroup: diagnosis_modelled
presets:
  - default_delta_properties
actions:
  - name: diagnosis_silver_source
    type: load
    readMode: batch
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{silver_schema}"
      table: diagnosis_dim
    target: v_diagnosis_silver
    description: "Load diagnosis from silver for modelling"

  - name: diagnosis_model_transform
    type: transform
    transform_type: sql
    readMode: batch
    source: v_diagnosis_silver
    target: v_diagnosis_modelled
    sql: |
      SELECT
        *,
        current_timestamp() as _modelled_at,
        'v1' as _model_version
      FROM v_diagnosis_silver

  - name: write_diagnosis_modelled
    type: write
    source: v_diagnosis_modelled
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{modelled_schema}"
      table: "diagnosis_modelled"
