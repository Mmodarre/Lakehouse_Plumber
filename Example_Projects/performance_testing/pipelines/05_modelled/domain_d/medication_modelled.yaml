pipeline: perf_modelled
flowgroup: medication_modelled
presets:
  - default_delta_properties
actions:
  - name: medication_silver_source
    type: load
    readMode: batch
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{silver_schema}"
      table: medication_dim
    target: v_medication_silver
    description: "Load medication from silver for modelling"

  - name: medication_model_transform
    type: transform
    transform_type: sql
    readMode: batch
    source: v_medication_silver
    target: v_medication_modelled
    sql: |
      SELECT
        *,
        current_timestamp() as _modelled_at,
        'v1' as _model_version
      FROM v_medication_silver

  - name: write_medication_modelled
    type: write
    source: v_medication_modelled
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{modelled_schema}"
      table: "medication_modelled"
