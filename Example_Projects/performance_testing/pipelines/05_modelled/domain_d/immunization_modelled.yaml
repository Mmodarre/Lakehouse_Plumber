pipeline: perf_modelled
flowgroup: immunization_modelled
presets:
  - default_delta_properties
actions:
  - name: immunization_silver_source
    type: load
    readMode: batch
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{silver_schema}"
      table: immunization_dim
    target: v_immunization_silver
    description: "Load immunization from silver for modelling"

  - name: immunization_model_transform
    type: transform
    transform_type: sql
    readMode: batch
    source: v_immunization_silver
    target: v_immunization_modelled
    sql: |
      SELECT
        *,
        current_timestamp() as _modelled_at,
        'v1' as _model_version
      FROM v_immunization_silver

  - name: write_immunization_modelled
    type: write
    source: v_immunization_modelled
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{modelled_schema}"
      table: "immunization_modelled"
