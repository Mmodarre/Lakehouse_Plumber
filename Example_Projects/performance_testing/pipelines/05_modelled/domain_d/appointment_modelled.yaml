pipeline: perf_modelled
flowgroup: appointment_modelled
presets:
  - default_delta_properties
actions:
  - name: appointment_silver_source
    type: load
    readMode: batch
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{silver_schema}"
      table: appointment_dim
    target: v_appointment_silver
    description: "Load appointment from silver for modelling"

  - name: appointment_model_transform
    type: transform
    transform_type: sql
    readMode: batch
    source: v_appointment_silver
    target: v_appointment_modelled
    sql: |
      SELECT
        *,
        current_timestamp() as _modelled_at,
        'v1' as _model_version
      FROM v_appointment_silver

  - name: write_appointment_modelled
    type: write
    source: v_appointment_modelled
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{modelled_schema}"
      table: "appointment_modelled"
