pipeline: perf_modelled
flowgroup: hospital_modelled
presets:
  - default_delta_properties
actions:
  - name: hospital_silver_source
    type: load
    readMode: batch
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{silver_schema}"
      table: hospital_dim
    target: v_hospital_silver
    description: "Load hospital from silver for modelling"

  - name: hospital_model_transform
    type: transform
    transform_type: sql
    readMode: batch
    source: v_hospital_silver
    target: v_hospital_modelled
    sql: |
      SELECT
        *,
        current_timestamp() as _modelled_at,
        'v1' as _model_version
      FROM v_hospital_silver

  - name: write_hospital_modelled
    type: write
    source: v_hospital_modelled
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{modelled_schema}"
      table: "hospital_modelled"
