pipeline: perf_modelled
flowgroup: airline_modelled
presets:
  - default_delta_properties
actions:
  - name: airline_silver_source
    type: load
    readMode: batch
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{silver_schema}"
      table: airline_dim
    target: v_airline_silver
    description: "Load airline from silver for modelling"

  - name: airline_model_transform
    type: transform
    transform_type: sql
    readMode: batch
    source: v_airline_silver
    target: v_airline_modelled
    sql: |
      SELECT
        *,
        current_timestamp() as _modelled_at,
        'v1' as _model_version
      FROM v_airline_silver

  - name: write_airline_modelled
    type: write
    source: v_airline_modelled
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{modelled_schema}"
      table: "airline_modelled"
