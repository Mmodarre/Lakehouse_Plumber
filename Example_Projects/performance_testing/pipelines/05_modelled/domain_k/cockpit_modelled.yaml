pipeline: perf_modelled
flowgroup: cockpit_modelled
presets:
  - default_delta_properties
actions:
  - name: cockpit_silver_source
    type: load
    readMode: batch
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{silver_schema}"
      table: cockpit_dim
    target: v_cockpit_silver
    description: "Load cockpit from silver for modelling"

  - name: cockpit_model_transform
    type: transform
    transform_type: sql
    readMode: batch
    source: v_cockpit_silver
    target: v_cockpit_modelled
    sql: |
      SELECT
        *,
        current_timestamp() as _modelled_at,
        'v1' as _model_version
      FROM v_cockpit_silver

  - name: write_cockpit_modelled
    type: write
    source: v_cockpit_modelled
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{modelled_schema}"
      table: "cockpit_modelled"
