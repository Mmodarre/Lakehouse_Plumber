pipeline: perf_modelled
flowgroup: gate_modelled
presets:
  - default_delta_properties
actions:
  - name: gate_silver_source
    type: load
    readMode: batch
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{silver_schema}"
      table: gate_dim
    target: v_gate_silver
    description: "Load gate from silver for modelling"

  - name: gate_model_transform
    type: transform
    transform_type: sql
    readMode: batch
    source: v_gate_silver
    target: v_gate_modelled
    sql: |
      SELECT
        *,
        current_timestamp() as _modelled_at,
        'v1' as _model_version
      FROM v_gate_silver

  - name: write_gate_modelled
    type: write
    source: v_gate_modelled
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{modelled_schema}"
      table: "gate_modelled"
