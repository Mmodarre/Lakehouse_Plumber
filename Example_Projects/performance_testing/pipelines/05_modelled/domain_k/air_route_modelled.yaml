pipeline: perf_modelled
flowgroup: air_route_modelled
presets:
  - default_delta_properties
actions:
  - name: air_route_silver_source
    type: load
    readMode: batch
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{silver_schema}"
      table: air_route_dim
    target: v_air_route_silver
    description: "Load air_route from silver for modelling"

  - name: air_route_model_transform
    type: transform
    transform_type: sql
    readMode: batch
    source: v_air_route_silver
    target: v_air_route_modelled
    sql: |
      SELECT
        *,
        current_timestamp() as _modelled_at,
        'v1' as _model_version
      FROM v_air_route_silver

  - name: write_air_route_modelled
    type: write
    source: v_air_route_modelled
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{modelled_schema}"
      table: "air_route_modelled"
