pipeline: perf_modelled
flowgroup: ticket_modelled
presets:
  - default_delta_properties
actions:
  - name: ticket_silver_source
    type: load
    readMode: batch
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{silver_schema}"
      table: ticket_dim
    target: v_ticket_silver
    description: "Load ticket from silver for modelling"

  - name: ticket_model_transform
    type: transform
    transform_type: sql
    readMode: batch
    source: v_ticket_silver
    target: v_ticket_modelled
    sql: |
      SELECT
        *,
        current_timestamp() as _modelled_at,
        'v1' as _model_version
      FROM v_ticket_silver

  - name: write_ticket_modelled
    type: write
    source: v_ticket_modelled
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{modelled_schema}"
      table: "ticket_modelled"
