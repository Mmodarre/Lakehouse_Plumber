pipeline: perf_modelled
flowgroup: itinerary_modelled
presets:
  - default_delta_properties
actions:
  - name: itinerary_silver_source
    type: load
    readMode: batch
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{silver_schema}"
      table: itinerary_dim
    target: v_itinerary_silver
    description: "Load itinerary from silver for modelling"

  - name: itinerary_model_transform
    type: transform
    transform_type: sql
    readMode: batch
    source: v_itinerary_silver
    target: v_itinerary_modelled
    sql: |
      SELECT
        *,
        current_timestamp() as _modelled_at,
        'v1' as _model_version
      FROM v_itinerary_silver

  - name: write_itinerary_modelled
    type: write
    source: v_itinerary_modelled
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{modelled_schema}"
      table: "itinerary_modelled"
