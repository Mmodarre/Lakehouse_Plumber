pipeline: perf_modelled
flowgroup: baggage_modelled
presets:
  - default_delta_properties
actions:
  - name: baggage_silver_source
    type: load
    readMode: batch
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{silver_schema}"
      table: baggage_dim
    target: v_baggage_silver
    description: "Load baggage from silver for modelling"

  - name: baggage_model_transform
    type: transform
    transform_type: sql
    readMode: batch
    source: v_baggage_silver
    target: v_baggage_modelled
    sql: |
      SELECT
        *,
        current_timestamp() as _modelled_at,
        'v1' as _model_version
      FROM v_baggage_silver

  - name: write_baggage_modelled
    type: write
    source: v_baggage_modelled
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{modelled_schema}"
      table: "baggage_modelled"
