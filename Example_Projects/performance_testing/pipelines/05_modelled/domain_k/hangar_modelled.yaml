pipeline: perf_modelled
flowgroup: hangar_modelled
presets:
  - default_delta_properties
actions:
  - name: hangar_silver_source
    type: load
    readMode: batch
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{silver_schema}"
      table: hangar_dim
    target: v_hangar_silver
    description: "Load hangar from silver for modelling"

  - name: hangar_model_transform
    type: transform
    transform_type: sql
    readMode: batch
    source: v_hangar_silver
    target: v_hangar_modelled
    sql: |
      SELECT
        *,
        current_timestamp() as _modelled_at,
        'v1' as _model_version
      FROM v_hangar_silver

  - name: write_hangar_modelled
    type: write
    source: v_hangar_modelled
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{modelled_schema}"
      table: "hangar_modelled"
