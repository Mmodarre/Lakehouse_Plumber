pipeline: domain_k_modelled
flowgroup: taxiway_modelled
presets:
  - default_delta_properties
actions:
  - name: taxiway_silver_source
    type: load
    readMode: batch
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{silver_schema}"
      table: taxiway_dim
    target: v_taxiway_silver
    description: "Load taxiway from silver for modelling"

  - name: taxiway_model_transform
    type: transform
    transform_type: sql
    readMode: batch
    source: v_taxiway_silver
    target: v_taxiway_modelled
    sql: |
      SELECT
        *,
        current_timestamp() as _modelled_at,
        'v1' as _model_version
      FROM v_taxiway_silver

  - name: write_taxiway_modelled
    type: write
    source: v_taxiway_modelled
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{modelled_schema}"
      table: "taxiway_modelled"
---
