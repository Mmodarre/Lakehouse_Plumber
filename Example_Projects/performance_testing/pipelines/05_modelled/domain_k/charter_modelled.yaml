pipeline: perf_modelled
flowgroup: charter_modelled
presets:
  - default_delta_properties
actions:
  - name: charter_silver_source
    type: load
    readMode: batch
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{silver_schema}"
      table: charter_dim
    target: v_charter_silver
    description: "Load charter from silver for modelling"

  - name: charter_model_transform
    type: transform
    transform_type: sql
    readMode: batch
    source: v_charter_silver
    target: v_charter_modelled
    sql: |
      SELECT
        *,
        current_timestamp() as _modelled_at,
        'v1' as _model_version
      FROM v_charter_silver

  - name: write_charter_modelled
    type: write
    source: v_charter_modelled
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{modelled_schema}"
      table: "charter_modelled"
