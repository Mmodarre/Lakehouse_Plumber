pipeline: domain_k_modelled
flowgroup: flight_modelled
presets:
  - default_delta_properties
actions:
  - name: flight_silver_source
    type: load
    readMode: batch
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{silver_schema}"
      table: flight_fct
    target: v_flight_silver
    description: "Load flight from silver for modelling"

  - name: flight_model_transform
    type: transform
    transform_type: sql
    readMode: batch
    source: v_flight_silver
    target: v_flight_modelled
    sql: |
      SELECT
        *,
        current_timestamp() as _modelled_at,
        'v1' as _model_version
      FROM v_flight_silver

  - name: write_flight_modelled
    type: write
    source: v_flight_modelled
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{modelled_schema}"
      table: "flight_modelled"
---
