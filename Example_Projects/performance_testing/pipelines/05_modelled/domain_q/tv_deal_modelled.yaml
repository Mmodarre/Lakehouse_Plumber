pipeline: domain_q_modelled
flowgroup: tv_deal_modelled
presets:
  - default_delta_properties
actions:
  - name: tv_deal_silver_source
    type: load
    readMode: batch
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{silver_schema}"
      table: tv_deal_dim
    target: v_tv_deal_silver
    description: "Load tv_deal from silver for modelling"

  - name: tv_deal_model_transform
    type: transform
    transform_type: sql
    readMode: batch
    source: v_tv_deal_silver
    target: v_tv_deal_modelled
    sql: |
      SELECT
        *,
        current_timestamp() as _modelled_at,
        'v1' as _model_version
      FROM v_tv_deal_silver

  - name: write_tv_deal_modelled
    type: write
    source: v_tv_deal_modelled
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{modelled_schema}"
      table: "tv_deal_modelled"
