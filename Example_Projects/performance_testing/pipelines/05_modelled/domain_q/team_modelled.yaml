pipeline: perf_modelled
flowgroup: team_modelled
presets:
  - default_delta_properties
actions:
  - name: team_silver_source
    type: load
    readMode: batch
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{silver_schema}"
      table: team_dim
    target: v_team_silver
    description: "Load team from silver for modelling"

  - name: team_model_transform
    type: transform
    transform_type: sql
    readMode: batch
    source: v_team_silver
    target: v_team_modelled
    sql: |
      SELECT
        *,
        current_timestamp() as _modelled_at,
        'v1' as _model_version
      FROM v_team_silver

  - name: write_team_modelled
    type: write
    source: v_team_modelled
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{modelled_schema}"
      table: "team_modelled"
