pipeline: domain_q_modelled
flowgroup: league_modelled
presets:
  - default_delta_properties
actions:
  - name: league_silver_source
    type: load
    readMode: batch
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{silver_schema}"
      table: league_dim
    target: v_league_silver
    description: "Load league from silver for modelling"

  - name: league_model_transform
    type: transform
    transform_type: sql
    readMode: batch
    source: v_league_silver
    target: v_league_modelled
    sql: |
      SELECT
        *,
        current_timestamp() as _modelled_at,
        'v1' as _model_version
      FROM v_league_silver

  - name: write_league_modelled
    type: write
    source: v_league_modelled
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{modelled_schema}"
      table: "league_modelled"
