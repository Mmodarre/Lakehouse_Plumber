pipeline: perf_modelled
flowgroup: sponsor_modelled
presets:
  - default_delta_properties
actions:
  - name: sponsor_silver_source
    type: load
    readMode: batch
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{silver_schema}"
      table: sponsor_dim
    target: v_sponsor_silver
    description: "Load sponsor from silver for modelling"

  - name: sponsor_model_transform
    type: transform
    transform_type: sql
    readMode: batch
    source: v_sponsor_silver
    target: v_sponsor_modelled
    sql: |
      SELECT
        *,
        current_timestamp() as _modelled_at,
        'v1' as _model_version
      FROM v_sponsor_silver

  - name: write_sponsor_modelled
    type: write
    source: v_sponsor_modelled
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{modelled_schema}"
      table: "sponsor_modelled"
