pipeline: perf_modelled
flowgroup: offside_modelled
presets:
  - default_delta_properties
actions:
  - name: offside_silver_source
    type: load
    readMode: batch
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{silver_schema}"
      table: offside_dim
    target: v_offside_silver
    description: "Load offside from silver for modelling"

  - name: offside_model_transform
    type: transform
    transform_type: sql
    readMode: batch
    source: v_offside_silver
    target: v_offside_modelled
    sql: |
      SELECT
        *,
        current_timestamp() as _modelled_at,
        'v1' as _model_version
      FROM v_offside_silver

  - name: write_offside_modelled
    type: write
    source: v_offside_modelled
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{modelled_schema}"
      table: "offside_modelled"
