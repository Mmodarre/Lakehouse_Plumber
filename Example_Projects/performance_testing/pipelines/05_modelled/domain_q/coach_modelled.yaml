pipeline: domain_q_modelled
flowgroup: coach_modelled
presets:
  - default_delta_properties
actions:
  - name: coach_silver_source
    type: load
    readMode: batch
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{silver_schema}"
      table: coach_fct
    target: v_coach_silver
    description: "Load coach from silver for modelling"

  - name: coach_model_transform
    type: transform
    transform_type: sql
    readMode: batch
    source: v_coach_silver
    target: v_coach_modelled
    sql: |
      SELECT
        *,
        current_timestamp() as _modelled_at,
        'v1' as _model_version
      FROM v_coach_silver

  - name: write_coach_modelled
    type: write
    source: v_coach_modelled
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{modelled_schema}"
      table: "coach_modelled"
