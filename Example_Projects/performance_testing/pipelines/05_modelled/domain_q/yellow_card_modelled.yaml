pipeline: perf_modelled
flowgroup: yellow_card_modelled
presets:
  - default_delta_properties
actions:
  - name: yellow_card_silver_source
    type: load
    readMode: batch
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{silver_schema}"
      table: yellow_card_dim
    target: v_yellow_card_silver
    description: "Load yellow_card from silver for modelling"

  - name: yellow_card_model_transform
    type: transform
    transform_type: sql
    readMode: batch
    source: v_yellow_card_silver
    target: v_yellow_card_modelled
    sql: |
      SELECT
        *,
        current_timestamp() as _modelled_at,
        'v1' as _model_version
      FROM v_yellow_card_silver

  - name: write_yellow_card_modelled
    type: write
    source: v_yellow_card_modelled
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{modelled_schema}"
      table: "yellow_card_modelled"
