pipeline: perf_modelled
flowgroup: highlight_modelled
presets:
  - default_delta_properties
actions:
  - name: highlight_silver_source
    type: load
    readMode: batch
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{silver_schema}"
      table: highlight_dim
    target: v_highlight_silver
    description: "Load highlight from silver for modelling"

  - name: highlight_model_transform
    type: transform
    transform_type: sql
    readMode: batch
    source: v_highlight_silver
    target: v_highlight_modelled
    sql: |
      SELECT
        *,
        current_timestamp() as _modelled_at,
        'v1' as _model_version
      FROM v_highlight_silver

  - name: write_highlight_modelled
    type: write
    source: v_highlight_modelled
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{modelled_schema}"
      table: "highlight_modelled"
