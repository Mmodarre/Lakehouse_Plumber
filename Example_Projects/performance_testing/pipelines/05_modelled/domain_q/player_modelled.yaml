pipeline: domain_q_modelled
flowgroup: player_modelled
presets:
  - default_delta_properties
actions:
  - name: player_silver_source
    type: load
    readMode: batch
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{silver_schema}"
      table: player_dim
    target: v_player_silver
    description: "Load player from silver for modelling"

  - name: player_model_transform
    type: transform
    transform_type: sql
    readMode: batch
    source: v_player_silver
    target: v_player_modelled
    sql: |
      SELECT
        *,
        current_timestamp() as _modelled_at,
        'v1' as _model_version
      FROM v_player_silver

  - name: write_player_modelled
    type: write
    source: v_player_modelled
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{modelled_schema}"
      table: "player_modelled"
