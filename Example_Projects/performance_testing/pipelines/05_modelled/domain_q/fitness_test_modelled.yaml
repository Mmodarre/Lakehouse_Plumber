pipeline: perf_modelled
flowgroup: fitness_test_modelled
presets:
  - default_delta_properties
actions:
  - name: fitness_test_silver_source
    type: load
    readMode: batch
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{silver_schema}"
      table: fitness_test_dim
    target: v_fitness_test_silver
    description: "Load fitness_test from silver for modelling"

  - name: fitness_test_model_transform
    type: transform
    transform_type: sql
    readMode: batch
    source: v_fitness_test_silver
    target: v_fitness_test_modelled
    sql: |
      SELECT
        *,
        current_timestamp() as _modelled_at,
        'v1' as _model_version
      FROM v_fitness_test_silver

  - name: write_fitness_test_modelled
    type: write
    source: v_fitness_test_modelled
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{modelled_schema}"
      table: "fitness_test_modelled"
