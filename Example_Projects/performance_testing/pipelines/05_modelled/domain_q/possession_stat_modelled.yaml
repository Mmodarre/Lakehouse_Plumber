pipeline: domain_q_modelled
flowgroup: possession_stat_modelled
presets:
  - default_delta_properties
actions:
  - name: possession_stat_silver_source
    type: load
    readMode: batch
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{silver_schema}"
      table: possession_stat_fct
    target: v_possession_stat_silver
    description: "Load possession_stat from silver for modelling"

  - name: possession_stat_model_transform
    type: transform
    transform_type: sql
    readMode: batch
    source: v_possession_stat_silver
    target: v_possession_stat_modelled
    sql: |
      SELECT
        *,
        current_timestamp() as _modelled_at,
        'v1' as _model_version
      FROM v_possession_stat_silver

  - name: write_possession_stat_modelled
    type: write
    source: v_possession_stat_modelled
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{modelled_schema}"
      table: "possession_stat_modelled"
