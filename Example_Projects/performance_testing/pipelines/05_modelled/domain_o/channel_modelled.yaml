pipeline: perf_modelled
flowgroup: channel_modelled
presets:
  - default_delta_properties
actions:
  - name: channel_silver_source
    type: load
    readMode: batch
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{silver_schema}"
      table: channel_dim
    target: v_channel_silver
    description: "Load channel from silver for modelling"

  - name: channel_model_transform
    type: transform
    transform_type: sql
    readMode: batch
    source: v_channel_silver
    target: v_channel_modelled
    sql: |
      SELECT
        *,
        current_timestamp() as _modelled_at,
        'v1' as _model_version
      FROM v_channel_silver

  - name: write_channel_modelled
    type: write
    source: v_channel_modelled
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{modelled_schema}"
      table: "channel_modelled"
