pipeline: domain_o_modelled
flowgroup: segment_modelled
presets:
  - default_delta_properties
actions:
  - name: segment_silver_source
    type: load
    readMode: batch
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{silver_schema}"
      table: segment_fct
    target: v_segment_silver
    description: "Load segment from silver for modelling"

  - name: segment_model_transform
    type: transform
    transform_type: sql
    readMode: batch
    source: v_segment_silver
    target: v_segment_modelled
    sql: |
      SELECT
        *,
        current_timestamp() as _modelled_at,
        'v1' as _model_version
      FROM v_segment_silver

  - name: write_segment_modelled
    type: write
    source: v_segment_modelled
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{modelled_schema}"
      table: "segment_modelled"
