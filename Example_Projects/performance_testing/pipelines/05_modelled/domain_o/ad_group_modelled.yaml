pipeline: perf_modelled
flowgroup: ad_group_modelled
presets:
  - default_delta_properties
actions:
  - name: ad_group_silver_source
    type: load
    readMode: batch
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{silver_schema}"
      table: ad_group_dim
    target: v_ad_group_silver
    description: "Load ad_group from silver for modelling"

  - name: ad_group_model_transform
    type: transform
    transform_type: sql
    readMode: batch
    source: v_ad_group_silver
    target: v_ad_group_modelled
    sql: |
      SELECT
        *,
        current_timestamp() as _modelled_at,
        'v1' as _model_version
      FROM v_ad_group_silver

  - name: write_ad_group_modelled
    type: write
    source: v_ad_group_modelled
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{modelled_schema}"
      table: "ad_group_modelled"
