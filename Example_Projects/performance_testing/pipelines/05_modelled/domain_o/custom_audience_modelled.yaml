pipeline: domain_o_modelled
flowgroup: custom_audience_modelled
presets:
  - default_delta_properties
actions:
  - name: custom_audience_silver_source
    type: load
    readMode: batch
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{silver_schema}"
      table: custom_audience_dim
    target: v_custom_audience_silver
    description: "Load custom_audience from silver for modelling"

  - name: custom_audience_model_transform
    type: transform
    transform_type: sql
    readMode: batch
    source: v_custom_audience_silver
    target: v_custom_audience_modelled
    sql: |
      SELECT
        *,
        current_timestamp() as _modelled_at,
        'v1' as _model_version
      FROM v_custom_audience_silver

  - name: write_custom_audience_modelled
    type: write
    source: v_custom_audience_modelled
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{modelled_schema}"
      table: "custom_audience_modelled"
