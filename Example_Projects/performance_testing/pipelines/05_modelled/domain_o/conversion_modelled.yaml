pipeline: perf_modelled
flowgroup: conversion_modelled
presets:
  - default_delta_properties
actions:
  - name: conversion_silver_source
    type: load
    readMode: batch
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{silver_schema}"
      table: conversion_dim
    target: v_conversion_silver
    description: "Load conversion from silver for modelling"

  - name: conversion_model_transform
    type: transform
    transform_type: sql
    readMode: batch
    source: v_conversion_silver
    target: v_conversion_modelled
    sql: |
      SELECT
        *,
        current_timestamp() as _modelled_at,
        'v1' as _model_version
      FROM v_conversion_silver

  - name: write_conversion_modelled
    type: write
    source: v_conversion_modelled
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{modelled_schema}"
      table: "conversion_modelled"
