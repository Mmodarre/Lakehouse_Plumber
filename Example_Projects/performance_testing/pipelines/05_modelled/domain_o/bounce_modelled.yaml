pipeline: domain_o_modelled
flowgroup: bounce_modelled
presets:
  - default_delta_properties
actions:
  - name: bounce_silver_source
    type: load
    readMode: batch
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{silver_schema}"
      table: bounce_fct
    target: v_bounce_silver
    description: "Load bounce from silver for modelling"

  - name: bounce_model_transform
    type: transform
    transform_type: sql
    readMode: batch
    source: v_bounce_silver
    target: v_bounce_modelled
    sql: |
      SELECT
        *,
        current_timestamp() as _modelled_at,
        'v1' as _model_version
      FROM v_bounce_silver

  - name: write_bounce_modelled
    type: write
    source: v_bounce_modelled
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{modelled_schema}"
      table: "bounce_modelled"
