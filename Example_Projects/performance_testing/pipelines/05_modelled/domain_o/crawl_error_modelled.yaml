pipeline: perf_modelled
flowgroup: crawl_error_modelled
presets:
  - default_delta_properties
actions:
  - name: crawl_error_silver_source
    type: load
    readMode: batch
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{silver_schema}"
      table: crawl_error_dim
    target: v_crawl_error_silver
    description: "Load crawl_error from silver for modelling"

  - name: crawl_error_model_transform
    type: transform
    transform_type: sql
    readMode: batch
    source: v_crawl_error_silver
    target: v_crawl_error_modelled
    sql: |
      SELECT
        *,
        current_timestamp() as _modelled_at,
        'v1' as _model_version
      FROM v_crawl_error_silver

  - name: write_crawl_error_modelled
    type: write
    source: v_crawl_error_modelled
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{modelled_schema}"
      table: "crawl_error_modelled"
