pipeline: perf_modelled
flowgroup: lead_modelled
presets:
  - default_delta_properties
actions:
  - name: lead_silver_source
    type: load
    readMode: batch
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{silver_schema}"
      table: lead_dim
    target: v_lead_silver
    description: "Load lead from silver for modelling"

  - name: lead_model_transform
    type: transform
    transform_type: sql
    readMode: batch
    source: v_lead_silver
    target: v_lead_modelled
    sql: |
      SELECT
        *,
        current_timestamp() as _modelled_at,
        'v1' as _model_version
      FROM v_lead_silver

  - name: write_lead_modelled
    type: write
    source: v_lead_modelled
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{modelled_schema}"
      table: "lead_modelled"
