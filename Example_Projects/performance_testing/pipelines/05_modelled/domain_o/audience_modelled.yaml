pipeline: perf_modelled
flowgroup: audience_modelled
presets:
  - default_delta_properties
actions:
  - name: audience_silver_source
    type: load
    readMode: batch
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{silver_schema}"
      table: audience_dim
    target: v_audience_silver
    description: "Load audience from silver for modelling"

  - name: audience_model_transform
    type: transform
    transform_type: sql
    readMode: batch
    source: v_audience_silver
    target: v_audience_modelled
    sql: |
      SELECT
        *,
        current_timestamp() as _modelled_at,
        'v1' as _model_version
      FROM v_audience_silver

  - name: write_audience_modelled
    type: write
    source: v_audience_modelled
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{modelled_schema}"
      table: "audience_modelled"
