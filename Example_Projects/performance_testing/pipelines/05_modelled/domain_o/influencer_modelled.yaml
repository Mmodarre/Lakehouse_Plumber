pipeline: perf_modelled
flowgroup: influencer_modelled
presets:
  - default_delta_properties
actions:
  - name: influencer_silver_source
    type: load
    readMode: batch
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{silver_schema}"
      table: influencer_dim
    target: v_influencer_silver
    description: "Load influencer from silver for modelling"

  - name: influencer_model_transform
    type: transform
    transform_type: sql
    readMode: batch
    source: v_influencer_silver
    target: v_influencer_modelled
    sql: |
      SELECT
        *,
        current_timestamp() as _modelled_at,
        'v1' as _model_version
      FROM v_influencer_silver

  - name: write_influencer_modelled
    type: write
    source: v_influencer_modelled
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{modelled_schema}"
      table: "influencer_modelled"
