pipeline: domain_s_modelled
flowgroup: provenance_modelled
presets:
  - default_delta_properties
actions:
  - name: provenance_silver_source
    type: load
    readMode: batch
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{silver_schema}"
      table: provenance_dim
    target: v_provenance_silver
    description: "Load provenance from silver for modelling"

  - name: provenance_model_transform
    type: transform
    transform_type: sql
    readMode: batch
    source: v_provenance_silver
    target: v_provenance_modelled
    sql: |
      SELECT
        *,
        current_timestamp() as _modelled_at,
        'v1' as _model_version
      FROM v_provenance_silver

  - name: write_provenance_modelled
    type: write
    source: v_provenance_modelled
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{modelled_schema}"
      table: "provenance_modelled"
