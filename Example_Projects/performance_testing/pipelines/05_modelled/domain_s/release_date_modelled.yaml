pipeline: perf_modelled
flowgroup: release_date_modelled
presets:
  - default_delta_properties
actions:
  - name: release_date_silver_source
    type: load
    readMode: batch
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{silver_schema}"
      table: release_date_dim
    target: v_release_date_silver
    description: "Load release_date from silver for modelling"

  - name: release_date_model_transform
    type: transform
    transform_type: sql
    readMode: batch
    source: v_release_date_silver
    target: v_release_date_modelled
    sql: |
      SELECT
        *,
        current_timestamp() as _modelled_at,
        'v1' as _model_version
      FROM v_release_date_silver

  - name: write_release_date_modelled
    type: write
    source: v_release_date_modelled
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{modelled_schema}"
      table: "release_date_modelled"
