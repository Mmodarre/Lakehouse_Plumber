pipeline: domain_s_modelled
flowgroup: bottle_modelled
presets:
  - default_delta_properties
actions:
  - name: bottle_silver_source
    type: load
    readMode: batch
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{silver_schema}"
      table: bottle_dim
    target: v_bottle_silver
    description: "Load bottle from silver for modelling"

  - name: bottle_model_transform
    type: transform
    transform_type: sql
    readMode: batch
    source: v_bottle_silver
    target: v_bottle_modelled
    sql: |
      SELECT
        *,
        current_timestamp() as _modelled_at,
        'v1' as _model_version
      FROM v_bottle_silver

  - name: write_bottle_modelled
    type: write
    source: v_bottle_modelled
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{modelled_schema}"
      table: "bottle_modelled"
