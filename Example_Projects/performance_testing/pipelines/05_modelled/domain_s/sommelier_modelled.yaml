pipeline: perf_modelled
flowgroup: sommelier_modelled
presets:
  - default_delta_properties
actions:
  - name: sommelier_silver_source
    type: load
    readMode: batch
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{silver_schema}"
      table: sommelier_dim
    target: v_sommelier_silver
    description: "Load sommelier from silver for modelling"

  - name: sommelier_model_transform
    type: transform
    transform_type: sql
    readMode: batch
    source: v_sommelier_silver
    target: v_sommelier_modelled
    sql: |
      SELECT
        *,
        current_timestamp() as _modelled_at,
        'v1' as _model_version
      FROM v_sommelier_silver

  - name: write_sommelier_modelled
    type: write
    source: v_sommelier_modelled
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{modelled_schema}"
      table: "sommelier_modelled"
