pipeline: perf_modelled
flowgroup: allocation_modelled
presets:
  - default_delta_properties
actions:
  - name: allocation_silver_source
    type: load
    readMode: batch
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{silver_schema}"
      table: allocation_dim
    target: v_allocation_silver
    description: "Load allocation from silver for modelling"

  - name: allocation_model_transform
    type: transform
    transform_type: sql
    readMode: batch
    source: v_allocation_silver
    target: v_allocation_modelled
    sql: |
      SELECT
        *,
        current_timestamp() as _modelled_at,
        'v1' as _model_version
      FROM v_allocation_silver

  - name: write_allocation_modelled
    type: write
    source: v_allocation_modelled
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{modelled_schema}"
      table: "allocation_modelled"
