pipeline: perf_modelled
flowgroup: critic_score_modelled
presets:
  - default_delta_properties
actions:
  - name: critic_score_silver_source
    type: load
    readMode: batch
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{silver_schema}"
      table: critic_score_dim
    target: v_critic_score_silver
    description: "Load critic_score from silver for modelling"

  - name: critic_score_model_transform
    type: transform
    transform_type: sql
    readMode: batch
    source: v_critic_score_silver
    target: v_critic_score_modelled
    sql: |
      SELECT
        *,
        current_timestamp() as _modelled_at,
        'v1' as _model_version
      FROM v_critic_score_silver

  - name: write_critic_score_modelled
    type: write
    source: v_critic_score_modelled
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{modelled_schema}"
      table: "critic_score_modelled"
