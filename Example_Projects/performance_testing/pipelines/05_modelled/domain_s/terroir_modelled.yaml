pipeline: domain_s_modelled
flowgroup: terroir_modelled
presets:
  - default_delta_properties
actions:
  - name: terroir_silver_source
    type: load
    readMode: batch
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{silver_schema}"
      table: terroir_fct
    target: v_terroir_silver
    description: "Load terroir from silver for modelling"

  - name: terroir_model_transform
    type: transform
    transform_type: sql
    readMode: batch
    source: v_terroir_silver
    target: v_terroir_modelled
    sql: |
      SELECT
        *,
        current_timestamp() as _modelled_at,
        'v1' as _model_version
      FROM v_terroir_silver

  - name: write_terroir_modelled
    type: write
    source: v_terroir_modelled
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{modelled_schema}"
      table: "terroir_modelled"
