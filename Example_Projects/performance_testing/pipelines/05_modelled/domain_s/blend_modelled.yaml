pipeline: perf_modelled
flowgroup: blend_modelled
presets:
  - default_delta_properties
actions:
  - name: blend_silver_source
    type: load
    readMode: batch
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{silver_schema}"
      table: blend_dim
    target: v_blend_silver
    description: "Load blend from silver for modelling"

  - name: blend_model_transform
    type: transform
    transform_type: sql
    readMode: batch
    source: v_blend_silver
    target: v_blend_modelled
    sql: |
      SELECT
        *,
        current_timestamp() as _modelled_at,
        'v1' as _model_version
      FROM v_blend_silver

  - name: write_blend_modelled
    type: write
    source: v_blend_modelled
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{modelled_schema}"
      table: "blend_modelled"
