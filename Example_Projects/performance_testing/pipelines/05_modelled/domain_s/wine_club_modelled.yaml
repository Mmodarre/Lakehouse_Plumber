pipeline: perf_modelled
flowgroup: wine_club_modelled
presets:
  - default_delta_properties
actions:
  - name: wine_club_silver_source
    type: load
    readMode: batch
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{silver_schema}"
      table: wine_club_dim
    target: v_wine_club_silver
    description: "Load wine_club from silver for modelling"

  - name: wine_club_model_transform
    type: transform
    transform_type: sql
    readMode: batch
    source: v_wine_club_silver
    target: v_wine_club_modelled
    sql: |
      SELECT
        *,
        current_timestamp() as _modelled_at,
        'v1' as _model_version
      FROM v_wine_club_silver

  - name: write_wine_club_modelled
    type: write
    source: v_wine_club_modelled
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{modelled_schema}"
      table: "wine_club_modelled"
