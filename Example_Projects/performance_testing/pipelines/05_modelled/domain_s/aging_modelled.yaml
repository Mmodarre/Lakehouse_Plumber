pipeline: domain_s_modelled
flowgroup: aging_modelled
presets:
  - default_delta_properties
actions:
  - name: aging_silver_source
    type: load
    readMode: batch
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{silver_schema}"
      table: aging_dim
    target: v_aging_silver
    description: "Load aging from silver for modelling"

  - name: aging_model_transform
    type: transform
    transform_type: sql
    readMode: batch
    source: v_aging_silver
    target: v_aging_modelled
    sql: |
      SELECT
        *,
        current_timestamp() as _modelled_at,
        'v1' as _model_version
      FROM v_aging_silver

  - name: write_aging_modelled
    type: write
    source: v_aging_modelled
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{modelled_schema}"
      table: "aging_modelled"
