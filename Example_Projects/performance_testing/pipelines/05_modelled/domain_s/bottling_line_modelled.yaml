pipeline: domain_s_modelled
flowgroup: bottling_line_modelled
presets:
  - default_delta_properties
actions:
  - name: bottling_line_silver_source
    type: load
    readMode: batch
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{silver_schema}"
      table: bottling_line_fct
    target: v_bottling_line_silver
    description: "Load bottling_line from silver for modelling"

  - name: bottling_line_model_transform
    type: transform
    transform_type: sql
    readMode: batch
    source: v_bottling_line_silver
    target: v_bottling_line_modelled
    sql: |
      SELECT
        *,
        current_timestamp() as _modelled_at,
        'v1' as _model_version
      FROM v_bottling_line_silver

  - name: write_bottling_line_modelled
    type: write
    source: v_bottling_line_modelled
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{modelled_schema}"
      table: "bottling_line_modelled"
