pipeline: perf_modelled
flowgroup: pressing_modelled
presets:
  - default_delta_properties
actions:
  - name: pressing_silver_source
    type: load
    readMode: batch
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{silver_schema}"
      table: pressing_dim
    target: v_pressing_silver
    description: "Load pressing from silver for modelling"

  - name: pressing_model_transform
    type: transform
    transform_type: sql
    readMode: batch
    source: v_pressing_silver
    target: v_pressing_modelled
    sql: |
      SELECT
        *,
        current_timestamp() as _modelled_at,
        'v1' as _model_version
      FROM v_pressing_silver

  - name: write_pressing_modelled
    type: write
    source: v_pressing_modelled
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{modelled_schema}"
      table: "pressing_modelled"
