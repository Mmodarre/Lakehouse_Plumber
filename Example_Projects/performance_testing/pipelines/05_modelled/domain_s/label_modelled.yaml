pipeline: perf_modelled
flowgroup: label_modelled
presets:
  - default_delta_properties
actions:
  - name: label_silver_source
    type: load
    readMode: batch
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{silver_schema}"
      table: label_dim
    target: v_label_silver
    description: "Load label from silver for modelling"

  - name: label_model_transform
    type: transform
    transform_type: sql
    readMode: batch
    source: v_label_silver
    target: v_label_modelled
    sql: |
      SELECT
        *,
        current_timestamp() as _modelled_at,
        'v1' as _model_version
      FROM v_label_silver

  - name: write_label_modelled
    type: write
    source: v_label_modelled
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{modelled_schema}"
      table: "label_modelled"
