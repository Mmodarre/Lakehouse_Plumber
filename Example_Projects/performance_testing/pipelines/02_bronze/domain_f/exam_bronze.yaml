pipeline: perf_bronze
flowgroup: exam_bronze
presets:
  - default_delta_properties
actions:
  - name: exam_raw_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: stream
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{raw_schema}"
      table: exam_raw
    target: v_exam_raw
    description: "Load exam from raw schema"

  - name: exam_bronze_cleanse
    type: transform
    transform_type: sql
    source: v_exam_raw
    target: v_exam_bronze_cleaned
    sql: |
      SELECT
        xxhash64(*) as exam_key,
        *,
        current_timestamp() as _etl_timestamp
      FROM v_exam_raw
      WHERE 1=1

  - name: exam_bronze_dqe
    type: transform
    transform_type: data_quality
    source: v_exam_bronze_cleaned
    target: v_exam_bronze_dqe
    readMode: stream
    expectations_file: "expectations/generic_quality.json"
    description: "Apply data quality checks to exam"

  - name: write_exam_bronze
    type: write
    source: v_exam_bronze_dqe
    write_target:
      create_table: true
      type: streaming_table
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: "exam"
