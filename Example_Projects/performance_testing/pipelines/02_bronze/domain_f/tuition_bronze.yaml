pipeline: perf_bronze
flowgroup: tuition_bronze
presets:
  - default_delta_properties
actions:
  - name: tuition_raw_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: stream
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{raw_schema}"
      table: tuition_raw
    target: v_tuition_raw
    description: "Load tuition from raw schema"

  - name: tuition_bronze_cleanse
    type: transform
    transform_type: sql
    source: v_tuition_raw
    target: v_tuition_bronze_cleaned
    sql: |
      SELECT
        xxhash64(*) as tuition_key,
        *,
        current_timestamp() as _etl_timestamp
      FROM v_tuition_raw

  - name: tuition_bronze_dqe
    type: transform
    transform_type: data_quality
    source: v_tuition_bronze_cleaned
    target: v_tuition_bronze_dqe
    readMode: stream
    expectations_file: "expectations/generic_quality.json"
    description: "Data quality for tuition bronze"

  - name: write_tuition_bronze
    type: write
    source: v_tuition_bronze_dqe
    write_target:
      create_table: true
      type: streaming_table
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: "tuition"

  - name: tuition_migration_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: batch
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{raw_schema}"
      table: tuition_migration
    target: v_tuition_migration
    description: "Load tuition migration data"

  - name: tuition_migration_cleanse
    type: transform
    transform_type: sql
    readMode: batch
    source: v_tuition_migration
    target: v_tuition_migration_cleaned
    sql: |
      SELECT
        xxhash64(*) as tuition_key,
        *,
        'MIGRATION' as _source_file_path,
        current_timestamp() as _etl_timestamp
      FROM v_tuition_migration

  - name: write_tuition_migration
    type: write
    source: v_tuition_migration_cleaned
    readMode: batch
    once: true
    write_target:
      create_table: false
      type: streaming_table
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: "tuition"
