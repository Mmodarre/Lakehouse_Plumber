pipeline: domain_f_bronze
flowgroup: faculty_bronze
presets:
  - default_delta_properties
actions:
  - name: faculty_raw_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: stream
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{raw_schema}"
      table: faculty_raw
    target: v_faculty_raw
    description: "Load faculty from raw schema"

  - name: faculty_bronze_cleanse
    type: transform
    transform_type: sql
    source: v_faculty_raw
    target: v_faculty_bronze_cleaned
    sql: |
      SELECT
        xxhash64(*) as faculty_key,
        *,
        current_timestamp() as _etl_timestamp
      FROM v_faculty_raw
      WHERE 1=1

  - name: faculty_bronze_dqe
    type: transform
    transform_type: data_quality
    source: v_faculty_bronze_cleaned
    target: v_faculty_bronze_dqe
    readMode: stream
    expectations_file: "expectations/generic_quality.json"
    description: "Apply data quality checks to faculty"

  - name: write_faculty_bronze
    type: write
    source: v_faculty_bronze_dqe
    write_target:
      create_table: true
      type: streaming_table
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: "faculty"
