pipeline: perf_bronze
flowgroup: lecture_bronze
presets:
  - default_delta_properties
actions:
  - name: lecture_raw_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: stream
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{raw_schema}"
      table: lecture_raw
    target: v_lecture_raw
    description: "Load lecture from raw schema"

  - name: lecture_bronze_cleanse
    type: transform
    transform_type: sql
    source: v_lecture_raw
    target: v_lecture_bronze_cleaned
    sql: |
      SELECT
        xxhash64(*) as lecture_key,
        *,
        current_timestamp() as _etl_timestamp
      FROM v_lecture_raw
      WHERE 1=1

  - name: lecture_bronze_dqe
    type: transform
    transform_type: data_quality
    source: v_lecture_bronze_cleaned
    target: v_lecture_bronze_dqe
    readMode: stream
    expectations_file: "expectations/generic_quality.json"
    description: "Apply data quality checks to lecture"

  - name: write_lecture_bronze
    type: write
    source: v_lecture_bronze_dqe
    write_target:
      create_table: true
      type: streaming_table
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: "lecture"
