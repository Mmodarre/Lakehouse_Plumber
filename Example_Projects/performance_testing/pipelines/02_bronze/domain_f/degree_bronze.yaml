pipeline: perf_bronze
flowgroup: degree_bronze
presets:
  - default_delta_properties
actions:
  - name: degree_raw_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: stream
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{raw_schema}"
      table: degree_raw
    target: v_degree_raw
    description: "Load degree from raw schema"

  - name: degree_bronze_cleanse
    type: transform
    transform_type: sql
    source: v_degree_raw
    target: v_degree_bronze_cleaned
    sql: |
      SELECT
        xxhash64(*) as degree_key,
        *,
        current_timestamp() as _etl_timestamp
      FROM v_degree_raw
      WHERE 1=1

  - name: degree_bronze_dqe
    type: transform
    transform_type: data_quality
    source: v_degree_bronze_cleaned
    target: v_degree_bronze_dqe
    readMode: stream
    expectations_file: "expectations/generic_quality.json"
    description: "Apply data quality checks to degree"

  - name: write_degree_bronze
    type: write
    source: v_degree_bronze_dqe
    write_target:
      create_table: true
      type: streaming_table
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: "degree"
