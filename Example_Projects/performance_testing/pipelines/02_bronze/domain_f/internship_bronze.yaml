pipeline: perf_bronze
flowgroup: internship_bronze
presets:
  - default_delta_properties
actions:
  - name: internship_raw_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: stream
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{raw_schema}"
      table: internship_raw
    target: v_internship_raw
    description: "Load internship from raw schema"

  - name: internship_bronze_cleanse
    type: transform
    transform_type: sql
    source: v_internship_raw
    target: v_internship_bronze_cleaned
    sql: |
      SELECT
        xxhash64(*) as internship_key,
        *,
        current_timestamp() as _etl_timestamp
      FROM v_internship_raw
      WHERE 1=1

  - name: internship_bronze_dqe
    type: transform
    transform_type: data_quality
    source: v_internship_bronze_cleaned
    target: v_internship_bronze_dqe
    readMode: stream
    expectations_file: "expectations/generic_quality.json"
    description: "Apply data quality checks to internship"

  - name: write_internship_bronze
    type: write
    source: v_internship_bronze_dqe
    write_target:
      create_table: true
      type: streaming_table
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: "internship"
