pipeline: perf_bronze
flowgroup: campus_bronze
presets:
  - default_delta_properties
actions:
  - name: campus_raw_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: stream
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{raw_schema}"
      table: campus_raw
    target: v_campus_raw
    description: "Load campus from raw schema"

  - name: campus_bronze_cleanse
    type: transform
    transform_type: sql
    source: v_campus_raw
    target: v_campus_bronze_cleaned
    sql: |
      SELECT
        xxhash64(*) as campus_key,
        *,
        current_timestamp() as _etl_timestamp
      FROM v_campus_raw
      WHERE 1=1

  - name: campus_bronze_dqe
    type: transform
    transform_type: data_quality
    source: v_campus_bronze_cleaned
    target: v_campus_bronze_dqe
    readMode: stream
    expectations_file: "expectations/generic_quality.json"
    description: "Apply data quality checks to campus"

  - name: write_campus_bronze
    type: write
    source: v_campus_bronze_dqe
    write_target:
      create_table: true
      type: streaming_table
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: "campus"
