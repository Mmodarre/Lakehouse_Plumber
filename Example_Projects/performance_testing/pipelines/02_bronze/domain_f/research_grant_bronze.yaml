pipeline: domain_f_bronze
flowgroup: research_grant_bronze
presets:
  - default_delta_properties
actions:
  - name: research_grant_raw_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: stream
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{raw_schema}"
      table: research_grant_raw
    target: v_research_grant_raw
    description: "Load research_grant from raw schema"

  - name: research_grant_bronze_cleanse
    type: transform
    transform_type: sql
    source: v_research_grant_raw
    target: v_research_grant_bronze_cleaned
    sql: |
      SELECT
        xxhash64(*) as research_grant_key,
        *,
        current_timestamp() as _etl_timestamp
      FROM v_research_grant_raw
      WHERE 1=1

  - name: research_grant_bronze_dqe
    type: transform
    transform_type: data_quality
    source: v_research_grant_bronze_cleaned
    target: v_research_grant_bronze_dqe
    readMode: stream
    expectations_file: "expectations/generic_quality.json"
    description: "Apply data quality checks to research_grant"

  - name: write_research_grant_bronze
    type: write
    source: v_research_grant_bronze_dqe
    write_target:
      create_table: true
      type: streaming_table
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: "research_grant"
