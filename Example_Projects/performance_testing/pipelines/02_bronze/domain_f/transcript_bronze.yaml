pipeline: perf_bronze
flowgroup: transcript_bronze
presets:
  - default_delta_properties
actions:
  - name: transcript_raw_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: stream
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{raw_schema}"
      table: transcript_raw
    target: v_transcript_raw
    description: "Load transcript from raw schema"

  - name: transcript_bronze_cleanse
    type: transform
    transform_type: sql
    source: v_transcript_raw
    target: v_transcript_bronze_cleaned
    sql: |
      SELECT
        xxhash64(*) as transcript_key,
        *,
        current_timestamp() as _etl_timestamp
      FROM v_transcript_raw
      WHERE 1=1

  - name: transcript_bronze_dqe
    type: transform
    transform_type: data_quality
    source: v_transcript_bronze_cleaned
    target: v_transcript_bronze_dqe
    readMode: stream
    expectations_file: "expectations/generic_quality.json"
    description: "Apply data quality checks to transcript"

  - name: write_transcript_bronze
    type: write
    source: v_transcript_bronze_dqe
    write_target:
      create_table: true
      type: streaming_table
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: "transcript"
