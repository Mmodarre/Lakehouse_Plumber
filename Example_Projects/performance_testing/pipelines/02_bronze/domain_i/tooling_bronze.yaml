pipeline: perf_bronze
flowgroup: tooling_bronze
presets:
  - default_delta_properties
actions:
  - name: tooling_raw_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: stream
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{raw_schema}"
      table: tooling_raw
    target: v_tooling_raw
    description: "Load tooling from raw schema"

  - name: tooling_bronze_cleanse
    type: transform
    transform_type: sql
    source: v_tooling_raw
    target: v_tooling_bronze_cleaned
    sql: |
      SELECT
        xxhash64(*) as tooling_key,
        *,
        current_timestamp() as _etl_timestamp
      FROM v_tooling_raw
      WHERE 1=1

  - name: tooling_bronze_dqe
    type: transform
    transform_type: data_quality
    source: v_tooling_bronze_cleaned
    target: v_tooling_bronze_dqe
    readMode: stream
    expectations_file: "expectations/generic_quality.json"
    description: "Apply data quality checks to tooling"

  - name: write_tooling_bronze
    type: write
    source: v_tooling_bronze_dqe
    write_target:
      create_table: true
      type: streaming_table
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: "tooling"
