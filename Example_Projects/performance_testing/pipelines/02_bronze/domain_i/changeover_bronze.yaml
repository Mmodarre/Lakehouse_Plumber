pipeline: perf_bronze
flowgroup: changeover_bronze
presets:
  - default_delta_properties
actions:
  - name: changeover_raw_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: stream
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{raw_schema}"
      table: changeover_raw
    target: v_changeover_raw
    description: "Load changeover from raw schema"

  - name: changeover_bronze_cleanse
    type: transform
    transform_type: sql
    source: v_changeover_raw
    target: v_changeover_bronze_cleaned
    sql: |
      SELECT
        xxhash64(*) as changeover_key,
        *,
        current_timestamp() as _etl_timestamp
      FROM v_changeover_raw
      WHERE 1=1

  - name: changeover_bronze_dqe
    type: transform
    transform_type: data_quality
    source: v_changeover_bronze_cleaned
    target: v_changeover_bronze_dqe
    readMode: stream
    expectations_file: "expectations/generic_quality.json"
    description: "Apply data quality checks to changeover"

  - name: write_changeover_bronze
    type: write
    source: v_changeover_bronze_dqe
    write_target:
      create_table: true
      type: streaming_table
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: "changeover"
