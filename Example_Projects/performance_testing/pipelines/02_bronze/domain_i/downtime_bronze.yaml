pipeline: perf_bronze
flowgroup: downtime_bronze
presets:
  - default_delta_properties
actions:
  - name: downtime_raw_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: stream
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{raw_schema}"
      table: downtime_raw
    target: v_downtime_raw
    description: "Load downtime from raw schema"

  - name: downtime_bronze_cleanse
    type: transform
    transform_type: sql
    source: v_downtime_raw
    target: v_downtime_bronze_cleaned
    sql: |
      SELECT
        xxhash64(*) as downtime_key,
        *,
        current_timestamp() as _etl_timestamp
      FROM v_downtime_raw
      WHERE 1=1

  - name: downtime_bronze_dqe
    type: transform
    transform_type: data_quality
    source: v_downtime_bronze_cleaned
    target: v_downtime_bronze_dqe
    readMode: stream
    expectations_file: "expectations/generic_quality.json"
    description: "Apply data quality checks to downtime"

  - name: write_downtime_bronze
    type: write
    source: v_downtime_bronze_dqe
    write_target:
      create_table: true
      type: streaming_table
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: "downtime"
