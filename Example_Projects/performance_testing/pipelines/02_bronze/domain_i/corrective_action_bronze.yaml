pipeline: domain_i_bronze
flowgroup: corrective_action_bronze
presets:
  - default_delta_properties
actions:
  - name: corrective_action_raw_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: stream
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{raw_schema}"
      table: corrective_action_raw
    target: v_corrective_action_raw
    description: "Load corrective_action from raw schema"

  - name: corrective_action_bronze_cleanse
    type: transform
    transform_type: sql
    source: v_corrective_action_raw
    target: v_corrective_action_bronze_cleaned
    sql: |
      SELECT
        xxhash64(*) as corrective_action_key,
        *,
        current_timestamp() as _etl_timestamp
      FROM v_corrective_action_raw
      WHERE 1=1

  - name: corrective_action_bronze_dqe
    type: transform
    transform_type: data_quality
    source: v_corrective_action_bronze_cleaned
    target: v_corrective_action_bronze_dqe
    readMode: stream
    expectations_file: "expectations/generic_quality.json"
    description: "Apply data quality checks to corrective_action"

  - name: write_corrective_action_bronze
    type: write
    source: v_corrective_action_bronze_dqe
    write_target:
      create_table: true
      type: streaming_table
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: "corrective_action"
