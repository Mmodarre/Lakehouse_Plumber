pipeline: perf_bronze
flowgroup: yield_rate_bronze
presets:
  - default_delta_properties
actions:
  - name: yield_rate_raw_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: stream
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{raw_schema}"
      table: yield_rate_raw
    target: v_yield_rate_raw
    description: "Load yield_rate from raw schema"

  - name: yield_rate_bronze_cleanse
    type: transform
    transform_type: sql
    source: v_yield_rate_raw
    target: v_yield_rate_bronze_cleaned
    sql: |
      SELECT
        xxhash64(*) as yield_rate_key,
        *,
        current_timestamp() as _etl_timestamp
      FROM v_yield_rate_raw
      WHERE 1=1

  - name: yield_rate_bronze_dqe
    type: transform
    transform_type: data_quality
    source: v_yield_rate_bronze_cleaned
    target: v_yield_rate_bronze_dqe
    readMode: stream
    expectations_file: "expectations/generic_quality.json"
    description: "Apply data quality checks to yield_rate"

  - name: write_yield_rate_bronze
    type: write
    source: v_yield_rate_bronze_dqe
    write_target:
      create_table: true
      type: streaming_table
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: "yield_rate"
