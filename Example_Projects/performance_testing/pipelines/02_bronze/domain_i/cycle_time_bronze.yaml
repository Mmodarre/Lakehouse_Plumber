pipeline: perf_bronze
flowgroup: cycle_time_bronze
presets:
  - default_delta_properties
actions:
  - name: cycle_time_raw_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: stream
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{raw_schema}"
      table: cycle_time_raw
    target: v_cycle_time_raw
    description: "Load cycle_time from raw schema"

  - name: cycle_time_bronze_cleanse
    type: transform
    transform_type: sql
    source: v_cycle_time_raw
    target: v_cycle_time_bronze_cleaned
    sql: |
      SELECT
        xxhash64(*) as cycle_time_key,
        *,
        current_timestamp() as _etl_timestamp
      FROM v_cycle_time_raw
      WHERE 1=1

  - name: cycle_time_bronze_dqe
    type: transform
    transform_type: data_quality
    source: v_cycle_time_bronze_cleaned
    target: v_cycle_time_bronze_dqe
    readMode: stream
    expectations_file: "expectations/generic_quality.json"
    description: "Apply data quality checks to cycle_time"

  - name: write_cycle_time_bronze
    type: write
    source: v_cycle_time_bronze_dqe
    write_target:
      create_table: true
      type: streaming_table
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: "cycle_time"
