pipeline: perf_bronze
flowgroup: barcode_bronze
presets:
  - default_delta_properties
actions:
  - name: barcode_raw_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: stream
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{raw_schema}"
      table: barcode_raw
    target: v_barcode_raw
    description: "Load barcode from raw schema"

  - name: barcode_bronze_cleanse
    type: transform
    transform_type: sql
    source: v_barcode_raw
    target: v_barcode_bronze_cleaned
    sql: |
      SELECT
        xxhash64(*) as barcode_key,
        *,
        current_timestamp() as _etl_timestamp
      FROM v_barcode_raw

  - name: barcode_bronze_dqe
    type: transform
    transform_type: data_quality
    source: v_barcode_bronze_cleaned
    target: v_barcode_bronze_dqe
    readMode: stream
    expectations_file: "expectations/generic_quality.json"
    description: "Data quality for barcode bronze"

  - name: write_barcode_bronze
    type: write
    source: v_barcode_bronze_dqe
    write_target:
      create_table: true
      type: streaming_table
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: "barcode"

  - name: barcode_migration_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: batch
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{raw_schema}"
      table: barcode_migration
    target: v_barcode_migration
    description: "Load barcode migration data"

  - name: barcode_migration_cleanse
    type: transform
    transform_type: sql
    readMode: batch
    source: v_barcode_migration
    target: v_barcode_migration_cleaned
    sql: |
      SELECT
        xxhash64(*) as barcode_key,
        *,
        'MIGRATION' as _source_file_path,
        current_timestamp() as _etl_timestamp
      FROM v_barcode_migration

  - name: write_barcode_migration
    type: write
    source: v_barcode_migration_cleaned
    readMode: batch
    once: true
    write_target:
      create_table: false
      type: streaming_table
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: "barcode"
