pipeline: perf_bronze
flowgroup: vendor_bronze
presets:
  - default_delta_properties
actions:
  - name: vendor_raw_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: stream
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{raw_schema}"
      table: vendor_raw
    target: v_vendor_raw
    description: "Load vendor from raw schema"

  - name: vendor_bronze_cleanse
    type: transform
    transform_type: sql
    source: v_vendor_raw
    target: v_vendor_bronze_cleaned
    sql: |
      SELECT
        xxhash64(*) as vendor_key,
        *,
        current_timestamp() as _etl_timestamp
      FROM v_vendor_raw
      WHERE 1=1

  - name: vendor_bronze_dqe
    type: transform
    transform_type: data_quality
    source: v_vendor_bronze_cleaned
    target: v_vendor_bronze_dqe
    readMode: stream
    expectations_file: "expectations/generic_quality.json"
    description: "Apply data quality checks to vendor"

  - name: write_vendor_bronze
    type: write
    source: v_vendor_bronze_dqe
    write_target:
      create_table: true
      type: streaming_table
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: "vendor"
