pipeline: perf_bronze
flowgroup: stock_count_bronze
presets:
  - default_delta_properties
actions:
  - name: stock_count_raw_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: stream
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{raw_schema}"
      table: stock_count_raw
    target: v_stock_count_raw
    description: "Load stock_count from raw schema"

  - name: stock_count_bronze_cleanse
    type: transform
    transform_type: sql
    source: v_stock_count_raw
    target: v_stock_count_bronze_cleaned
    sql: |
      SELECT
        xxhash64(*) as stock_count_key,
        *,
        current_timestamp() as _etl_timestamp
      FROM v_stock_count_raw
      WHERE 1=1

  - name: stock_count_bronze_dqe
    type: transform
    transform_type: data_quality
    source: v_stock_count_bronze_cleaned
    target: v_stock_count_bronze_dqe
    readMode: stream
    expectations_file: "expectations/generic_quality.json"
    description: "Apply data quality checks to stock_count"

  - name: write_stock_count_bronze
    type: write
    source: v_stock_count_bronze_dqe
    write_target:
      create_table: true
      type: streaming_table
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: "stock_count"
