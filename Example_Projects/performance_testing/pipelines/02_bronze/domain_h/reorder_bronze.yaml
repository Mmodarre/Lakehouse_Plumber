pipeline: perf_bronze
flowgroup: reorder_bronze
presets:
  - default_delta_properties
actions:
  - name: reorder_raw_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: stream
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{raw_schema}"
      table: reorder_raw
    target: v_reorder_raw
    description: "Load reorder from raw schema"

  - name: reorder_bronze_cleanse
    type: transform
    transform_type: sql
    source: v_reorder_raw
    target: v_reorder_bronze_cleaned
    sql: |
      SELECT
        xxhash64(*) as reorder_key,
        *,
        current_timestamp() as _etl_timestamp
      FROM v_reorder_raw

  - name: reorder_bronze_dqe
    type: transform
    transform_type: data_quality
    source: v_reorder_bronze_cleaned
    target: v_reorder_bronze_dqe
    readMode: stream
    expectations_file: "expectations/generic_quality.json"
    description: "Data quality for reorder bronze"

  - name: write_reorder_bronze
    type: write
    source: v_reorder_bronze_dqe
    write_target:
      create_table: true
      type: streaming_table
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: "reorder"

  - name: reorder_migration_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: batch
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{raw_schema}"
      table: reorder_migration
    target: v_reorder_migration
    description: "Load reorder migration data"

  - name: reorder_migration_cleanse
    type: transform
    transform_type: sql
    readMode: batch
    source: v_reorder_migration
    target: v_reorder_migration_cleaned
    sql: |
      SELECT
        xxhash64(*) as reorder_key,
        *,
        'MIGRATION' as _source_file_path,
        current_timestamp() as _etl_timestamp
      FROM v_reorder_migration

  - name: write_reorder_migration
    type: write
    source: v_reorder_migration_cleaned
    readMode: batch
    once: true
    write_target:
      create_table: false
      type: streaming_table
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: "reorder"
