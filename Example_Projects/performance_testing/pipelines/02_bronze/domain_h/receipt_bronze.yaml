pipeline: perf_bronze
flowgroup: receipt_bronze
presets:
  - default_delta_properties
actions:
  - name: receipt_raw_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: stream
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{raw_schema}"
      table: receipt_raw
    target: v_receipt_raw
    description: "Load receipt from raw schema"

  - name: receipt_bronze_cleanse
    type: transform
    transform_type: sql
    source: v_receipt_raw
    target: v_receipt_bronze_cleaned
    sql: |
      SELECT
        xxhash64(*) as receipt_key,
        *,
        current_timestamp() as _etl_timestamp
      FROM v_receipt_raw
      WHERE 1=1

  - name: receipt_bronze_dqe
    type: transform
    transform_type: data_quality
    source: v_receipt_bronze_cleaned
    target: v_receipt_bronze_dqe
    readMode: stream
    expectations_file: "expectations/generic_quality.json"
    description: "Apply data quality checks to receipt"

  - name: write_receipt_bronze
    type: write
    source: v_receipt_bronze_dqe
    write_target:
      create_table: true
      type: streaming_table
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: "receipt"
