pipeline: perf_bronze
flowgroup: shrinkage_bronze
presets:
  - default_delta_properties
actions:
  - name: shrinkage_raw_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: stream
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{raw_schema}"
      table: shrinkage_raw
    target: v_shrinkage_raw
    description: "Load shrinkage from raw schema"

  - name: shrinkage_bronze_cleanse
    type: transform
    transform_type: sql
    source: v_shrinkage_raw
    target: v_shrinkage_bronze_cleaned
    sql: |
      SELECT
        xxhash64(*) as shrinkage_key,
        *,
        current_timestamp() as _etl_timestamp
      FROM v_shrinkage_raw
      WHERE 1=1

  - name: shrinkage_bronze_dqe
    type: transform
    transform_type: data_quality
    source: v_shrinkage_bronze_cleaned
    target: v_shrinkage_bronze_dqe
    readMode: stream
    expectations_file: "expectations/generic_quality.json"
    description: "Apply data quality checks to shrinkage"

  - name: write_shrinkage_bronze
    type: write
    source: v_shrinkage_bronze_dqe
    write_target:
      create_table: true
      type: streaming_table
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: "shrinkage"
