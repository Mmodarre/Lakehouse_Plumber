pipeline: perf_bronze
flowgroup: register_bronze
presets:
  - default_delta_properties
actions:
  - name: register_raw_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: stream
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{raw_schema}"
      table: register_raw
    target: v_register_raw
    description: "Load register from raw schema"

  - name: register_bronze_cleanse
    type: transform
    transform_type: sql
    source: v_register_raw
    target: v_register_bronze_cleaned
    sql: |
      SELECT
        xxhash64(*) as register_key,
        *,
        current_timestamp() as _etl_timestamp
      FROM v_register_raw
      WHERE 1=1

  - name: register_bronze_dqe
    type: transform
    transform_type: data_quality
    source: v_register_bronze_cleaned
    target: v_register_bronze_dqe
    readMode: stream
    expectations_file: "expectations/generic_quality.json"
    description: "Apply data quality checks to register"

  - name: write_register_bronze
    type: write
    source: v_register_bronze_dqe
    write_target:
      create_table: true
      type: streaming_table
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: "register"
