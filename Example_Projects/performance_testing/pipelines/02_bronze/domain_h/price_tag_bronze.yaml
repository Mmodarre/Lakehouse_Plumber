pipeline: perf_bronze
flowgroup: price_tag_bronze
presets:
  - default_delta_properties
actions:
  - name: price_tag_raw_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: stream
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{raw_schema}"
      table: price_tag_raw
    target: v_price_tag_raw
    description: "Load price_tag from raw schema"

  - name: price_tag_bronze_cleanse
    type: transform
    transform_type: sql
    source: v_price_tag_raw
    target: v_price_tag_bronze_cleaned
    sql: |
      SELECT
        xxhash64(*) as price_tag_key,
        *,
        current_timestamp() as _etl_timestamp
      FROM v_price_tag_raw
      WHERE 1=1

  - name: price_tag_bronze_dqe
    type: transform
    transform_type: data_quality
    source: v_price_tag_bronze_cleaned
    target: v_price_tag_bronze_dqe
    readMode: stream
    expectations_file: "expectations/generic_quality.json"
    description: "Apply data quality checks to price_tag"

  - name: write_price_tag_bronze
    type: write
    source: v_price_tag_bronze_dqe
    write_target:
      create_table: true
      type: streaming_table
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: "price_tag"
