pipeline: perf_bronze
flowgroup: inventory_bronze
presets:
  - default_delta_properties
actions:
  - name: inventory_raw_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: stream
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{raw_schema}"
      table: inventory_raw
    target: v_inventory_raw
    description: "Load inventory from raw schema"

  - name: inventory_bronze_cleanse
    type: transform
    transform_type: sql
    source: v_inventory_raw
    target: v_inventory_bronze_cleaned
    sql: |
      SELECT
        xxhash64(*) as inventory_key,
        *,
        current_timestamp() as _etl_timestamp
      FROM v_inventory_raw
      WHERE 1=1

  - name: inventory_bronze_dqe
    type: transform
    transform_type: data_quality
    source: v_inventory_bronze_cleaned
    target: v_inventory_bronze_dqe
    readMode: stream
    expectations_file: "expectations/generic_quality.json"
    description: "Apply data quality checks to inventory"

  - name: write_inventory_bronze
    type: write
    source: v_inventory_bronze_dqe
    write_target:
      create_table: true
      type: streaming_table
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: "inventory"
