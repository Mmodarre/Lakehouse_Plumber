pipeline: perf_bronze
flowgroup: warehouse_bronze
presets:
  - default_delta_properties
actions:
  - name: warehouse_raw_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: stream
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{raw_schema}"
      table: warehouse_raw
    target: v_warehouse_raw
    description: "Load warehouse from raw schema"

  - name: warehouse_bronze_cleanse
    type: transform
    transform_type: sql
    source: v_warehouse_raw
    target: v_warehouse_bronze_cleaned
    sql: |
      SELECT
        xxhash64(*) as warehouse_key,
        *,
        current_timestamp() as _etl_timestamp
      FROM v_warehouse_raw
      WHERE 1=1

  - name: warehouse_bronze_dqe
    type: transform
    transform_type: data_quality
    source: v_warehouse_bronze_cleaned
    target: v_warehouse_bronze_dqe
    readMode: stream
    expectations_file: "expectations/generic_quality.json"
    description: "Apply data quality checks to warehouse"

  - name: write_warehouse_bronze
    type: write
    source: v_warehouse_bronze_dqe
    write_target:
      create_table: true
      type: streaming_table
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: "warehouse"
