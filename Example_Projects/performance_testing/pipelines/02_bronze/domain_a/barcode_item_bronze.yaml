pipeline: perf_bronze
flowgroup: barcode_item_bronze
presets:
  - default_delta_properties
actions:
  - name: barcode_item_raw_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: stream
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{raw_schema}"
      table: barcode_item_raw
    target: v_barcode_item_raw
    description: "Load barcode_item from raw schema"

  - name: barcode_item_bronze_cleanse
    type: transform
    transform_type: sql
    source: v_barcode_item_raw
    target: v_barcode_item_bronze_cleaned
    sql: |
      SELECT
        xxhash64(*) as barcode_item_key,
        *,
        current_timestamp() as _etl_timestamp
      FROM v_barcode_item_raw
      WHERE 1=1

  - name: barcode_item_bronze_dqe
    type: transform
    transform_type: data_quality
    source: v_barcode_item_bronze_cleaned
    target: v_barcode_item_bronze_dqe
    readMode: stream
    expectations_file: "expectations/generic_quality.json"
    description: "Apply data quality checks to barcode_item"

  - name: write_barcode_item_bronze
    type: write
    source: v_barcode_item_bronze_dqe
    write_target:
      create_table: true
      type: streaming_table
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: "barcode_item"
