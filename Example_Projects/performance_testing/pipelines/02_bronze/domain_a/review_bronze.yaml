pipeline: perf_bronze
flowgroup: review_bronze
presets:
  - default_delta_properties
actions:
  - name: review_raw_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: stream
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{raw_schema}"
      table: review_raw
    target: v_review_raw
    description: "Load review from raw schema"

  - name: review_bronze_cleanse
    type: transform
    transform_type: sql
    source: v_review_raw
    target: v_review_bronze_cleaned
    sql: |
      SELECT
        xxhash64(*) as review_key,
        *,
        current_timestamp() as _etl_timestamp
      FROM v_review_raw

  - name: review_bronze_dqe
    type: transform
    transform_type: data_quality
    source: v_review_bronze_cleaned
    target: v_review_bronze_dqe
    readMode: stream
    expectations_file: "expectations/generic_quality.json"
    description: "Data quality for review bronze"

  - name: write_review_bronze
    type: write
    source: v_review_bronze_dqe
    write_target:
      create_table: true
      type: streaming_table
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: "review"

  - name: review_migration_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: batch
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{raw_schema}"
      table: review_migration
    target: v_review_migration
    description: "Load review migration data"

  - name: review_migration_cleanse
    type: transform
    transform_type: sql
    readMode: batch
    source: v_review_migration
    target: v_review_migration_cleaned
    sql: |
      SELECT
        xxhash64(*) as review_key,
        *,
        'MIGRATION' as _source_file_path,
        current_timestamp() as _etl_timestamp
      FROM v_review_migration

  - name: write_review_migration
    type: write
    source: v_review_migration_cleaned
    readMode: batch
    once: true
    write_target:
      create_table: false
      type: streaming_table
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: "review"
