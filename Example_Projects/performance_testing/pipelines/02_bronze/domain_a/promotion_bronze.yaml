pipeline: perf_bronze
flowgroup: promotion_bronze
presets:
  - default_delta_properties
actions:
  - name: promotion_raw_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: stream
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{raw_schema}"
      table: promotion_raw
    target: v_promotion_raw
    description: "Load promotion from raw schema"

  - name: promotion_bronze_cleanse
    type: transform
    transform_type: sql
    source: v_promotion_raw
    target: v_promotion_bronze_cleaned
    sql: |
      SELECT
        xxhash64(*) as promotion_key,
        *,
        current_timestamp() as _etl_timestamp
      FROM v_promotion_raw

  - name: promotion_bronze_dqe
    type: transform
    transform_type: data_quality
    source: v_promotion_bronze_cleaned
    target: v_promotion_bronze_dqe
    readMode: stream
    expectations_file: "expectations/generic_quality.json"
    description: "Data quality for promotion bronze"

  - name: write_promotion_bronze
    type: write
    source: v_promotion_bronze_dqe
    write_target:
      create_table: true
      type: streaming_table
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: "promotion"

  - name: promotion_migration_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: batch
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{raw_schema}"
      table: promotion_migration
    target: v_promotion_migration
    description: "Load promotion migration data"

  - name: promotion_migration_cleanse
    type: transform
    transform_type: sql
    readMode: batch
    source: v_promotion_migration
    target: v_promotion_migration_cleaned
    sql: |
      SELECT
        xxhash64(*) as promotion_key,
        *,
        'MIGRATION' as _source_file_path,
        current_timestamp() as _etl_timestamp
      FROM v_promotion_migration

  - name: write_promotion_migration
    type: write
    source: v_promotion_migration_cleaned
    readMode: batch
    once: true
    write_target:
      create_table: false
      type: streaming_table
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: "promotion"
