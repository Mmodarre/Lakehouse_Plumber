pipeline: perf_bronze
flowgroup: coupon_bronze
presets:
  - default_delta_properties
actions:
  - name: coupon_raw_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: stream
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{raw_schema}"
      table: coupon_raw
    target: v_coupon_raw
    description: "Load coupon from raw schema"

  - name: coupon_bronze_cleanse
    type: transform
    transform_type: sql
    source: v_coupon_raw
    target: v_coupon_bronze_cleaned
    sql: |
      SELECT
        xxhash64(*) as coupon_key,
        *,
        current_timestamp() as _etl_timestamp
      FROM v_coupon_raw
      WHERE 1=1

  - name: coupon_bronze_dqe
    type: transform
    transform_type: data_quality
    source: v_coupon_bronze_cleaned
    target: v_coupon_bronze_dqe
    readMode: stream
    expectations_file: "expectations/generic_quality.json"
    description: "Apply data quality checks to coupon"

  - name: write_coupon_bronze
    type: write
    source: v_coupon_bronze_dqe
    write_target:
      create_table: true
      type: streaming_table
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: "coupon"
