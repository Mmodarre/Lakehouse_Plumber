pipeline: perf_bronze
flowgroup: wishlist_bronze
presets:
  - default_delta_properties
actions:
  - name: wishlist_raw_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: stream
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{raw_schema}"
      table: wishlist_raw
    target: v_wishlist_raw
    description: "Load wishlist from raw schema"

  - name: wishlist_bronze_cleanse
    type: transform
    transform_type: sql
    source: v_wishlist_raw
    target: v_wishlist_bronze_cleaned
    sql: |
      SELECT
        xxhash64(*) as wishlist_key,
        *,
        current_timestamp() as _etl_timestamp
      FROM v_wishlist_raw
      WHERE 1=1

  - name: wishlist_bronze_dqe
    type: transform
    transform_type: data_quality
    source: v_wishlist_bronze_cleaned
    target: v_wishlist_bronze_dqe
    readMode: stream
    expectations_file: "expectations/generic_quality.json"
    description: "Apply data quality checks to wishlist"

  - name: write_wishlist_bronze
    type: write
    source: v_wishlist_bronze_dqe
    write_target:
      create_table: true
      type: streaming_table
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: "wishlist"
