pipeline: perf_bronze
flowgroup: fan_bronze
presets:
  - default_delta_properties
actions:
  - name: fan_raw_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: stream
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{raw_schema}"
      table: fan_raw
    target: v_fan_raw
    description: "Load fan from raw schema"

  - name: fan_bronze_cleanse
    type: transform
    transform_type: sql
    source: v_fan_raw
    target: v_fan_bronze_cleaned
    sql: |
      SELECT
        xxhash64(*) as fan_key,
        *,
        current_timestamp() as _etl_timestamp
      FROM v_fan_raw
      WHERE 1=1

  - name: fan_bronze_dqe
    type: transform
    transform_type: data_quality
    source: v_fan_bronze_cleaned
    target: v_fan_bronze_dqe
    readMode: stream
    expectations_file: "expectations/generic_quality.json"
    description: "Apply data quality checks to fan"

  - name: write_fan_bronze
    type: write
    source: v_fan_bronze_dqe
    write_target:
      create_table: true
      type: streaming_table
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: "fan"
