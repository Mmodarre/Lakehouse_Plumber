pipeline: domain_q_bronze
flowgroup: free_kick_bronze
presets:
  - default_delta_properties
actions:
  - name: free_kick_raw_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: stream
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{raw_schema}"
      table: free_kick_raw
    target: v_free_kick_raw
    description: "Load free_kick from raw schema"

  - name: free_kick_bronze_cleanse
    type: transform
    transform_type: sql
    source: v_free_kick_raw
    target: v_free_kick_bronze_cleaned
    sql: |
      SELECT
        xxhash64(*) as free_kick_key,
        *,
        current_timestamp() as _etl_timestamp
      FROM v_free_kick_raw
      WHERE 1=1

  - name: free_kick_bronze_dqe
    type: transform
    transform_type: data_quality
    source: v_free_kick_bronze_cleaned
    target: v_free_kick_bronze_dqe
    readMode: stream
    expectations_file: "expectations/generic_quality.json"
    description: "Apply data quality checks to free_kick"

  - name: write_free_kick_bronze
    type: write
    source: v_free_kick_bronze_dqe
    write_target:
      create_table: true
      type: streaming_table
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: "free_kick"
