pipeline: perf_bronze
flowgroup: transfer_bronze
presets:
  - default_delta_properties
actions:
  - name: transfer_raw_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: stream
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{raw_schema}"
      table: transfer_raw
    target: v_transfer_raw
    description: "Load transfer from raw schema"

  - name: transfer_bronze_cleanse
    type: transform
    transform_type: sql
    source: v_transfer_raw
    target: v_transfer_bronze_cleaned
    sql: |
      SELECT
        xxhash64(*) as transfer_key,
        *,
        current_timestamp() as _etl_timestamp
      FROM v_transfer_raw
      WHERE 1=1

  - name: transfer_bronze_dqe
    type: transform
    transform_type: data_quality
    source: v_transfer_bronze_cleaned
    target: v_transfer_bronze_dqe
    readMode: stream
    expectations_file: "expectations/generic_quality.json"
    description: "Apply data quality checks to transfer"

  - name: write_transfer_bronze
    type: write
    source: v_transfer_bronze_dqe
    write_target:
      create_table: true
      type: streaming_table
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: "transfer"
