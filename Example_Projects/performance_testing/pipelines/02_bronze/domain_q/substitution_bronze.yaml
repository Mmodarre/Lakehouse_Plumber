pipeline: perf_bronze
flowgroup: substitution_bronze
presets:
  - default_delta_properties
actions:
  - name: substitution_raw_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: stream
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{raw_schema}"
      table: substitution_raw
    target: v_substitution_raw
    description: "Load substitution from raw schema"

  - name: substitution_bronze_cleanse
    type: transform
    transform_type: sql
    source: v_substitution_raw
    target: v_substitution_bronze_cleaned
    sql: |
      SELECT
        xxhash64(*) as substitution_key,
        *,
        current_timestamp() as _etl_timestamp
      FROM v_substitution_raw

  - name: substitution_bronze_dqe
    type: transform
    transform_type: data_quality
    source: v_substitution_bronze_cleaned
    target: v_substitution_bronze_dqe
    readMode: stream
    expectations_file: "expectations/generic_quality.json"
    description: "Data quality for substitution bronze"

  - name: write_substitution_bronze
    type: write
    source: v_substitution_bronze_dqe
    write_target:
      create_table: true
      type: streaming_table
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: "substitution"

  - name: substitution_migration_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: batch
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{raw_schema}"
      table: substitution_migration
    target: v_substitution_migration
    description: "Load substitution migration data"

  - name: substitution_migration_cleanse
    type: transform
    transform_type: sql
    readMode: batch
    source: v_substitution_migration
    target: v_substitution_migration_cleaned
    sql: |
      SELECT
        xxhash64(*) as substitution_key,
        *,
        'MIGRATION' as _source_file_path,
        current_timestamp() as _etl_timestamp
      FROM v_substitution_migration

  - name: write_substitution_migration
    type: write
    source: v_substitution_migration_cleaned
    readMode: batch
    once: true
    write_target:
      create_table: false
      type: streaming_table
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: "substitution"
