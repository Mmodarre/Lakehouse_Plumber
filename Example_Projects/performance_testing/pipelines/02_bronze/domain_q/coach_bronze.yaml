pipeline: perf_bronze
flowgroup: coach_bronze
presets:
  - default_delta_properties
actions:
  - name: coach_raw_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: stream
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{raw_schema}"
      table: coach_raw
    target: v_coach_raw
    description: "Load coach from raw schema"

  - name: coach_bronze_cleanse
    type: transform
    transform_type: sql
    source: v_coach_raw
    target: v_coach_bronze_cleaned
    sql: |
      SELECT
        xxhash64(*) as coach_key,
        *,
        current_timestamp() as _etl_timestamp
      FROM v_coach_raw

  - name: coach_bronze_dqe
    type: transform
    transform_type: data_quality
    source: v_coach_bronze_cleaned
    target: v_coach_bronze_dqe
    readMode: stream
    expectations_file: "expectations/generic_quality.json"
    description: "Data quality for coach bronze"

  - name: write_coach_bronze
    type: write
    source: v_coach_bronze_dqe
    write_target:
      create_table: true
      type: streaming_table
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: "coach"

  - name: coach_migration_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: batch
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{raw_schema}"
      table: coach_migration
    target: v_coach_migration
    description: "Load coach migration data"

  - name: coach_migration_cleanse
    type: transform
    transform_type: sql
    readMode: batch
    source: v_coach_migration
    target: v_coach_migration_cleaned
    sql: |
      SELECT
        xxhash64(*) as coach_key,
        *,
        'MIGRATION' as _source_file_path,
        current_timestamp() as _etl_timestamp
      FROM v_coach_migration

  - name: write_coach_migration
    type: write
    source: v_coach_migration_cleaned
    readMode: batch
    once: true
    write_target:
      create_table: false
      type: streaming_table
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: "coach"
