pipeline: perf_bronze
flowgroup: venue_bronze
presets:
  - default_delta_properties
actions:
  - name: venue_raw_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: stream
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{raw_schema}"
      table: venue_raw
    target: v_venue_raw
    description: "Load venue from raw schema"

  - name: venue_bronze_cleanse
    type: transform
    transform_type: sql
    source: v_venue_raw
    target: v_venue_bronze_cleaned
    sql: |
      SELECT
        xxhash64(*) as venue_key,
        *,
        current_timestamp() as _etl_timestamp
      FROM v_venue_raw
      WHERE 1=1

  - name: venue_bronze_dqe
    type: transform
    transform_type: data_quality
    source: v_venue_bronze_cleaned
    target: v_venue_bronze_dqe
    readMode: stream
    expectations_file: "expectations/generic_quality.json"
    description: "Apply data quality checks to venue"

  - name: write_venue_bronze
    type: write
    source: v_venue_bronze_dqe
    write_target:
      create_table: true
      type: streaming_table
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: "venue"
