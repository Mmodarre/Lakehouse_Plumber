pipeline: perf_bronze
flowgroup: genre_bronze
presets:
  - default_delta_properties
actions:
  - name: genre_raw_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: stream
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{raw_schema}"
      table: genre_raw
    target: v_genre_raw
    description: "Load genre from raw schema"

  - name: genre_bronze_cleanse
    type: transform
    transform_type: sql
    source: v_genre_raw
    target: v_genre_bronze_cleaned
    sql: |
      SELECT
        xxhash64(*) as genre_key,
        *,
        current_timestamp() as _etl_timestamp
      FROM v_genre_raw
      WHERE 1=1

  - name: genre_bronze_dqe
    type: transform
    transform_type: data_quality
    source: v_genre_bronze_cleaned
    target: v_genre_bronze_dqe
    readMode: stream
    expectations_file: "expectations/generic_quality.json"
    description: "Apply data quality checks to genre"

  - name: write_genre_bronze
    type: write
    source: v_genre_bronze_dqe
    write_target:
      create_table: true
      type: streaming_table
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: "genre"
