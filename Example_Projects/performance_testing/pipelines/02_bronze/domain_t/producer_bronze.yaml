pipeline: perf_bronze
flowgroup: producer_bronze
presets:
  - default_delta_properties
actions:
  - name: producer_raw_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: stream
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{raw_schema}"
      table: producer_raw
    target: v_producer_raw
    description: "Load producer from raw schema"

  - name: producer_bronze_cleanse
    type: transform
    transform_type: sql
    source: v_producer_raw
    target: v_producer_bronze_cleaned
    sql: |
      SELECT
        xxhash64(*) as producer_key,
        *,
        current_timestamp() as _etl_timestamp
      FROM v_producer_raw

  - name: producer_bronze_dqe
    type: transform
    transform_type: data_quality
    source: v_producer_bronze_cleaned
    target: v_producer_bronze_dqe
    readMode: stream
    expectations_file: "expectations/generic_quality.json"
    description: "Data quality for producer bronze"

  - name: write_producer_bronze
    type: write
    source: v_producer_bronze_dqe
    write_target:
      create_table: true
      type: streaming_table
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: "producer"

  - name: producer_migration_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: batch
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{raw_schema}"
      table: producer_migration
    target: v_producer_migration
    description: "Load producer migration data"

  - name: producer_migration_cleanse
    type: transform
    transform_type: sql
    readMode: batch
    source: v_producer_migration
    target: v_producer_migration_cleaned
    sql: |
      SELECT
        xxhash64(*) as producer_key,
        *,
        'MIGRATION' as _source_file_path,
        current_timestamp() as _etl_timestamp
      FROM v_producer_migration

  - name: write_producer_migration
    type: write
    source: v_producer_migration_cleaned
    readMode: batch
    once: true
    write_target:
      create_table: false
      type: streaming_table
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: "producer"
