pipeline: perf_bronze
flowgroup: control_tower_bronze
presets:
  - default_delta_properties
actions:
  - name: control_tower_raw_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: stream
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{raw_schema}"
      table: control_tower_raw
    target: v_control_tower_raw
    description: "Load control_tower from raw schema"

  - name: control_tower_bronze_cleanse
    type: transform
    transform_type: sql
    source: v_control_tower_raw
    target: v_control_tower_bronze_cleaned
    sql: |
      SELECT
        xxhash64(*) as control_tower_key,
        *,
        current_timestamp() as _etl_timestamp
      FROM v_control_tower_raw
      WHERE 1=1

  - name: control_tower_bronze_dqe
    type: transform
    transform_type: data_quality
    source: v_control_tower_bronze_cleaned
    target: v_control_tower_bronze_dqe
    readMode: stream
    expectations_file: "expectations/generic_quality.json"
    description: "Apply data quality checks to control_tower"

  - name: write_control_tower_bronze
    type: write
    source: v_control_tower_bronze_dqe
    write_target:
      create_table: true
      type: streaming_table
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: "control_tower"
