pipeline: perf_bronze
flowgroup: cabin_bronze
presets:
  - default_delta_properties
actions:
  - name: cabin_raw_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: stream
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{raw_schema}"
      table: cabin_raw
    target: v_cabin_raw
    description: "Load cabin from raw schema"

  - name: cabin_bronze_cleanse
    type: transform
    transform_type: sql
    source: v_cabin_raw
    target: v_cabin_bronze_cleaned
    sql: |
      SELECT
        xxhash64(*) as cabin_key,
        *,
        current_timestamp() as _etl_timestamp
      FROM v_cabin_raw
      WHERE 1=1

  - name: cabin_bronze_dqe
    type: transform
    transform_type: data_quality
    source: v_cabin_bronze_cleaned
    target: v_cabin_bronze_dqe
    readMode: stream
    expectations_file: "expectations/generic_quality.json"
    description: "Apply data quality checks to cabin"

  - name: write_cabin_bronze
    type: write
    source: v_cabin_bronze_dqe
    write_target:
      create_table: true
      type: streaming_table
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: "cabin"
