pipeline: domain_k_bronze
flowgroup: charter_bronze
presets:
  - default_delta_properties
actions:
  - name: charter_raw_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: stream
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{raw_schema}"
      table: charter_raw
    target: v_charter_raw
    description: "Load charter from raw schema"

  - name: charter_bronze_cleanse
    type: transform
    transform_type: sql
    source: v_charter_raw
    target: v_charter_bronze_cleaned
    sql: |
      SELECT
        xxhash64(*) as charter_key,
        *,
        current_timestamp() as _etl_timestamp
      FROM v_charter_raw
      WHERE 1=1

  - name: charter_bronze_dqe
    type: transform
    transform_type: data_quality
    source: v_charter_bronze_cleaned
    target: v_charter_bronze_dqe
    readMode: stream
    expectations_file: "expectations/generic_quality.json"
    description: "Apply data quality checks to charter"

  - name: write_charter_bronze
    type: write
    source: v_charter_bronze_dqe
    write_target:
      create_table: true
      type: streaming_table
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: "charter"
