pipeline: perf_bronze
flowgroup: terminal_bronze
presets:
  - default_delta_properties
actions:
  - name: terminal_raw_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: stream
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{raw_schema}"
      table: terminal_raw
    target: v_terminal_raw
    description: "Load terminal from raw schema"

  - name: terminal_bronze_cleanse
    type: transform
    transform_type: sql
    source: v_terminal_raw
    target: v_terminal_bronze_cleaned
    sql: |
      SELECT
        xxhash64(*) as terminal_key,
        *,
        current_timestamp() as _etl_timestamp
      FROM v_terminal_raw

  - name: terminal_bronze_dqe
    type: transform
    transform_type: data_quality
    source: v_terminal_bronze_cleaned
    target: v_terminal_bronze_dqe
    readMode: stream
    expectations_file: "expectations/generic_quality.json"
    description: "Data quality for terminal bronze"

  - name: write_terminal_bronze
    type: write
    source: v_terminal_bronze_dqe
    write_target:
      create_table: true
      type: streaming_table
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: "terminal"

  - name: terminal_migration_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: batch
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{raw_schema}"
      table: terminal_migration
    target: v_terminal_migration
    description: "Load terminal migration data"

  - name: terminal_migration_cleanse
    type: transform
    transform_type: sql
    readMode: batch
    source: v_terminal_migration
    target: v_terminal_migration_cleaned
    sql: |
      SELECT
        xxhash64(*) as terminal_key,
        *,
        'MIGRATION' as _source_file_path,
        current_timestamp() as _etl_timestamp
      FROM v_terminal_migration

  - name: write_terminal_migration
    type: write
    source: v_terminal_migration_cleaned
    readMode: batch
    once: true
    write_target:
      create_table: false
      type: streaming_table
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: "terminal"
