pipeline: perf_bronze
flowgroup: crew_bronze
presets:
  - default_delta_properties
actions:
  - name: crew_raw_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: stream
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{raw_schema}"
      table: crew_raw
    target: v_crew_raw
    description: "Load crew from raw schema"

  - name: crew_bronze_cleanse
    type: transform
    transform_type: sql
    source: v_crew_raw
    target: v_crew_bronze_cleaned
    sql: |
      SELECT
        xxhash64(*) as crew_key,
        *,
        current_timestamp() as _etl_timestamp
      FROM v_crew_raw
      WHERE 1=1

  - name: crew_bronze_dqe
    type: transform
    transform_type: data_quality
    source: v_crew_bronze_cleaned
    target: v_crew_bronze_dqe
    readMode: stream
    expectations_file: "expectations/generic_quality.json"
    description: "Apply data quality checks to crew"

  - name: write_crew_bronze
    type: write
    source: v_crew_bronze_dqe
    write_target:
      create_table: true
      type: streaming_table
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: "crew"
