pipeline: perf_bronze
flowgroup: cockpit_bronze
presets:
  - default_delta_properties
actions:
  - name: cockpit_raw_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: stream
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{raw_schema}"
      table: cockpit_raw
    target: v_cockpit_raw
    description: "Load cockpit from raw schema"

  - name: cockpit_bronze_cleanse
    type: transform
    transform_type: sql
    source: v_cockpit_raw
    target: v_cockpit_bronze_cleaned
    sql: |
      SELECT
        xxhash64(*) as cockpit_key,
        *,
        current_timestamp() as _etl_timestamp
      FROM v_cockpit_raw

  - name: cockpit_bronze_dqe
    type: transform
    transform_type: data_quality
    source: v_cockpit_bronze_cleaned
    target: v_cockpit_bronze_dqe
    readMode: stream
    expectations_file: "expectations/generic_quality.json"
    description: "Data quality for cockpit bronze"

  - name: write_cockpit_bronze
    type: write
    source: v_cockpit_bronze_dqe
    write_target:
      create_table: true
      type: streaming_table
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: "cockpit"

  - name: cockpit_migration_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: batch
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{raw_schema}"
      table: cockpit_migration
    target: v_cockpit_migration
    description: "Load cockpit migration data"

  - name: cockpit_migration_cleanse
    type: transform
    transform_type: sql
    readMode: batch
    source: v_cockpit_migration
    target: v_cockpit_migration_cleaned
    sql: |
      SELECT
        xxhash64(*) as cockpit_key,
        *,
        'MIGRATION' as _source_file_path,
        current_timestamp() as _etl_timestamp
      FROM v_cockpit_migration

  - name: write_cockpit_migration
    type: write
    source: v_cockpit_migration_cleaned
    readMode: batch
    once: true
    write_target:
      create_table: false
      type: streaming_table
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: "cockpit"
