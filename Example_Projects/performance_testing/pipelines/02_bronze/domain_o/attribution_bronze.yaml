pipeline: perf_bronze
flowgroup: attribution_bronze
presets:
  - default_delta_properties
actions:
  - name: attribution_raw_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: stream
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{raw_schema}"
      table: attribution_raw
    target: v_attribution_raw
    description: "Load attribution from raw schema"

  - name: attribution_bronze_cleanse
    type: transform
    transform_type: sql
    source: v_attribution_raw
    target: v_attribution_bronze_cleaned
    sql: |
      SELECT
        xxhash64(*) as attribution_key,
        *,
        current_timestamp() as _etl_timestamp
      FROM v_attribution_raw
      WHERE 1=1

  - name: attribution_bronze_dqe
    type: transform
    transform_type: data_quality
    source: v_attribution_bronze_cleaned
    target: v_attribution_bronze_dqe
    readMode: stream
    expectations_file: "expectations/generic_quality.json"
    description: "Apply data quality checks to attribution"

  - name: write_attribution_bronze
    type: write
    source: v_attribution_bronze_dqe
    write_target:
      create_table: true
      type: streaming_table
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: "attribution"
