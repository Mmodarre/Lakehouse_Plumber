pipeline: perf_bronze
flowgroup: lead_bronze
presets:
  - default_delta_properties
actions:
  - name: lead_raw_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: stream
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{raw_schema}"
      table: lead_raw
    target: v_lead_raw
    description: "Load lead from raw schema"

  - name: lead_bronze_cleanse
    type: transform
    transform_type: sql
    source: v_lead_raw
    target: v_lead_bronze_cleaned
    sql: |
      SELECT
        xxhash64(*) as lead_key,
        *,
        current_timestamp() as _etl_timestamp
      FROM v_lead_raw

  - name: lead_bronze_dqe
    type: transform
    transform_type: data_quality
    source: v_lead_bronze_cleaned
    target: v_lead_bronze_dqe
    readMode: stream
    expectations_file: "expectations/generic_quality.json"
    description: "Data quality for lead bronze"

  - name: write_lead_bronze
    type: write
    source: v_lead_bronze_dqe
    write_target:
      create_table: true
      type: streaming_table
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: "lead"

  - name: lead_migration_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: batch
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{raw_schema}"
      table: lead_migration
    target: v_lead_migration
    description: "Load lead migration data"

  - name: lead_migration_cleanse
    type: transform
    transform_type: sql
    readMode: batch
    source: v_lead_migration
    target: v_lead_migration_cleaned
    sql: |
      SELECT
        xxhash64(*) as lead_key,
        *,
        'MIGRATION' as _source_file_path,
        current_timestamp() as _etl_timestamp
      FROM v_lead_migration

  - name: write_lead_migration
    type: write
    source: v_lead_migration_cleaned
    readMode: batch
    once: true
    write_target:
      create_table: false
      type: streaming_table
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: "lead"
