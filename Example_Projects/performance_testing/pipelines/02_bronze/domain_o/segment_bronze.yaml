pipeline: perf_bronze
flowgroup: segment_bronze
presets:
  - default_delta_properties
actions:
  - name: segment_raw_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: stream
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{raw_schema}"
      table: segment_raw
    target: v_segment_raw
    description: "Load segment from raw schema"

  - name: segment_bronze_cleanse
    type: transform
    transform_type: sql
    source: v_segment_raw
    target: v_segment_bronze_cleaned
    sql: |
      SELECT
        xxhash64(*) as segment_key,
        *,
        current_timestamp() as _etl_timestamp
      FROM v_segment_raw
      WHERE 1=1

  - name: segment_bronze_dqe
    type: transform
    transform_type: data_quality
    source: v_segment_bronze_cleaned
    target: v_segment_bronze_dqe
    readMode: stream
    expectations_file: "expectations/generic_quality.json"
    description: "Apply data quality checks to segment"

  - name: write_segment_bronze
    type: write
    source: v_segment_bronze_dqe
    write_target:
      create_table: true
      type: streaming_table
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: "segment"
