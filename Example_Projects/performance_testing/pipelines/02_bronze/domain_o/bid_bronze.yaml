pipeline: perf_bronze
flowgroup: bid_bronze
presets:
  - default_delta_properties
actions:
  - name: bid_raw_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: stream
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{raw_schema}"
      table: bid_raw
    target: v_bid_raw
    description: "Load bid from raw schema"

  - name: bid_bronze_cleanse
    type: transform
    transform_type: sql
    source: v_bid_raw
    target: v_bid_bronze_cleaned
    sql: |
      SELECT
        xxhash64(*) as bid_key,
        *,
        current_timestamp() as _etl_timestamp
      FROM v_bid_raw

  - name: bid_bronze_dqe
    type: transform
    transform_type: data_quality
    source: v_bid_bronze_cleaned
    target: v_bid_bronze_dqe
    readMode: stream
    expectations_file: "expectations/generic_quality.json"
    description: "Data quality for bid bronze"

  - name: write_bid_bronze
    type: write
    source: v_bid_bronze_dqe
    write_target:
      create_table: true
      type: streaming_table
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: "bid"

  - name: bid_migration_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: batch
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{raw_schema}"
      table: bid_migration
    target: v_bid_migration
    description: "Load bid migration data"

  - name: bid_migration_cleanse
    type: transform
    transform_type: sql
    readMode: batch
    source: v_bid_migration
    target: v_bid_migration_cleaned
    sql: |
      SELECT
        xxhash64(*) as bid_key,
        *,
        'MIGRATION' as _source_file_path,
        current_timestamp() as _etl_timestamp
      FROM v_bid_migration

  - name: write_bid_migration
    type: write
    source: v_bid_migration_cleaned
    readMode: batch
    once: true
    write_target:
      create_table: false
      type: streaming_table
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: "bid"
