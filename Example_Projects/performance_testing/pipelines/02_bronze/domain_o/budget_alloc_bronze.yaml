pipeline: perf_bronze
flowgroup: budget_alloc_bronze
presets:
  - default_delta_properties
actions:
  - name: budget_alloc_raw_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: stream
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{raw_schema}"
      table: budget_alloc_raw
    target: v_budget_alloc_raw
    description: "Load budget_alloc from raw schema"

  - name: budget_alloc_bronze_cleanse
    type: transform
    transform_type: sql
    source: v_budget_alloc_raw
    target: v_budget_alloc_bronze_cleaned
    sql: |
      SELECT
        xxhash64(*) as budget_alloc_key,
        *,
        current_timestamp() as _etl_timestamp
      FROM v_budget_alloc_raw
      WHERE 1=1

  - name: budget_alloc_bronze_dqe
    type: transform
    transform_type: data_quality
    source: v_budget_alloc_bronze_cleaned
    target: v_budget_alloc_bronze_dqe
    readMode: stream
    expectations_file: "expectations/generic_quality.json"
    description: "Apply data quality checks to budget_alloc"

  - name: write_budget_alloc_bronze
    type: write
    source: v_budget_alloc_bronze_dqe
    write_target:
      create_table: true
      type: streaming_table
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: "budget_alloc"
