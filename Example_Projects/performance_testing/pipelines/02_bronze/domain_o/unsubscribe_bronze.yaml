pipeline: perf_bronze
flowgroup: unsubscribe_bronze
presets:
  - default_delta_properties
actions:
  - name: unsubscribe_raw_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: stream
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{raw_schema}"
      table: unsubscribe_raw
    target: v_unsubscribe_raw
    description: "Load unsubscribe from raw schema"

  - name: unsubscribe_bronze_cleanse
    type: transform
    transform_type: sql
    source: v_unsubscribe_raw
    target: v_unsubscribe_bronze_cleaned
    sql: |
      SELECT
        xxhash64(*) as unsubscribe_key,
        *,
        current_timestamp() as _etl_timestamp
      FROM v_unsubscribe_raw
      WHERE 1=1

  - name: unsubscribe_bronze_dqe
    type: transform
    transform_type: data_quality
    source: v_unsubscribe_bronze_cleaned
    target: v_unsubscribe_bronze_dqe
    readMode: stream
    expectations_file: "expectations/generic_quality.json"
    description: "Apply data quality checks to unsubscribe"

  - name: write_unsubscribe_bronze
    type: write
    source: v_unsubscribe_bronze_dqe
    write_target:
      create_table: true
      type: streaming_table
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: "unsubscribe"
