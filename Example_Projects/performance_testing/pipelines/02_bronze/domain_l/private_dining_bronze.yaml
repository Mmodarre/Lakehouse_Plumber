pipeline: perf_bronze
flowgroup: private_dining_bronze
presets:
  - default_delta_properties
actions:
  - name: private_dining_raw_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: stream
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{raw_schema}"
      table: private_dining_raw
    target: v_private_dining_raw
    description: "Load private_dining from raw schema"

  - name: private_dining_bronze_cleanse
    type: transform
    transform_type: sql
    source: v_private_dining_raw
    target: v_private_dining_bronze_cleaned
    sql: |
      SELECT
        xxhash64(*) as private_dining_key,
        *,
        current_timestamp() as _etl_timestamp
      FROM v_private_dining_raw

  - name: private_dining_bronze_dqe
    type: transform
    transform_type: data_quality
    source: v_private_dining_bronze_cleaned
    target: v_private_dining_bronze_dqe
    readMode: stream
    expectations_file: "expectations/generic_quality.json"
    description: "Data quality for private_dining bronze"

  - name: write_private_dining_bronze
    type: write
    source: v_private_dining_bronze_dqe
    write_target:
      create_table: true
      type: streaming_table
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: "private_dining"

  - name: private_dining_migration_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: batch
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{raw_schema}"
      table: private_dining_migration
    target: v_private_dining_migration
    description: "Load private_dining migration data"

  - name: private_dining_migration_cleanse
    type: transform
    transform_type: sql
    readMode: batch
    source: v_private_dining_migration
    target: v_private_dining_migration_cleaned
    sql: |
      SELECT
        xxhash64(*) as private_dining_key,
        *,
        'MIGRATION' as _source_file_path,
        current_timestamp() as _etl_timestamp
      FROM v_private_dining_migration

  - name: write_private_dining_migration
    type: write
    source: v_private_dining_migration_cleaned
    readMode: batch
    once: true
    write_target:
      create_table: false
      type: streaming_table
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: "private_dining"
