pipeline: perf_bronze
flowgroup: appetizer_bronze
presets:
  - default_delta_properties
actions:
  - name: appetizer_raw_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: stream
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{raw_schema}"
      table: appetizer_raw
    target: v_appetizer_raw
    description: "Load appetizer from raw schema"

  - name: appetizer_bronze_cleanse
    type: transform
    transform_type: sql
    source: v_appetizer_raw
    target: v_appetizer_bronze_cleaned
    sql: |
      SELECT
        xxhash64(*) as appetizer_key,
        *,
        current_timestamp() as _etl_timestamp
      FROM v_appetizer_raw
      WHERE 1=1

  - name: appetizer_bronze_dqe
    type: transform
    transform_type: data_quality
    source: v_appetizer_bronze_cleaned
    target: v_appetizer_bronze_dqe
    readMode: stream
    expectations_file: "expectations/generic_quality.json"
    description: "Apply data quality checks to appetizer"

  - name: write_appetizer_bronze
    type: write
    source: v_appetizer_bronze_dqe
    write_target:
      create_table: true
      type: streaming_table
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: "appetizer"
