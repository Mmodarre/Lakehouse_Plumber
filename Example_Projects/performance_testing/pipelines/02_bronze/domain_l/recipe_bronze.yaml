pipeline: perf_bronze
flowgroup: recipe_bronze
presets:
  - default_delta_properties
actions:
  - name: recipe_raw_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: stream
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{raw_schema}"
      table: recipe_raw
    target: v_recipe_raw
    description: "Load recipe from raw schema"

  - name: recipe_bronze_cleanse
    type: transform
    transform_type: sql
    source: v_recipe_raw
    target: v_recipe_bronze_cleaned
    sql: |
      SELECT
        xxhash64(*) as recipe_key,
        *,
        current_timestamp() as _etl_timestamp
      FROM v_recipe_raw

  - name: recipe_bronze_dqe
    type: transform
    transform_type: data_quality
    source: v_recipe_bronze_cleaned
    target: v_recipe_bronze_dqe
    readMode: stream
    expectations_file: "expectations/generic_quality.json"
    description: "Data quality for recipe bronze"

  - name: write_recipe_bronze
    type: write
    source: v_recipe_bronze_dqe
    write_target:
      create_table: true
      type: streaming_table
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: "recipe"

  - name: recipe_migration_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: batch
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{raw_schema}"
      table: recipe_migration
    target: v_recipe_migration
    description: "Load recipe migration data"

  - name: recipe_migration_cleanse
    type: transform
    transform_type: sql
    readMode: batch
    source: v_recipe_migration
    target: v_recipe_migration_cleaned
    sql: |
      SELECT
        xxhash64(*) as recipe_key,
        *,
        'MIGRATION' as _source_file_path,
        current_timestamp() as _etl_timestamp
      FROM v_recipe_migration

  - name: write_recipe_migration
    type: write
    source: v_recipe_migration_cleaned
    readMode: batch
    once: true
    write_target:
      create_table: false
      type: streaming_table
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: "recipe"
