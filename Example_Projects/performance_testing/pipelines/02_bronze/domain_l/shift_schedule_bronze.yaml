pipeline: perf_bronze
flowgroup: shift_schedule_bronze
presets:
  - default_delta_properties
actions:
  - name: shift_schedule_raw_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: stream
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{raw_schema}"
      table: shift_schedule_raw
    target: v_shift_schedule_raw
    description: "Load shift_schedule from raw schema"

  - name: shift_schedule_bronze_cleanse
    type: transform
    transform_type: sql
    source: v_shift_schedule_raw
    target: v_shift_schedule_bronze_cleaned
    sql: |
      SELECT
        xxhash64(*) as shift_schedule_key,
        *,
        current_timestamp() as _etl_timestamp
      FROM v_shift_schedule_raw
      WHERE 1=1

  - name: shift_schedule_bronze_dqe
    type: transform
    transform_type: data_quality
    source: v_shift_schedule_bronze_cleaned
    target: v_shift_schedule_bronze_dqe
    readMode: stream
    expectations_file: "expectations/generic_quality.json"
    description: "Apply data quality checks to shift_schedule"

  - name: write_shift_schedule_bronze
    type: write
    source: v_shift_schedule_bronze_dqe
    write_target:
      create_table: true
      type: streaming_table
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: "shift_schedule"
