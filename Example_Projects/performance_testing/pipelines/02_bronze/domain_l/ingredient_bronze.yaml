pipeline: perf_bronze
flowgroup: ingredient_bronze
presets:
  - default_delta_properties
actions:
  - name: ingredient_raw_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: stream
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{raw_schema}"
      table: ingredient_raw
    target: v_ingredient_raw
    description: "Load ingredient from raw schema"

  - name: ingredient_bronze_cleanse
    type: transform
    transform_type: sql
    source: v_ingredient_raw
    target: v_ingredient_bronze_cleaned
    sql: |
      SELECT
        xxhash64(*) as ingredient_key,
        *,
        current_timestamp() as _etl_timestamp
      FROM v_ingredient_raw
      WHERE 1=1

  - name: ingredient_bronze_dqe
    type: transform
    transform_type: data_quality
    source: v_ingredient_bronze_cleaned
    target: v_ingredient_bronze_dqe
    readMode: stream
    expectations_file: "expectations/generic_quality.json"
    description: "Apply data quality checks to ingredient"

  - name: write_ingredient_bronze
    type: write
    source: v_ingredient_bronze_dqe
    write_target:
      create_table: true
      type: streaming_table
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: "ingredient"
