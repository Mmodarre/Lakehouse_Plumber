pipeline: perf_bronze
flowgroup: pantry_bronze
presets:
  - default_delta_properties
actions:
  - name: pantry_raw_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: stream
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{raw_schema}"
      table: pantry_raw
    target: v_pantry_raw
    description: "Load pantry from raw schema"

  - name: pantry_bronze_cleanse
    type: transform
    transform_type: sql
    source: v_pantry_raw
    target: v_pantry_bronze_cleaned
    sql: |
      SELECT
        xxhash64(*) as pantry_key,
        *,
        current_timestamp() as _etl_timestamp
      FROM v_pantry_raw

  - name: pantry_bronze_dqe
    type: transform
    transform_type: data_quality
    source: v_pantry_bronze_cleaned
    target: v_pantry_bronze_dqe
    readMode: stream
    expectations_file: "expectations/generic_quality.json"
    description: "Data quality for pantry bronze"

  - name: write_pantry_bronze
    type: write
    source: v_pantry_bronze_dqe
    write_target:
      create_table: true
      type: streaming_table
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: "pantry"

  - name: pantry_migration_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: batch
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{raw_schema}"
      table: pantry_migration
    target: v_pantry_migration
    description: "Load pantry migration data"

  - name: pantry_migration_cleanse
    type: transform
    transform_type: sql
    readMode: batch
    source: v_pantry_migration
    target: v_pantry_migration_cleaned
    sql: |
      SELECT
        xxhash64(*) as pantry_key,
        *,
        'MIGRATION' as _source_file_path,
        current_timestamp() as _etl_timestamp
      FROM v_pantry_migration

  - name: write_pantry_migration
    type: write
    source: v_pantry_migration_cleaned
    readMode: batch
    once: true
    write_target:
      create_table: false
      type: streaming_table
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: "pantry"
