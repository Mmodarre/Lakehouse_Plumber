pipeline: perf_bronze
flowgroup: supplier_contract_bronze
presets:
  - default_delta_properties
actions:
  - name: supplier_contract_raw_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: stream
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{raw_schema}"
      table: supplier_contract_raw
    target: v_supplier_contract_raw
    description: "Load supplier_contract from raw schema"

  - name: supplier_contract_bronze_cleanse
    type: transform
    transform_type: sql
    source: v_supplier_contract_raw
    target: v_supplier_contract_bronze_cleaned
    sql: |
      SELECT
        xxhash64(*) as supplier_contract_key,
        *,
        current_timestamp() as _etl_timestamp
      FROM v_supplier_contract_raw
      WHERE 1=1

  - name: supplier_contract_bronze_dqe
    type: transform
    transform_type: data_quality
    source: v_supplier_contract_bronze_cleaned
    target: v_supplier_contract_bronze_dqe
    readMode: stream
    expectations_file: "expectations/generic_quality.json"
    description: "Apply data quality checks to supplier_contract"

  - name: write_supplier_contract_bronze
    type: write
    source: v_supplier_contract_bronze_dqe
    write_target:
      create_table: true
      type: streaming_table
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: "supplier_contract"
