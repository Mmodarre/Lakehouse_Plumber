pipeline: perf_bronze
flowgroup: hospital_bronze
presets:
  - default_delta_properties
actions:
  - name: hospital_raw_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: stream
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{raw_schema}"
      table: hospital_raw
    target: v_hospital_raw
    description: "Load hospital from raw schema"

  - name: hospital_bronze_cleanse
    type: transform
    transform_type: sql
    source: v_hospital_raw
    target: v_hospital_bronze_cleaned
    sql: |
      SELECT
        xxhash64(*) as hospital_key,
        *,
        current_timestamp() as _etl_timestamp
      FROM v_hospital_raw
      WHERE 1=1

  - name: hospital_bronze_dqe
    type: transform
    transform_type: data_quality
    source: v_hospital_bronze_cleaned
    target: v_hospital_bronze_dqe
    readMode: stream
    expectations_file: "expectations/generic_quality.json"
    description: "Apply data quality checks to hospital"

  - name: write_hospital_bronze
    type: write
    source: v_hospital_bronze_dqe
    write_target:
      create_table: true
      type: streaming_table
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: "hospital"
