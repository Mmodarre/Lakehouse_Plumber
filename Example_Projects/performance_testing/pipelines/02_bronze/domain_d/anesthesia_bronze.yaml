pipeline: perf_bronze
flowgroup: anesthesia_bronze
presets:
  - default_delta_properties
actions:
  - name: anesthesia_raw_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: stream
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{raw_schema}"
      table: anesthesia_raw
    target: v_anesthesia_raw
    description: "Load anesthesia from raw schema"

  - name: anesthesia_bronze_cleanse
    type: transform
    transform_type: sql
    source: v_anesthesia_raw
    target: v_anesthesia_bronze_cleaned
    sql: |
      SELECT
        xxhash64(*) as anesthesia_key,
        *,
        current_timestamp() as _etl_timestamp
      FROM v_anesthesia_raw
      WHERE 1=1

  - name: anesthesia_bronze_dqe
    type: transform
    transform_type: data_quality
    source: v_anesthesia_bronze_cleaned
    target: v_anesthesia_bronze_dqe
    readMode: stream
    expectations_file: "expectations/generic_quality.json"
    description: "Apply data quality checks to anesthesia"

  - name: write_anesthesia_bronze
    type: write
    source: v_anesthesia_bronze_dqe
    write_target:
      create_table: true
      type: streaming_table
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: "anesthesia"
