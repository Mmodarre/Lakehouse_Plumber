pipeline: perf_bronze
flowgroup: lab_test_bronze
presets:
  - default_delta_properties
actions:
  - name: lab_test_raw_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: stream
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{raw_schema}"
      table: lab_test_raw
    target: v_lab_test_raw
    description: "Load lab_test from raw schema"

  - name: lab_test_bronze_cleanse
    type: transform
    transform_type: sql
    source: v_lab_test_raw
    target: v_lab_test_bronze_cleaned
    sql: |
      SELECT
        xxhash64(*) as lab_test_key,
        *,
        current_timestamp() as _etl_timestamp
      FROM v_lab_test_raw
      WHERE 1=1

  - name: lab_test_bronze_dqe
    type: transform
    transform_type: data_quality
    source: v_lab_test_bronze_cleaned
    target: v_lab_test_bronze_dqe
    readMode: stream
    expectations_file: "expectations/generic_quality.json"
    description: "Apply data quality checks to lab_test"

  - name: write_lab_test_bronze
    type: write
    source: v_lab_test_bronze_dqe
    write_target:
      create_table: true
      type: streaming_table
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: "lab_test"
