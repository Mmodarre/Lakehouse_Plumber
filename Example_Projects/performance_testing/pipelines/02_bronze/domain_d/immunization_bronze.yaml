pipeline: perf_bronze
flowgroup: immunization_bronze
presets:
  - default_delta_properties
actions:
  - name: immunization_raw_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: stream
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{raw_schema}"
      table: immunization_raw
    target: v_immunization_raw
    description: "Load immunization from raw schema"

  - name: immunization_bronze_cleanse
    type: transform
    transform_type: sql
    source: v_immunization_raw
    target: v_immunization_bronze_cleaned
    sql: |
      SELECT
        xxhash64(*) as immunization_key,
        *,
        current_timestamp() as _etl_timestamp
      FROM v_immunization_raw

  - name: immunization_bronze_dqe
    type: transform
    transform_type: data_quality
    source: v_immunization_bronze_cleaned
    target: v_immunization_bronze_dqe
    readMode: stream
    expectations_file: "expectations/generic_quality.json"
    description: "Data quality for immunization bronze"

  - name: write_immunization_bronze
    type: write
    source: v_immunization_bronze_dqe
    write_target:
      create_table: true
      type: streaming_table
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: "immunization"

  - name: immunization_migration_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: batch
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{raw_schema}"
      table: immunization_migration
    target: v_immunization_migration
    description: "Load immunization migration data"

  - name: immunization_migration_cleanse
    type: transform
    transform_type: sql
    readMode: batch
    source: v_immunization_migration
    target: v_immunization_migration_cleaned
    sql: |
      SELECT
        xxhash64(*) as immunization_key,
        *,
        'MIGRATION' as _source_file_path,
        current_timestamp() as _etl_timestamp
      FROM v_immunization_migration

  - name: write_immunization_migration
    type: write
    source: v_immunization_migration_cleaned
    readMode: batch
    once: true
    write_target:
      create_table: false
      type: streaming_table
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: "immunization"
