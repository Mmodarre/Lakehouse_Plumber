pipeline: perf_bronze
flowgroup: referral_bronze
presets:
  - default_delta_properties
actions:
  - name: referral_raw_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: stream
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{raw_schema}"
      table: referral_raw
    target: v_referral_raw
    description: "Load referral from raw schema"

  - name: referral_bronze_cleanse
    type: transform
    transform_type: sql
    source: v_referral_raw
    target: v_referral_bronze_cleaned
    sql: |
      SELECT
        xxhash64(*) as referral_key,
        *,
        current_timestamp() as _etl_timestamp
      FROM v_referral_raw
      WHERE 1=1

  - name: referral_bronze_dqe
    type: transform
    transform_type: data_quality
    source: v_referral_bronze_cleaned
    target: v_referral_bronze_dqe
    readMode: stream
    expectations_file: "expectations/generic_quality.json"
    description: "Apply data quality checks to referral"

  - name: write_referral_bronze
    type: write
    source: v_referral_bronze_dqe
    write_target:
      create_table: true
      type: streaming_table
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: "referral"
