pipeline: perf_bronze
flowgroup: ward_bronze
presets:
  - default_delta_properties
actions:
  - name: ward_raw_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: stream
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{raw_schema}"
      table: ward_raw
    target: v_ward_raw
    description: "Load ward from raw schema"

  - name: ward_bronze_cleanse
    type: transform
    transform_type: sql
    source: v_ward_raw
    target: v_ward_bronze_cleaned
    sql: |
      SELECT
        xxhash64(*) as ward_key,
        *,
        current_timestamp() as _etl_timestamp
      FROM v_ward_raw

  - name: ward_bronze_dqe
    type: transform
    transform_type: data_quality
    source: v_ward_bronze_cleaned
    target: v_ward_bronze_dqe
    readMode: stream
    expectations_file: "expectations/generic_quality.json"
    description: "Data quality for ward bronze"

  - name: write_ward_bronze
    type: write
    source: v_ward_bronze_dqe
    write_target:
      create_table: true
      type: streaming_table
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: "ward"

  - name: ward_migration_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: batch
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{raw_schema}"
      table: ward_migration
    target: v_ward_migration
    description: "Load ward migration data"

  - name: ward_migration_cleanse
    type: transform
    transform_type: sql
    readMode: batch
    source: v_ward_migration
    target: v_ward_migration_cleaned
    sql: |
      SELECT
        xxhash64(*) as ward_key,
        *,
        'MIGRATION' as _source_file_path,
        current_timestamp() as _etl_timestamp
      FROM v_ward_migration

  - name: write_ward_migration
    type: write
    source: v_ward_migration_cleaned
    readMode: batch
    once: true
    write_target:
      create_table: false
      type: streaming_table
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: "ward"
