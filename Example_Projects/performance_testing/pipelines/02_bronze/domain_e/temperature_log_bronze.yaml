pipeline: perf_bronze
flowgroup: temperature_log_bronze
presets:
  - default_delta_properties
actions:
  - name: temperature_log_raw_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: stream
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{raw_schema}"
      table: temperature_log_raw
    target: v_temperature_log_raw
    description: "Load temperature_log from raw schema"

  - name: temperature_log_bronze_cleanse
    type: transform
    transform_type: sql
    source: v_temperature_log_raw
    target: v_temperature_log_bronze_cleaned
    sql: |
      SELECT
        xxhash64(*) as temperature_log_key,
        *,
        current_timestamp() as _etl_timestamp
      FROM v_temperature_log_raw
      WHERE 1=1

  - name: temperature_log_bronze_dqe
    type: transform
    transform_type: data_quality
    source: v_temperature_log_bronze_cleaned
    target: v_temperature_log_bronze_dqe
    readMode: stream
    expectations_file: "expectations/generic_quality.json"
    description: "Apply data quality checks to temperature_log"

  - name: write_temperature_log_bronze
    type: write
    source: v_temperature_log_bronze_dqe
    write_target:
      create_table: true
      type: streaming_table
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: "temperature_log"
