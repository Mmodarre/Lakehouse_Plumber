pipeline: perf_bronze
flowgroup: hub_bronze
presets:
  - default_delta_properties
actions:
  - name: hub_raw_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: stream
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{raw_schema}"
      table: hub_raw
    target: v_hub_raw
    description: "Load hub from raw schema"

  - name: hub_bronze_cleanse
    type: transform
    transform_type: sql
    source: v_hub_raw
    target: v_hub_bronze_cleaned
    sql: |
      SELECT
        xxhash64(*) as hub_key,
        *,
        current_timestamp() as _etl_timestamp
      FROM v_hub_raw
      WHERE 1=1

  - name: hub_bronze_dqe
    type: transform
    transform_type: data_quality
    source: v_hub_bronze_cleaned
    target: v_hub_bronze_dqe
    readMode: stream
    expectations_file: "expectations/generic_quality.json"
    description: "Apply data quality checks to hub"

  - name: write_hub_bronze
    type: write
    source: v_hub_bronze_dqe
    write_target:
      create_table: true
      type: streaming_table
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: "hub"
