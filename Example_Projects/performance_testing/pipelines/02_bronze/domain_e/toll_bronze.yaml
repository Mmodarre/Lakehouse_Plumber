pipeline: perf_bronze
flowgroup: toll_bronze
presets:
  - default_delta_properties
actions:
  - name: toll_raw_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: stream
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{raw_schema}"
      table: toll_raw
    target: v_toll_raw
    description: "Load toll from raw schema"

  - name: toll_bronze_cleanse
    type: transform
    transform_type: sql
    source: v_toll_raw
    target: v_toll_bronze_cleaned
    sql: |
      SELECT
        xxhash64(*) as toll_key,
        *,
        current_timestamp() as _etl_timestamp
      FROM v_toll_raw
      WHERE 1=1

  - name: toll_bronze_dqe
    type: transform
    transform_type: data_quality
    source: v_toll_bronze_cleaned
    target: v_toll_bronze_dqe
    readMode: stream
    expectations_file: "expectations/generic_quality.json"
    description: "Apply data quality checks to toll"

  - name: write_toll_bronze
    type: write
    source: v_toll_bronze_dqe
    write_target:
      create_table: true
      type: streaming_table
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: "toll"
