pipeline: perf_bronze
flowgroup: fleet_bronze
presets:
  - default_delta_properties
actions:
  - name: fleet_raw_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: stream
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{raw_schema}"
      table: fleet_raw
    target: v_fleet_raw
    description: "Load fleet from raw schema"

  - name: fleet_bronze_cleanse
    type: transform
    transform_type: sql
    source: v_fleet_raw
    target: v_fleet_bronze_cleaned
    sql: |
      SELECT
        xxhash64(*) as fleet_key,
        *,
        current_timestamp() as _etl_timestamp
      FROM v_fleet_raw
      WHERE 1=1

  - name: fleet_bronze_dqe
    type: transform
    transform_type: data_quality
    source: v_fleet_bronze_cleaned
    target: v_fleet_bronze_dqe
    readMode: stream
    expectations_file: "expectations/generic_quality.json"
    description: "Apply data quality checks to fleet"

  - name: write_fleet_bronze
    type: write
    source: v_fleet_bronze_dqe
    write_target:
      create_table: true
      type: streaming_table
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: "fleet"
