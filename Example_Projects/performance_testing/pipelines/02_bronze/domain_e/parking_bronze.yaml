pipeline: perf_bronze
flowgroup: parking_bronze
presets:
  - default_delta_properties
actions:
  - name: parking_raw_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: stream
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{raw_schema}"
      table: parking_raw
    target: v_parking_raw
    description: "Load parking from raw schema"

  - name: parking_bronze_cleanse
    type: transform
    transform_type: sql
    source: v_parking_raw
    target: v_parking_bronze_cleaned
    sql: |
      SELECT
        xxhash64(*) as parking_key,
        *,
        current_timestamp() as _etl_timestamp
      FROM v_parking_raw

  - name: parking_bronze_dqe
    type: transform
    transform_type: data_quality
    source: v_parking_bronze_cleaned
    target: v_parking_bronze_dqe
    readMode: stream
    expectations_file: "expectations/generic_quality.json"
    description: "Data quality for parking bronze"

  - name: write_parking_bronze
    type: write
    source: v_parking_bronze_dqe
    write_target:
      create_table: true
      type: streaming_table
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: "parking"

  - name: parking_migration_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: batch
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{raw_schema}"
      table: parking_migration
    target: v_parking_migration
    description: "Load parking migration data"

  - name: parking_migration_cleanse
    type: transform
    transform_type: sql
    readMode: batch
    source: v_parking_migration
    target: v_parking_migration_cleaned
    sql: |
      SELECT
        xxhash64(*) as parking_key,
        *,
        'MIGRATION' as _source_file_path,
        current_timestamp() as _etl_timestamp
      FROM v_parking_migration

  - name: write_parking_migration
    type: write
    source: v_parking_migration_cleaned
    readMode: batch
    once: true
    write_target:
      create_table: false
      type: streaming_table
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: "parking"
