      entity_name: vehicle
      source_table: vehicle_raw

  - flowgroup: driver_bronze
    template_parameters:
      entity_name: driver
      source_table: driver_raw

  - flowgroup: route_bronze
    template_parameters:
      entity_name: route
      source_table: route_raw

  - flowgroup: delivery_bronze
    template_parameters:
      entity_name: delivery
