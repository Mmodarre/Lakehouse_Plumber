      source_table: maintenance_raw

  - flowgroup: inspection_bronze
    template_parameters:
      entity_name: inspection
      source_table: inspection_raw

  - flowgroup: toll_bronze
    template_parameters:
      entity_name: toll
      source_table: toll_raw

  - flowgroup: parking_bronze
    template_parameters:
      entity_name: parking
      source_table: parking_raw

  - flowgroup: fleet_bronze
    template_parameters:
      entity_name: fleet
      source_table: fleet_raw

  - flowgroup: dispatch_bronze
