      source_table: dispatch_raw

  - flowgroup: cargo_bronze
    template_parameters:
      entity_name: cargo
      source_table: cargo_raw

  - flowgroup: manifest_bronze
    template_parameters:
      entity_name: manifest
      source_table: manifest_raw

  - flowgroup: consignment_bronze
    template_parameters:
      entity_name: consignment
      source_table: consignment_raw

  - flowgroup: hub_bronze
    template_parameters:
      entity_name: hub
      source_table: hub_raw
