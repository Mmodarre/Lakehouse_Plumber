pipeline: perf_bronze
flowgroup: renewal_bronze
presets:
  - default_delta_properties
actions:
  - name: renewal_raw_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: stream
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{raw_schema}"
      table: renewal_raw
    target: v_renewal_raw
    description: "Load renewal from raw schema"

  - name: renewal_bronze_cleanse
    type: transform
    transform_type: sql
    source: v_renewal_raw
    target: v_renewal_bronze_cleaned
    sql: |
      SELECT
        xxhash64(*) as renewal_key,
        *,
        current_timestamp() as _etl_timestamp
      FROM v_renewal_raw
      WHERE 1=1

  - name: renewal_bronze_dqe
    type: transform
    transform_type: data_quality
    source: v_renewal_bronze_cleaned
    target: v_renewal_bronze_dqe
    readMode: stream
    expectations_file: "expectations/generic_quality.json"
    description: "Apply data quality checks to renewal"

  - name: write_renewal_bronze
    type: write
    source: v_renewal_bronze_dqe
    write_target:
      create_table: true
      type: streaming_table
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: "renewal"
