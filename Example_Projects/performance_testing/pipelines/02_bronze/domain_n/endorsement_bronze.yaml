pipeline: perf_bronze
flowgroup: endorsement_bronze
presets:
  - default_delta_properties
actions:
  - name: endorsement_raw_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: stream
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{raw_schema}"
      table: endorsement_raw
    target: v_endorsement_raw
    description: "Load endorsement from raw schema"

  - name: endorsement_bronze_cleanse
    type: transform
    transform_type: sql
    source: v_endorsement_raw
    target: v_endorsement_bronze_cleaned
    sql: |
      SELECT
        xxhash64(*) as endorsement_key,
        *,
        current_timestamp() as _etl_timestamp
      FROM v_endorsement_raw
      WHERE 1=1

  - name: endorsement_bronze_dqe
    type: transform
    transform_type: data_quality
    source: v_endorsement_bronze_cleaned
    target: v_endorsement_bronze_dqe
    readMode: stream
    expectations_file: "expectations/generic_quality.json"
    description: "Apply data quality checks to endorsement"

  - name: write_endorsement_bronze
    type: write
    source: v_endorsement_bronze_dqe
    write_target:
      create_table: true
      type: streaming_table
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: "endorsement"
