pipeline: perf_bronze
flowgroup: subrogation_bronze
presets:
  - default_delta_properties
actions:
  - name: subrogation_raw_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: stream
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{raw_schema}"
      table: subrogation_raw
    target: v_subrogation_raw
    description: "Load subrogation from raw schema"

  - name: subrogation_bronze_cleanse
    type: transform
    transform_type: sql
    source: v_subrogation_raw
    target: v_subrogation_bronze_cleaned
    sql: |
      SELECT
        xxhash64(*) as subrogation_key,
        *,
        current_timestamp() as _etl_timestamp
      FROM v_subrogation_raw

  - name: subrogation_bronze_dqe
    type: transform
    transform_type: data_quality
    source: v_subrogation_bronze_cleaned
    target: v_subrogation_bronze_dqe
    readMode: stream
    expectations_file: "expectations/generic_quality.json"
    description: "Data quality for subrogation bronze"

  - name: write_subrogation_bronze
    type: write
    source: v_subrogation_bronze_dqe
    write_target:
      create_table: true
      type: streaming_table
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: "subrogation"

  - name: subrogation_migration_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: batch
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{raw_schema}"
      table: subrogation_migration
    target: v_subrogation_migration
    description: "Load subrogation migration data"

  - name: subrogation_migration_cleanse
    type: transform
    transform_type: sql
    readMode: batch
    source: v_subrogation_migration
    target: v_subrogation_migration_cleaned
    sql: |
      SELECT
        xxhash64(*) as subrogation_key,
        *,
        'MIGRATION' as _source_file_path,
        current_timestamp() as _etl_timestamp
      FROM v_subrogation_migration

  - name: write_subrogation_migration
    type: write
    source: v_subrogation_migration_cleaned
    readMode: batch
    once: true
    write_target:
      create_table: false
      type: streaming_table
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: "subrogation"
