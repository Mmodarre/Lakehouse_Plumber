pipeline: perf_bronze
flowgroup: medical_exam_bronze
presets:
  - default_delta_properties
actions:
  - name: medical_exam_raw_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: stream
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{raw_schema}"
      table: medical_exam_raw
    target: v_medical_exam_raw
    description: "Load medical_exam from raw schema"

  - name: medical_exam_bronze_cleanse
    type: transform
    transform_type: sql
    source: v_medical_exam_raw
    target: v_medical_exam_bronze_cleaned
    sql: |
      SELECT
        xxhash64(*) as medical_exam_key,
        *,
        current_timestamp() as _etl_timestamp
      FROM v_medical_exam_raw
      WHERE 1=1

  - name: medical_exam_bronze_dqe
    type: transform
    transform_type: data_quality
    source: v_medical_exam_bronze_cleaned
    target: v_medical_exam_bronze_dqe
    readMode: stream
    expectations_file: "expectations/generic_quality.json"
    description: "Apply data quality checks to medical_exam"

  - name: write_medical_exam_bronze
    type: write
    source: v_medical_exam_bronze_dqe
    write_target:
      create_table: true
      type: streaming_table
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: "medical_exam"
