pipeline: perf_bronze
flowgroup: exclusion_bronze
presets:
  - default_delta_properties
actions:
  - name: exclusion_raw_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: stream
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{raw_schema}"
      table: exclusion_raw
    target: v_exclusion_raw
    description: "Load exclusion from raw schema"

  - name: exclusion_bronze_cleanse
    type: transform
    transform_type: sql
    source: v_exclusion_raw
    target: v_exclusion_bronze_cleaned
    sql: |
      SELECT
        xxhash64(*) as exclusion_key,
        *,
        current_timestamp() as _etl_timestamp
      FROM v_exclusion_raw

  - name: exclusion_bronze_dqe
    type: transform
    transform_type: data_quality
    source: v_exclusion_bronze_cleaned
    target: v_exclusion_bronze_dqe
    readMode: stream
    expectations_file: "expectations/generic_quality.json"
    description: "Data quality for exclusion bronze"

  - name: write_exclusion_bronze
    type: write
    source: v_exclusion_bronze_dqe
    write_target:
      create_table: true
      type: streaming_table
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: "exclusion"

  - name: exclusion_migration_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: batch
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{raw_schema}"
      table: exclusion_migration
    target: v_exclusion_migration
    description: "Load exclusion migration data"

  - name: exclusion_migration_cleanse
    type: transform
    transform_type: sql
    readMode: batch
    source: v_exclusion_migration
    target: v_exclusion_migration_cleaned
    sql: |
      SELECT
        xxhash64(*) as exclusion_key,
        *,
        'MIGRATION' as _source_file_path,
        current_timestamp() as _etl_timestamp
      FROM v_exclusion_migration

  - name: write_exclusion_migration
    type: write
    source: v_exclusion_migration_cleaned
    readMode: batch
    once: true
    write_target:
      create_table: false
      type: streaming_table
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: "exclusion"
