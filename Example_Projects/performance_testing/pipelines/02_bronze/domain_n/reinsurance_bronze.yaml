pipeline: perf_bronze
flowgroup: reinsurance_bronze
presets:
  - default_delta_properties
actions:
  - name: reinsurance_raw_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: stream
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{raw_schema}"
      table: reinsurance_raw
    target: v_reinsurance_raw
    description: "Load reinsurance from raw schema"

  - name: reinsurance_bronze_cleanse
    type: transform
    transform_type: sql
    source: v_reinsurance_raw
    target: v_reinsurance_bronze_cleaned
    sql: |
      SELECT
        xxhash64(*) as reinsurance_key,
        *,
        current_timestamp() as _etl_timestamp
      FROM v_reinsurance_raw
      WHERE 1=1

  - name: reinsurance_bronze_dqe
    type: transform
    transform_type: data_quality
    source: v_reinsurance_bronze_cleaned
    target: v_reinsurance_bronze_dqe
    readMode: stream
    expectations_file: "expectations/generic_quality.json"
    description: "Apply data quality checks to reinsurance"

  - name: write_reinsurance_bronze
    type: write
    source: v_reinsurance_bronze_dqe
    write_target:
      create_table: true
      type: streaming_table
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: "reinsurance"
