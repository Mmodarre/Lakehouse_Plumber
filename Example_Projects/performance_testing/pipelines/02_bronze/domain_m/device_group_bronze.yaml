pipeline: perf_bronze
flowgroup: device_group_bronze
presets:
  - default_delta_properties
actions:
  - name: device_group_raw_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: stream
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{raw_schema}"
      table: device_group_raw
    target: v_device_group_raw
    description: "Load device_group from raw schema"

  - name: device_group_bronze_cleanse
    type: transform
    transform_type: sql
    source: v_device_group_raw
    target: v_device_group_bronze_cleaned
    sql: |
      SELECT
        xxhash64(*) as device_group_key,
        *,
        current_timestamp() as _etl_timestamp
      FROM v_device_group_raw
      WHERE 1=1

  - name: device_group_bronze_dqe
    type: transform
    transform_type: data_quality
    source: v_device_group_bronze_cleaned
    target: v_device_group_bronze_dqe
    readMode: stream
    expectations_file: "expectations/generic_quality.json"
    description: "Apply data quality checks to device_group"

  - name: write_device_group_bronze
    type: write
    source: v_device_group_bronze_dqe
    write_target:
      create_table: true
      type: streaming_table
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: "device_group"
