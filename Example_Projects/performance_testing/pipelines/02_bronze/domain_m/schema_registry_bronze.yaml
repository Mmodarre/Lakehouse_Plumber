pipeline: domain_m_bronze
flowgroup: schema_registry_bronze
presets:
  - default_delta_properties
actions:
  - name: schema_registry_raw_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: stream
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{raw_schema}"
      table: schema_registry_raw
    target: v_schema_registry_raw
    description: "Load schema_registry from raw schema"

  - name: schema_registry_bronze_cleanse
    type: transform
    transform_type: sql
    source: v_schema_registry_raw
    target: v_schema_registry_bronze_cleaned
    sql: |
      SELECT
        xxhash64(*) as schema_registry_key,
        *,
        current_timestamp() as _etl_timestamp
      FROM v_schema_registry_raw
      WHERE 1=1

  - name: schema_registry_bronze_dqe
    type: transform
    transform_type: data_quality
    source: v_schema_registry_bronze_cleaned
    target: v_schema_registry_bronze_dqe
    readMode: stream
    expectations_file: "expectations/generic_quality.json"
    description: "Apply data quality checks to schema_registry"

  - name: write_schema_registry_bronze
    type: write
    source: v_schema_registry_bronze_dqe
    write_target:
      create_table: true
      type: streaming_table
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: "schema_registry"
