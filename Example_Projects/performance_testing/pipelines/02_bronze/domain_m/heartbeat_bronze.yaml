pipeline: perf_bronze
flowgroup: heartbeat_bronze
presets:
  - default_delta_properties
actions:
  - name: heartbeat_raw_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: stream
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{raw_schema}"
      table: heartbeat_raw
    target: v_heartbeat_raw
    description: "Load heartbeat from raw schema"

  - name: heartbeat_bronze_cleanse
    type: transform
    transform_type: sql
    source: v_heartbeat_raw
    target: v_heartbeat_bronze_cleaned
    sql: |
      SELECT
        xxhash64(*) as heartbeat_key,
        *,
        current_timestamp() as _etl_timestamp
      FROM v_heartbeat_raw

  - name: heartbeat_bronze_dqe
    type: transform
    transform_type: data_quality
    source: v_heartbeat_bronze_cleaned
    target: v_heartbeat_bronze_dqe
    readMode: stream
    expectations_file: "expectations/generic_quality.json"
    description: "Data quality for heartbeat bronze"

  - name: write_heartbeat_bronze
    type: write
    source: v_heartbeat_bronze_dqe
    write_target:
      create_table: true
      type: streaming_table
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: "heartbeat"

  - name: heartbeat_migration_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: batch
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{raw_schema}"
      table: heartbeat_migration
    target: v_heartbeat_migration
    description: "Load heartbeat migration data"

  - name: heartbeat_migration_cleanse
    type: transform
    transform_type: sql
    readMode: batch
    source: v_heartbeat_migration
    target: v_heartbeat_migration_cleaned
    sql: |
      SELECT
        xxhash64(*) as heartbeat_key,
        *,
        'MIGRATION' as _source_file_path,
        current_timestamp() as _etl_timestamp
      FROM v_heartbeat_migration

  - name: write_heartbeat_migration
    type: write
    source: v_heartbeat_migration_cleaned
    readMode: batch
    once: true
    write_target:
      create_table: false
      type: streaming_table
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: "heartbeat"
