pipeline: perf_bronze
flowgroup: petri_dish_bronze
presets:
  - default_delta_properties
actions:
  - name: petri_dish_raw_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: stream
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{raw_schema}"
      table: petri_dish_raw
    target: v_petri_dish_raw
    description: "Load petri_dish from raw schema"

  - name: petri_dish_bronze_cleanse
    type: transform
    transform_type: sql
    source: v_petri_dish_raw
    target: v_petri_dish_bronze_cleaned
    sql: |
      SELECT
        xxhash64(*) as petri_dish_key,
        *,
        current_timestamp() as _etl_timestamp
      FROM v_petri_dish_raw
      WHERE 1=1

  - name: petri_dish_bronze_dqe
    type: transform
    transform_type: data_quality
    source: v_petri_dish_bronze_cleaned
    target: v_petri_dish_bronze_dqe
    readMode: stream
    expectations_file: "expectations/generic_quality.json"
    description: "Apply data quality checks to petri_dish"

  - name: write_petri_dish_bronze
    type: write
    source: v_petri_dish_bronze_dqe
    write_target:
      create_table: true
      type: streaming_table
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: "petri_dish"
