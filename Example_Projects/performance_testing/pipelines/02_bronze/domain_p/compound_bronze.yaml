pipeline: domain_p_bronze
flowgroup: compound_bronze
presets:
  - default_delta_properties
actions:
  - name: compound_raw_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: stream
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{raw_schema}"
      table: compound_raw
    target: v_compound_raw
    description: "Load compound from raw schema"

  - name: compound_bronze_cleanse
    type: transform
    transform_type: sql
    source: v_compound_raw
    target: v_compound_bronze_cleaned
    sql: |
      SELECT
        xxhash64(*) as compound_key,
        *,
        current_timestamp() as _etl_timestamp
      FROM v_compound_raw
      WHERE 1=1

  - name: compound_bronze_dqe
    type: transform
    transform_type: data_quality
    source: v_compound_bronze_cleaned
    target: v_compound_bronze_dqe
    readMode: stream
    expectations_file: "expectations/generic_quality.json"
    description: "Apply data quality checks to compound"

  - name: write_compound_bronze
    type: write
    source: v_compound_bronze_dqe
    write_target:
      create_table: true
      type: streaming_table
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: "compound"
