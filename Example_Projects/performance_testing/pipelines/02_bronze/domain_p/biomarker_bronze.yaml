pipeline: perf_bronze
flowgroup: biomarker_bronze
presets:
  - default_delta_properties
actions:
  - name: biomarker_raw_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: stream
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{raw_schema}"
      table: biomarker_raw
    target: v_biomarker_raw
    description: "Load biomarker from raw schema"

  - name: biomarker_bronze_cleanse
    type: transform
    transform_type: sql
    source: v_biomarker_raw
    target: v_biomarker_bronze_cleaned
    sql: |
      SELECT
        xxhash64(*) as biomarker_key,
        *,
        current_timestamp() as _etl_timestamp
      FROM v_biomarker_raw

  - name: biomarker_bronze_dqe
    type: transform
    transform_type: data_quality
    source: v_biomarker_bronze_cleaned
    target: v_biomarker_bronze_dqe
    readMode: stream
    expectations_file: "expectations/generic_quality.json"
    description: "Data quality for biomarker bronze"

  - name: write_biomarker_bronze
    type: write
    source: v_biomarker_bronze_dqe
    write_target:
      create_table: true
      type: streaming_table
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: "biomarker"

  - name: biomarker_migration_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: batch
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{raw_schema}"
      table: biomarker_migration
    target: v_biomarker_migration
    description: "Load biomarker migration data"

  - name: biomarker_migration_cleanse
    type: transform
    transform_type: sql
    readMode: batch
    source: v_biomarker_migration
    target: v_biomarker_migration_cleaned
    sql: |
      SELECT
        xxhash64(*) as biomarker_key,
        *,
        'MIGRATION' as _source_file_path,
        current_timestamp() as _etl_timestamp
      FROM v_biomarker_migration

  - name: write_biomarker_migration
    type: write
    source: v_biomarker_migration_cleaned
    readMode: batch
    once: true
    write_target:
      create_table: false
      type: streaming_table
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: "biomarker"
