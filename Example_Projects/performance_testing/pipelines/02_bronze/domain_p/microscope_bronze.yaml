pipeline: perf_bronze
flowgroup: microscope_bronze
presets:
  - default_delta_properties
actions:
  - name: microscope_raw_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: stream
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{raw_schema}"
      table: microscope_raw
    target: v_microscope_raw
    description: "Load microscope from raw schema"

  - name: microscope_bronze_cleanse
    type: transform
    transform_type: sql
    source: v_microscope_raw
    target: v_microscope_bronze_cleaned
    sql: |
      SELECT
        xxhash64(*) as microscope_key,
        *,
        current_timestamp() as _etl_timestamp
      FROM v_microscope_raw
      WHERE 1=1

  - name: microscope_bronze_dqe
    type: transform
    transform_type: data_quality
    source: v_microscope_bronze_cleaned
    target: v_microscope_bronze_dqe
    readMode: stream
    expectations_file: "expectations/generic_quality.json"
    description: "Apply data quality checks to microscope"

  - name: write_microscope_bronze
    type: write
    source: v_microscope_bronze_dqe
    write_target:
      create_table: true
      type: streaming_table
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: "microscope"
