pipeline: perf_bronze
flowgroup: trial_bronze
presets:
  - default_delta_properties
actions:
  - name: trial_raw_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: stream
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{raw_schema}"
      table: trial_raw
    target: v_trial_raw
    description: "Load trial from raw schema"

  - name: trial_bronze_cleanse
    type: transform
    transform_type: sql
    source: v_trial_raw
    target: v_trial_bronze_cleaned
    sql: |
      SELECT
        xxhash64(*) as trial_key,
        *,
        current_timestamp() as _etl_timestamp
      FROM v_trial_raw
      WHERE 1=1

  - name: trial_bronze_dqe
    type: transform
    transform_type: data_quality
    source: v_trial_bronze_cleaned
    target: v_trial_bronze_dqe
    readMode: stream
    expectations_file: "expectations/generic_quality.json"
    description: "Apply data quality checks to trial"

  - name: write_trial_bronze
    type: write
    source: v_trial_bronze_dqe
    write_target:
      create_table: true
      type: streaming_table
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: "trial"
