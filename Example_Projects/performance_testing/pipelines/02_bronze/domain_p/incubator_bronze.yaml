pipeline: perf_bronze
flowgroup: incubator_bronze
presets:
  - default_delta_properties
actions:
  - name: incubator_raw_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: stream
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{raw_schema}"
      table: incubator_raw
    target: v_incubator_raw
    description: "Load incubator from raw schema"

  - name: incubator_bronze_cleanse
    type: transform
    transform_type: sql
    source: v_incubator_raw
    target: v_incubator_bronze_cleaned
    sql: |
      SELECT
        xxhash64(*) as incubator_key,
        *,
        current_timestamp() as _etl_timestamp
      FROM v_incubator_raw
      WHERE 1=1

  - name: incubator_bronze_dqe
    type: transform
    transform_type: data_quality
    source: v_incubator_bronze_cleaned
    target: v_incubator_bronze_dqe
    readMode: stream
    expectations_file: "expectations/generic_quality.json"
    description: "Apply data quality checks to incubator"

  - name: write_incubator_bronze
    type: write
    source: v_incubator_bronze_dqe
    write_target:
      create_table: true
      type: streaming_table
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: "incubator"
