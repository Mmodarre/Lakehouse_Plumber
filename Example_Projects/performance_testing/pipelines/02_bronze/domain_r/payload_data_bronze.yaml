pipeline: perf_bronze
flowgroup: payload_data_bronze
presets:
  - default_delta_properties
actions:
  - name: payload_data_raw_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: stream
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{raw_schema}"
      table: payload_data_raw
    target: v_payload_data_raw
    description: "Load payload_data from raw schema"

  - name: payload_data_bronze_cleanse
    type: transform
    transform_type: sql
    source: v_payload_data_raw
    target: v_payload_data_bronze_cleaned
    sql: |
      SELECT
        xxhash64(*) as payload_data_key,
        *,
        current_timestamp() as _etl_timestamp
      FROM v_payload_data_raw
      WHERE 1=1

  - name: payload_data_bronze_dqe
    type: transform
    transform_type: data_quality
    source: v_payload_data_bronze_cleaned
    target: v_payload_data_bronze_dqe
    readMode: stream
    expectations_file: "expectations/generic_quality.json"
    description: "Apply data quality checks to payload_data"

  - name: write_payload_data_bronze
    type: write
    source: v_payload_data_bronze_dqe
    write_target:
      create_table: true
      type: streaming_table
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: "payload_data"
