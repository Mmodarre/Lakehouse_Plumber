pipeline: perf_bronze
flowgroup: mission_bronze
presets:
  - default_delta_properties
actions:
  - name: mission_raw_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: stream
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{raw_schema}"
      table: mission_raw
    target: v_mission_raw
    description: "Load mission from raw schema"

  - name: mission_bronze_cleanse
    type: transform
    transform_type: sql
    source: v_mission_raw
    target: v_mission_bronze_cleaned
    sql: |
      SELECT
        xxhash64(*) as mission_key,
        *,
        current_timestamp() as _etl_timestamp
      FROM v_mission_raw
      WHERE 1=1

  - name: mission_bronze_dqe
    type: transform
    transform_type: data_quality
    source: v_mission_bronze_cleaned
    target: v_mission_bronze_dqe
    readMode: stream
    expectations_file: "expectations/generic_quality.json"
    description: "Apply data quality checks to mission"

  - name: write_mission_bronze
    type: write
    source: v_mission_bronze_dqe
    write_target:
      create_table: true
      type: streaming_table
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: "mission"
