pipeline: perf_bronze
flowgroup: constellation_bronze
presets:
  - default_delta_properties
actions:
  - name: constellation_raw_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: stream
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{raw_schema}"
      table: constellation_raw
    target: v_constellation_raw
    description: "Load constellation from raw schema"

  - name: constellation_bronze_cleanse
    type: transform
    transform_type: sql
    source: v_constellation_raw
    target: v_constellation_bronze_cleaned
    sql: |
      SELECT
        xxhash64(*) as constellation_key,
        *,
        current_timestamp() as _etl_timestamp
      FROM v_constellation_raw
      WHERE 1=1

  - name: constellation_bronze_dqe
    type: transform
    transform_type: data_quality
    source: v_constellation_bronze_cleaned
    target: v_constellation_bronze_dqe
    readMode: stream
    expectations_file: "expectations/generic_quality.json"
    description: "Apply data quality checks to constellation"

  - name: write_constellation_bronze
    type: write
    source: v_constellation_bronze_dqe
    write_target:
      create_table: true
      type: streaming_table
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: "constellation"
