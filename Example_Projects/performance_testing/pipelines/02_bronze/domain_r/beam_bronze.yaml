pipeline: perf_bronze
flowgroup: beam_bronze
presets:
  - default_delta_properties
actions:
  - name: beam_raw_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: stream
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{raw_schema}"
      table: beam_raw
    target: v_beam_raw
    description: "Load beam from raw schema"

  - name: beam_bronze_cleanse
    type: transform
    transform_type: sql
    source: v_beam_raw
    target: v_beam_bronze_cleaned
    sql: |
      SELECT
        xxhash64(*) as beam_key,
        *,
        current_timestamp() as _etl_timestamp
      FROM v_beam_raw
      WHERE 1=1

  - name: beam_bronze_dqe
    type: transform
    transform_type: data_quality
    source: v_beam_bronze_cleaned
    target: v_beam_bronze_dqe
    readMode: stream
    expectations_file: "expectations/generic_quality.json"
    description: "Apply data quality checks to beam"

  - name: write_beam_bronze
    type: write
    source: v_beam_bronze_dqe
    write_target:
      create_table: true
      type: streaming_table
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: "beam"
