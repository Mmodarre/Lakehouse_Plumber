pipeline: perf_bronze
flowgroup: tle_bronze
presets:
  - default_delta_properties
actions:
  - name: tle_raw_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: stream
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{raw_schema}"
      table: tle_raw
    target: v_tle_raw
    description: "Load tle from raw schema"

  - name: tle_bronze_cleanse
    type: transform
    transform_type: sql
    source: v_tle_raw
    target: v_tle_bronze_cleaned
    sql: |
      SELECT
        xxhash64(*) as tle_key,
        *,
        current_timestamp() as _etl_timestamp
      FROM v_tle_raw
      WHERE 1=1

  - name: tle_bronze_dqe
    type: transform
    transform_type: data_quality
    source: v_tle_bronze_cleaned
    target: v_tle_bronze_dqe
    readMode: stream
    expectations_file: "expectations/generic_quality.json"
    description: "Apply data quality checks to tle"

  - name: write_tle_bronze
    type: write
    source: v_tle_bronze_dqe
    write_target:
      create_table: true
      type: streaming_table
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: "tle"
