pipeline: perf_bronze
flowgroup: launch_vehicle_bronze
presets:
  - default_delta_properties
actions:
  - name: launch_vehicle_raw_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: stream
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{raw_schema}"
      table: launch_vehicle_raw
    target: v_launch_vehicle_raw
    description: "Load launch_vehicle from raw schema"

  - name: launch_vehicle_bronze_cleanse
    type: transform
    transform_type: sql
    source: v_launch_vehicle_raw
    target: v_launch_vehicle_bronze_cleaned
    sql: |
      SELECT
        xxhash64(*) as launch_vehicle_key,
        *,
        current_timestamp() as _etl_timestamp
      FROM v_launch_vehicle_raw

  - name: launch_vehicle_bronze_dqe
    type: transform
    transform_type: data_quality
    source: v_launch_vehicle_bronze_cleaned
    target: v_launch_vehicle_bronze_dqe
    readMode: stream
    expectations_file: "expectations/generic_quality.json"
    description: "Data quality for launch_vehicle bronze"

  - name: write_launch_vehicle_bronze
    type: write
    source: v_launch_vehicle_bronze_dqe
    write_target:
      create_table: true
      type: streaming_table
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: "launch_vehicle"

  - name: launch_vehicle_migration_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: batch
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{raw_schema}"
      table: launch_vehicle_migration
    target: v_launch_vehicle_migration
    description: "Load launch_vehicle migration data"

  - name: launch_vehicle_migration_cleanse
    type: transform
    transform_type: sql
    readMode: batch
    source: v_launch_vehicle_migration
    target: v_launch_vehicle_migration_cleaned
    sql: |
      SELECT
        xxhash64(*) as launch_vehicle_key,
        *,
        'MIGRATION' as _source_file_path,
        current_timestamp() as _etl_timestamp
      FROM v_launch_vehicle_migration

  - name: write_launch_vehicle_migration
    type: write
    source: v_launch_vehicle_migration_cleaned
    readMode: batch
    once: true
    write_target:
      create_table: false
      type: streaming_table
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: "launch_vehicle"
