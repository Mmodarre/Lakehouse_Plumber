pipeline: perf_bronze
flowgroup: footprint_bronze
presets:
  - default_delta_properties
actions:
  - name: footprint_raw_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: stream
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{raw_schema}"
      table: footprint_raw
    target: v_footprint_raw
    description: "Load footprint from raw schema"

  - name: footprint_bronze_cleanse
    type: transform
    transform_type: sql
    source: v_footprint_raw
    target: v_footprint_bronze_cleaned
    sql: |
      SELECT
        xxhash64(*) as footprint_key,
        *,
        current_timestamp() as _etl_timestamp
      FROM v_footprint_raw

  - name: footprint_bronze_dqe
    type: transform
    transform_type: data_quality
    source: v_footprint_bronze_cleaned
    target: v_footprint_bronze_dqe
    readMode: stream
    expectations_file: "expectations/generic_quality.json"
    description: "Data quality for footprint bronze"

  - name: write_footprint_bronze
    type: write
    source: v_footprint_bronze_dqe
    write_target:
      create_table: true
      type: streaming_table
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: "footprint"

  - name: footprint_migration_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: batch
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{raw_schema}"
      table: footprint_migration
    target: v_footprint_migration
    description: "Load footprint migration data"

  - name: footprint_migration_cleanse
    type: transform
    transform_type: sql
    readMode: batch
    source: v_footprint_migration
    target: v_footprint_migration_cleaned
    sql: |
      SELECT
        xxhash64(*) as footprint_key,
        *,
        'MIGRATION' as _source_file_path,
        current_timestamp() as _etl_timestamp
      FROM v_footprint_migration

  - name: write_footprint_migration
    type: write
    source: v_footprint_migration_cleaned
    readMode: batch
    once: true
    write_target:
      create_table: false
      type: streaming_table
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: "footprint"
