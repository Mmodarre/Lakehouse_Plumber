pipeline: perf_bronze
flowgroup: ephemeris_bronze
presets:
  - default_delta_properties
actions:
  - name: ephemeris_raw_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: stream
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{raw_schema}"
      table: ephemeris_raw
    target: v_ephemeris_raw
    description: "Load ephemeris from raw schema"

  - name: ephemeris_bronze_cleanse
    type: transform
    transform_type: sql
    source: v_ephemeris_raw
    target: v_ephemeris_bronze_cleaned
    sql: |
      SELECT
        xxhash64(*) as ephemeris_key,
        *,
        current_timestamp() as _etl_timestamp
      FROM v_ephemeris_raw
      WHERE 1=1

  - name: ephemeris_bronze_dqe
    type: transform
    transform_type: data_quality
    source: v_ephemeris_bronze_cleaned
    target: v_ephemeris_bronze_dqe
    readMode: stream
    expectations_file: "expectations/generic_quality.json"
    description: "Apply data quality checks to ephemeris"

  - name: write_ephemeris_bronze
    type: write
    source: v_ephemeris_bronze_dqe
    write_target:
      create_table: true
      type: streaming_table
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: "ephemeris"
