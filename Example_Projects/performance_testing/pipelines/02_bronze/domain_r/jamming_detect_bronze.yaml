pipeline: domain_r_bronze
flowgroup: jamming_detect_bronze
presets:
  - default_delta_properties
actions:
  - name: jamming_detect_raw_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: stream
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{raw_schema}"
      table: jamming_detect_raw
    target: v_jamming_detect_raw
    description: "Load jamming_detect from raw schema"

  - name: jamming_detect_bronze_cleanse
    type: transform
    transform_type: sql
    source: v_jamming_detect_raw
    target: v_jamming_detect_bronze_cleaned
    sql: |
      SELECT
        xxhash64(*) as jamming_detect_key,
        *,
        current_timestamp() as _etl_timestamp
      FROM v_jamming_detect_raw
      WHERE 1=1

  - name: jamming_detect_bronze_dqe
    type: transform
    transform_type: data_quality
    source: v_jamming_detect_bronze_cleaned
    target: v_jamming_detect_bronze_dqe
    readMode: stream
    expectations_file: "expectations/generic_quality.json"
    description: "Apply data quality checks to jamming_detect"

  - name: write_jamming_detect_bronze
    type: write
    source: v_jamming_detect_bronze_dqe
    write_target:
      create_table: true
      type: streaming_table
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: "jamming_detect"
