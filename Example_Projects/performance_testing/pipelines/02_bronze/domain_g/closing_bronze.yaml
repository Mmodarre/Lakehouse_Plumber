pipeline: perf_bronze
flowgroup: closing_bronze
presets:
  - default_delta_properties
actions:
  - name: closing_raw_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: stream
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{raw_schema}"
      table: closing_raw
    target: v_closing_raw
    description: "Load closing from raw schema"

  - name: closing_bronze_cleanse
    type: transform
    transform_type: sql
    source: v_closing_raw
    target: v_closing_bronze_cleaned
    sql: |
      SELECT
        xxhash64(*) as closing_key,
        *,
        current_timestamp() as _etl_timestamp
      FROM v_closing_raw
      WHERE 1=1

  - name: closing_bronze_dqe
    type: transform
    transform_type: data_quality
    source: v_closing_bronze_cleaned
    target: v_closing_bronze_dqe
    readMode: stream
    expectations_file: "expectations/generic_quality.json"
    description: "Apply data quality checks to closing"

  - name: write_closing_bronze
    type: write
    source: v_closing_bronze_dqe
    write_target:
      create_table: true
      type: streaming_table
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: "closing"
