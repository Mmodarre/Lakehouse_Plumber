pipeline: perf_bronze
flowgroup: rent_payment_bronze
presets:
  - default_delta_properties
actions:
  - name: rent_payment_raw_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: stream
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{raw_schema}"
      table: rent_payment_raw
    target: v_rent_payment_raw
    description: "Load rent_payment from raw schema"

  - name: rent_payment_bronze_cleanse
    type: transform
    transform_type: sql
    source: v_rent_payment_raw
    target: v_rent_payment_bronze_cleaned
    sql: |
      SELECT
        xxhash64(*) as rent_payment_key,
        *,
        current_timestamp() as _etl_timestamp
      FROM v_rent_payment_raw
      WHERE 1=1

  - name: rent_payment_bronze_dqe
    type: transform
    transform_type: data_quality
    source: v_rent_payment_bronze_cleaned
    target: v_rent_payment_bronze_dqe
    readMode: stream
    expectations_file: "expectations/generic_quality.json"
    description: "Apply data quality checks to rent_payment"

  - name: write_rent_payment_bronze
    type: write
    source: v_rent_payment_bronze_dqe
    write_target:
      create_table: true
      type: streaming_table
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: "rent_payment"
