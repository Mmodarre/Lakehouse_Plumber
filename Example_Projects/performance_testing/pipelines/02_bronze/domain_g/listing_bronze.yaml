pipeline: perf_bronze
flowgroup: listing_bronze
presets:
  - default_delta_properties
actions:
  - name: listing_raw_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: stream
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{raw_schema}"
      table: listing_raw
    target: v_listing_raw
    description: "Load listing from raw schema"

  - name: listing_bronze_cleanse
    type: transform
    transform_type: sql
    source: v_listing_raw
    target: v_listing_bronze_cleaned
    sql: |
      SELECT
        xxhash64(*) as listing_key,
        *,
        current_timestamp() as _etl_timestamp
      FROM v_listing_raw
      WHERE 1=1

  - name: listing_bronze_dqe
    type: transform
    transform_type: data_quality
    source: v_listing_bronze_cleaned
    target: v_listing_bronze_dqe
    readMode: stream
    expectations_file: "expectations/generic_quality.json"
    description: "Apply data quality checks to listing"

  - name: write_listing_bronze
    type: write
    source: v_listing_bronze_dqe
    write_target:
      create_table: true
      type: streaming_table
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: "listing"
