pipeline: perf_bronze
flowgroup: mortgage_bronze
presets:
  - default_delta_properties
actions:
  - name: mortgage_raw_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: stream
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{raw_schema}"
      table: mortgage_raw
    target: v_mortgage_raw
    description: "Load mortgage from raw schema"

  - name: mortgage_bronze_cleanse
    type: transform
    transform_type: sql
    source: v_mortgage_raw
    target: v_mortgage_bronze_cleaned
    sql: |
      SELECT
        xxhash64(*) as mortgage_key,
        *,
        current_timestamp() as _etl_timestamp
      FROM v_mortgage_raw
      WHERE 1=1

  - name: mortgage_bronze_dqe
    type: transform
    transform_type: data_quality
    source: v_mortgage_bronze_cleaned
    target: v_mortgage_bronze_dqe
    readMode: stream
    expectations_file: "expectations/generic_quality.json"
    description: "Apply data quality checks to mortgage"

  - name: write_mortgage_bronze
    type: write
    source: v_mortgage_bronze_dqe
    write_target:
      create_table: true
      type: streaming_table
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: "mortgage"
