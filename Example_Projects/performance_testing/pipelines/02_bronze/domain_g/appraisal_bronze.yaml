pipeline: perf_bronze
flowgroup: appraisal_bronze
presets:
  - default_delta_properties
actions:
  - name: appraisal_raw_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: stream
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{raw_schema}"
      table: appraisal_raw
    target: v_appraisal_raw
    description: "Load appraisal from raw schema"

  - name: appraisal_bronze_cleanse
    type: transform
    transform_type: sql
    source: v_appraisal_raw
    target: v_appraisal_bronze_cleaned
    sql: |
      SELECT
        xxhash64(*) as appraisal_key,
        *,
        current_timestamp() as _etl_timestamp
      FROM v_appraisal_raw
      WHERE 1=1

  - name: appraisal_bronze_dqe
    type: transform
    transform_type: data_quality
    source: v_appraisal_bronze_cleaned
    target: v_appraisal_bronze_dqe
    readMode: stream
    expectations_file: "expectations/generic_quality.json"
    description: "Apply data quality checks to appraisal"

  - name: write_appraisal_bronze
    type: write
    source: v_appraisal_bronze_dqe
    write_target:
      create_table: true
      type: streaming_table
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: "appraisal"
