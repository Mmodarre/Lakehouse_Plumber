pipeline: perf_bronze
flowgroup: eviction_bronze
presets:
  - default_delta_properties
actions:
  - name: eviction_raw_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: stream
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{raw_schema}"
      table: eviction_raw
    target: v_eviction_raw
    description: "Load eviction from raw schema"

  - name: eviction_bronze_cleanse
    type: transform
    transform_type: sql
    source: v_eviction_raw
    target: v_eviction_bronze_cleaned
    sql: |
      SELECT
        xxhash64(*) as eviction_key,
        *,
        current_timestamp() as _etl_timestamp
      FROM v_eviction_raw

  - name: eviction_bronze_dqe
    type: transform
    transform_type: data_quality
    source: v_eviction_bronze_cleaned
    target: v_eviction_bronze_dqe
    readMode: stream
    expectations_file: "expectations/generic_quality.json"
    description: "Data quality for eviction bronze"

  - name: write_eviction_bronze
    type: write
    source: v_eviction_bronze_dqe
    write_target:
      create_table: true
      type: streaming_table
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: "eviction"

  - name: eviction_migration_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: batch
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{raw_schema}"
      table: eviction_migration
    target: v_eviction_migration
    description: "Load eviction migration data"

  - name: eviction_migration_cleanse
    type: transform
    transform_type: sql
    readMode: batch
    source: v_eviction_migration
    target: v_eviction_migration_cleaned
    sql: |
      SELECT
        xxhash64(*) as eviction_key,
        *,
        'MIGRATION' as _source_file_path,
        current_timestamp() as _etl_timestamp
      FROM v_eviction_migration

  - name: write_eviction_migration
    type: write
    source: v_eviction_migration_cleaned
    readMode: batch
    once: true
    write_target:
      create_table: false
      type: streaming_table
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: "eviction"
