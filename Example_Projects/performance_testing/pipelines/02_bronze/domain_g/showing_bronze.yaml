pipeline: perf_bronze
flowgroup: showing_bronze
presets:
  - default_delta_properties
actions:
  - name: showing_raw_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: stream
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{raw_schema}"
      table: showing_raw
    target: v_showing_raw
    description: "Load showing from raw schema"

  - name: showing_bronze_cleanse
    type: transform
    transform_type: sql
    source: v_showing_raw
    target: v_showing_bronze_cleaned
    sql: |
      SELECT
        xxhash64(*) as showing_key,
        *,
        current_timestamp() as _etl_timestamp
      FROM v_showing_raw
      WHERE 1=1

  - name: showing_bronze_dqe
    type: transform
    transform_type: data_quality
    source: v_showing_bronze_cleaned
    target: v_showing_bronze_dqe
    readMode: stream
    expectations_file: "expectations/generic_quality.json"
    description: "Apply data quality checks to showing"

  - name: write_showing_bronze
    type: write
    source: v_showing_bronze_dqe
    write_target:
      create_table: true
      type: streaming_table
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: "showing"
