pipeline: perf_bronze
flowgroup: survey_bronze
presets:
  - default_delta_properties
actions:
  - name: survey_raw_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: stream
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{raw_schema}"
      table: survey_raw
    target: v_survey_raw
    description: "Load survey from raw schema"

  - name: survey_bronze_cleanse
    type: transform
    transform_type: sql
    source: v_survey_raw
    target: v_survey_bronze_cleaned
    sql: |
      SELECT
        xxhash64(*) as survey_key,
        *,
        current_timestamp() as _etl_timestamp
      FROM v_survey_raw
      WHERE 1=1

  - name: survey_bronze_dqe
    type: transform
    transform_type: data_quality
    source: v_survey_bronze_cleaned
    target: v_survey_bronze_dqe
    readMode: stream
    expectations_file: "expectations/generic_quality.json"
    description: "Apply data quality checks to survey"

  - name: write_survey_bronze
    type: write
    source: v_survey_bronze_dqe
    write_target:
      create_table: true
      type: streaming_table
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: "survey"
