pipeline: perf_bronze
flowgroup: compliance_bronze
presets:
  - default_delta_properties
actions:
  - name: compliance_raw_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: stream
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{raw_schema}"
      table: compliance_raw
    target: v_compliance_raw
    description: "Load compliance from raw schema"

  - name: compliance_bronze_cleanse
    type: transform
    transform_type: sql
    source: v_compliance_raw
    target: v_compliance_bronze_cleaned
    sql: |
      SELECT
        xxhash64(*) as compliance_key,
        *,
        current_timestamp() as _etl_timestamp
      FROM v_compliance_raw
      WHERE 1=1

  - name: compliance_bronze_dqe
    type: transform
    transform_type: data_quality
    source: v_compliance_bronze_cleaned
    target: v_compliance_bronze_dqe
    readMode: stream
    expectations_file: "expectations/generic_quality.json"
    description: "Apply data quality checks to compliance"

  - name: write_compliance_bronze
    type: write
    source: v_compliance_bronze_dqe
    write_target:
      create_table: true
      type: streaming_table
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: "compliance"
