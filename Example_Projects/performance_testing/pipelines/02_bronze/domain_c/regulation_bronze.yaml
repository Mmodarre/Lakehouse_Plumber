pipeline: perf_bronze
flowgroup: regulation_bronze
presets:
  - default_delta_properties
actions:
  - name: regulation_raw_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: stream
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{raw_schema}"
      table: regulation_raw
    target: v_regulation_raw
    description: "Load regulation from raw schema"

  - name: regulation_bronze_cleanse
    type: transform
    transform_type: sql
    source: v_regulation_raw
    target: v_regulation_bronze_cleaned
    sql: |
      SELECT
        xxhash64(*) as regulation_key,
        *,
        current_timestamp() as _etl_timestamp
      FROM v_regulation_raw

  - name: regulation_bronze_dqe
    type: transform
    transform_type: data_quality
    source: v_regulation_bronze_cleaned
    target: v_regulation_bronze_dqe
    readMode: stream
    expectations_file: "expectations/generic_quality.json"
    description: "Data quality for regulation bronze"

  - name: write_regulation_bronze
    type: write
    source: v_regulation_bronze_dqe
    write_target:
      create_table: true
      type: streaming_table
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: "regulation"

  - name: regulation_migration_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: batch
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{raw_schema}"
      table: regulation_migration
    target: v_regulation_migration
    description: "Load regulation migration data"

  - name: regulation_migration_cleanse
    type: transform
    transform_type: sql
    readMode: batch
    source: v_regulation_migration
    target: v_regulation_migration_cleaned
    sql: |
      SELECT
        xxhash64(*) as regulation_key,
        *,
        'MIGRATION' as _source_file_path,
        current_timestamp() as _etl_timestamp
      FROM v_regulation_migration

  - name: write_regulation_migration
    type: write
    source: v_regulation_migration_cleaned
    readMode: batch
    once: true
    write_target:
      create_table: false
      type: streaming_table
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: "regulation"
