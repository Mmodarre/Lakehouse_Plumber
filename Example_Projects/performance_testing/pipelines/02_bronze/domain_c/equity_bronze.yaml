pipeline: perf_bronze
flowgroup: equity_bronze
presets:
  - default_delta_properties
actions:
  - name: equity_raw_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: stream
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{raw_schema}"
      table: equity_raw
    target: v_equity_raw
    description: "Load equity from raw schema"

  - name: equity_bronze_cleanse
    type: transform
    transform_type: sql
    source: v_equity_raw
    target: v_equity_bronze_cleaned
    sql: |
      SELECT
        xxhash64(*) as equity_key,
        *,
        current_timestamp() as _etl_timestamp
      FROM v_equity_raw
      WHERE 1=1

  - name: equity_bronze_dqe
    type: transform
    transform_type: data_quality
    source: v_equity_bronze_cleaned
    target: v_equity_bronze_dqe
    readMode: stream
    expectations_file: "expectations/generic_quality.json"
    description: "Apply data quality checks to equity"

  - name: write_equity_bronze
    type: write
    source: v_equity_bronze_dqe
    write_target:
      create_table: true
      type: streaming_table
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: "equity"
