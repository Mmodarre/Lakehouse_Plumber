pipeline: perf_bronze
flowgroup: liability_bronze
presets:
  - default_delta_properties
actions:
  - name: liability_raw_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: stream
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{raw_schema}"
      table: liability_raw
    target: v_liability_raw
    description: "Load liability from raw schema"

  - name: liability_bronze_cleanse
    type: transform
    transform_type: sql
    source: v_liability_raw
    target: v_liability_bronze_cleaned
    sql: |
      SELECT
        xxhash64(*) as liability_key,
        *,
        current_timestamp() as _etl_timestamp
      FROM v_liability_raw
      WHERE 1=1

  - name: liability_bronze_dqe
    type: transform
    transform_type: data_quality
    source: v_liability_bronze_cleaned
    target: v_liability_bronze_dqe
    readMode: stream
    expectations_file: "expectations/generic_quality.json"
    description: "Apply data quality checks to liability"

  - name: write_liability_bronze
    type: write
    source: v_liability_bronze_dqe
    write_target:
      create_table: true
      type: streaming_table
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: "liability"
