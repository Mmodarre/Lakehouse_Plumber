pipeline: perf_bronze
flowgroup: expense_bronze
presets:
  - default_delta_properties
actions:
  - name: expense_raw_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: stream
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{raw_schema}"
      table: expense_raw
    target: v_expense_raw
    description: "Load expense from raw schema"

  - name: expense_bronze_cleanse
    type: transform
    transform_type: sql
    source: v_expense_raw
    target: v_expense_bronze_cleaned
    sql: |
      SELECT
        xxhash64(*) as expense_key,
        *,
        current_timestamp() as _etl_timestamp
      FROM v_expense_raw
      WHERE 1=1

  - name: expense_bronze_dqe
    type: transform
    transform_type: data_quality
    source: v_expense_bronze_cleaned
    target: v_expense_bronze_dqe
    readMode: stream
    expectations_file: "expectations/generic_quality.json"
    description: "Apply data quality checks to expense"

  - name: write_expense_bronze
    type: write
    source: v_expense_bronze_dqe
    write_target:
      create_table: true
      type: streaming_table
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: "expense"
