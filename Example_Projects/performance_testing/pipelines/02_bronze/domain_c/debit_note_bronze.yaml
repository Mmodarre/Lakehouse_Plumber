pipeline: perf_bronze
flowgroup: debit_note_bronze
presets:
  - default_delta_properties
actions:
  - name: debit_note_raw_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: stream
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{raw_schema}"
      table: debit_note_raw
    target: v_debit_note_raw
    description: "Load debit_note from raw schema"

  - name: debit_note_bronze_cleanse
    type: transform
    transform_type: sql
    source: v_debit_note_raw
    target: v_debit_note_bronze_cleaned
    sql: |
      SELECT
        xxhash64(*) as debit_note_key,
        *,
        current_timestamp() as _etl_timestamp
      FROM v_debit_note_raw
      WHERE 1=1

  - name: debit_note_bronze_dqe
    type: transform
    transform_type: data_quality
    source: v_debit_note_bronze_cleaned
    target: v_debit_note_bronze_dqe
    readMode: stream
    expectations_file: "expectations/generic_quality.json"
    description: "Apply data quality checks to debit_note"

  - name: write_debit_note_bronze
    type: write
    source: v_debit_note_bronze_dqe
    write_target:
      create_table: true
      type: streaming_table
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: "debit_note"
