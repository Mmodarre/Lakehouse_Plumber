pipeline: perf_bronze
flowgroup: depreciation_bronze
presets:
  - default_delta_properties
actions:
  - name: depreciation_raw_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: stream
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{raw_schema}"
      table: depreciation_raw
    target: v_depreciation_raw
    description: "Load depreciation from raw schema"

  - name: depreciation_bronze_cleanse
    type: transform
    transform_type: sql
    source: v_depreciation_raw
    target: v_depreciation_bronze_cleaned
    sql: |
      SELECT
        xxhash64(*) as depreciation_key,
        *,
        current_timestamp() as _etl_timestamp
      FROM v_depreciation_raw
      WHERE 1=1

  - name: depreciation_bronze_dqe
    type: transform
    transform_type: data_quality
    source: v_depreciation_bronze_cleaned
    target: v_depreciation_bronze_dqe
    readMode: stream
    expectations_file: "expectations/generic_quality.json"
    description: "Apply data quality checks to depreciation"

  - name: write_depreciation_bronze
    type: write
    source: v_depreciation_bronze_dqe
    write_target:
      create_table: true
      type: streaming_table
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: "depreciation"
