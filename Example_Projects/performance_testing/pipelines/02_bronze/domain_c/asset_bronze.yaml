pipeline: perf_bronze
flowgroup: asset_bronze
presets:
  - default_delta_properties
actions:
  - name: asset_raw_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: stream
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{raw_schema}"
      table: asset_raw
    target: v_asset_raw
    description: "Load asset from raw schema"

  - name: asset_bronze_cleanse
    type: transform
    transform_type: sql
    source: v_asset_raw
    target: v_asset_bronze_cleaned
    sql: |
      SELECT
        xxhash64(*) as asset_key,
        *,
        current_timestamp() as _etl_timestamp
      FROM v_asset_raw
      WHERE 1=1

  - name: asset_bronze_dqe
    type: transform
    transform_type: data_quality
    source: v_asset_bronze_cleaned
    target: v_asset_bronze_dqe
    readMode: stream
    expectations_file: "expectations/generic_quality.json"
    description: "Apply data quality checks to asset"

  - name: write_asset_bronze
    type: write
    source: v_asset_bronze_dqe
    write_target:
      create_table: true
      type: streaming_table
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: "asset"
