pipeline: perf_bronze
flowgroup: revenue_bronze
presets:
  - default_delta_properties
actions:
  - name: revenue_raw_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: stream
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{raw_schema}"
      table: revenue_raw
    target: v_revenue_raw
    description: "Load revenue from raw schema"

  - name: revenue_bronze_cleanse
    type: transform
    transform_type: sql
    source: v_revenue_raw
    target: v_revenue_bronze_cleaned
    sql: |
      SELECT
        xxhash64(*) as revenue_key,
        *,
        current_timestamp() as _etl_timestamp
      FROM v_revenue_raw

  - name: revenue_bronze_dqe
    type: transform
    transform_type: data_quality
    source: v_revenue_bronze_cleaned
    target: v_revenue_bronze_dqe
    readMode: stream
    expectations_file: "expectations/generic_quality.json"
    description: "Data quality for revenue bronze"

  - name: write_revenue_bronze
    type: write
    source: v_revenue_bronze_dqe
    write_target:
      create_table: true
      type: streaming_table
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: "revenue"

  - name: revenue_migration_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: batch
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{raw_schema}"
      table: revenue_migration
    target: v_revenue_migration
    description: "Load revenue migration data"

  - name: revenue_migration_cleanse
    type: transform
    transform_type: sql
    readMode: batch
    source: v_revenue_migration
    target: v_revenue_migration_cleaned
    sql: |
      SELECT
        xxhash64(*) as revenue_key,
        *,
        'MIGRATION' as _source_file_path,
        current_timestamp() as _etl_timestamp
      FROM v_revenue_migration

  - name: write_revenue_migration
    type: write
    source: v_revenue_migration_cleaned
    readMode: batch
    once: true
    write_target:
      create_table: false
      type: streaming_table
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: "revenue"
