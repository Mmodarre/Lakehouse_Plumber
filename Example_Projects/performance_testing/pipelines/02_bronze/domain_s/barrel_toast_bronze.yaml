pipeline: domain_s_bronze
flowgroup: barrel_toast_bronze
presets:
  - default_delta_properties
actions:
  - name: barrel_toast_raw_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: stream
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{raw_schema}"
      table: barrel_toast_raw
    target: v_barrel_toast_raw
    description: "Load barrel_toast from raw schema"

  - name: barrel_toast_bronze_cleanse
    type: transform
    transform_type: sql
    source: v_barrel_toast_raw
    target: v_barrel_toast_bronze_cleaned
    sql: |
      SELECT
        xxhash64(*) as barrel_toast_key,
        *,
        current_timestamp() as _etl_timestamp
      FROM v_barrel_toast_raw
      WHERE 1=1

  - name: barrel_toast_bronze_dqe
    type: transform
    transform_type: data_quality
    source: v_barrel_toast_bronze_cleaned
    target: v_barrel_toast_bronze_dqe
    readMode: stream
    expectations_file: "expectations/generic_quality.json"
    description: "Apply data quality checks to barrel_toast"

  - name: write_barrel_toast_bronze
    type: write
    source: v_barrel_toast_bronze_dqe
    write_target:
      create_table: true
      type: streaming_table
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: "barrel_toast"
