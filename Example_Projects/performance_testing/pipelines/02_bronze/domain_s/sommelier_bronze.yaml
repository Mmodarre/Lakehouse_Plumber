pipeline: perf_bronze
flowgroup: sommelier_bronze
presets:
  - default_delta_properties
actions:
  - name: sommelier_raw_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: stream
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{raw_schema}"
      table: sommelier_raw
    target: v_sommelier_raw
    description: "Load sommelier from raw schema"

  - name: sommelier_bronze_cleanse
    type: transform
    transform_type: sql
    source: v_sommelier_raw
    target: v_sommelier_bronze_cleaned
    sql: |
      SELECT
        xxhash64(*) as sommelier_key,
        *,
        current_timestamp() as _etl_timestamp
      FROM v_sommelier_raw

  - name: sommelier_bronze_dqe
    type: transform
    transform_type: data_quality
    source: v_sommelier_bronze_cleaned
    target: v_sommelier_bronze_dqe
    readMode: stream
    expectations_file: "expectations/generic_quality.json"
    description: "Data quality for sommelier bronze"

  - name: write_sommelier_bronze
    type: write
    source: v_sommelier_bronze_dqe
    write_target:
      create_table: true
      type: streaming_table
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: "sommelier"

  - name: sommelier_migration_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: batch
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{raw_schema}"
      table: sommelier_migration
    target: v_sommelier_migration
    description: "Load sommelier migration data"

  - name: sommelier_migration_cleanse
    type: transform
    transform_type: sql
    readMode: batch
    source: v_sommelier_migration
    target: v_sommelier_migration_cleaned
    sql: |
      SELECT
        xxhash64(*) as sommelier_key,
        *,
        'MIGRATION' as _source_file_path,
        current_timestamp() as _etl_timestamp
      FROM v_sommelier_migration

  - name: write_sommelier_migration
    type: write
    source: v_sommelier_migration_cleaned
    readMode: batch
    once: true
    write_target:
      create_table: false
      type: streaming_table
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: "sommelier"
