pipeline: perf_bronze
flowgroup: cellar_bronze
presets:
  - default_delta_properties
actions:
  - name: cellar_raw_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: stream
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{raw_schema}"
      table: cellar_raw
    target: v_cellar_raw
    description: "Load cellar from raw schema"

  - name: cellar_bronze_cleanse
    type: transform
    transform_type: sql
    source: v_cellar_raw
    target: v_cellar_bronze_cleaned
    sql: |
      SELECT
        xxhash64(*) as cellar_key,
        *,
        current_timestamp() as _etl_timestamp
      FROM v_cellar_raw
      WHERE 1=1

  - name: cellar_bronze_dqe
    type: transform
    transform_type: data_quality
    source: v_cellar_bronze_cleaned
    target: v_cellar_bronze_dqe
    readMode: stream
    expectations_file: "expectations/generic_quality.json"
    description: "Apply data quality checks to cellar"

  - name: write_cellar_bronze
    type: write
    source: v_cellar_bronze_dqe
    write_target:
      create_table: true
      type: streaming_table
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: "cellar"
