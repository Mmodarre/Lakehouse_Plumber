pipeline: perf_bronze
flowgroup: aging_bronze
presets:
  - default_delta_properties
actions:
  - name: aging_raw_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: stream
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{raw_schema}"
      table: aging_raw
    target: v_aging_raw
    description: "Load aging from raw schema"

  - name: aging_bronze_cleanse
    type: transform
    transform_type: sql
    source: v_aging_raw
    target: v_aging_bronze_cleaned
    sql: |
      SELECT
        xxhash64(*) as aging_key,
        *,
        current_timestamp() as _etl_timestamp
      FROM v_aging_raw

  - name: aging_bronze_dqe
    type: transform
    transform_type: data_quality
    source: v_aging_bronze_cleaned
    target: v_aging_bronze_dqe
    readMode: stream
    expectations_file: "expectations/generic_quality.json"
    description: "Data quality for aging bronze"

  - name: write_aging_bronze
    type: write
    source: v_aging_bronze_dqe
    write_target:
      create_table: true
      type: streaming_table
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: "aging"

  - name: aging_migration_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: batch
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{raw_schema}"
      table: aging_migration
    target: v_aging_migration
    description: "Load aging migration data"

  - name: aging_migration_cleanse
    type: transform
    transform_type: sql
    readMode: batch
    source: v_aging_migration
    target: v_aging_migration_cleaned
    sql: |
      SELECT
        xxhash64(*) as aging_key,
        *,
        'MIGRATION' as _source_file_path,
        current_timestamp() as _etl_timestamp
      FROM v_aging_migration

  - name: write_aging_migration
    type: write
    source: v_aging_migration_cleaned
    readMode: batch
    once: true
    write_target:
      create_table: false
      type: streaming_table
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: "aging"
