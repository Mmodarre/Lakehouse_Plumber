pipeline: perf_bronze
flowgroup: terroir_bronze
presets:
  - default_delta_properties
actions:
  - name: terroir_raw_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: stream
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{raw_schema}"
      table: terroir_raw
    target: v_terroir_raw
    description: "Load terroir from raw schema"

  - name: terroir_bronze_cleanse
    type: transform
    transform_type: sql
    source: v_terroir_raw
    target: v_terroir_bronze_cleaned
    sql: |
      SELECT
        xxhash64(*) as terroir_key,
        *,
        current_timestamp() as _etl_timestamp
      FROM v_terroir_raw
      WHERE 1=1

  - name: terroir_bronze_dqe
    type: transform
    transform_type: data_quality
    source: v_terroir_bronze_cleaned
    target: v_terroir_bronze_dqe
    readMode: stream
    expectations_file: "expectations/generic_quality.json"
    description: "Apply data quality checks to terroir"

  - name: write_terroir_bronze
    type: write
    source: v_terroir_bronze_dqe
    write_target:
      create_table: true
      type: streaming_table
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: "terroir"
