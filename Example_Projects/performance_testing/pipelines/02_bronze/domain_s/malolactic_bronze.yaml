pipeline: domain_s_bronze
flowgroup: malolactic_bronze
presets:
  - default_delta_properties
actions:
  - name: malolactic_raw_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: stream
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{raw_schema}"
      table: malolactic_raw
    target: v_malolactic_raw
    description: "Load malolactic from raw schema"

  - name: malolactic_bronze_cleanse
    type: transform
    transform_type: sql
    source: v_malolactic_raw
    target: v_malolactic_bronze_cleaned
    sql: |
      SELECT
        xxhash64(*) as malolactic_key,
        *,
        current_timestamp() as _etl_timestamp
      FROM v_malolactic_raw
      WHERE 1=1

  - name: malolactic_bronze_dqe
    type: transform
    transform_type: data_quality
    source: v_malolactic_bronze_cleaned
    target: v_malolactic_bronze_dqe
    readMode: stream
    expectations_file: "expectations/generic_quality.json"
    description: "Apply data quality checks to malolactic"

  - name: write_malolactic_bronze
    type: write
    source: v_malolactic_bronze_dqe
    write_target:
      create_table: true
      type: streaming_table
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: "malolactic"
