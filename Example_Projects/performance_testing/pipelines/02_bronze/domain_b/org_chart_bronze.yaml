pipeline: perf_bronze
flowgroup: org_chart_bronze
presets:
  - default_delta_properties
actions:
  - name: org_chart_raw_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: stream
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{raw_schema}"
      table: org_chart_raw
    target: v_org_chart_raw
    description: "Load org_chart from raw schema"

  - name: org_chart_bronze_cleanse
    type: transform
    transform_type: sql
    source: v_org_chart_raw
    target: v_org_chart_bronze_cleaned
    sql: |
      SELECT
        xxhash64(*) as org_chart_key,
        *,
        current_timestamp() as _etl_timestamp
      FROM v_org_chart_raw
      WHERE 1=1

  - name: org_chart_bronze_dqe
    type: transform
    transform_type: data_quality
    source: v_org_chart_bronze_cleaned
    target: v_org_chart_bronze_dqe
    readMode: stream
    expectations_file: "expectations/generic_quality.json"
    description: "Apply data quality checks to org_chart"

  - name: write_org_chart_bronze
    type: write
    source: v_org_chart_bronze_dqe
    write_target:
      create_table: true
      type: streaming_table
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: "org_chart"
