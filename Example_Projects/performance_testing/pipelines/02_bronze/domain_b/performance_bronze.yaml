pipeline: perf_bronze
flowgroup: performance_bronze
presets:
  - default_delta_properties
actions:
  - name: performance_raw_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: stream
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{raw_schema}"
      table: performance_raw
    target: v_performance_raw
    description: "Load performance from raw schema"

  - name: performance_bronze_cleanse
    type: transform
    transform_type: sql
    source: v_performance_raw
    target: v_performance_bronze_cleaned
    sql: |
      SELECT
        xxhash64(*) as performance_key,
        *,
        current_timestamp() as _etl_timestamp
      FROM v_performance_raw
      WHERE 1=1

  - name: performance_bronze_dqe
    type: transform
    transform_type: data_quality
    source: v_performance_bronze_cleaned
    target: v_performance_bronze_dqe
    readMode: stream
    expectations_file: "expectations/generic_quality.json"
    description: "Apply data quality checks to performance"

  - name: write_performance_bronze
    type: write
    source: v_performance_bronze_dqe
    write_target:
      create_table: true
      type: streaming_table
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: "performance"
