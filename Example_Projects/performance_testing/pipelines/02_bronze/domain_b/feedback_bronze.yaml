pipeline: perf_bronze
flowgroup: feedback_bronze
presets:
  - default_delta_properties
actions:
  - name: feedback_raw_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: stream
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{raw_schema}"
      table: feedback_raw
    target: v_feedback_raw
    description: "Load feedback from raw schema"

  - name: feedback_bronze_cleanse
    type: transform
    transform_type: sql
    source: v_feedback_raw
    target: v_feedback_bronze_cleaned
    sql: |
      SELECT
        xxhash64(*) as feedback_key,
        *,
        current_timestamp() as _etl_timestamp
      FROM v_feedback_raw
      WHERE 1=1

  - name: feedback_bronze_dqe
    type: transform
    transform_type: data_quality
    source: v_feedback_bronze_cleaned
    target: v_feedback_bronze_dqe
    readMode: stream
    expectations_file: "expectations/generic_quality.json"
    description: "Apply data quality checks to feedback"

  - name: write_feedback_bronze
    type: write
    source: v_feedback_bronze_dqe
    write_target:
      create_table: true
      type: streaming_table
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: "feedback"
