pipeline: domain_b_bronze
flowgroup: background_check_bronze
presets:
  - default_delta_properties
actions:
  - name: background_check_raw_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: stream
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{raw_schema}"
      table: background_check_raw
    target: v_background_check_raw
    description: "Load background_check from raw schema"

  - name: background_check_bronze_cleanse
    type: transform
    transform_type: sql
    source: v_background_check_raw
    target: v_background_check_bronze_cleaned
    sql: |
      SELECT
        xxhash64(*) as background_check_key,
        *,
        current_timestamp() as _etl_timestamp
      FROM v_background_check_raw
      WHERE 1=1

  - name: background_check_bronze_dqe
    type: transform
    transform_type: data_quality
    source: v_background_check_bronze_cleaned
    target: v_background_check_bronze_dqe
    readMode: stream
    expectations_file: "expectations/generic_quality.json"
    description: "Apply data quality checks to background_check"

  - name: write_background_check_bronze
    type: write
    source: v_background_check_bronze_dqe
    write_target:
      create_table: true
      type: streaming_table
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: "background_check"
