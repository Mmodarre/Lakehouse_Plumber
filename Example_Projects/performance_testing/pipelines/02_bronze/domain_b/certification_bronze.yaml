pipeline: perf_bronze
flowgroup: certification_bronze
presets:
  - default_delta_properties
actions:
  - name: certification_raw_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: stream
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{raw_schema}"
      table: certification_raw
    target: v_certification_raw
    description: "Load certification from raw schema"

  - name: certification_bronze_cleanse
    type: transform
    transform_type: sql
    source: v_certification_raw
    target: v_certification_bronze_cleaned
    sql: |
      SELECT
        xxhash64(*) as certification_key,
        *,
        current_timestamp() as _etl_timestamp
      FROM v_certification_raw

  - name: certification_bronze_dqe
    type: transform
    transform_type: data_quality
    source: v_certification_bronze_cleaned
    target: v_certification_bronze_dqe
    readMode: stream
    expectations_file: "expectations/generic_quality.json"
    description: "Data quality for certification bronze"

  - name: write_certification_bronze
    type: write
    source: v_certification_bronze_dqe
    write_target:
      create_table: true
      type: streaming_table
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: "certification"

  - name: certification_migration_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: batch
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{raw_schema}"
      table: certification_migration
    target: v_certification_migration
    description: "Load certification migration data"

  - name: certification_migration_cleanse
    type: transform
    transform_type: sql
    readMode: batch
    source: v_certification_migration
    target: v_certification_migration_cleaned
    sql: |
      SELECT
        xxhash64(*) as certification_key,
        *,
        'MIGRATION' as _source_file_path,
        current_timestamp() as _etl_timestamp
      FROM v_certification_migration

  - name: write_certification_migration
    type: write
    source: v_certification_migration_cleaned
    readMode: batch
    once: true
    write_target:
      create_table: false
      type: streaming_table
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: "certification"
