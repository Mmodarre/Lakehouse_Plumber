pipeline: perf_bronze
flowgroup: goal_bronze
presets:
  - default_delta_properties
actions:
  - name: goal_raw_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: stream
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{raw_schema}"
      table: goal_raw
    target: v_goal_raw
    description: "Load goal from raw schema"

  - name: goal_bronze_cleanse
    type: transform
    transform_type: sql
    source: v_goal_raw
    target: v_goal_bronze_cleaned
    sql: |
      SELECT
        xxhash64(*) as goal_key,
        *,
        current_timestamp() as _etl_timestamp
      FROM v_goal_raw
      WHERE 1=1

  - name: goal_bronze_dqe
    type: transform
    transform_type: data_quality
    source: v_goal_bronze_cleaned
    target: v_goal_bronze_dqe
    readMode: stream
    expectations_file: "expectations/generic_quality.json"
    description: "Apply data quality checks to goal"

  - name: write_goal_bronze
    type: write
    source: v_goal_bronze_dqe
    write_target:
      create_table: true
      type: streaming_table
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: "goal"
