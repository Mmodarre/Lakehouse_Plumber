pipeline: perf_bronze
flowgroup: team_lead_bronze
presets:
  - default_delta_properties
actions:
  - name: team_lead_raw_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: stream
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{raw_schema}"
      table: team_lead_raw
    target: v_team_lead_raw
    description: "Load team_lead from raw schema"

  - name: team_lead_bronze_cleanse
    type: transform
    transform_type: sql
    source: v_team_lead_raw
    target: v_team_lead_bronze_cleaned
    sql: |
      SELECT
        xxhash64(*) as team_lead_key,
        *,
        current_timestamp() as _etl_timestamp
      FROM v_team_lead_raw
      WHERE 1=1

  - name: team_lead_bronze_dqe
    type: transform
    transform_type: data_quality
    source: v_team_lead_bronze_cleaned
    target: v_team_lead_bronze_dqe
    readMode: stream
    expectations_file: "expectations/generic_quality.json"
    description: "Apply data quality checks to team_lead"

  - name: write_team_lead_bronze
    type: write
    source: v_team_lead_bronze_dqe
    write_target:
      create_table: true
      type: streaming_table
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: "team_lead"
