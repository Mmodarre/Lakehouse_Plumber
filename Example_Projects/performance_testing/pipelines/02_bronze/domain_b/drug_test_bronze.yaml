pipeline: perf_bronze
flowgroup: drug_test_bronze
presets:
  - default_delta_properties
actions:
  - name: drug_test_raw_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: stream
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{raw_schema}"
      table: drug_test_raw
    target: v_drug_test_raw
    description: "Load drug_test from raw schema"

  - name: drug_test_bronze_cleanse
    type: transform
    transform_type: sql
    source: v_drug_test_raw
    target: v_drug_test_bronze_cleaned
    sql: |
      SELECT
        xxhash64(*) as drug_test_key,
        *,
        current_timestamp() as _etl_timestamp
      FROM v_drug_test_raw
      WHERE 1=1

  - name: drug_test_bronze_dqe
    type: transform
    transform_type: data_quality
    source: v_drug_test_bronze_cleaned
    target: v_drug_test_bronze_dqe
    readMode: stream
    expectations_file: "expectations/generic_quality.json"
    description: "Apply data quality checks to drug_test"

  - name: write_drug_test_bronze
    type: write
    source: v_drug_test_bronze_dqe
    write_target:
      create_table: true
      type: streaming_table
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: "drug_test"
