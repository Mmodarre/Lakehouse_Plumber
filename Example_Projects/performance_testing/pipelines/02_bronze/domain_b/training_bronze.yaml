pipeline: perf_bronze
flowgroup: training_bronze
presets:
  - default_delta_properties
actions:
  - name: training_raw_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: stream
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{raw_schema}"
      table: training_raw
    target: v_training_raw
    description: "Load training from raw schema"

  - name: training_bronze_cleanse
    type: transform
    transform_type: sql
    source: v_training_raw
    target: v_training_bronze_cleaned
    sql: |
      SELECT
        xxhash64(*) as training_key,
        *,
        current_timestamp() as _etl_timestamp
      FROM v_training_raw
      WHERE 1=1

  - name: training_bronze_dqe
    type: transform
    transform_type: data_quality
    source: v_training_bronze_cleaned
    target: v_training_bronze_dqe
    readMode: stream
    expectations_file: "expectations/generic_quality.json"
    description: "Apply data quality checks to training"

  - name: write_training_bronze
    type: write
    source: v_training_bronze_dqe
    write_target:
      create_table: true
      type: streaming_table
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: "training"
