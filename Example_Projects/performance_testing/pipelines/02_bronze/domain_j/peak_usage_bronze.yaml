pipeline: perf_bronze
flowgroup: peak_usage_bronze
presets:
  - default_delta_properties
actions:
  - name: peak_usage_raw_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: stream
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{raw_schema}"
      table: peak_usage_raw
    target: v_peak_usage_raw
    description: "Load peak_usage from raw schema"

  - name: peak_usage_bronze_cleanse
    type: transform
    transform_type: sql
    source: v_peak_usage_raw
    target: v_peak_usage_bronze_cleaned
    sql: |
      SELECT
        xxhash64(*) as peak_usage_key,
        *,
        current_timestamp() as _etl_timestamp
      FROM v_peak_usage_raw
      WHERE 1=1

  - name: peak_usage_bronze_dqe
    type: transform
    transform_type: data_quality
    source: v_peak_usage_bronze_cleaned
    target: v_peak_usage_bronze_dqe
    readMode: stream
    expectations_file: "expectations/generic_quality.json"
    description: "Apply data quality checks to peak_usage"

  - name: write_peak_usage_bronze
    type: write
    source: v_peak_usage_bronze_dqe
    write_target:
      create_table: true
      type: streaming_table
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: "peak_usage"
