pipeline: perf_bronze
flowgroup: generation_bronze
presets:
  - default_delta_properties
actions:
  - name: generation_raw_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: stream
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{raw_schema}"
      table: generation_raw
    target: v_generation_raw
    description: "Load generation from raw schema"

  - name: generation_bronze_cleanse
    type: transform
    transform_type: sql
    source: v_generation_raw
    target: v_generation_bronze_cleaned
    sql: |
      SELECT
        xxhash64(*) as generation_key,
        *,
        current_timestamp() as _etl_timestamp
      FROM v_generation_raw
      WHERE 1=1

  - name: generation_bronze_dqe
    type: transform
    transform_type: data_quality
    source: v_generation_bronze_cleaned
    target: v_generation_bronze_dqe
    readMode: stream
    expectations_file: "expectations/generic_quality.json"
    description: "Apply data quality checks to generation"

  - name: write_generation_bronze
    type: write
    source: v_generation_bronze_dqe
    write_target:
      create_table: true
      type: streaming_table
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: "generation"
