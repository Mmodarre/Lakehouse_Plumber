pipeline: domain_j_bronze
flowgroup: frequency_bronze
presets:
  - default_delta_properties
actions:
  - name: frequency_raw_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: stream
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{raw_schema}"
      table: frequency_raw
    target: v_frequency_raw
    description: "Load frequency from raw schema"

  - name: frequency_bronze_cleanse
    type: transform
    transform_type: sql
    source: v_frequency_raw
    target: v_frequency_bronze_cleaned
    sql: |
      SELECT
        xxhash64(*) as frequency_key,
        *,
        current_timestamp() as _etl_timestamp
      FROM v_frequency_raw
      WHERE 1=1

  - name: frequency_bronze_dqe
    type: transform
    transform_type: data_quality
    source: v_frequency_bronze_cleaned
    target: v_frequency_bronze_dqe
    readMode: stream
    expectations_file: "expectations/generic_quality.json"
    description: "Apply data quality checks to frequency"

  - name: write_frequency_bronze
    type: write
    source: v_frequency_bronze_dqe
    write_target:
      create_table: true
      type: streaming_table
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: "frequency"
