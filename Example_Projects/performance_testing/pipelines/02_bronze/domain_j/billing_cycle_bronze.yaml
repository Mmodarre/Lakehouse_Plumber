pipeline: perf_bronze
flowgroup: billing_cycle_bronze
presets:
  - default_delta_properties
actions:
  - name: billing_cycle_raw_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: stream
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{raw_schema}"
      table: billing_cycle_raw
    target: v_billing_cycle_raw
    description: "Load billing_cycle from raw schema"

  - name: billing_cycle_bronze_cleanse
    type: transform
    transform_type: sql
    source: v_billing_cycle_raw
    target: v_billing_cycle_bronze_cleaned
    sql: |
      SELECT
        xxhash64(*) as billing_cycle_key,
        *,
        current_timestamp() as _etl_timestamp
      FROM v_billing_cycle_raw

  - name: billing_cycle_bronze_dqe
    type: transform
    transform_type: data_quality
    source: v_billing_cycle_bronze_cleaned
    target: v_billing_cycle_bronze_dqe
    readMode: stream
    expectations_file: "expectations/generic_quality.json"
    description: "Data quality for billing_cycle bronze"

  - name: write_billing_cycle_bronze
    type: write
    source: v_billing_cycle_bronze_dqe
    write_target:
      create_table: true
      type: streaming_table
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: "billing_cycle"

  - name: billing_cycle_migration_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: batch
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{raw_schema}"
      table: billing_cycle_migration
    target: v_billing_cycle_migration
    description: "Load billing_cycle migration data"

  - name: billing_cycle_migration_cleanse
    type: transform
    transform_type: sql
    readMode: batch
    source: v_billing_cycle_migration
    target: v_billing_cycle_migration_cleaned
    sql: |
      SELECT
        xxhash64(*) as billing_cycle_key,
        *,
        'MIGRATION' as _source_file_path,
        current_timestamp() as _etl_timestamp
      FROM v_billing_cycle_migration

  - name: write_billing_cycle_migration
    type: write
    source: v_billing_cycle_migration_cleaned
    readMode: batch
    once: true
    write_target:
      create_table: false
      type: streaming_table
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: "billing_cycle"
