pipeline: perf_bronze
flowgroup: inverter_bronze
presets:
  - default_delta_properties
actions:
  - name: inverter_raw_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: stream
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{raw_schema}"
      table: inverter_raw
    target: v_inverter_raw
    description: "Load inverter from raw schema"

  - name: inverter_bronze_cleanse
    type: transform
    transform_type: sql
    source: v_inverter_raw
    target: v_inverter_bronze_cleaned
    sql: |
      SELECT
        xxhash64(*) as inverter_key,
        *,
        current_timestamp() as _etl_timestamp
      FROM v_inverter_raw
      WHERE 1=1

  - name: inverter_bronze_dqe
    type: transform
    transform_type: data_quality
    source: v_inverter_bronze_cleaned
    target: v_inverter_bronze_dqe
    readMode: stream
    expectations_file: "expectations/generic_quality.json"
    description: "Apply data quality checks to inverter"

  - name: write_inverter_bronze
    type: write
    source: v_inverter_bronze_dqe
    write_target:
      create_table: true
      type: streaming_table
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: "inverter"
