pipeline: perf_bronze
flowgroup: wind_turbine_bronze
presets:
  - default_delta_properties
actions:
  - name: wind_turbine_raw_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: stream
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{raw_schema}"
      table: wind_turbine_raw
    target: v_wind_turbine_raw
    description: "Load wind_turbine from raw schema"

  - name: wind_turbine_bronze_cleanse
    type: transform
    transform_type: sql
    source: v_wind_turbine_raw
    target: v_wind_turbine_bronze_cleaned
    sql: |
      SELECT
        xxhash64(*) as wind_turbine_key,
        *,
        current_timestamp() as _etl_timestamp
      FROM v_wind_turbine_raw
      WHERE 1=1

  - name: wind_turbine_bronze_dqe
    type: transform
    transform_type: data_quality
    source: v_wind_turbine_bronze_cleaned
    target: v_wind_turbine_bronze_dqe
    readMode: stream
    expectations_file: "expectations/generic_quality.json"
    description: "Apply data quality checks to wind_turbine"

  - name: write_wind_turbine_bronze
    type: write
    source: v_wind_turbine_bronze_dqe
    write_target:
      create_table: true
      type: streaming_table
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: "wind_turbine"
