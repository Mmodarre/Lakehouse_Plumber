pipeline: domain_j_bronze
flowgroup: off_peak_bronze
presets:
  - default_delta_properties
actions:
  - name: off_peak_raw_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: stream
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{raw_schema}"
      table: off_peak_raw
    target: v_off_peak_raw
    description: "Load off_peak from raw schema"

  - name: off_peak_bronze_cleanse
    type: transform
    transform_type: sql
    source: v_off_peak_raw
    target: v_off_peak_bronze_cleaned
    sql: |
      SELECT
        xxhash64(*) as off_peak_key,
        *,
        current_timestamp() as _etl_timestamp
      FROM v_off_peak_raw
      WHERE 1=1

  - name: off_peak_bronze_dqe
    type: transform
    transform_type: data_quality
    source: v_off_peak_bronze_cleaned
    target: v_off_peak_bronze_dqe
    readMode: stream
    expectations_file: "expectations/generic_quality.json"
    description: "Apply data quality checks to off_peak"

  - name: write_off_peak_bronze
    type: write
    source: v_off_peak_bronze_dqe
    write_target:
      create_table: true
      type: streaming_table
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: "off_peak"
