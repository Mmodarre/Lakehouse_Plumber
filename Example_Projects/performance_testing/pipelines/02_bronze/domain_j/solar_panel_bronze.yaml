pipeline: perf_bronze
flowgroup: solar_panel_bronze
presets:
  - default_delta_properties
actions:
  - name: solar_panel_raw_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: stream
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{raw_schema}"
      table: solar_panel_raw
    target: v_solar_panel_raw
    description: "Load solar_panel from raw schema"

  - name: solar_panel_bronze_cleanse
    type: transform
    transform_type: sql
    source: v_solar_panel_raw
    target: v_solar_panel_bronze_cleaned
    sql: |
      SELECT
        xxhash64(*) as solar_panel_key,
        *,
        current_timestamp() as _etl_timestamp
      FROM v_solar_panel_raw

  - name: solar_panel_bronze_dqe
    type: transform
    transform_type: data_quality
    source: v_solar_panel_bronze_cleaned
    target: v_solar_panel_bronze_dqe
    readMode: stream
    expectations_file: "expectations/generic_quality.json"
    description: "Data quality for solar_panel bronze"

  - name: write_solar_panel_bronze
    type: write
    source: v_solar_panel_bronze_dqe
    write_target:
      create_table: true
      type: streaming_table
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: "solar_panel"

  - name: solar_panel_migration_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: batch
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{raw_schema}"
      table: solar_panel_migration
    target: v_solar_panel_migration
    description: "Load solar_panel migration data"

  - name: solar_panel_migration_cleanse
    type: transform
    transform_type: sql
    readMode: batch
    source: v_solar_panel_migration
    target: v_solar_panel_migration_cleaned
    sql: |
      SELECT
        xxhash64(*) as solar_panel_key,
        *,
        'MIGRATION' as _source_file_path,
        current_timestamp() as _etl_timestamp
      FROM v_solar_panel_migration

  - name: write_solar_panel_migration
    type: write
    source: v_solar_panel_migration_cleaned
    readMode: batch
    once: true
    write_target:
      create_table: false
      type: streaming_table
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: "solar_panel"
