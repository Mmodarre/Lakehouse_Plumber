pipeline: domain_q_silver
flowgroup: yellow_card_silver_dim
presets:
  - default_delta_properties
actions:
  - name: yellow_card_silver_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: stream
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: yellow_card
    target: v_yellow_card_bronze
    description: "Load yellow_card from bronze for silver layer"

  - name: write_yellow_card_silver
    type: write
    source: v_yellow_card_bronze
    write_target:
      type: streaming_table
      catalog: "{catalog}"
      schema: "{silver_schema}"
      table: "yellow_card_dim"
      mode: "cdc"
      cdc_config:
        keys: ["yellow_card_key"]
        sequence_by: "_etl_timestamp"
        scd_type: 2
        ignore_null_updates: true
        track_history_except_column_list: ["_source_file_path", "_processing_timestamp", "_etl_timestamp"]
