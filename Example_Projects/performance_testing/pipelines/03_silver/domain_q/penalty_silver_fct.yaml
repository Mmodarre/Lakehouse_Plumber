pipeline: domain_q_silver
flowgroup: penalty_silver_fct
presets:
  - default_delta_properties
actions:
  - name: penalty_silver_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: stream
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: penalty
    target: v_penalty_bronze
    description: "Load penalty from bronze for silver layer"

  - name: write_penalty_silver
    type: write
    source: v_penalty_bronze
    write_target:
      type: streaming_table
      catalog: "{catalog}"
      schema: "{silver_schema}"
      table: "penalty_fct"
      mode: "cdc"
      cdc_config:
        keys: ["penalty_key"]
        sequence_by: "_etl_timestamp"
        scd_type: 2
        ignore_null_updates: true
        track_history_except_column_list: ["_source_file_path", "_processing_timestamp", "_etl_timestamp"]
