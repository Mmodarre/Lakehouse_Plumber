pipeline: domain_q_silver
flowgroup: sponsor_silver_dim
presets:
  - default_delta_properties
actions:
  - name: sponsor_silver_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: stream
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: sponsor
    target: v_sponsor_bronze
    description: "Load sponsor from bronze for silver layer"

  - name: write_sponsor_silver
    type: write
    source: v_sponsor_bronze
    write_target:
      type: streaming_table
      catalog: "{catalog}"
      schema: "{silver_schema}"
      table: "sponsor_dim"
      mode: "cdc"
      cdc_config:
        keys: ["sponsor_key"]
        sequence_by: "_etl_timestamp"
        scd_type: 2
        ignore_null_updates: true
        track_history_except_column_list: ["_source_file_path", "_processing_timestamp", "_etl_timestamp"]
