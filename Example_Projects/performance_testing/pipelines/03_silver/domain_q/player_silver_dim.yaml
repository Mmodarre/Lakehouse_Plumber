pipeline: domain_q_silver
flowgroup: player_silver_dim
presets:
  - default_delta_properties
actions:
  - name: player_silver_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: stream
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: player
    target: v_player_bronze
    description: "Load player from bronze for silver layer"

  - name: write_player_silver
    type: write
    source: v_player_bronze
    write_target:
      type: streaming_table
      catalog: "{catalog}"
      schema: "{silver_schema}"
      table: "player_dim"
      mode: "cdc"
      cdc_config:
        keys: ["player_key"]
        sequence_by: "_etl_timestamp"
        scd_type: 2
        ignore_null_updates: true
        track_history_except_column_list: ["_source_file_path", "_processing_timestamp", "_etl_timestamp"]
