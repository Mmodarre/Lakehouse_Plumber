pipeline: domain_q_silver
flowgroup: league_silver_dim
presets:
  - default_delta_properties
actions:
  - name: league_silver_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: stream
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: league
    target: v_league_bronze
    description: "Load league from bronze for silver layer"

  - name: write_league_silver
    type: write
    source: v_league_bronze
    write_target:
      type: streaming_table
      catalog: "{catalog}"
      schema: "{silver_schema}"
      table: "league_dim"
      mode: "cdc"
      cdc_config:
        keys: ["league_key"]
        sequence_by: "_etl_timestamp"
        scd_type: 2
        ignore_null_updates: true
        track_history_except_column_list: ["_source_file_path", "_processing_timestamp", "_etl_timestamp"]
