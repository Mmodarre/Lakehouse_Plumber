pipeline: domain_e_silver
flowgroup: trailer_silver_dim
presets:
  - default_delta_properties
actions:
  - name: trailer_silver_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: stream
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: trailer
    target: v_trailer_bronze
    description: "Load trailer from bronze for silver layer"

  - name: write_trailer_silver
    type: write
    source: v_trailer_bronze
    write_target:
      type: streaming_table
      catalog: "{catalog}"
      schema: "{silver_schema}"
      table: "trailer_dim"
      mode: "cdc"
      cdc_config:
        keys: ["trailer_key"]
        sequence_by: "_etl_timestamp"
        scd_type: 2
        ignore_null_updates: true
        track_history_except_column_list: ["_source_file_path", "_processing_timestamp", "_etl_timestamp"]
---
