pipeline: perf_silver
flowgroup: carrier_silver_dim
presets:
  - default_delta_properties
actions:
  - name: carrier_silver_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: stream
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: carrier
    target: v_carrier_bronze
    description: "Load carrier from bronze for silver layer"

  - name: write_carrier_silver
    type: write
    source: v_carrier_bronze
    write_target:
      type: streaming_table
      catalog: "{catalog}"
      schema: "{silver_schema}"
      table: "carrier_dim"
      mode: "cdc"
      cdc_config:
        keys: ["carrier_key"]
        sequence_by: "_etl_timestamp"
        scd_type: 2
        ignore_null_updates: true
        track_history_except_column_list: ["_source_file_path", "_processing_timestamp", "_etl_timestamp"]
