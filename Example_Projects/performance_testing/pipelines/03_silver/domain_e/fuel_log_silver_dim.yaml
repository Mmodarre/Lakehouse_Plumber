pipeline: perf_silver
flowgroup: fuel_log_silver_dim
presets:
  - default_delta_properties
actions:
  - name: fuel_log_silver_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: stream
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: fuel_log
    target: v_fuel_log_bronze
    description: "Load fuel_log from bronze for silver layer"

  - name: write_fuel_log_silver
    type: write
    source: v_fuel_log_bronze
    write_target:
      type: streaming_table
      catalog: "{catalog}"
      schema: "{silver_schema}"
      table: "fuel_log_dim"
      mode: "cdc"
      cdc_config:
        keys: ["fuel_log_key"]
        sequence_by: "_etl_timestamp"
        scd_type: 2
        ignore_null_updates: true
        track_history_except_column_list: ["_source_file_path", "_processing_timestamp", "_etl_timestamp"]
