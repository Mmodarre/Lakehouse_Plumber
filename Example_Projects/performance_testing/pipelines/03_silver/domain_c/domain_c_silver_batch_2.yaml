pipeline: perf_silver
flowgroup: invoice_line_silver_dim
presets:
  - default_delta_properties
actions:
  - name: invoice_line_silver_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: stream
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: invoice_line
    target: v_invoice_line_bronze
    description: "Load invoice_line from bronze for silver layer"

  - name: write_invoice_line_silver
    type: write
    source: v_invoice_line_bronze
    write_target:
      type: streaming_table
      catalog: "{catalog}"
      schema: "{silver_schema}"
      table: "invoice_line_dim"
      mode: "cdc"
      cdc_config:
        keys: ["invoice_line_key"]
        sequence_by: "_etl_timestamp"
        scd_type: 2
        ignore_null_updates: true
        track_history_except_column_list: ["_source_file_path", "_processing_timestamp", "_etl_timestamp"]
---
