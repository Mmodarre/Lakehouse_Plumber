pipeline: perf_silver
flowgroup: currency_silver_fct
presets:
  - default_delta_properties
actions:
  - name: currency_silver_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: stream
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: currency
    target: v_currency_bronze
    description: "Load currency from bronze for silver layer"

  - name: write_currency_silver
    type: write
    source: v_currency_bronze
    write_target:
      type: streaming_table
      catalog: "{catalog}"
      schema: "{silver_schema}"
      table: "currency_fct"
      mode: "cdc"
      cdc_config:
        keys: ["currency_key"]
        sequence_by: "_etl_timestamp"
        scd_type: 2
        ignore_null_updates: true
        track_history_except_column_list: ["_source_file_path", "_processing_timestamp", "_etl_timestamp"]
