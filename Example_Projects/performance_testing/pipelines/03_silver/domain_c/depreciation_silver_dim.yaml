pipeline: perf_silver
flowgroup: depreciation_silver_dim
presets:
  - default_delta_properties
actions:
  - name: depreciation_silver_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: stream
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: depreciation
    target: v_depreciation_bronze
    description: "Load depreciation from bronze for silver layer"

  - name: write_depreciation_silver
    type: write
    source: v_depreciation_bronze
    write_target:
      type: streaming_table
      catalog: "{catalog}"
      schema: "{silver_schema}"
      table: "depreciation_dim"
      mode: "cdc"
      cdc_config:
        keys: ["depreciation_key"]
        sequence_by: "_etl_timestamp"
        scd_type: 2
        ignore_null_updates: true
        track_history_except_column_list: ["_source_file_path", "_processing_timestamp", "_etl_timestamp"]
