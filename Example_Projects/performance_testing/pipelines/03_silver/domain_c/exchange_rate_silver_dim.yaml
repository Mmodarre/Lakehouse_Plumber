pipeline: perf_silver
flowgroup: exchange_rate_silver_dim
presets:
  - default_delta_properties
actions:
  - name: exchange_rate_silver_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: stream
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: exchange_rate
    target: v_exchange_rate_bronze
    description: "Load exchange_rate from bronze for silver layer"

  - name: write_exchange_rate_silver
    type: write
    source: v_exchange_rate_bronze
    write_target:
      type: streaming_table
      catalog: "{catalog}"
      schema: "{silver_schema}"
      table: "exchange_rate_dim"
      mode: "cdc"
      cdc_config:
        keys: ["exchange_rate_key"]
        sequence_by: "_etl_timestamp"
        scd_type: 2
        ignore_null_updates: true
        track_history_except_column_list: ["_source_file_path", "_processing_timestamp", "_etl_timestamp"]
