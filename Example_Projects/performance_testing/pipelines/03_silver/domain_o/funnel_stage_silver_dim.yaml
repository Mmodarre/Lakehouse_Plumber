pipeline: perf_silver
flowgroup: funnel_stage_silver_dim
presets:
  - default_delta_properties
actions:
  - name: funnel_stage_silver_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: stream
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: funnel_stage
    target: v_funnel_stage_bronze
    description: "Load funnel_stage from bronze for silver layer"

  - name: write_funnel_stage_silver
    type: write
    source: v_funnel_stage_bronze
    write_target:
      type: streaming_table
      catalog: "{catalog}"
      schema: "{silver_schema}"
      table: "funnel_stage_dim"
      mode: "cdc"
      cdc_config:
        keys: ["funnel_stage_key"]
        sequence_by: "_etl_timestamp"
        scd_type: 2
        ignore_null_updates: true
        track_history_except_column_list: ["_source_file_path", "_processing_timestamp", "_etl_timestamp"]
