pipeline: domain_o_silver
flowgroup: click_through_silver_dim
presets:
  - default_delta_properties
actions:
  - name: click_through_silver_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: stream
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: click_through
    target: v_click_through_bronze
    description: "Load click_through from bronze for silver layer"

  - name: write_click_through_silver
    type: write
    source: v_click_through_bronze
    write_target:
      type: streaming_table
      catalog: "{catalog}"
      schema: "{silver_schema}"
      table: "click_through_dim"
      mode: "cdc"
      cdc_config:
        keys: ["click_through_key"]
        sequence_by: "_etl_timestamp"
        scd_type: 2
        ignore_null_updates: true
        track_history_except_column_list: ["_source_file_path", "_processing_timestamp", "_etl_timestamp"]
