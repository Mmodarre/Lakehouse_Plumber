pipeline: domain_o_silver
flowgroup: influencer_silver_dim
presets:
  - default_delta_properties
actions:
  - name: influencer_silver_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: stream
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: influencer
    target: v_influencer_bronze
    description: "Load influencer from bronze for silver layer"

  - name: write_influencer_silver
    type: write
    source: v_influencer_bronze
    write_target:
      type: streaming_table
      catalog: "{catalog}"
      schema: "{silver_schema}"
      table: "influencer_dim"
      mode: "cdc"
      cdc_config:
        keys: ["influencer_key"]
        sequence_by: "_etl_timestamp"
        scd_type: 2
        ignore_null_updates: true
        track_history_except_column_list: ["_source_file_path", "_processing_timestamp", "_etl_timestamp"]
