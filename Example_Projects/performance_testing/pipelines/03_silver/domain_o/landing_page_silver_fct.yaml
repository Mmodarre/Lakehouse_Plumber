pipeline: perf_silver
flowgroup: landing_page_silver_fct
presets:
  - default_delta_properties
actions:
  - name: landing_page_silver_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: stream
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: landing_page
    target: v_landing_page_bronze
    description: "Load landing_page from bronze for silver layer"

  - name: write_landing_page_silver
    type: write
    source: v_landing_page_bronze
    write_target:
      type: streaming_table
      catalog: "{catalog}"
      schema: "{silver_schema}"
      table: "landing_page_fct"
      mode: "cdc"
      cdc_config:
        keys: ["landing_page_key"]
        sequence_by: "_etl_timestamp"
        scd_type: 2
        ignore_null_updates: true
        track_history_except_column_list: ["_source_file_path", "_processing_timestamp", "_etl_timestamp"]
