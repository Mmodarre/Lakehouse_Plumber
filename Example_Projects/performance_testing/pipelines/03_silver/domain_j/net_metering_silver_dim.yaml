pipeline: perf_silver
flowgroup: net_metering_silver_dim
presets:
  - default_delta_properties
actions:
  - name: net_metering_silver_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: stream
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: net_metering
    target: v_net_metering_bronze
    description: "Load net_metering from bronze for silver layer"

  - name: write_net_metering_silver
    type: write
    source: v_net_metering_bronze
    write_target:
      type: streaming_table
      catalog: "{catalog}"
      schema: "{silver_schema}"
      table: "net_metering_dim"
      mode: "cdc"
      cdc_config:
        keys: ["net_metering_key"]
        sequence_by: "_etl_timestamp"
        scd_type: 2
        ignore_null_updates: true
        track_history_except_column_list: ["_source_file_path", "_processing_timestamp", "_etl_timestamp"]
