pipeline: perf_silver
flowgroup: billing_cycle_silver_dim
presets:
  - default_delta_properties
actions:
  - name: billing_cycle_silver_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: stream
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: billing_cycle
    target: v_billing_cycle_bronze
    description: "Load billing_cycle from bronze for silver layer"

  - name: write_billing_cycle_silver
    type: write
    source: v_billing_cycle_bronze
    write_target:
      type: streaming_table
      catalog: "{catalog}"
      schema: "{silver_schema}"
      table: "billing_cycle_dim"
      mode: "cdc"
      cdc_config:
        keys: ["billing_cycle_key"]
        sequence_by: "_etl_timestamp"
        scd_type: 2
        ignore_null_updates: true
        track_history_except_column_list: ["_source_file_path", "_processing_timestamp", "_etl_timestamp"]
