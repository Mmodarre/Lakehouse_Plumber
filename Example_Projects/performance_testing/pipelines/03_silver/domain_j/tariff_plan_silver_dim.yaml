pipeline: perf_silver
flowgroup: tariff_plan_silver_dim
presets:
  - default_delta_properties
actions:
  - name: tariff_plan_silver_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: stream
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: tariff_plan
    target: v_tariff_plan_bronze
    description: "Load tariff_plan from bronze for silver layer"

  - name: write_tariff_plan_silver
    type: write
    source: v_tariff_plan_bronze
    write_target:
      type: streaming_table
      catalog: "{catalog}"
      schema: "{silver_schema}"
      table: "tariff_plan_dim"
      mode: "cdc"
      cdc_config:
        keys: ["tariff_plan_key"]
        sequence_by: "_etl_timestamp"
        scd_type: 2
        ignore_null_updates: true
        track_history_except_column_list: ["_source_file_path", "_processing_timestamp", "_etl_timestamp"]
