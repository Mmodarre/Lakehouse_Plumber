pipeline: perf_silver
flowgroup: solar_panel_silver_fct
presets:
  - default_delta_properties
actions:
  - name: solar_panel_silver_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: stream
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: solar_panel
    target: v_solar_panel_bronze
    description: "Load solar_panel from bronze for silver layer"

  - name: write_solar_panel_silver
    type: write
    source: v_solar_panel_bronze
    write_target:
      type: streaming_table
      catalog: "{catalog}"
      schema: "{silver_schema}"
      table: "solar_panel_fct"
      mode: "cdc"
      cdc_config:
        keys: ["solar_panel_key"]
        sequence_by: "_etl_timestamp"
        scd_type: 2
        ignore_null_updates: true
        track_history_except_column_list: ["_source_file_path", "_processing_timestamp", "_etl_timestamp"]
