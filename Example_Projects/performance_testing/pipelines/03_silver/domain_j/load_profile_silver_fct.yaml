pipeline: perf_silver
flowgroup: load_profile_silver_fct
presets:
  - default_delta_properties
actions:
  - name: load_profile_silver_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: stream
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: load_profile
    target: v_load_profile_bronze
    description: "Load load_profile from bronze for silver layer"

  - name: write_load_profile_silver
    type: write
    source: v_load_profile_bronze
    write_target:
      type: streaming_table
      catalog: "{catalog}"
      schema: "{silver_schema}"
      table: "load_profile_fct"
      mode: "cdc"
      cdc_config:
        keys: ["load_profile_key"]
        sequence_by: "_etl_timestamp"
        scd_type: 2
        ignore_null_updates: true
        track_history_except_column_list: ["_source_file_path", "_processing_timestamp", "_etl_timestamp"]
