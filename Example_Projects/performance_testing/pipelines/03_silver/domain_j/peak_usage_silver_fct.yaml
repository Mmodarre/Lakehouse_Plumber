pipeline: perf_silver
flowgroup: peak_usage_silver_fct
presets:
  - default_delta_properties
actions:
  - name: peak_usage_silver_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: stream
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: peak_usage
    target: v_peak_usage_bronze
    description: "Load peak_usage from bronze for silver layer"

  - name: write_peak_usage_silver
    type: write
    source: v_peak_usage_bronze
    write_target:
      type: streaming_table
      catalog: "{catalog}"
      schema: "{silver_schema}"
      table: "peak_usage_fct"
      mode: "cdc"
      cdc_config:
        keys: ["peak_usage_key"]
        sequence_by: "_etl_timestamp"
        scd_type: 2
        ignore_null_updates: true
        track_history_except_column_list: ["_source_file_path", "_processing_timestamp", "_etl_timestamp"]
