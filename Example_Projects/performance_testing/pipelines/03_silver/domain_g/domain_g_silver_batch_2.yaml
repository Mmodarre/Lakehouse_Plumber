pipeline: domain_g_silver
flowgroup: hoa_silver_dim
presets:
  - default_delta_properties
actions:
  - name: hoa_silver_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: stream
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: hoa
    target: v_hoa_bronze
    description: "Load hoa from bronze for silver layer"

  - name: write_hoa_silver
    type: write
    source: v_hoa_bronze
    write_target:
      type: streaming_table
      catalog: "{catalog}"
      schema: "{silver_schema}"
      table: "hoa_dim"
      mode: "cdc"
      cdc_config:
        keys: ["hoa_key"]
        sequence_by: "_etl_timestamp"
        scd_type: 2
        ignore_null_updates: true
        track_history_except_column_list: ["_source_file_path", "_processing_timestamp", "_etl_timestamp"]
---
