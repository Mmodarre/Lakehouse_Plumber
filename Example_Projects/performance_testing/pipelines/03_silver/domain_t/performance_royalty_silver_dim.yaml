pipeline: domain_t_silver
flowgroup: performance_royalty_silver_dim
presets:
  - default_delta_properties
actions:
  - name: performance_royalty_silver_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: stream
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: performance_royalty
    target: v_performance_royalty_bronze
    description: "Load performance_royalty from bronze for silver layer"

  - name: write_performance_royalty_silver
    type: write
    source: v_performance_royalty_bronze
    write_target:
      type: streaming_table
      catalog: "{catalog}"
      schema: "{silver_schema}"
      table: "performance_royalty_dim"
      mode: "cdc"
      cdc_config:
        keys: ["performance_royalty_key"]
        sequence_by: "_etl_timestamp"
        scd_type: 2
        ignore_null_updates: true
        track_history_except_column_list: ["_source_file_path", "_processing_timestamp", "_etl_timestamp"]
