pipeline: perf_silver
flowgroup: music_video_silver_fct
presets:
  - default_delta_properties
actions:
  - name: music_video_silver_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: stream
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: music_video
    target: v_music_video_bronze
    description: "Load music_video from bronze for silver layer"

  - name: write_music_video_silver
    type: write
    source: v_music_video_bronze
    write_target:
      type: streaming_table
      catalog: "{catalog}"
      schema: "{silver_schema}"
      table: "music_video_fct"
      mode: "cdc"
      cdc_config:
        keys: ["music_video_key"]
        sequence_by: "_etl_timestamp"
        scd_type: 2
        ignore_null_updates: true
        track_history_except_column_list: ["_source_file_path", "_processing_timestamp", "_etl_timestamp"]
