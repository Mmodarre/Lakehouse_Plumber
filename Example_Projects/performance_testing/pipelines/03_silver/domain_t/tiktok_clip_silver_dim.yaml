pipeline: domain_t_silver
flowgroup: tiktok_clip_silver_dim
presets:
  - default_delta_properties
actions:
  - name: tiktok_clip_silver_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: stream
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: tiktok_clip
    target: v_tiktok_clip_bronze
    description: "Load tiktok_clip from bronze for silver layer"

  - name: write_tiktok_clip_silver
    type: write
    source: v_tiktok_clip_bronze
    write_target:
      type: streaming_table
      catalog: "{catalog}"
      schema: "{silver_schema}"
      table: "tiktok_clip_dim"
      mode: "cdc"
      cdc_config:
        keys: ["tiktok_clip_key"]
        sequence_by: "_etl_timestamp"
        scd_type: 2
        ignore_null_updates: true
        track_history_except_column_list: ["_source_file_path", "_processing_timestamp", "_etl_timestamp"]
