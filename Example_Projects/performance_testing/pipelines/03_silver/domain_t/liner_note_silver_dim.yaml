pipeline: perf_silver
flowgroup: liner_note_silver_dim
presets:
  - default_delta_properties
actions:
  - name: liner_note_silver_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: stream
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: liner_note
    target: v_liner_note_bronze
    description: "Load liner_note from bronze for silver layer"

  - name: write_liner_note_silver
    type: write
    source: v_liner_note_bronze
    write_target:
      type: streaming_table
      catalog: "{catalog}"
      schema: "{silver_schema}"
      table: "liner_note_dim"
      mode: "cdc"
      cdc_config:
        keys: ["liner_note_key"]
        sequence_by: "_etl_timestamp"
        scd_type: 2
        ignore_null_updates: true
        track_history_except_column_list: ["_source_file_path", "_processing_timestamp", "_etl_timestamp"]
