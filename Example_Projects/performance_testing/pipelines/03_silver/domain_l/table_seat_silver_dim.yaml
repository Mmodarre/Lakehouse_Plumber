pipeline: perf_silver
flowgroup: table_seat_silver_dim
presets:
  - default_delta_properties
actions:
  - name: table_seat_silver_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: stream
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: table_seat
    target: v_table_seat_bronze
    description: "Load table_seat from bronze for silver layer"

  - name: write_table_seat_silver
    type: write
    source: v_table_seat_bronze
    write_target:
      type: streaming_table
      catalog: "{catalog}"
      schema: "{silver_schema}"
      table: "table_seat_dim"
      mode: "cdc"
      cdc_config:
        keys: ["table_seat_key"]
        sequence_by: "_etl_timestamp"
        scd_type: 2
        ignore_null_updates: true
        track_history_except_column_list: ["_source_file_path", "_processing_timestamp", "_etl_timestamp"]
