pipeline: perf_silver
flowgroup: supplier_contract_silver_dim
presets:
  - default_delta_properties
actions:
  - name: supplier_contract_silver_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: stream
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: supplier_contract
    target: v_supplier_contract_bronze
    description: "Load supplier_contract from bronze for silver layer"

  - name: write_supplier_contract_silver
    type: write
    source: v_supplier_contract_bronze
    write_target:
      type: streaming_table
      catalog: "{catalog}"
      schema: "{silver_schema}"
      table: "supplier_contract_dim"
      mode: "cdc"
      cdc_config:
        keys: ["supplier_contract_key"]
        sequence_by: "_etl_timestamp"
        scd_type: 2
        ignore_null_updates: true
        track_history_except_column_list: ["_source_file_path", "_processing_timestamp", "_etl_timestamp"]
