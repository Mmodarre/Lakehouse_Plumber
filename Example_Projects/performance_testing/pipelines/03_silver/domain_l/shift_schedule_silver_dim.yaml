pipeline: perf_silver
flowgroup: shift_schedule_silver_dim
presets:
  - default_delta_properties
actions:
  - name: shift_schedule_silver_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: stream
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: shift_schedule
    target: v_shift_schedule_bronze
    description: "Load shift_schedule from bronze for silver layer"

  - name: write_shift_schedule_silver
    type: write
    source: v_shift_schedule_bronze
    write_target:
      type: streaming_table
      catalog: "{catalog}"
      schema: "{silver_schema}"
      table: "shift_schedule_dim"
      mode: "cdc"
      cdc_config:
        keys: ["shift_schedule_key"]
        sequence_by: "_etl_timestamp"
        scd_type: 2
        ignore_null_updates: true
        track_history_except_column_list: ["_source_file_path", "_processing_timestamp", "_etl_timestamp"]
