pipeline: perf_silver
flowgroup: return_item_silver_fct
presets:
  - default_delta_properties
actions:
  - name: return_item_silver_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: stream
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: return_item
    target: v_return_item_bronze
    description: "Load return_item from bronze for silver layer"

  - name: write_return_item_silver
    type: write
    source: v_return_item_bronze
    write_target:
      type: streaming_table
      catalog: "{catalog}"
      schema: "{silver_schema}"
      table: "return_item_fct"
      mode: "cdc"
      cdc_config:
        keys: ["return_item_key"]
        sequence_by: "_etl_timestamp"
        scd_type: 2
        ignore_null_updates: true
        track_history_except_column_list: ["_source_file_path", "_processing_timestamp", "_etl_timestamp"]
