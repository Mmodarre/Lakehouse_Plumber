pipeline: perf_silver
flowgroup: stock_count_silver_dim
presets:
  - default_delta_properties
actions:
  - name: stock_count_silver_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: stream
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: stock_count
    target: v_stock_count_bronze
    description: "Load stock_count from bronze for silver layer"

  - name: write_stock_count_silver
    type: write
    source: v_stock_count_bronze
    write_target:
      type: streaming_table
      catalog: "{catalog}"
      schema: "{silver_schema}"
      table: "stock_count_dim"
      mode: "cdc"
      cdc_config:
        keys: ["stock_count_key"]
        sequence_by: "_etl_timestamp"
        scd_type: 2
        ignore_null_updates: true
        track_history_except_column_list: ["_source_file_path", "_processing_timestamp", "_etl_timestamp"]
