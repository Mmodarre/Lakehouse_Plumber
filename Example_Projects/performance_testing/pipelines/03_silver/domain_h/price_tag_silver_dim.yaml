pipeline: perf_silver
flowgroup: price_tag_silver_dim
presets:
  - default_delta_properties
actions:
  - name: price_tag_silver_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: stream
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: price_tag
    target: v_price_tag_bronze
    description: "Load price_tag from bronze for silver layer"

  - name: write_price_tag_silver
    type: write
    source: v_price_tag_bronze
    write_target:
      type: streaming_table
      catalog: "{catalog}"
      schema: "{silver_schema}"
      table: "price_tag_dim"
      mode: "cdc"
      cdc_config:
        keys: ["price_tag_key"]
        sequence_by: "_etl_timestamp"
        scd_type: 2
        ignore_null_updates: true
        track_history_except_column_list: ["_source_file_path", "_processing_timestamp", "_etl_timestamp"]
