pipeline: perf_silver
flowgroup: oak_origin_silver_dim
presets:
  - default_delta_properties
actions:
  - name: oak_origin_silver_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: stream
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: oak_origin
    target: v_oak_origin_bronze
    description: "Load oak_origin from bronze for silver layer"

  - name: write_oak_origin_silver
    type: write
    source: v_oak_origin_bronze
    write_target:
      type: streaming_table
      catalog: "{catalog}"
      schema: "{silver_schema}"
      table: "oak_origin_dim"
      mode: "cdc"
      cdc_config:
        keys: ["oak_origin_key"]
        sequence_by: "_etl_timestamp"
        scd_type: 2
        ignore_null_updates: true
        track_history_except_column_list: ["_source_file_path", "_processing_timestamp", "_etl_timestamp"]
