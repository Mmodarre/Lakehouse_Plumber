pipeline: domain_s_silver
flowgroup: auction_lot_silver_fct
presets:
  - default_delta_properties
actions:
  - name: auction_lot_silver_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: stream
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: auction_lot
    target: v_auction_lot_bronze
    description: "Load auction_lot from bronze for silver layer"

  - name: write_auction_lot_silver
    type: write
    source: v_auction_lot_bronze
    write_target:
      type: streaming_table
      catalog: "{catalog}"
      schema: "{silver_schema}"
      table: "auction_lot_fct"
      mode: "cdc"
      cdc_config:
        keys: ["auction_lot_key"]
        sequence_by: "_etl_timestamp"
        scd_type: 2
        ignore_null_updates: true
        track_history_except_column_list: ["_source_file_path", "_processing_timestamp", "_etl_timestamp"]
