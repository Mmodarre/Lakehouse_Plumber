pipeline: domain_s_silver
flowgroup: release_date_silver_dim
presets:
  - default_delta_properties
actions:
  - name: release_date_silver_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: stream
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: release_date
    target: v_release_date_bronze
    description: "Load release_date from bronze for silver layer"

  - name: write_release_date_silver
    type: write
    source: v_release_date_bronze
    write_target:
      type: streaming_table
      catalog: "{catalog}"
      schema: "{silver_schema}"
      table: "release_date_dim"
      mode: "cdc"
      cdc_config:
        keys: ["release_date_key"]
        sequence_by: "_etl_timestamp"
        scd_type: 2
        ignore_null_updates: true
        track_history_except_column_list: ["_source_file_path", "_processing_timestamp", "_etl_timestamp"]
