pipeline: perf_silver
flowgroup: treatment_silver_dim
presets:
  - default_delta_properties
actions:
  - name: treatment_silver_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: stream
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: treatment
    target: v_treatment_bronze
    description: "Load treatment from bronze for silver layer"

  - name: write_treatment_silver
    type: write
    source: v_treatment_bronze
    write_target:
      type: streaming_table
      catalog: "{catalog}"
      schema: "{silver_schema}"
      table: "treatment_dim"
      mode: "cdc"
      cdc_config:
        keys: ["treatment_key"]
        sequence_by: "_etl_timestamp"
        scd_type: 2
        ignore_null_updates: true
        track_history_except_column_list: ["_source_file_path", "_processing_timestamp", "_etl_timestamp"]
