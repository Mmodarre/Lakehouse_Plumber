pipeline: perf_silver
flowgroup: lab_test_silver_dim
presets:
  - default_delta_properties
actions:
  - name: lab_test_silver_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: stream
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: lab_test
    target: v_lab_test_bronze
    description: "Load lab_test from bronze for silver layer"

  - name: write_lab_test_silver
    type: write
    source: v_lab_test_bronze
    write_target:
      type: streaming_table
      catalog: "{catalog}"
      schema: "{silver_schema}"
      table: "lab_test_dim"
      mode: "cdc"
      cdc_config:
        keys: ["lab_test_key"]
        sequence_by: "_etl_timestamp"
        scd_type: 2
        ignore_null_updates: true
        track_history_except_column_list: ["_source_file_path", "_processing_timestamp", "_etl_timestamp"]
