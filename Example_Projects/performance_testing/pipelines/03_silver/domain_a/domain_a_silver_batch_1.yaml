pipeline: perf_silver
flowgroup: customer_silver_fct
presets:
  - default_delta_properties
actions:
  - name: customer_silver_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: stream
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: customer
    target: v_customer_bronze
    description: "Load customer from bronze for silver layer"

  - name: write_customer_silver
    type: write
    source: v_customer_bronze
    write_target:
      type: streaming_table
      catalog: "{catalog}"
      schema: "{silver_schema}"
      table: "customer_fct"
      mode: "cdc"
      cdc_config:
        keys: ["customer_key"]
        sequence_by: "_etl_timestamp"
        scd_type: 2
        ignore_null_updates: true
        track_history_except_column_list: ["_source_file_path", "_processing_timestamp", "_etl_timestamp"]
---
