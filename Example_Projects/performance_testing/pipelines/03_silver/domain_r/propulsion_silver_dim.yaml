pipeline: domain_r_silver
flowgroup: propulsion_silver_dim
presets:
  - default_delta_properties
actions:
  - name: propulsion_silver_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: stream
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: propulsion
    target: v_propulsion_bronze
    description: "Load propulsion from bronze for silver layer"

  - name: write_propulsion_silver
    type: write
    source: v_propulsion_bronze
    write_target:
      type: streaming_table
      catalog: "{catalog}"
      schema: "{silver_schema}"
      table: "propulsion_dim"
      mode: "cdc"
      cdc_config:
        keys: ["propulsion_key"]
        sequence_by: "_etl_timestamp"
        scd_type: 2
        ignore_null_updates: true
        track_history_except_column_list: ["_source_file_path", "_processing_timestamp", "_etl_timestamp"]
