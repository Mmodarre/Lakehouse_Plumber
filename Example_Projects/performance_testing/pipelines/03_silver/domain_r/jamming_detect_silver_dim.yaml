pipeline: perf_silver
flowgroup: jamming_detect_silver_dim
presets:
  - default_delta_properties
actions:
  - name: jamming_detect_silver_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: stream
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: jamming_detect
    target: v_jamming_detect_bronze
    description: "Load jamming_detect from bronze for silver layer"

  - name: write_jamming_detect_silver
    type: write
    source: v_jamming_detect_bronze
    write_target:
      type: streaming_table
      catalog: "{catalog}"
      schema: "{silver_schema}"
      table: "jamming_detect_dim"
      mode: "cdc"
      cdc_config:
        keys: ["jamming_detect_key"]
        sequence_by: "_etl_timestamp"
        scd_type: 2
        ignore_null_updates: true
        track_history_except_column_list: ["_source_file_path", "_processing_timestamp", "_etl_timestamp"]
