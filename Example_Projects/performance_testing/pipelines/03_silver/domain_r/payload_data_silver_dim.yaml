pipeline: perf_silver
flowgroup: payload_data_silver_dim
presets:
  - default_delta_properties
actions:
  - name: payload_data_silver_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: stream
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: payload_data
    target: v_payload_data_bronze
    description: "Load payload_data from bronze for silver layer"

  - name: write_payload_data_silver
    type: write
    source: v_payload_data_bronze
    write_target:
      type: streaming_table
      catalog: "{catalog}"
      schema: "{silver_schema}"
      table: "payload_data_dim"
      mode: "cdc"
      cdc_config:
        keys: ["payload_data_key"]
        sequence_by: "_etl_timestamp"
        scd_type: 2
        ignore_null_updates: true
        track_history_except_column_list: ["_source_file_path", "_processing_timestamp", "_etl_timestamp"]
