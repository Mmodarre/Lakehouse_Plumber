pipeline: perf_silver
flowgroup: launch_vehicle_silver_dim
presets:
  - default_delta_properties
actions:
  - name: launch_vehicle_silver_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: stream
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: launch_vehicle
    target: v_launch_vehicle_bronze
    description: "Load launch_vehicle from bronze for silver layer"

  - name: write_launch_vehicle_silver
    type: write
    source: v_launch_vehicle_bronze
    write_target:
      type: streaming_table
      catalog: "{catalog}"
      schema: "{silver_schema}"
      table: "launch_vehicle_dim"
      mode: "cdc"
      cdc_config:
        keys: ["launch_vehicle_key"]
        sequence_by: "_etl_timestamp"
        scd_type: 2
        ignore_null_updates: true
        track_history_except_column_list: ["_source_file_path", "_processing_timestamp", "_etl_timestamp"]
