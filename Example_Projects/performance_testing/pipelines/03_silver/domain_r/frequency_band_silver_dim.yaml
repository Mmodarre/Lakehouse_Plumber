pipeline: perf_silver
flowgroup: frequency_band_silver_dim
presets:
  - default_delta_properties
actions:
  - name: frequency_band_silver_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: stream
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: frequency_band
    target: v_frequency_band_bronze
    description: "Load frequency_band from bronze for silver layer"

  - name: write_frequency_band_silver
    type: write
    source: v_frequency_band_bronze
    write_target:
      type: streaming_table
      catalog: "{catalog}"
      schema: "{silver_schema}"
      table: "frequency_band_dim"
      mode: "cdc"
      cdc_config:
        keys: ["frequency_band_key"]
        sequence_by: "_etl_timestamp"
        scd_type: 2
        ignore_null_updates: true
        track_history_except_column_list: ["_source_file_path", "_processing_timestamp", "_etl_timestamp"]
