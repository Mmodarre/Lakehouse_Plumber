pipeline: perf_silver
flowgroup: leave_request_silver_dim
presets:
  - default_delta_properties
actions:
  - name: leave_request_silver_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: stream
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: leave_request
    target: v_leave_request_bronze
    description: "Load leave_request from bronze for silver layer"

  - name: write_leave_request_silver
    type: write
    source: v_leave_request_bronze
    write_target:
      type: streaming_table
      catalog: "{catalog}"
      schema: "{silver_schema}"
      table: "leave_request_dim"
      mode: "cdc"
      cdc_config:
        keys: ["leave_request_key"]
        sequence_by: "_etl_timestamp"
        scd_type: 2
        ignore_null_updates: true
        track_history_except_column_list: ["_source_file_path", "_processing_timestamp", "_etl_timestamp"]
