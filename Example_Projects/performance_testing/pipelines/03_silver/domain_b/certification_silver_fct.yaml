pipeline: perf_silver
flowgroup: certification_silver_fct
presets:
  - default_delta_properties
actions:
  - name: certification_silver_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: stream
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: certification
    target: v_certification_bronze
    description: "Load certification from bronze for silver layer"

  - name: write_certification_silver
    type: write
    source: v_certification_bronze
    write_target:
      type: streaming_table
      catalog: "{catalog}"
      schema: "{silver_schema}"
      table: "certification_fct"
      mode: "cdc"
      cdc_config:
        keys: ["certification_key"]
        sequence_by: "_etl_timestamp"
        scd_type: 2
        ignore_null_updates: true
        track_history_except_column_list: ["_source_file_path", "_processing_timestamp", "_etl_timestamp"]
