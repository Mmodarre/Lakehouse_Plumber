pipeline: perf_silver
flowgroup: job_posting_silver_fct
presets:
  - default_delta_properties
actions:
  - name: job_posting_silver_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: stream
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: job_posting
    target: v_job_posting_bronze
    description: "Load job_posting from bronze for silver layer"

  - name: write_job_posting_silver
    type: write
    source: v_job_posting_bronze
    write_target:
      type: streaming_table
      catalog: "{catalog}"
      schema: "{silver_schema}"
      table: "job_posting_fct"
      mode: "cdc"
      cdc_config:
        keys: ["job_posting_key"]
        sequence_by: "_etl_timestamp"
        scd_type: 2
        ignore_null_updates: true
        track_history_except_column_list: ["_source_file_path", "_processing_timestamp", "_etl_timestamp"]
