pipeline: perf_silver
flowgroup: offer_letter_silver_dim
presets:
  - default_delta_properties
actions:
  - name: offer_letter_silver_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: stream
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: offer_letter
    target: v_offer_letter_bronze
    description: "Load offer_letter from bronze for silver layer"

  - name: write_offer_letter_silver
    type: write
    source: v_offer_letter_bronze
    write_target:
      type: streaming_table
      catalog: "{catalog}"
      schema: "{silver_schema}"
      table: "offer_letter_dim"
      mode: "cdc"
      cdc_config:
        keys: ["offer_letter_key"]
        sequence_by: "_etl_timestamp"
        scd_type: 2
        ignore_null_updates: true
        track_history_except_column_list: ["_source_file_path", "_processing_timestamp", "_etl_timestamp"]
