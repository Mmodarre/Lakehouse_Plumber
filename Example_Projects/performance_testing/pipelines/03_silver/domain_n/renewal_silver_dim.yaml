pipeline: domain_n_silver
flowgroup: renewal_silver_dim
presets:
  - default_delta_properties
actions:
  - name: renewal_silver_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: stream
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: renewal
    target: v_renewal_bronze
    description: "Load renewal from bronze for silver layer"

  - name: write_renewal_silver
    type: write
    source: v_renewal_bronze
    write_target:
      type: streaming_table
      catalog: "{catalog}"
      schema: "{silver_schema}"
      table: "renewal_dim"
      mode: "cdc"
      cdc_config:
        keys: ["renewal_key"]
        sequence_by: "_etl_timestamp"
        scd_type: 2
        ignore_null_updates: true
        track_history_except_column_list: ["_source_file_path", "_processing_timestamp", "_etl_timestamp"]
