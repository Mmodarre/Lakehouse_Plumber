pipeline: domain_n_silver
flowgroup: bordereaux_silver_dim
presets:
  - default_delta_properties
actions:
  - name: bordereaux_silver_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: stream
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: bordereaux
    target: v_bordereaux_bronze
    description: "Load bordereaux from bronze for silver layer"

  - name: write_bordereaux_silver
    type: write
    source: v_bordereaux_bronze
    write_target:
      type: streaming_table
      catalog: "{catalog}"
      schema: "{silver_schema}"
      table: "bordereaux_dim"
      mode: "cdc"
      cdc_config:
        keys: ["bordereaux_key"]
        sequence_by: "_etl_timestamp"
        scd_type: 2
        ignore_null_updates: true
        track_history_except_column_list: ["_source_file_path", "_processing_timestamp", "_etl_timestamp"]
