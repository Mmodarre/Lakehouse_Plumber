pipeline: domain_n_silver
flowgroup: coverage_silver_fct
presets:
  - default_delta_properties
actions:
  - name: coverage_silver_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: stream
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: coverage
    target: v_coverage_bronze
    description: "Load coverage from bronze for silver layer"

  - name: write_coverage_silver
    type: write
    source: v_coverage_bronze
    write_target:
      type: streaming_table
      catalog: "{catalog}"
      schema: "{silver_schema}"
      table: "coverage_fct"
      mode: "cdc"
      cdc_config:
        keys: ["coverage_key"]
        sequence_by: "_etl_timestamp"
        scd_type: 2
        ignore_null_updates: true
        track_history_except_column_list: ["_source_file_path", "_processing_timestamp", "_etl_timestamp"]
