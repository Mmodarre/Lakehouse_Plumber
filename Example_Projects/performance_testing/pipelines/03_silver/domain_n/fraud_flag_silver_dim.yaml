pipeline: domain_n_silver
flowgroup: fraud_flag_silver_dim
presets:
  - default_delta_properties
actions:
  - name: fraud_flag_silver_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: stream
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: fraud_flag
    target: v_fraud_flag_bronze
    description: "Load fraud_flag from bronze for silver layer"

  - name: write_fraud_flag_silver
    type: write
    source: v_fraud_flag_bronze
    write_target:
      type: streaming_table
      catalog: "{catalog}"
      schema: "{silver_schema}"
      table: "fraud_flag_dim"
      mode: "cdc"
      cdc_config:
        keys: ["fraud_flag_key"]
        sequence_by: "_etl_timestamp"
        scd_type: 2
        ignore_null_updates: true
        track_history_except_column_list: ["_source_file_path", "_processing_timestamp", "_etl_timestamp"]
