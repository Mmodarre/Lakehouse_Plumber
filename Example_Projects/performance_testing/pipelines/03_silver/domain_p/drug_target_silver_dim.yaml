pipeline: perf_silver
flowgroup: drug_target_silver_dim
presets:
  - default_delta_properties
actions:
  - name: drug_target_silver_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: stream
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: drug_target
    target: v_drug_target_bronze
    description: "Load drug_target from bronze for silver layer"

  - name: write_drug_target_silver
    type: write
    source: v_drug_target_bronze
    write_target:
      type: streaming_table
      catalog: "{catalog}"
      schema: "{silver_schema}"
      table: "drug_target_dim"
      mode: "cdc"
      cdc_config:
        keys: ["drug_target_key"]
        sequence_by: "_etl_timestamp"
        scd_type: 2
        ignore_null_updates: true
        track_history_except_column_list: ["_source_file_path", "_processing_timestamp", "_etl_timestamp"]
