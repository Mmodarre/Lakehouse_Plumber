pipeline: domain_p_silver
flowgroup: annotation_silver_fct
presets:
  - default_delta_properties
actions:
  - name: annotation_silver_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: stream
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: annotation
    target: v_annotation_bronze
    description: "Load annotation from bronze for silver layer"

  - name: write_annotation_silver
    type: write
    source: v_annotation_bronze
    write_target:
      type: streaming_table
      catalog: "{catalog}"
      schema: "{silver_schema}"
      table: "annotation_fct"
      mode: "cdc"
      cdc_config:
        keys: ["annotation_key"]
        sequence_by: "_etl_timestamp"
        scd_type: 2
        ignore_null_updates: true
        track_history_except_column_list: ["_source_file_path", "_processing_timestamp", "_etl_timestamp"]
