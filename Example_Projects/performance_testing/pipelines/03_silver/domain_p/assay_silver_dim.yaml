pipeline: perf_silver
flowgroup: assay_silver_dim
presets:
  - default_delta_properties
actions:
  - name: assay_silver_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: stream
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: assay
    target: v_assay_bronze
    description: "Load assay from bronze for silver layer"

  - name: write_assay_silver
    type: write
    source: v_assay_bronze
    write_target:
      type: streaming_table
      catalog: "{catalog}"
      schema: "{silver_schema}"
      table: "assay_dim"
      mode: "cdc"
      cdc_config:
        keys: ["assay_key"]
        sequence_by: "_etl_timestamp"
        scd_type: 2
        ignore_null_updates: true
        track_history_except_column_list: ["_source_file_path", "_processing_timestamp", "_etl_timestamp"]
