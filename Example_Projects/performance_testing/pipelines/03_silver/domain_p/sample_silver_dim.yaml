pipeline: domain_p_silver
flowgroup: sample_silver_dim
presets:
  - default_delta_properties
actions:
  - name: sample_silver_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: stream
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: sample
    target: v_sample_bronze
    description: "Load sample from bronze for silver layer"

  - name: write_sample_silver
    type: write
    source: v_sample_bronze
    write_target:
      type: streaming_table
      catalog: "{catalog}"
      schema: "{silver_schema}"
      table: "sample_dim"
      mode: "cdc"
      cdc_config:
        keys: ["sample_key"]
        sequence_by: "_etl_timestamp"
        scd_type: 2
        ignore_null_updates: true
        track_history_except_column_list: ["_source_file_path", "_processing_timestamp", "_etl_timestamp"]
