pipeline: perf_silver
flowgroup: grade_silver_fct
presets:
  - default_delta_properties
actions:
  - name: grade_silver_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: stream
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: grade
    target: v_grade_bronze
    description: "Load grade from bronze for silver layer"

  - name: write_grade_silver
    type: write
    source: v_grade_bronze
    write_target:
      type: streaming_table
      catalog: "{catalog}"
      schema: "{silver_schema}"
      table: "grade_fct"
      mode: "cdc"
      cdc_config:
        keys: ["grade_key"]
        sequence_by: "_etl_timestamp"
        scd_type: 2
        ignore_null_updates: true
        track_history_except_column_list: ["_source_file_path", "_processing_timestamp", "_etl_timestamp"]
