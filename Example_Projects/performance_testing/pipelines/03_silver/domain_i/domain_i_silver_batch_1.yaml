pipeline: domain_i_silver
flowgroup: machine_silver_fct
presets:
  - default_delta_properties
actions:
  - name: machine_silver_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: stream
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: machine
    target: v_machine_bronze
    description: "Load machine from bronze for silver layer"

  - name: write_machine_silver
    type: write
    source: v_machine_bronze
    write_target:
      type: streaming_table
      catalog: "{catalog}"
      schema: "{silver_schema}"
      table: "machine_fct"
      mode: "cdc"
      cdc_config:
        keys: ["machine_key"]
        sequence_by: "_etl_timestamp"
        scd_type: 2
        ignore_null_updates: true
        track_history_except_column_list: ["_source_file_path", "_processing_timestamp", "_etl_timestamp"]
---
