pipeline: perf_silver
flowgroup: raw_material_silver_fct
presets:
  - default_delta_properties
actions:
  - name: raw_material_silver_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: stream
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: raw_material
    target: v_raw_material_bronze
    description: "Load raw_material from bronze for silver layer"

  - name: write_raw_material_silver
    type: write
    source: v_raw_material_bronze
    write_target:
      type: streaming_table
      catalog: "{catalog}"
      schema: "{silver_schema}"
      table: "raw_material_fct"
      mode: "cdc"
      cdc_config:
        keys: ["raw_material_key"]
        sequence_by: "_etl_timestamp"
        scd_type: 2
        ignore_null_updates: true
        track_history_except_column_list: ["_source_file_path", "_processing_timestamp", "_etl_timestamp"]
