pipeline: perf_silver
flowgroup: work_cell_silver_dim
presets:
  - default_delta_properties
actions:
  - name: work_cell_silver_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: stream
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: work_cell
    target: v_work_cell_bronze
    description: "Load work_cell from bronze for silver layer"

  - name: write_work_cell_silver
    type: write
    source: v_work_cell_bronze
    write_target:
      type: streaming_table
      catalog: "{catalog}"
      schema: "{silver_schema}"
      table: "work_cell_dim"
      mode: "cdc"
      cdc_config:
        keys: ["work_cell_key"]
        sequence_by: "_etl_timestamp"
        scd_type: 2
        ignore_null_updates: true
        track_history_except_column_list: ["_source_file_path", "_processing_timestamp", "_etl_timestamp"]
