pipeline: perf_silver
flowgroup: quality_check_silver_dim
presets:
  - default_delta_properties
actions:
  - name: quality_check_silver_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: stream
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: quality_check
    target: v_quality_check_bronze
    description: "Load quality_check from bronze for silver layer"

  - name: write_quality_check_silver
    type: write
    source: v_quality_check_bronze
    write_target:
      type: streaming_table
      catalog: "{catalog}"
      schema: "{silver_schema}"
      table: "quality_check_dim"
      mode: "cdc"
      cdc_config:
        keys: ["quality_check_key"]
        sequence_by: "_etl_timestamp"
        scd_type: 2
        ignore_null_updates: true
        track_history_except_column_list: ["_source_file_path", "_processing_timestamp", "_etl_timestamp"]
