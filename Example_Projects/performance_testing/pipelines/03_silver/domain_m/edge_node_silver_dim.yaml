pipeline: perf_silver
flowgroup: edge_node_silver_dim
presets:
  - default_delta_properties
actions:
  - name: edge_node_silver_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: stream
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: edge_node
    target: v_edge_node_bronze
    description: "Load edge_node from bronze for silver layer"

  - name: write_edge_node_silver
    type: write
    source: v_edge_node_bronze
    write_target:
      type: streaming_table
      catalog: "{catalog}"
      schema: "{silver_schema}"
      table: "edge_node_dim"
      mode: "cdc"
      cdc_config:
        keys: ["edge_node_key"]
        sequence_by: "_etl_timestamp"
        scd_type: 2
        ignore_null_updates: true
        track_history_except_column_list: ["_source_file_path", "_processing_timestamp", "_etl_timestamp"]
