pipeline: domain_m_silver
flowgroup: ota_update_silver_dim
presets:
  - default_delta_properties
actions:
  - name: ota_update_silver_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: stream
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: ota_update
    target: v_ota_update_bronze
    description: "Load ota_update from bronze for silver layer"

  - name: write_ota_update_silver
    type: write
    source: v_ota_update_bronze
    write_target:
      type: streaming_table
      catalog: "{catalog}"
      schema: "{silver_schema}"
      table: "ota_update_dim"
      mode: "cdc"
      cdc_config:
        keys: ["ota_update_key"]
        sequence_by: "_etl_timestamp"
        scd_type: 2
        ignore_null_updates: true
        track_history_except_column_list: ["_source_file_path", "_processing_timestamp", "_etl_timestamp"]
