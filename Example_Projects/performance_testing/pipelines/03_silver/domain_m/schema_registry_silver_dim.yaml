pipeline: domain_m_silver
flowgroup: schema_registry_silver_dim
presets:
  - default_delta_properties
actions:
  - name: schema_registry_silver_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: stream
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: schema_registry
    target: v_schema_registry_bronze
    description: "Load schema_registry from bronze for silver layer"

  - name: write_schema_registry_silver
    type: write
    source: v_schema_registry_bronze
    write_target:
      type: streaming_table
      catalog: "{catalog}"
      schema: "{silver_schema}"
      table: "schema_registry_dim"
      mode: "cdc"
      cdc_config:
        keys: ["schema_registry_key"]
        sequence_by: "_etl_timestamp"
        scd_type: 2
        ignore_null_updates: true
        track_history_except_column_list: ["_source_file_path", "_processing_timestamp", "_etl_timestamp"]
