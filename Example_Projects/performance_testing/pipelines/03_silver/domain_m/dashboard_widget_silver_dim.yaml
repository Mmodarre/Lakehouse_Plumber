pipeline: perf_silver
flowgroup: dashboard_widget_silver_dim
presets:
  - default_delta_properties
actions:
  - name: dashboard_widget_silver_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: stream
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: dashboard_widget
    target: v_dashboard_widget_bronze
    description: "Load dashboard_widget from bronze for silver layer"

  - name: write_dashboard_widget_silver
    type: write
    source: v_dashboard_widget_bronze
    write_target:
      type: streaming_table
      catalog: "{catalog}"
      schema: "{silver_schema}"
      table: "dashboard_widget_dim"
      mode: "cdc"
      cdc_config:
        keys: ["dashboard_widget_key"]
        sequence_by: "_etl_timestamp"
        scd_type: 2
        ignore_null_updates: true
        track_history_except_column_list: ["_source_file_path", "_processing_timestamp", "_etl_timestamp"]
