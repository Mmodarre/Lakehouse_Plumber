pipeline: domain_m_silver
flowgroup: simulation_silver_fct
presets:
  - default_delta_properties
actions:
  - name: simulation_silver_load
    type: load
    operational_metadata: ["_processing_timestamp"]
    readMode: stream
    source:
      type: delta
      catalog: "{catalog}"
      schema: "{bronze_schema}"
      table: simulation
    target: v_simulation_bronze
    description: "Load simulation from bronze for silver layer"

  - name: write_simulation_silver
    type: write
    source: v_simulation_bronze
    write_target:
      type: streaming_table
      catalog: "{catalog}"
      schema: "{silver_schema}"
      table: "simulation_fct"
      mode: "cdc"
      cdc_config:
        keys: ["simulation_key"]
        sequence_by: "_etl_timestamp"
        scd_type: 2
        ignore_null_updates: true
        track_history_except_column_list: ["_source_file_path", "_processing_timestamp", "_etl_timestamp"]
