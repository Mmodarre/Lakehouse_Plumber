pipeline: domain_g_raw
flowgroup: floor_plan_ingestion
presets:
  - default_delta_properties
actions:
  - name: load_floor_plan_cloudfiles
    type: load
    operational_metadata:
      - "_source_file_path"
      - "_processing_timestamp"
    source:
      type: cloudfiles
      path: "{landing_volume}/floor_plan/*.parquet"
      format: parquet
      options:
        cloudFiles.format: parquet
        cloudFiles.maxFilesPerTrigger: 50
        cloudFiles.inferColumnTypes: True
        cloudFiles.schemaEvolutionMode: "addNewColumns"
        cloudFiles.rescuedDataColumn: "_rescued_data"
    target: v_floor_plan_cloudfiles
    description: "Load floor_plan from landing volume"

  - name: write_floor_plan_raw
    type: write
    source: v_floor_plan_cloudfiles
    write_target:
      type: streaming_table
      catalog: "{catalog}"
      schema: "{raw_schema}"
      table: "floor_plan_raw"
