pipeline: domain_g_raw
flowgroup: home_inspection_ingestion
presets:
  - default_delta_properties
actions:
  - name: load_home_inspection_cloudfiles
    type: load
    operational_metadata:
      - "_source_file_path"
      - "_processing_timestamp"
    source:
      type: cloudfiles
      path: "{landing_volume}/home_inspection/*.parquet"
      format: parquet
      options:
        cloudFiles.format: parquet
        cloudFiles.maxFilesPerTrigger: 50
        cloudFiles.inferColumnTypes: True
        cloudFiles.schemaEvolutionMode: "addNewColumns"
        cloudFiles.rescuedDataColumn: "_rescued_data"
    target: v_home_inspection_cloudfiles
    description: "Load home_inspection from landing volume"

  - name: write_home_inspection_raw
    type: write
    source: v_home_inspection_cloudfiles
    write_target:
      type: streaming_table
      catalog: "{catalog}"
      schema: "{raw_schema}"
      table: "home_inspection_raw"
