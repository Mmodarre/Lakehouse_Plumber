pipeline: perf_raw
flowgroup: case_manager_ingestion
presets:
  - default_delta_properties
actions:
  - name: load_case_manager_cloudfiles
    type: load
    operational_metadata:
      - "_source_file_path"
      - "_processing_timestamp"
    source:
      type: cloudfiles
      path: "{landing_volume}/case_manager/*.parquet"
      format: parquet
      options:
        cloudFiles.format: parquet
        cloudFiles.maxFilesPerTrigger: 50
        cloudFiles.inferColumnTypes: True
        cloudFiles.schemaEvolutionMode: "addNewColumns"
        cloudFiles.rescuedDataColumn: "_rescued_data"
    target: v_case_manager_cloudfiles
    description: "Load case_manager from landing volume"

  - name: write_case_manager_raw
    type: write
    source: v_case_manager_cloudfiles
    write_target:
      type: streaming_table
      catalog: "{catalog}"
      schema: "{raw_schema}"
      table: "case_manager_raw"
