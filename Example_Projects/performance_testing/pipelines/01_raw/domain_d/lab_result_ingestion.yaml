pipeline: perf_raw
flowgroup: lab_result_ingestion
presets:
  - default_delta_properties
actions:
  - name: load_lab_result_cloudfiles
    type: load
    operational_metadata:
      - "_source_file_path"
      - "_processing_timestamp"
    source:
      type: cloudfiles
      path: "{landing_volume}/lab_result/*.parquet"
      format: parquet
      options:
        cloudFiles.format: parquet
        cloudFiles.maxFilesPerTrigger: 50
        cloudFiles.inferColumnTypes: True
        cloudFiles.schemaEvolutionMode: "addNewColumns"
        cloudFiles.rescuedDataColumn: "_rescued_data"
    target: v_lab_result_cloudfiles
    description: "Load lab_result from landing volume"

  - name: write_lab_result_raw
    type: write
    source: v_lab_result_cloudfiles
    write_target:
      type: streaming_table
      catalog: "{catalog}"
      schema: "{raw_schema}"
      table: "lab_result_raw"
