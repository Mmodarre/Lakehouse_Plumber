pipeline: domain_d_raw
flowgroup: emergency_ingestion
presets:
  - default_delta_properties
actions:
  - name: load_emergency_cloudfiles
    type: load
    operational_metadata:
      - "_source_file_path"
      - "_processing_timestamp"
    source:
      type: cloudfiles
      path: "{landing_volume}/emergency/*.parquet"
      format: parquet
      options:
        cloudFiles.format: parquet
        cloudFiles.maxFilesPerTrigger: 50
        cloudFiles.inferColumnTypes: True
        cloudFiles.schemaEvolutionMode: "addNewColumns"
        cloudFiles.rescuedDataColumn: "_rescued_data"
    target: v_emergency_cloudfiles
    description: "Load emergency from landing volume"

  - name: write_emergency_raw
    type: write
    source: v_emergency_cloudfiles
    write_target:
      type: streaming_table
      catalog: "{catalog}"
      schema: "{raw_schema}"
      table: "emergency_raw"
