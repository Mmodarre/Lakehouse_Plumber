pipeline: domain_f_raw
use_template: csv_ingestion_template
presets:
  - default_delta_properties

flowgroups:
  - flowgroup: classroom_ingestion
    template_parameters:
      table_name: classroom_raw
      landing_folder: classroom
      schema_file: part_schema

  - flowgroup: semester_ingestion
    template_parameters:
      table_name: semester_raw
      landing_folder: semester
      schema_file: customer_schema

  - flowgroup: campus_ingestion
    template_parameters:
      table_name: campus_raw
      landing_folder: campus
      schema_file: product_schema

  - flowgroup: program_ingestion
    template_parameters:
      table_name: program_raw
      landing_folder: program
      schema_file: partsupp_schema

  - flowgroup: research_grant_ingestion
    template_parameters:
      table_name: research_grant_raw
      landing_folder: research_grant
      schema_file: lineitem_schema

  - flowgroup: accreditation_ingestion
    template_parameters:
      table_name: accreditation_raw
      landing_folder: accreditation
      schema_file: customer_schema

  - flowgroup: dormitory_ingestion
    template_parameters:
      table_name: dormitory_raw
      landing_folder: dormitory
      schema_file: product_schema

  - flowgroup: athletics_ingestion
    template_parameters:
      table_name: athletics_raw
      landing_folder: athletics
      schema_file: nation_schema
