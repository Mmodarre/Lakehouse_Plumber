pipeline: domain_f_raw
flowgroup: assignment_ingestion
presets:
  - default_delta_properties
actions:
  - name: load_assignment_cloudfiles
    type: load
    operational_metadata:
      - "_source_file_path"
      - "_processing_timestamp"
    source:
      type: cloudfiles
      path: "{landing_volume}/assignment/*.parquet"
      format: parquet
      options:
        cloudFiles.format: parquet
        cloudFiles.maxFilesPerTrigger: 50
        cloudFiles.inferColumnTypes: True
        cloudFiles.schemaEvolutionMode: "addNewColumns"
        cloudFiles.rescuedDataColumn: "_rescued_data"
    target: v_assignment_cloudfiles
    description: "Load assignment from landing volume"

  - name: write_assignment_raw
    type: write
    source: v_assignment_cloudfiles
    write_target:
      type: streaming_table
      catalog: "{catalog}"
      schema: "{raw_schema}"
      table: "assignment_raw"
