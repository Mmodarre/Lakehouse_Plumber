pipeline: perf_raw
flowgroup: cellar_ingestion
presets:
  - default_delta_properties
actions:
  - name: load_cellar_cloudfiles
    type: load
    operational_metadata:
      - "_source_file_path"
      - "_processing_timestamp"
    source:
      type: cloudfiles
      path: "{landing_volume}/cellar/*.parquet"
      format: parquet
      options:
        cloudFiles.format: parquet
        cloudFiles.maxFilesPerTrigger: 50
        cloudFiles.inferColumnTypes: True
        cloudFiles.schemaEvolutionMode: "addNewColumns"
        cloudFiles.rescuedDataColumn: "_rescued_data"
    target: v_cellar_cloudfiles
    description: "Load cellar from landing volume"

  - name: write_cellar_raw
    type: write
    source: v_cellar_cloudfiles
    write_target:
      type: streaming_table
      catalog: "{catalog}"
      schema: "{raw_schema}"
      table: "cellar_raw"
