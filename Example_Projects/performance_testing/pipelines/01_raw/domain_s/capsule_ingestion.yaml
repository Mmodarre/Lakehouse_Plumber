pipeline: domain_s_raw
flowgroup: capsule_ingestion
presets:
  - default_delta_properties
actions:
  - name: load_capsule_cloudfiles
    type: load
    operational_metadata:
      - "_source_file_path"
      - "_processing_timestamp"
    source:
      type: cloudfiles
      path: "{landing_volume}/capsule/*.parquet"
      format: parquet
      options:
        cloudFiles.format: parquet
        cloudFiles.maxFilesPerTrigger: 50
        cloudFiles.inferColumnTypes: True
        cloudFiles.schemaEvolutionMode: "addNewColumns"
        cloudFiles.rescuedDataColumn: "_rescued_data"
    target: v_capsule_cloudfiles
    description: "Load capsule from landing volume"

  - name: write_capsule_raw
    type: write
    source: v_capsule_cloudfiles
    write_target:
      type: streaming_table
      catalog: "{catalog}"
      schema: "{raw_schema}"
      table: "capsule_raw"
