pipeline: perf_raw
flowgroup: cellar_temp_ingestion
presets:
  - default_delta_properties
actions:
  - name: load_cellar_temp_cloudfiles
    type: load
    operational_metadata:
      - "_source_file_path"
      - "_processing_timestamp"
    source:
      type: cloudfiles
      path: "{landing_volume}/cellar_temp/*.parquet"
      format: parquet
      options:
        cloudFiles.format: parquet
        cloudFiles.maxFilesPerTrigger: 50
        cloudFiles.inferColumnTypes: True
        cloudFiles.schemaEvolutionMode: "addNewColumns"
        cloudFiles.rescuedDataColumn: "_rescued_data"
    target: v_cellar_temp_cloudfiles
    description: "Load cellar_temp from landing volume"

  - name: write_cellar_temp_raw
    type: write
    source: v_cellar_temp_cloudfiles
    write_target:
      type: streaming_table
      catalog: "{catalog}"
      schema: "{raw_schema}"
      table: "cellar_temp_raw"
