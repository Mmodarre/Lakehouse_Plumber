pipeline: domain_e_raw
flowgroup: vehicle_ingestion
presets:
  - default_delta_properties
actions:
  - name: load_vehicle_cloudfiles
    type: load
    operational_metadata:
      - "_source_file_path"
      - "_processing_timestamp"
    source:
      type: cloudfiles
      path: "{landing_volume}/vehicle/*.parquet"
      format: parquet
      options:
        cloudFiles.format: parquet
        cloudFiles.maxFilesPerTrigger: 50
        cloudFiles.inferColumnTypes: True
        cloudFiles.schemaEvolutionMode: "addNewColumns"
        cloudFiles.rescuedDataColumn: "_rescued_data"
    target: v_vehicle_cloudfiles
    description: "Load vehicle from landing volume"

  - name: write_vehicle_raw
    type: write
    source: v_vehicle_cloudfiles
    write_target:
      type: streaming_table
      catalog: "{catalog}"
      schema: "{raw_schema}"
      table: "vehicle_raw"
