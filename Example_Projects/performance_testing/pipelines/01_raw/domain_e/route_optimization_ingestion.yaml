pipeline: perf_raw
flowgroup: route_optimization_ingestion
presets:
  - default_delta_properties
actions:
  - name: load_route_optimization_cloudfiles
    type: load
    operational_metadata:
      - "_source_file_path"
      - "_processing_timestamp"
    source:
      type: cloudfiles
      path: "{landing_volume}/route_optimization/*.parquet"
      format: parquet
      options:
        cloudFiles.format: parquet
        cloudFiles.maxFilesPerTrigger: 50
        cloudFiles.inferColumnTypes: True
        cloudFiles.schemaEvolutionMode: "addNewColumns"
        cloudFiles.rescuedDataColumn: "_rescued_data"
    target: v_route_optimization_cloudfiles
    description: "Load route_optimization from landing volume"

  - name: write_route_optimization_raw
    type: write
    source: v_route_optimization_cloudfiles
    write_target:
      type: streaming_table
      catalog: "{catalog}"
      schema: "{raw_schema}"
      table: "route_optimization_raw"
