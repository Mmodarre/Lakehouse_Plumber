pipeline: perf_raw
flowgroup: fuel_log_ingestion
presets:
  - default_delta_properties
actions:
  - name: load_fuel_log_cloudfiles
    type: load
    operational_metadata:
      - "_source_file_path"
      - "_processing_timestamp"
    source:
      type: cloudfiles
      path: "{landing_volume}/fuel_log/*.parquet"
      format: parquet
      options:
        cloudFiles.format: parquet
        cloudFiles.maxFilesPerTrigger: 50
        cloudFiles.inferColumnTypes: True
        cloudFiles.schemaEvolutionMode: "addNewColumns"
        cloudFiles.rescuedDataColumn: "_rescued_data"
    target: v_fuel_log_cloudfiles
    description: "Load fuel_log from landing volume"

  - name: write_fuel_log_raw
    type: write
    source: v_fuel_log_cloudfiles
    write_target:
      type: streaming_table
      catalog: "{catalog}"
      schema: "{raw_schema}"
      table: "fuel_log_raw"
