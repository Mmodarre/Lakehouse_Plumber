pipeline: domain_e_raw
flowgroup: proof_of_delivery_ingestion
presets:
  - default_delta_properties
actions:
  - name: load_proof_of_delivery_cloudfiles
    type: load
    operational_metadata:
      - "_source_file_path"
      - "_processing_timestamp"
    source:
      type: cloudfiles
      path: "{landing_volume}/proof_of_delivery/*.parquet"
      format: parquet
      options:
        cloudFiles.format: parquet
        cloudFiles.maxFilesPerTrigger: 50
        cloudFiles.inferColumnTypes: True
        cloudFiles.schemaEvolutionMode: "addNewColumns"
        cloudFiles.rescuedDataColumn: "_rescued_data"
    target: v_proof_of_delivery_cloudfiles
    description: "Load proof_of_delivery from landing volume"

  - name: write_proof_of_delivery_raw
    type: write
    source: v_proof_of_delivery_cloudfiles
    write_target:
      type: streaming_table
      catalog: "{catalog}"
      schema: "{raw_schema}"
      table: "proof_of_delivery_raw"
