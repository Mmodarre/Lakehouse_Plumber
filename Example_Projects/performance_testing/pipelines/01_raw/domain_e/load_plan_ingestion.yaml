pipeline: domain_e_raw
flowgroup: load_plan_ingestion
presets:
  - default_delta_properties
actions:
  - name: load_load_plan_cloudfiles
    type: load
    operational_metadata:
      - "_source_file_path"
      - "_processing_timestamp"
    source:
      type: cloudfiles
      path: "{landing_volume}/load_plan/*.parquet"
      format: parquet
      options:
        cloudFiles.format: parquet
        cloudFiles.maxFilesPerTrigger: 50
        cloudFiles.inferColumnTypes: True
        cloudFiles.schemaEvolutionMode: "addNewColumns"
        cloudFiles.rescuedDataColumn: "_rescued_data"
    target: v_load_plan_cloudfiles
    description: "Load load_plan from landing volume"

  - name: write_load_plan_raw
    type: write
    source: v_load_plan_cloudfiles
    write_target:
      type: streaming_table
      catalog: "{catalog}"
      schema: "{raw_schema}"
      table: "load_plan_raw"
