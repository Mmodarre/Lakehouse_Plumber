pipeline: domain_b_raw
flowgroup: skill_matrix_ingestion
presets:
  - default_delta_properties
actions:
  - name: load_skill_matrix_cloudfiles
    type: load
    operational_metadata:
      - "_source_file_path"
      - "_processing_timestamp"
    source:
      type: cloudfiles
      path: "{landing_volume}/skill_matrix/*.parquet"
      format: parquet
      options:
        cloudFiles.format: parquet
        cloudFiles.maxFilesPerTrigger: 50
        cloudFiles.inferColumnTypes: True
        cloudFiles.schemaEvolutionMode: "addNewColumns"
        cloudFiles.rescuedDataColumn: "_rescued_data"
    target: v_skill_matrix_cloudfiles
    description: "Load skill_matrix from landing volume"

  - name: write_skill_matrix_raw
    type: write
    source: v_skill_matrix_cloudfiles
    write_target:
      type: streaming_table
      catalog: "{catalog}"
      schema: "{raw_schema}"
      table: "skill_matrix_raw"
