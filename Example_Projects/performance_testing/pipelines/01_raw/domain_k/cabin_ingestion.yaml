pipeline: domain_k_raw
flowgroup: cabin_ingestion
presets:
  - default_delta_properties
actions:
  - name: load_cabin_cloudfiles
    type: load
    operational_metadata:
      - "_source_file_path"
      - "_processing_timestamp"
    source:
      type: cloudfiles
      path: "{landing_volume}/cabin/*.parquet"
      format: parquet
      options:
        cloudFiles.format: parquet
        cloudFiles.maxFilesPerTrigger: 50
        cloudFiles.inferColumnTypes: True
        cloudFiles.schemaEvolutionMode: "addNewColumns"
        cloudFiles.rescuedDataColumn: "_rescued_data"
    target: v_cabin_cloudfiles
    description: "Load cabin from landing volume"

  - name: write_cabin_raw
    type: write
    source: v_cabin_cloudfiles
    write_target:
      type: streaming_table
      catalog: "{catalog}"
      schema: "{raw_schema}"
      table: "cabin_raw"
