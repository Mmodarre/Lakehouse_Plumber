pipeline: domain_k_raw
flowgroup: immigration_ingestion
presets:
  - default_delta_properties
actions:
  - name: load_immigration_cloudfiles
    type: load
    operational_metadata:
      - "_source_file_path"
      - "_processing_timestamp"
    source:
      type: cloudfiles
      path: "{landing_volume}/immigration/*.parquet"
      format: parquet
      options:
        cloudFiles.format: parquet
        cloudFiles.maxFilesPerTrigger: 50
        cloudFiles.inferColumnTypes: True
        cloudFiles.schemaEvolutionMode: "addNewColumns"
        cloudFiles.rescuedDataColumn: "_rescued_data"
    target: v_immigration_cloudfiles
    description: "Load immigration from landing volume"

  - name: write_immigration_raw
    type: write
    source: v_immigration_cloudfiles
    write_target:
      type: streaming_table
      catalog: "{catalog}"
      schema: "{raw_schema}"
      table: "immigration_raw"
