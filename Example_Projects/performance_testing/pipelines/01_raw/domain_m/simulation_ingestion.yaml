pipeline: domain_m_raw
flowgroup: simulation_ingestion
presets:
  - default_delta_properties
actions:
  - name: load_simulation_cloudfiles
    type: load
    operational_metadata:
      - "_source_file_path"
      - "_processing_timestamp"
    source:
      type: cloudfiles
      path: "{landing_volume}/simulation/*.parquet"
      format: parquet
      options:
        cloudFiles.format: parquet
        cloudFiles.maxFilesPerTrigger: 50
        cloudFiles.inferColumnTypes: True
        cloudFiles.schemaEvolutionMode: "addNewColumns"
        cloudFiles.rescuedDataColumn: "_rescued_data"
    target: v_simulation_cloudfiles
    description: "Load simulation from landing volume"

  - name: write_simulation_raw
    type: write
    source: v_simulation_cloudfiles
    write_target:
      type: streaming_table
      catalog: "{catalog}"
      schema: "{raw_schema}"
      table: "simulation_raw"
