pipeline: perf_raw
flowgroup: device_group_ingestion
presets:
  - default_delta_properties
actions:
  - name: load_device_group_cloudfiles
    type: load
    operational_metadata:
      - "_source_file_path"
      - "_processing_timestamp"
    source:
      type: cloudfiles
      path: "{landing_volume}/device_group/*.parquet"
      format: parquet
      options:
        cloudFiles.format: parquet
        cloudFiles.maxFilesPerTrigger: 50
        cloudFiles.inferColumnTypes: True
        cloudFiles.schemaEvolutionMode: "addNewColumns"
        cloudFiles.rescuedDataColumn: "_rescued_data"
    target: v_device_group_cloudfiles
    description: "Load device_group from landing volume"

  - name: write_device_group_raw
    type: write
    source: v_device_group_cloudfiles
    write_target:
      type: streaming_table
      catalog: "{catalog}"
      schema: "{raw_schema}"
      table: "device_group_raw"
