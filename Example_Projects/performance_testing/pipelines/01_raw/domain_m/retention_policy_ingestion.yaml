pipeline: perf_raw
flowgroup: retention_policy_ingestion
presets:
  - default_delta_properties
actions:
  - name: load_retention_policy_cloudfiles
    type: load
    operational_metadata:
      - "_source_file_path"
      - "_processing_timestamp"
    source:
      type: cloudfiles
      path: "{landing_volume}/retention_policy/*.parquet"
      format: parquet
      options:
        cloudFiles.format: parquet
        cloudFiles.maxFilesPerTrigger: 50
        cloudFiles.inferColumnTypes: True
        cloudFiles.schemaEvolutionMode: "addNewColumns"
        cloudFiles.rescuedDataColumn: "_rescued_data"
    target: v_retention_policy_cloudfiles
    description: "Load retention_policy from landing volume"

  - name: write_retention_policy_raw
    type: write
    source: v_retention_policy_cloudfiles
    write_target:
      type: streaming_table
      catalog: "{catalog}"
      schema: "{raw_schema}"
      table: "retention_policy_raw"
