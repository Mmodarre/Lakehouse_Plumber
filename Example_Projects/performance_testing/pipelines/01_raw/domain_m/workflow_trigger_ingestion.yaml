pipeline: domain_m_raw
flowgroup: workflow_trigger_ingestion
presets:
  - default_delta_properties
actions:
  - name: load_workflow_trigger_cloudfiles
    type: load
    operational_metadata:
      - "_source_file_path"
      - "_processing_timestamp"
    source:
      type: cloudfiles
      path: "{landing_volume}/workflow_trigger/*.parquet"
      format: parquet
      options:
        cloudFiles.format: parquet
        cloudFiles.maxFilesPerTrigger: 50
        cloudFiles.inferColumnTypes: True
        cloudFiles.schemaEvolutionMode: "addNewColumns"
        cloudFiles.rescuedDataColumn: "_rescued_data"
    target: v_workflow_trigger_cloudfiles
    description: "Load workflow_trigger from landing volume"

  - name: write_workflow_trigger_raw
    type: write
    source: v_workflow_trigger_cloudfiles
    write_target:
      type: streaming_table
      catalog: "{catalog}"
      schema: "{raw_schema}"
      table: "workflow_trigger_raw"
