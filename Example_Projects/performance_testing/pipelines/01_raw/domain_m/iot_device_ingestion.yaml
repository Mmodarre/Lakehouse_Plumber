pipeline: domain_m_raw
flowgroup: iot_device_ingestion
presets:
  - default_delta_properties
actions:
  - name: load_iot_device_cloudfiles
    type: load
    operational_metadata:
      - "_source_file_path"
      - "_processing_timestamp"
    source:
      type: cloudfiles
      path: "{landing_volume}/iot_device/*.parquet"
      format: parquet
      options:
        cloudFiles.format: parquet
        cloudFiles.maxFilesPerTrigger: 50
        cloudFiles.inferColumnTypes: True
        cloudFiles.schemaEvolutionMode: "addNewColumns"
        cloudFiles.rescuedDataColumn: "_rescued_data"
    target: v_iot_device_cloudfiles
    description: "Load iot_device from landing volume"

  - name: write_iot_device_raw
    type: write
    source: v_iot_device_cloudfiles
    write_target:
      type: streaming_table
      catalog: "{catalog}"
      schema: "{raw_schema}"
      table: "iot_device_raw"
