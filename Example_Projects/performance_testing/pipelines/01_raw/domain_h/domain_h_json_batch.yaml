pipeline: domain_h_raw
use_template: json_ingestion_template
presets:
  - default_delta_properties

flowgroups:
  - flowgroup: purchase_ingestion
    template_parameters:
      table_name: purchase_raw
      landing_folder: purchase
      schema_file: nation_schema

  - flowgroup: price_tag_ingestion
    template_parameters:
      table_name: price_tag_raw
      landing_folder: price_tag
      schema_file: lineitem_schema

  - flowgroup: reorder_ingestion
    template_parameters:
      table_name: reorder_raw
      landing_folder: reorder
      schema_file: customer_schema

  - flowgroup: clearance_ingestion
    template_parameters:
      table_name: clearance_raw
      landing_folder: clearance
      schema_file: orders_schema

  - flowgroup: foot_traffic_ingestion
    template_parameters:
      table_name: foot_traffic_raw
      landing_folder: foot_traffic
      schema_file: nation_schema

  - flowgroup: nps_score_ingestion
    template_parameters:
      table_name: nps_score_raw
      landing_folder: nps_score
      schema_file: lineitem_schema

  - flowgroup: self_checkout_ingestion
    template_parameters:
      table_name: self_checkout_raw
      landing_folder: self_checkout
      schema_file: part_schema

  - flowgroup: price_override_ingestion
    template_parameters:
      table_name: price_override_raw
      landing_folder: price_override
      schema_file: orders_schema
