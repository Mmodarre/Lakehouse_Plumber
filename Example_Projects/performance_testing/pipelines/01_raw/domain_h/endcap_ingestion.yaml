pipeline: perf_raw
flowgroup: endcap_ingestion
presets:
  - default_delta_properties
actions:
  - name: load_endcap_cloudfiles
    type: load
    operational_metadata:
      - "_source_file_path"
      - "_processing_timestamp"
    source:
      type: cloudfiles
      path: "{landing_volume}/endcap/*.parquet"
      format: parquet
      options:
        cloudFiles.format: parquet
        cloudFiles.maxFilesPerTrigger: 50
        cloudFiles.inferColumnTypes: True
        cloudFiles.schemaEvolutionMode: "addNewColumns"
        cloudFiles.rescuedDataColumn: "_rescued_data"
    target: v_endcap_cloudfiles
    description: "Load endcap from landing volume"

  - name: write_endcap_raw
    type: write
    source: v_endcap_cloudfiles
    write_target:
      type: streaming_table
      catalog: "{catalog}"
      schema: "{raw_schema}"
      table: "endcap_raw"
