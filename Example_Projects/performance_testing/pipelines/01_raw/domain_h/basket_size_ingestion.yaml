pipeline: perf_raw
flowgroup: basket_size_ingestion
presets:
  - default_delta_properties
actions:
  - name: load_basket_size_cloudfiles
    type: load
    operational_metadata:
      - "_source_file_path"
      - "_processing_timestamp"
    source:
      type: cloudfiles
      path: "{landing_volume}/basket_size/*.parquet"
      format: parquet
      options:
        cloudFiles.format: parquet
        cloudFiles.maxFilesPerTrigger: 50
        cloudFiles.inferColumnTypes: True
        cloudFiles.schemaEvolutionMode: "addNewColumns"
        cloudFiles.rescuedDataColumn: "_rescued_data"
    target: v_basket_size_cloudfiles
    description: "Load basket_size from landing volume"

  - name: write_basket_size_raw
    type: write
    source: v_basket_size_cloudfiles
    write_target:
      type: streaming_table
      catalog: "{catalog}"
      schema: "{raw_schema}"
      table: "basket_size_raw"
