pipeline: perf_raw
flowgroup: yellow_card_ingestion
presets:
  - default_delta_properties
actions:
  - name: load_yellow_card_cloudfiles
    type: load
    operational_metadata:
      - "_source_file_path"
      - "_processing_timestamp"
    source:
      type: cloudfiles
      path: "{landing_volume}/yellow_card/*.parquet"
      format: parquet
      options:
        cloudFiles.format: parquet
        cloudFiles.maxFilesPerTrigger: 50
        cloudFiles.inferColumnTypes: True
        cloudFiles.schemaEvolutionMode: "addNewColumns"
        cloudFiles.rescuedDataColumn: "_rescued_data"
    target: v_yellow_card_cloudfiles
    description: "Load yellow_card from landing volume"

  - name: write_yellow_card_raw
    type: write
    source: v_yellow_card_cloudfiles
    write_target:
      type: streaming_table
      catalog: "{catalog}"
      schema: "{raw_schema}"
      table: "yellow_card_raw"
