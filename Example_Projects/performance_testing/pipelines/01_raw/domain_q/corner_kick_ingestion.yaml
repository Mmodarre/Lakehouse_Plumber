pipeline: perf_raw
flowgroup: corner_kick_ingestion
presets:
  - default_delta_properties
actions:
  - name: load_corner_kick_cloudfiles
    type: load
    operational_metadata:
      - "_source_file_path"
      - "_processing_timestamp"
    source:
      type: cloudfiles
      path: "{landing_volume}/corner_kick/*.parquet"
      format: parquet
      options:
        cloudFiles.format: parquet
        cloudFiles.maxFilesPerTrigger: 50
        cloudFiles.inferColumnTypes: True
        cloudFiles.schemaEvolutionMode: "addNewColumns"
        cloudFiles.rescuedDataColumn: "_rescued_data"
    target: v_corner_kick_cloudfiles
    description: "Load corner_kick from landing volume"

  - name: write_corner_kick_raw
    type: write
    source: v_corner_kick_cloudfiles
    write_target:
      type: streaming_table
      catalog: "{catalog}"
      schema: "{raw_schema}"
      table: "corner_kick_raw"
