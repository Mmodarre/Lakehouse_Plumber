pipeline: perf_raw
flowgroup: training_session_ingestion
presets:
  - default_delta_properties
actions:
  - name: load_training_session_cloudfiles
    type: load
    operational_metadata:
      - "_source_file_path"
      - "_processing_timestamp"
    source:
      type: cloudfiles
      path: "{landing_volume}/training_session/*.parquet"
      format: parquet
      options:
        cloudFiles.format: parquet
        cloudFiles.maxFilesPerTrigger: 50
        cloudFiles.inferColumnTypes: True
        cloudFiles.schemaEvolutionMode: "addNewColumns"
        cloudFiles.rescuedDataColumn: "_rescued_data"
    target: v_training_session_cloudfiles
    description: "Load training_session from landing volume"

  - name: write_training_session_raw
    type: write
    source: v_training_session_cloudfiles
    write_target:
      type: streaming_table
      catalog: "{catalog}"
      schema: "{raw_schema}"
      table: "training_session_raw"
