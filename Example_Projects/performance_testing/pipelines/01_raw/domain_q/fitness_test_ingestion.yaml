pipeline: domain_q_raw
flowgroup: fitness_test_ingestion
presets:
  - default_delta_properties
actions:
  - name: load_fitness_test_cloudfiles
    type: load
    operational_metadata:
      - "_source_file_path"
      - "_processing_timestamp"
    source:
      type: cloudfiles
      path: "{landing_volume}/fitness_test/*.parquet"
      format: parquet
      options:
        cloudFiles.format: parquet
        cloudFiles.maxFilesPerTrigger: 50
        cloudFiles.inferColumnTypes: True
        cloudFiles.schemaEvolutionMode: "addNewColumns"
        cloudFiles.rescuedDataColumn: "_rescued_data"
    target: v_fitness_test_cloudfiles
    description: "Load fitness_test from landing volume"

  - name: write_fitness_test_raw
    type: write
    source: v_fitness_test_cloudfiles
    write_target:
      type: streaming_table
      catalog: "{catalog}"
      schema: "{raw_schema}"
      table: "fitness_test_raw"
