pipeline: domain_j_raw
flowgroup: wind_turbine_ingestion
presets:
  - default_delta_properties
actions:
  - name: load_wind_turbine_cloudfiles
    type: load
    operational_metadata:
      - "_source_file_path"
      - "_processing_timestamp"
    source:
      type: cloudfiles
      path: "{landing_volume}/wind_turbine/*.parquet"
      format: parquet
      options:
        cloudFiles.format: parquet
        cloudFiles.maxFilesPerTrigger: 50
        cloudFiles.inferColumnTypes: True
        cloudFiles.schemaEvolutionMode: "addNewColumns"
        cloudFiles.rescuedDataColumn: "_rescued_data"
    target: v_wind_turbine_cloudfiles
    description: "Load wind_turbine from landing volume"

  - name: write_wind_turbine_raw
    type: write
    source: v_wind_turbine_cloudfiles
    write_target:
      type: streaming_table
      catalog: "{catalog}"
      schema: "{raw_schema}"
      table: "wind_turbine_raw"
