pipeline: perf_raw
flowgroup: demand_response_ingestion
presets:
  - default_delta_properties
actions:
  - name: load_demand_response_cloudfiles
    type: load
    operational_metadata:
      - "_source_file_path"
      - "_processing_timestamp"
    source:
      type: cloudfiles
      path: "{landing_volume}/demand_response/*.parquet"
      format: parquet
      options:
        cloudFiles.format: parquet
        cloudFiles.maxFilesPerTrigger: 50
        cloudFiles.inferColumnTypes: True
        cloudFiles.schemaEvolutionMode: "addNewColumns"
        cloudFiles.rescuedDataColumn: "_rescued_data"
    target: v_demand_response_cloudfiles
    description: "Load demand_response from landing volume"

  - name: write_demand_response_raw
    type: write
    source: v_demand_response_cloudfiles
    write_target:
      type: streaming_table
      catalog: "{catalog}"
      schema: "{raw_schema}"
      table: "demand_response_raw"
