pipeline: domain_j_raw
flowgroup: curtailment_ingestion
presets:
  - default_delta_properties
actions:
  - name: load_curtailment_cloudfiles
    type: load
    operational_metadata:
      - "_source_file_path"
      - "_processing_timestamp"
    source:
      type: cloudfiles
      path: "{landing_volume}/curtailment/*.parquet"
      format: parquet
      options:
        cloudFiles.format: parquet
        cloudFiles.maxFilesPerTrigger: 50
        cloudFiles.inferColumnTypes: True
        cloudFiles.schemaEvolutionMode: "addNewColumns"
        cloudFiles.rescuedDataColumn: "_rescued_data"
    target: v_curtailment_cloudfiles
    description: "Load curtailment from landing volume"

  - name: write_curtailment_raw
    type: write
    source: v_curtailment_cloudfiles
    write_target:
      type: streaming_table
      catalog: "{catalog}"
      schema: "{raw_schema}"
      table: "curtailment_raw"
