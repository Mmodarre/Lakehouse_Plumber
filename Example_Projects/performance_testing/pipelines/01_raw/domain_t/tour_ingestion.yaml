pipeline: domain_t_raw
flowgroup: tour_ingestion
presets:
  - default_delta_properties
actions:
  - name: load_tour_cloudfiles
    type: load
    operational_metadata:
      - "_source_file_path"
      - "_processing_timestamp"
    source:
      type: cloudfiles
      path: "{landing_volume}/tour/*.parquet"
      format: parquet
      options:
        cloudFiles.format: parquet
        cloudFiles.maxFilesPerTrigger: 50
        cloudFiles.inferColumnTypes: True
        cloudFiles.schemaEvolutionMode: "addNewColumns"
        cloudFiles.rescuedDataColumn: "_rescued_data"
    target: v_tour_cloudfiles
    description: "Load tour from landing volume"

  - name: write_tour_raw
    type: write
    source: v_tour_cloudfiles
    write_target:
      type: streaming_table
      catalog: "{catalog}"
      schema: "{raw_schema}"
      table: "tour_raw"
