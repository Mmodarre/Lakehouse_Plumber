pipeline: perf_raw
flowgroup: music_track_ingestion
presets:
  - default_delta_properties
actions:
  - name: load_music_track_cloudfiles
    type: load
    operational_metadata:
      - "_source_file_path"
      - "_processing_timestamp"
    source:
      type: cloudfiles
      path: "{landing_volume}/music_track/*.parquet"
      format: parquet
      options:
        cloudFiles.format: parquet
        cloudFiles.maxFilesPerTrigger: 50
        cloudFiles.inferColumnTypes: True
        cloudFiles.schemaEvolutionMode: "addNewColumns"
        cloudFiles.rescuedDataColumn: "_rescued_data"
    target: v_music_track_cloudfiles
    description: "Load music_track from landing volume"

  - name: write_music_track_raw
    type: write
    source: v_music_track_cloudfiles
    write_target:
      type: streaming_table
      catalog: "{catalog}"
      schema: "{raw_schema}"
      table: "music_track_raw"
