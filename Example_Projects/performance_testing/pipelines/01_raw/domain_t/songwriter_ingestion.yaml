pipeline: domain_t_raw
flowgroup: songwriter_ingestion
presets:
  - default_delta_properties
actions:
  - name: load_songwriter_cloudfiles
    type: load
    operational_metadata:
      - "_source_file_path"
      - "_processing_timestamp"
    source:
      type: cloudfiles
      path: "{landing_volume}/songwriter/*.parquet"
      format: parquet
      options:
        cloudFiles.format: parquet
        cloudFiles.maxFilesPerTrigger: 50
        cloudFiles.inferColumnTypes: True
        cloudFiles.schemaEvolutionMode: "addNewColumns"
        cloudFiles.rescuedDataColumn: "_rescued_data"
    target: v_songwriter_cloudfiles
    description: "Load songwriter from landing volume"

  - name: write_songwriter_raw
    type: write
    source: v_songwriter_cloudfiles
    write_target:
      type: streaming_table
      catalog: "{catalog}"
      schema: "{raw_schema}"
      table: "songwriter_raw"
