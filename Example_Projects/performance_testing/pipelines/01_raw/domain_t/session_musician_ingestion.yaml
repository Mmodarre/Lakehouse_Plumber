pipeline: domain_t_raw
flowgroup: session_musician_ingestion
presets:
  - default_delta_properties
actions:
  - name: load_session_musician_cloudfiles
    type: load
    operational_metadata:
      - "_source_file_path"
      - "_processing_timestamp"
    source:
      type: cloudfiles
      path: "{landing_volume}/session_musician/*.parquet"
      format: parquet
      options:
        cloudFiles.format: parquet
        cloudFiles.maxFilesPerTrigger: 50
        cloudFiles.inferColumnTypes: True
        cloudFiles.schemaEvolutionMode: "addNewColumns"
        cloudFiles.rescuedDataColumn: "_rescued_data"
    target: v_session_musician_cloudfiles
    description: "Load session_musician from landing volume"

  - name: write_session_musician_raw
    type: write
    source: v_session_musician_cloudfiles
    write_target:
      type: streaming_table
      catalog: "{catalog}"
      schema: "{raw_schema}"
      table: "session_musician_raw"
