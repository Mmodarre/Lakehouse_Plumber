pipeline: domain_c_raw
flowgroup: trial_balance_ingestion
presets:
  - default_delta_properties
actions:
  - name: load_trial_balance_cloudfiles
    type: load
    operational_metadata:
      - "_source_file_path"
      - "_processing_timestamp"
    source:
      type: cloudfiles
      path: "{landing_volume}/trial_balance/*.parquet"
      format: parquet
      options:
        cloudFiles.format: parquet
        cloudFiles.maxFilesPerTrigger: 50
        cloudFiles.inferColumnTypes: True
        cloudFiles.schemaEvolutionMode: "addNewColumns"
        cloudFiles.rescuedDataColumn: "_rescued_data"
    target: v_trial_balance_cloudfiles
    description: "Load trial_balance from landing volume"

  - name: write_trial_balance_raw
    type: write
    source: v_trial_balance_cloudfiles
    write_target:
      type: streaming_table
      catalog: "{catalog}"
      schema: "{raw_schema}"
      table: "trial_balance_raw"
