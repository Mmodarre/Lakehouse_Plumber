pipeline: perf_raw
flowgroup: cash_flow_ingestion
presets:
  - default_delta_properties
actions:
  - name: load_cash_flow_cloudfiles
    type: load
    operational_metadata:
      - "_source_file_path"
      - "_processing_timestamp"
    source:
      type: cloudfiles
      path: "{landing_volume}/cash_flow/*.parquet"
      format: parquet
      options:
        cloudFiles.format: parquet
        cloudFiles.maxFilesPerTrigger: 50
        cloudFiles.inferColumnTypes: True
        cloudFiles.schemaEvolutionMode: "addNewColumns"
        cloudFiles.rescuedDataColumn: "_rescued_data"
    target: v_cash_flow_cloudfiles
    description: "Load cash_flow from landing volume"

  - name: write_cash_flow_raw
    type: write
    source: v_cash_flow_cloudfiles
    write_target:
      type: streaming_table
      catalog: "{catalog}"
      schema: "{raw_schema}"
      table: "cash_flow_raw"
