pipeline: domain_c_raw
flowgroup: expense_ingestion
presets:
  - default_delta_properties
actions:
  - name: load_expense_cloudfiles
    type: load
    operational_metadata:
      - "_source_file_path"
      - "_processing_timestamp"
    source:
      type: cloudfiles
      path: "{landing_volume}/expense/*.parquet"
      format: parquet
      options:
        cloudFiles.format: parquet
        cloudFiles.maxFilesPerTrigger: 50
        cloudFiles.inferColumnTypes: True
        cloudFiles.schemaEvolutionMode: "addNewColumns"
        cloudFiles.rescuedDataColumn: "_rescued_data"
    target: v_expense_cloudfiles
    description: "Load expense from landing volume"

  - name: write_expense_raw
    type: write
    source: v_expense_cloudfiles
    write_target:
      type: streaming_table
      catalog: "{catalog}"
      schema: "{raw_schema}"
      table: "expense_raw"
