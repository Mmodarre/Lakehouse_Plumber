pipeline: perf_raw
flowgroup: segment_report_ingestion
presets:
  - default_delta_properties
actions:
  - name: load_segment_report_cloudfiles
    type: load
    operational_metadata:
      - "_source_file_path"
      - "_processing_timestamp"
    source:
      type: cloudfiles
      path: "{landing_volume}/segment_report/*.parquet"
      format: parquet
      options:
        cloudFiles.format: parquet
        cloudFiles.maxFilesPerTrigger: 50
        cloudFiles.inferColumnTypes: True
        cloudFiles.schemaEvolutionMode: "addNewColumns"
        cloudFiles.rescuedDataColumn: "_rescued_data"
    target: v_segment_report_cloudfiles
    description: "Load segment_report from landing volume"

  - name: write_segment_report_raw
    type: write
    source: v_segment_report_cloudfiles
    write_target:
      type: streaming_table
      catalog: "{catalog}"
      schema: "{raw_schema}"
      table: "segment_report_raw"
