pipeline: domain_c_raw
flowgroup: transaction_ingestion
presets:
  - default_delta_properties
actions:
  - name: load_transaction_cloudfiles
    type: load
    operational_metadata:
      - "_source_file_path"
      - "_processing_timestamp"
    source:
      type: cloudfiles
      path: "{landing_volume}/transaction/*.parquet"
      format: parquet
      options:
        cloudFiles.format: parquet
        cloudFiles.maxFilesPerTrigger: 50
        cloudFiles.inferColumnTypes: True
        cloudFiles.schemaEvolutionMode: "addNewColumns"
        cloudFiles.rescuedDataColumn: "_rescued_data"
    target: v_transaction_cloudfiles
    description: "Load transaction from landing volume"

  - name: write_transaction_raw
    type: write
    source: v_transaction_cloudfiles
    write_target:
      type: streaming_table
      catalog: "{catalog}"
      schema: "{raw_schema}"
      table: "transaction_raw"
