pipeline: domain_p_raw
flowgroup: trial_ingestion
presets:
  - default_delta_properties
actions:
  - name: load_trial_cloudfiles
    type: load
    operational_metadata:
      - "_source_file_path"
      - "_processing_timestamp"
    source:
      type: cloudfiles
      path: "{landing_volume}/trial/*.parquet"
      format: parquet
      options:
        cloudFiles.format: parquet
        cloudFiles.maxFilesPerTrigger: 50
        cloudFiles.inferColumnTypes: True
        cloudFiles.schemaEvolutionMode: "addNewColumns"
        cloudFiles.rescuedDataColumn: "_rescued_data"
    target: v_trial_cloudfiles
    description: "Load trial from landing volume"

  - name: write_trial_raw
    type: write
    source: v_trial_cloudfiles
    write_target:
      type: streaming_table
      catalog: "{catalog}"
      schema: "{raw_schema}"
      table: "trial_raw"
