pipeline: domain_p_raw
flowgroup: petri_dish_ingestion
presets:
  - default_delta_properties
actions:
  - name: load_petri_dish_cloudfiles
    type: load
    operational_metadata:
      - "_source_file_path"
      - "_processing_timestamp"
    source:
      type: cloudfiles
      path: "{landing_volume}/petri_dish/*.parquet"
      format: parquet
      options:
        cloudFiles.format: parquet
        cloudFiles.maxFilesPerTrigger: 50
        cloudFiles.inferColumnTypes: True
        cloudFiles.schemaEvolutionMode: "addNewColumns"
        cloudFiles.rescuedDataColumn: "_rescued_data"
    target: v_petri_dish_cloudfiles
    description: "Load petri_dish from landing volume"

  - name: write_petri_dish_raw
    type: write
    source: v_petri_dish_cloudfiles
    write_target:
      type: streaming_table
      catalog: "{catalog}"
      schema: "{raw_schema}"
      table: "petri_dish_raw"
