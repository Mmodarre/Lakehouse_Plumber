pipeline: perf_raw
flowgroup: drug_target_ingestion
presets:
  - default_delta_properties
actions:
  - name: load_drug_target_cloudfiles
    type: load
    operational_metadata:
      - "_source_file_path"
      - "_processing_timestamp"
    source:
      type: cloudfiles
      path: "{landing_volume}/drug_target/*.parquet"
      format: parquet
      options:
        cloudFiles.format: parquet
        cloudFiles.maxFilesPerTrigger: 50
        cloudFiles.inferColumnTypes: True
        cloudFiles.schemaEvolutionMode: "addNewColumns"
        cloudFiles.rescuedDataColumn: "_rescued_data"
    target: v_drug_target_cloudfiles
    description: "Load drug_target from landing volume"

  - name: write_drug_target_raw
    type: write
    source: v_drug_target_cloudfiles
    write_target:
      type: streaming_table
      catalog: "{catalog}"
      schema: "{raw_schema}"
      table: "drug_target_raw"
