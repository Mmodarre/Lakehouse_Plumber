pipeline: perf_raw
flowgroup: western_blot_ingestion
presets:
  - default_delta_properties
actions:
  - name: load_western_blot_cloudfiles
    type: load
    operational_metadata:
      - "_source_file_path"
      - "_processing_timestamp"
    source:
      type: cloudfiles
      path: "{landing_volume}/western_blot/*.parquet"
      format: parquet
      options:
        cloudFiles.format: parquet
        cloudFiles.maxFilesPerTrigger: 50
        cloudFiles.inferColumnTypes: True
        cloudFiles.schemaEvolutionMode: "addNewColumns"
        cloudFiles.rescuedDataColumn: "_rescued_data"
    target: v_western_blot_cloudfiles
    description: "Load western_blot from landing volume"

  - name: write_western_blot_raw
    type: write
    source: v_western_blot_cloudfiles
    write_target:
      type: streaming_table
      catalog: "{catalog}"
      schema: "{raw_schema}"
      table: "western_blot_raw"
