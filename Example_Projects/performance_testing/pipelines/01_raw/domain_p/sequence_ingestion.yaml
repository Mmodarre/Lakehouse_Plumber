pipeline: perf_raw
flowgroup: sequence_ingestion
presets:
  - default_delta_properties
actions:
  - name: load_sequence_cloudfiles
    type: load
    operational_metadata:
      - "_source_file_path"
      - "_processing_timestamp"
    source:
      type: cloudfiles
      path: "{landing_volume}/sequence/*.parquet"
      format: parquet
      options:
        cloudFiles.format: parquet
        cloudFiles.maxFilesPerTrigger: 50
        cloudFiles.inferColumnTypes: True
        cloudFiles.schemaEvolutionMode: "addNewColumns"
        cloudFiles.rescuedDataColumn: "_rescued_data"
    target: v_sequence_cloudfiles
    description: "Load sequence from landing volume"

  - name: write_sequence_raw
    type: write
    source: v_sequence_cloudfiles
    write_target:
      type: streaming_table
      catalog: "{catalog}"
      schema: "{raw_schema}"
      table: "sequence_raw"
