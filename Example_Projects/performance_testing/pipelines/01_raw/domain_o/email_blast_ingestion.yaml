pipeline: domain_o_raw
flowgroup: email_blast_ingestion
presets:
  - default_delta_properties
actions:
  - name: load_email_blast_cloudfiles
    type: load
    operational_metadata:
      - "_source_file_path"
      - "_processing_timestamp"
    source:
      type: cloudfiles
      path: "{landing_volume}/email_blast/*.parquet"
      format: parquet
      options:
        cloudFiles.format: parquet
        cloudFiles.maxFilesPerTrigger: 50
        cloudFiles.inferColumnTypes: True
        cloudFiles.schemaEvolutionMode: "addNewColumns"
        cloudFiles.rescuedDataColumn: "_rescued_data"
    target: v_email_blast_cloudfiles
    description: "Load email_blast from landing volume"

  - name: write_email_blast_raw
    type: write
    source: v_email_blast_cloudfiles
    write_target:
      type: streaming_table
      catalog: "{catalog}"
      schema: "{raw_schema}"
      table: "email_blast_raw"
