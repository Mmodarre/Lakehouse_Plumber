pipeline: perf_raw
flowgroup: ad_group_ingestion
presets:
  - default_delta_properties
actions:
  - name: load_ad_group_cloudfiles
    type: load
    operational_metadata:
      - "_source_file_path"
      - "_processing_timestamp"
    source:
      type: cloudfiles
      path: "{landing_volume}/ad_group/*.parquet"
      format: parquet
      options:
        cloudFiles.format: parquet
        cloudFiles.maxFilesPerTrigger: 50
        cloudFiles.inferColumnTypes: True
        cloudFiles.schemaEvolutionMode: "addNewColumns"
        cloudFiles.rescuedDataColumn: "_rescued_data"
    target: v_ad_group_cloudfiles
    description: "Load ad_group from landing volume"

  - name: write_ad_group_raw
    type: write
    source: v_ad_group_cloudfiles
    write_target:
      type: streaming_table
      catalog: "{catalog}"
      schema: "{raw_schema}"
      table: "ad_group_raw"
