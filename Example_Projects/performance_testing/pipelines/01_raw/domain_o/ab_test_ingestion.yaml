pipeline: perf_raw
flowgroup: ab_test_ingestion
presets:
  - default_delta_properties
actions:
  - name: load_ab_test_cloudfiles
    type: load
    operational_metadata:
      - "_source_file_path"
      - "_processing_timestamp"
    source:
      type: cloudfiles
      path: "{landing_volume}/ab_test/*.parquet"
      format: parquet
      options:
        cloudFiles.format: parquet
        cloudFiles.maxFilesPerTrigger: 50
        cloudFiles.inferColumnTypes: True
        cloudFiles.schemaEvolutionMode: "addNewColumns"
        cloudFiles.rescuedDataColumn: "_rescued_data"
    target: v_ab_test_cloudfiles
    description: "Load ab_test from landing volume"

  - name: write_ab_test_raw
    type: write
    source: v_ab_test_cloudfiles
    write_target:
      type: streaming_table
      catalog: "{catalog}"
      schema: "{raw_schema}"
      table: "ab_test_raw"
