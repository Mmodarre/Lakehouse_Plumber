pipeline: domain_o_raw
flowgroup: budget_alloc_ingestion
presets:
  - default_delta_properties
actions:
  - name: load_budget_alloc_cloudfiles
    type: load
    operational_metadata:
      - "_source_file_path"
      - "_processing_timestamp"
    source:
      type: cloudfiles
      path: "{landing_volume}/budget_alloc/*.parquet"
      format: parquet
      options:
        cloudFiles.format: parquet
        cloudFiles.maxFilesPerTrigger: 50
        cloudFiles.inferColumnTypes: True
        cloudFiles.schemaEvolutionMode: "addNewColumns"
        cloudFiles.rescuedDataColumn: "_rescued_data"
    target: v_budget_alloc_cloudfiles
    description: "Load budget_alloc from landing volume"

  - name: write_budget_alloc_raw
    type: write
    source: v_budget_alloc_cloudfiles
    write_target:
      type: streaming_table
      catalog: "{catalog}"
      schema: "{raw_schema}"
      table: "budget_alloc_raw"
