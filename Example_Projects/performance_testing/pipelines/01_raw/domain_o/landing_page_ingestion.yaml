pipeline: perf_raw
flowgroup: landing_page_ingestion
presets:
  - default_delta_properties
actions:
  - name: load_landing_page_cloudfiles
    type: load
    operational_metadata:
      - "_source_file_path"
      - "_processing_timestamp"
    source:
      type: cloudfiles
      path: "{landing_volume}/landing_page/*.parquet"
      format: parquet
      options:
        cloudFiles.format: parquet
        cloudFiles.maxFilesPerTrigger: 50
        cloudFiles.inferColumnTypes: True
        cloudFiles.schemaEvolutionMode: "addNewColumns"
        cloudFiles.rescuedDataColumn: "_rescued_data"
    target: v_landing_page_cloudfiles
    description: "Load landing_page from landing volume"

  - name: write_landing_page_raw
    type: write
    source: v_landing_page_cloudfiles
    write_target:
      type: streaming_table
      catalog: "{catalog}"
      schema: "{raw_schema}"
      table: "landing_page_raw"
