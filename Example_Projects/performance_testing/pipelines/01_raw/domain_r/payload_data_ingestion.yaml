pipeline: perf_raw
flowgroup: payload_data_ingestion
presets:
  - default_delta_properties
actions:
  - name: load_payload_data_cloudfiles
    type: load
    operational_metadata:
      - "_source_file_path"
      - "_processing_timestamp"
    source:
      type: cloudfiles
      path: "{landing_volume}/payload_data/*.parquet"
      format: parquet
      options:
        cloudFiles.format: parquet
        cloudFiles.maxFilesPerTrigger: 50
        cloudFiles.inferColumnTypes: True
        cloudFiles.schemaEvolutionMode: "addNewColumns"
        cloudFiles.rescuedDataColumn: "_rescued_data"
    target: v_payload_data_cloudfiles
    description: "Load payload_data from landing volume"

  - name: write_payload_data_raw
    type: write
    source: v_payload_data_cloudfiles
    write_target:
      type: streaming_table
      catalog: "{catalog}"
      schema: "{raw_schema}"
      table: "payload_data_raw"
