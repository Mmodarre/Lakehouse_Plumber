pipeline: domain_r_raw
flowgroup: collision_avoidance_ingestion
presets:
  - default_delta_properties
actions:
  - name: load_collision_avoidance_cloudfiles
    type: load
    operational_metadata:
      - "_source_file_path"
      - "_processing_timestamp"
    source:
      type: cloudfiles
      path: "{landing_volume}/collision_avoidance/*.parquet"
      format: parquet
      options:
        cloudFiles.format: parquet
        cloudFiles.maxFilesPerTrigger: 50
        cloudFiles.inferColumnTypes: True
        cloudFiles.schemaEvolutionMode: "addNewColumns"
        cloudFiles.rescuedDataColumn: "_rescued_data"
    target: v_collision_avoidance_cloudfiles
    description: "Load collision_avoidance from landing volume"

  - name: write_collision_avoidance_raw
    type: write
    source: v_collision_avoidance_cloudfiles
    write_target:
      type: streaming_table
      catalog: "{catalog}"
      schema: "{raw_schema}"
      table: "collision_avoidance_raw"
