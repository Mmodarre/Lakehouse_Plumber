pipeline: perf_raw
flowgroup: cycle_time_ingestion
presets:
  - default_delta_properties
actions:
  - name: load_cycle_time_cloudfiles
    type: load
    operational_metadata:
      - "_source_file_path"
      - "_processing_timestamp"
    source:
      type: cloudfiles
      path: "{landing_volume}/cycle_time/*.parquet"
      format: parquet
      options:
        cloudFiles.format: parquet
        cloudFiles.maxFilesPerTrigger: 50
        cloudFiles.inferColumnTypes: True
        cloudFiles.schemaEvolutionMode: "addNewColumns"
        cloudFiles.rescuedDataColumn: "_rescued_data"
    target: v_cycle_time_cloudfiles
    description: "Load cycle_time from landing volume"

  - name: write_cycle_time_raw
    type: write
    source: v_cycle_time_cloudfiles
    write_target:
      type: streaming_table
      catalog: "{catalog}"
      schema: "{raw_schema}"
      table: "cycle_time_raw"
