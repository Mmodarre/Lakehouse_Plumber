pipeline: domain_i_raw
flowgroup: fixture_ingestion
presets:
  - default_delta_properties
actions:
  - name: load_fixture_cloudfiles
    type: load
    operational_metadata:
      - "_source_file_path"
      - "_processing_timestamp"
    source:
      type: cloudfiles
      path: "{landing_volume}/fixture/*.parquet"
      format: parquet
      options:
        cloudFiles.format: parquet
        cloudFiles.maxFilesPerTrigger: 50
        cloudFiles.inferColumnTypes: True
        cloudFiles.schemaEvolutionMode: "addNewColumns"
        cloudFiles.rescuedDataColumn: "_rescued_data"
    target: v_fixture_cloudfiles
    description: "Load fixture from landing volume"

  - name: write_fixture_raw
    type: write
    source: v_fixture_cloudfiles
    write_target:
      type: streaming_table
      catalog: "{catalog}"
      schema: "{raw_schema}"
      table: "fixture_raw"
