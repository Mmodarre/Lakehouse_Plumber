pipeline: perf_raw
flowgroup: spc_chart_ingestion
presets:
  - default_delta_properties
actions:
  - name: load_spc_chart_cloudfiles
    type: load
    operational_metadata:
      - "_source_file_path"
      - "_processing_timestamp"
    source:
      type: cloudfiles
      path: "{landing_volume}/spc_chart/*.parquet"
      format: parquet
      options:
        cloudFiles.format: parquet
        cloudFiles.maxFilesPerTrigger: 50
        cloudFiles.inferColumnTypes: True
        cloudFiles.schemaEvolutionMode: "addNewColumns"
        cloudFiles.rescuedDataColumn: "_rescued_data"
    target: v_spc_chart_cloudfiles
    description: "Load spc_chart from landing volume"

  - name: write_spc_chart_raw
    type: write
    source: v_spc_chart_cloudfiles
    write_target:
      type: streaming_table
      catalog: "{catalog}"
      schema: "{raw_schema}"
      table: "spc_chart_raw"
