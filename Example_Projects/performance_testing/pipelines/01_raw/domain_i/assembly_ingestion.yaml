pipeline: domain_i_raw
flowgroup: assembly_ingestion
presets:
  - default_delta_properties
actions:
  - name: load_assembly_cloudfiles
    type: load
    operational_metadata:
      - "_source_file_path"
      - "_processing_timestamp"
    source:
      type: cloudfiles
      path: "{landing_volume}/assembly/*.parquet"
      format: parquet
      options:
        cloudFiles.format: parquet
        cloudFiles.maxFilesPerTrigger: 50
        cloudFiles.inferColumnTypes: True
        cloudFiles.schemaEvolutionMode: "addNewColumns"
        cloudFiles.rescuedDataColumn: "_rescued_data"
    target: v_assembly_cloudfiles
    description: "Load assembly from landing volume"

  - name: write_assembly_raw
    type: write
    source: v_assembly_cloudfiles
    write_target:
      type: streaming_table
      catalog: "{catalog}"
      schema: "{raw_schema}"
      table: "assembly_raw"
