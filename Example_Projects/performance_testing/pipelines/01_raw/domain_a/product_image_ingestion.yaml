pipeline: domain_a_raw
flowgroup: product_image_ingestion
presets:
  - default_delta_properties
actions:
  - name: load_product_image_cloudfiles
    type: load
    operational_metadata:
      - "_source_file_path"
      - "_processing_timestamp"
    source:
      type: cloudfiles
      path: "{landing_volume}/product_image/*.parquet"
      format: parquet
      options:
        cloudFiles.format: parquet
        cloudFiles.maxFilesPerTrigger: 50
        cloudFiles.inferColumnTypes: True
        cloudFiles.schemaEvolutionMode: "addNewColumns"
        cloudFiles.rescuedDataColumn: "_rescued_data"
    target: v_product_image_cloudfiles
    description: "Load product_image from landing volume"

  - name: write_product_image_raw
    type: write
    source: v_product_image_cloudfiles
    write_target:
      type: streaming_table
      catalog: "{catalog}"
      schema: "{raw_schema}"
      table: "product_image_raw"
