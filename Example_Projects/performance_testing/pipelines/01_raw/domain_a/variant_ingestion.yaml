pipeline: domain_a_raw
flowgroup: variant_ingestion
presets:
  - default_delta_properties
actions:
  - name: load_variant_cloudfiles
    type: load
    operational_metadata:
      - "_source_file_path"
      - "_processing_timestamp"
    source:
      type: cloudfiles
      path: "{landing_volume}/variant/*.parquet"
      format: parquet
      options:
        cloudFiles.format: parquet
        cloudFiles.maxFilesPerTrigger: 50
        cloudFiles.inferColumnTypes: True
        cloudFiles.schemaEvolutionMode: "addNewColumns"
        cloudFiles.rescuedDataColumn: "_rescued_data"
    target: v_variant_cloudfiles
    description: "Load variant from landing volume"

  - name: write_variant_raw
    type: write
    source: v_variant_cloudfiles
    write_target:
      type: streaming_table
      catalog: "{catalog}"
      schema: "{raw_schema}"
      table: "variant_raw"
