pipeline: domain_l_raw
flowgroup: menu_item_ingestion
presets:
  - default_delta_properties
actions:
  - name: load_menu_item_cloudfiles
    type: load
    operational_metadata:
      - "_source_file_path"
      - "_processing_timestamp"
    source:
      type: cloudfiles
      path: "{landing_volume}/menu_item/*.parquet"
      format: parquet
      options:
        cloudFiles.format: parquet
        cloudFiles.maxFilesPerTrigger: 50
        cloudFiles.inferColumnTypes: True
        cloudFiles.schemaEvolutionMode: "addNewColumns"
        cloudFiles.rescuedDataColumn: "_rescued_data"
    target: v_menu_item_cloudfiles
    description: "Load menu_item from landing volume"

  - name: write_menu_item_raw
    type: write
    source: v_menu_item_cloudfiles
    write_target:
      type: streaming_table
      catalog: "{catalog}"
      schema: "{raw_schema}"
      table: "menu_item_raw"
