pipeline: perf_raw
flowgroup: food_cost_ingestion
presets:
  - default_delta_properties
actions:
  - name: load_food_cost_cloudfiles
    type: load
    operational_metadata:
      - "_source_file_path"
      - "_processing_timestamp"
    source:
      type: cloudfiles
      path: "{landing_volume}/food_cost/*.parquet"
      format: parquet
      options:
        cloudFiles.format: parquet
        cloudFiles.maxFilesPerTrigger: 50
        cloudFiles.inferColumnTypes: True
        cloudFiles.schemaEvolutionMode: "addNewColumns"
        cloudFiles.rescuedDataColumn: "_rescued_data"
    target: v_food_cost_cloudfiles
    description: "Load food_cost from landing volume"

  - name: write_food_cost_raw
    type: write
    source: v_food_cost_cloudfiles
    write_target:
      type: streaming_table
      catalog: "{catalog}"
      schema: "{raw_schema}"
      table: "food_cost_raw"
