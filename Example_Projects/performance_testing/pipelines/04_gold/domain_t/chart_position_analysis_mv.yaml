pipeline: domain_t_gold
flowgroup: chart_position_analysis_mv
actions:
  - name: chart_position_analysis_sql
    type: load
    source:
      type: sql
      sql: |
        SELECT
          *,
          current_timestamp() as _report_generated_at
        FROM {catalog}.{silver_schema}.chart_position_dim
    target: v_chart_position_analysis

  - name: write_chart_position_analysis_mv
    type: write
    source: v_chart_position_analysis
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{gold_schema}"
      table: "chart_position_analysis_mv"
