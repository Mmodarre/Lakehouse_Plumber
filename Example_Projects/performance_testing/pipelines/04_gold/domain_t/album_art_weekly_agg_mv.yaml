pipeline: perf_gold
flowgroup: album_art_weekly_agg_mv
actions:
  - name: album_art_weekly_agg_load
    type: load
    source:
      type: sql
      sql: |
        SELECT
          date_trunc('week', _etl_timestamp) as period,
          count(*) as record_count,
          current_timestamp() as _generated_at
        FROM {catalog}.{silver_schema}.album_art_dim
        GROUP BY 1
    target: v_album_art_weekly_agg

  - name: write_album_art_weekly_agg_mv
    type: write
    source: v_album_art_weekly_agg
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{gold_schema}"
      table: "album_art_weekly_agg_mv"
