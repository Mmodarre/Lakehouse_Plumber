pipeline: domain_t_gold
flowgroup: vinyl_pressing_quarterly_agg_mv
actions:
  - name: vinyl_pressing_quarterly_agg_load
    type: load
    source:
      type: sql
      sql: |
        SELECT
          date_trunc('quarter', _etl_timestamp) as period,
          count(*) as record_count,
          current_timestamp() as _generated_at
        FROM {catalog}.{silver_schema}.vinyl_pressing_fct
        GROUP BY 1
    target: v_vinyl_pressing_quarterly_agg

  - name: write_vinyl_pressing_quarterly_agg_mv
    type: write
    source: v_vinyl_pressing_quarterly_agg
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{gold_schema}"
      table: "vinyl_pressing_quarterly_agg_mv"
