pipeline: perf_gold
flowgroup: setlist_analysis_mv
actions:
  - name: setlist_analysis_sql
    type: load
    source:
      type: sql
      sql: |
        SELECT
          *,
          current_timestamp() as _report_generated_at
        FROM {catalog}.{silver_schema}.setlist_dim
    target: v_setlist_analysis

  - name: write_setlist_analysis_mv
    type: write
    source: v_setlist_analysis
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{gold_schema}"
      table: "setlist_analysis_mv"
