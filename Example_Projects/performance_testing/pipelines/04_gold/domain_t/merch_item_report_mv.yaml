pipeline: perf_gold
flowgroup: merch_item_report_mv
actions:
  - name: merch_item_report_sql
    type: load
    source:
      type: sql
      sql: |
        SELECT
          *,
          current_timestamp() as _report_generated_at
        FROM {catalog}.{silver_schema}.merch_item_dim
    target: v_merch_item_report

  - name: write_merch_item_report_mv
    type: write
    source: v_merch_item_report
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{gold_schema}"
      table: "merch_item_report_mv"
