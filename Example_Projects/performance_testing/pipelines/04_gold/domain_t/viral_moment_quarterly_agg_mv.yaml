pipeline: domain_t_gold
flowgroup: viral_moment_quarterly_agg_mv
actions:
  - name: viral_moment_quarterly_agg_load
    type: load
    source:
      type: sql
      sql: |
        SELECT
          date_trunc('quarter', _etl_timestamp) as period,
          count(*) as record_count,
          current_timestamp() as _generated_at
        FROM {catalog}.{silver_schema}.viral_moment_fct
        GROUP BY 1
    target: v_viral_moment_quarterly_agg

  - name: write_viral_moment_quarterly_agg_mv
    type: write
    source: v_viral_moment_quarterly_agg
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{gold_schema}"
      table: "viral_moment_quarterly_agg_mv"
