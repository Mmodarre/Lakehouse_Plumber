pipeline: perf_gold
flowgroup: listener_summary_mv
actions:
  - name: listener_summary_sql
    type: load
    source:
      type: sql
      sql: |
        SELECT
          *,
          current_timestamp() as _report_generated_at
        FROM {catalog}.{silver_schema}.listener_dim
    target: v_listener_summary

  - name: write_listener_summary_mv
    type: write
    source: v_listener_summary
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{gold_schema}"
      table: "listener_summary_mv"
