pipeline: domain_h_gold
flowgroup: barcode_analysis_mv
actions:
  - name: barcode_analysis_sql
    type: load
    source:
      type: sql
      sql: |
        SELECT
          *,
          current_timestamp() as _report_generated_at
        FROM {catalog}.{silver_schema}.barcode_fct
    target: v_barcode_analysis

  - name: write_barcode_analysis_mv
    type: write
    source: v_barcode_analysis
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{gold_schema}"
      table: "barcode_analysis_mv"
