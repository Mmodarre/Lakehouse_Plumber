pipeline: domain_h_gold
flowgroup: seasonal_report_mv
actions:
  - name: seasonal_report_sql
    type: load
    source:
      type: sql
      sql: |
        SELECT
          *,
          current_timestamp() as _report_generated_at
        FROM {catalog}.{silver_schema}.seasonal_fct
    target: v_seasonal_report

  - name: write_seasonal_report_mv
    type: write
    source: v_seasonal_report
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{gold_schema}"
      table: "seasonal_report_mv"
