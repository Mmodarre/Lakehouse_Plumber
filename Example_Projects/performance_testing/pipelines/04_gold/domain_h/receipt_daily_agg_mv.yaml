pipeline: perf_gold
flowgroup: receipt_daily_agg_mv
actions:
  - name: receipt_daily_agg_load
    type: load
    source:
      type: sql
      sql: |
        SELECT
          date_trunc('day', _etl_timestamp) as period,
          count(*) as record_count,
          current_timestamp() as _generated_at
        FROM {catalog}.{silver_schema}.receipt_dim
        GROUP BY 1
    target: v_receipt_daily_agg

  - name: write_receipt_daily_agg_mv
    type: write
    source: v_receipt_daily_agg
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{gold_schema}"
      table: "receipt_daily_agg_mv"
