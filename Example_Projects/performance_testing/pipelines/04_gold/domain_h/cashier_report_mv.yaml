pipeline: perf_gold
flowgroup: cashier_report_mv
actions:
  - name: cashier_report_sql
    type: load
    source:
      type: sql
      sql: |
        SELECT
          *,
          current_timestamp() as _report_generated_at
        FROM {catalog}.{silver_schema}.cashier_dim
    target: v_cashier_report

  - name: write_cashier_report_mv
    type: write
    source: v_cashier_report
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{gold_schema}"
      table: "cashier_report_mv"
