pipeline: perf_gold
flowgroup: clearance_analysis_mv
actions:
  - name: clearance_analysis_sql
    type: load
    source:
      type: sql
      sql: |
        SELECT
          *,
          current_timestamp() as _report_generated_at
        FROM {catalog}.{silver_schema}.clearance_dim
    target: v_clearance_analysis

  - name: write_clearance_analysis_mv
    type: write
    source: v_clearance_analysis
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{gold_schema}"
      table: "clearance_analysis_mv"
