pipeline: domain_h_gold
flowgroup: store_summary_mv
actions:
  - name: store_summary_sql
    type: load
    source:
      type: sql
      sql: |
        SELECT
          *,
          current_timestamp() as _report_generated_at
        FROM {catalog}.{silver_schema}.store_fct
    target: v_store_summary

  - name: write_store_summary_mv
    type: write
    source: v_store_summary
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{gold_schema}"
      table: "store_summary_mv"
