pipeline: domain_h_gold
flowgroup: display_dashboard_mv
actions:
  - name: display_dashboard_sql
    type: load
    source:
      type: sql
      sql: |
        SELECT
          *,
          current_timestamp() as _report_generated_at
        FROM {catalog}.{silver_schema}.display_dim
    target: v_display_dashboard

  - name: write_display_dashboard_mv
    type: write
    source: v_display_dashboard
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{gold_schema}"
      table: "display_dashboard_mv"
