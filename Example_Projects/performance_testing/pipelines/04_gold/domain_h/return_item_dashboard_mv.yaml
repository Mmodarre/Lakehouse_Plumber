pipeline: perf_gold
flowgroup: return_item_dashboard_mv
actions:
  - name: return_item_dashboard_sql
    type: load
    source:
      type: sql
      sql: |
        SELECT
          *,
          current_timestamp() as _report_generated_at
        FROM {catalog}.{silver_schema}.return_item_dim
    target: v_return_item_dashboard

  - name: write_return_item_dashboard_mv
    type: write
    source: v_return_item_dashboard
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{gold_schema}"
      table: "return_item_dashboard_mv"
