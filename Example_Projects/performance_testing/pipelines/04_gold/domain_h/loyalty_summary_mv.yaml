pipeline: domain_h_gold
flowgroup: loyalty_summary_mv
actions:
  - name: loyalty_summary_sql
    type: load
    source:
      type: sql
      sql: |
        SELECT
          *,
          current_timestamp() as _report_generated_at
        FROM {catalog}.{silver_schema}.loyalty_dim
    target: v_loyalty_summary

  - name: write_loyalty_summary_mv
    type: write
    source: v_loyalty_summary
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{gold_schema}"
      table: "loyalty_summary_mv"
