pipeline: domain_h_gold
flowgroup: aisle_dashboard_mv
actions:
  - name: aisle_dashboard_sql
    type: load
    source:
      type: sql
      sql: |
        SELECT
          *,
          current_timestamp() as _report_generated_at
        FROM {catalog}.{silver_schema}.aisle_dim
    target: v_aisle_dashboard

  - name: write_aisle_dashboard_mv
    type: write
    source: v_aisle_dashboard
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{gold_schema}"
      table: "aisle_dashboard_mv"
