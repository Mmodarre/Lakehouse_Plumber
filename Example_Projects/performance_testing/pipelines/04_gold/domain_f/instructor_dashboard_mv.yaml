pipeline: perf_gold
flowgroup: instructor_dashboard_mv
actions:
  - name: instructor_dashboard_sql
    type: load
    source:
      type: sql
      sql: |
        SELECT
          *,
          current_timestamp() as _report_generated_at
        FROM {catalog}.{silver_schema}.instructor_dim
    target: v_instructor_dashboard

  - name: write_instructor_dashboard_mv
    type: write
    source: v_instructor_dashboard
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{gold_schema}"
      table: "instructor_dashboard_mv"
