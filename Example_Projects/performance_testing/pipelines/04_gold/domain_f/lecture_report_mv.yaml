pipeline: perf_gold
flowgroup: lecture_report_mv
actions:
  - name: lecture_report_sql
    type: load
    source:
      type: sql
      sql: |
        SELECT
          *,
          current_timestamp() as _report_generated_at
        FROM {catalog}.{silver_schema}.lecture_dim
    target: v_lecture_report

  - name: write_lecture_report_mv
    type: write
    source: v_lecture_report
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{gold_schema}"
      table: "lecture_report_mv"
