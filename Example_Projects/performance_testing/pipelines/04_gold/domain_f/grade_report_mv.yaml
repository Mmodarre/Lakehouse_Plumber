pipeline: perf_gold
flowgroup: grade_report_mv
actions:
  - name: grade_report_sql
    type: load
    source:
      type: sql
      sql: |
        SELECT
          *,
          current_timestamp() as _report_generated_at
        FROM {catalog}.{silver_schema}.grade_dim
    target: v_grade_report

  - name: write_grade_report_mv
    type: write
    source: v_grade_report
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{gold_schema}"
      table: "grade_report_mv"
