pipeline: perf_gold
flowgroup: library_book_summary_mv
actions:
  - name: library_book_summary_sql
    type: load
    source:
      type: sql
      sql: |
        SELECT
          *,
          current_timestamp() as _report_generated_at
        FROM {catalog}.{silver_schema}.library_book_dim
    target: v_library_book_summary

  - name: write_library_book_summary_mv
    type: write
    source: v_library_book_summary
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{gold_schema}"
      table: "library_book_summary_mv"
