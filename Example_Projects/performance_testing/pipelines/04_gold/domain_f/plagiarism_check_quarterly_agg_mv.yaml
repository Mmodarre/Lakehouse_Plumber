pipeline: domain_f_gold
flowgroup: plagiarism_check_quarterly_agg_mv
actions:
  - name: plagiarism_check_quarterly_agg_load
    type: load
    source:
      type: sql
      sql: |
        SELECT
          date_trunc('quarter', _etl_timestamp) as period,
          count(*) as record_count,
          current_timestamp() as _generated_at
        FROM {catalog}.{silver_schema}.plagiarism_check_fct
        GROUP BY 1
    target: v_plagiarism_check_quarterly_agg

  - name: write_plagiarism_check_quarterly_agg_mv
    type: write
    source: v_plagiarism_check_quarterly_agg
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{gold_schema}"
      table: "plagiarism_check_quarterly_agg_mv"
