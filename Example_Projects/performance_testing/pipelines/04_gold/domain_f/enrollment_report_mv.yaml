pipeline: domain_f_gold
flowgroup: enrollment_report_mv
actions:
  - name: enrollment_report_sql
    type: load
    source:
      type: sql
      sql: |
        SELECT
          *,
          current_timestamp() as _report_generated_at
        FROM {catalog}.{silver_schema}.enrollment_dim
    target: v_enrollment_report

  - name: write_enrollment_report_mv
    type: write
    source: v_enrollment_report
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{gold_schema}"
      table: "enrollment_report_mv"
