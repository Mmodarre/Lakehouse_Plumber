pipeline: perf_gold
flowgroup: scholarship_analysis_mv
actions:
  - name: scholarship_analysis_sql
    type: load
    source:
      type: sql
      sql: |
        SELECT
          *,
          current_timestamp() as _report_generated_at
        FROM {catalog}.{silver_schema}.scholarship_dim
    target: v_scholarship_analysis

  - name: write_scholarship_analysis_mv
    type: write
    source: v_scholarship_analysis
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{gold_schema}"
      table: "scholarship_analysis_mv"
