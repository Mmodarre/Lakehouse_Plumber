pipeline: perf_gold
flowgroup: faculty_analysis_mv
actions:
  - name: faculty_analysis_sql
    type: load
    source:
      type: sql
      sql: |
        SELECT
          *,
          current_timestamp() as _report_generated_at
        FROM {catalog}.{silver_schema}.faculty_dim
    target: v_faculty_analysis

  - name: write_faculty_analysis_mv
    type: write
    source: v_faculty_analysis
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{gold_schema}"
      table: "faculty_analysis_mv"
