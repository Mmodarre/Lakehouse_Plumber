pipeline: perf_gold
flowgroup: manifest_analysis_mv
actions:
  - name: manifest_analysis_sql
    type: load
    source:
      type: sql
      sql: |
        SELECT
          *,
          current_timestamp() as _report_generated_at
        FROM {catalog}.{silver_schema}.manifest_dim
    target: v_manifest_analysis

  - name: write_manifest_analysis_mv
    type: write
    source: v_manifest_analysis
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{gold_schema}"
      table: "manifest_analysis_mv"
