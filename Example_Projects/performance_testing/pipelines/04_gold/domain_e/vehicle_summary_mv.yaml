pipeline: perf_gold
flowgroup: vehicle_summary_mv
actions:
  - name: vehicle_summary_sql
    type: load
    source:
      type: sql
      sql: |
        SELECT
          *,
          current_timestamp() as _report_generated_at
        FROM {catalog}.{silver_schema}.vehicle_dim
    target: v_vehicle_summary

  - name: write_vehicle_summary_mv
    type: write
    source: v_vehicle_summary
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{gold_schema}"
      table: "vehicle_summary_mv"
