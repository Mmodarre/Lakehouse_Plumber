pipeline: domain_e_gold
flowgroup: driver_analysis_mv
actions:
  - name: driver_analysis_sql
    type: load
    source:
      type: sql
      sql: |
        SELECT
          *,
          current_timestamp() as _report_generated_at
        FROM {catalog}.{silver_schema}.driver_dim
    target: v_driver_analysis

  - name: write_driver_analysis_mv
    type: write
    source: v_driver_analysis
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{gold_schema}"
      table: "driver_analysis_mv"
