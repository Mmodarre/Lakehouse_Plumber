pipeline: perf_gold
flowgroup: route_report_mv
actions:
  - name: route_report_sql
    type: load
    source:
      type: sql
      sql: |
        SELECT
          *,
          current_timestamp() as _report_generated_at
        FROM {catalog}.{silver_schema}.route_dim
    target: v_route_report

  - name: write_route_report_mv
    type: write
    source: v_route_report
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{gold_schema}"
      table: "route_report_mv"
