pipeline: domain_e_gold
flowgroup: idle_time_weekly_agg_mv
actions:
  - name: idle_time_weekly_agg_load
    type: load
    source:
      type: sql
      sql: |
        SELECT
          date_trunc('week', _etl_timestamp) as period,
          count(*) as record_count,
          current_timestamp() as _generated_at
        FROM {catalog}.{silver_schema}.idle_time_fct
        GROUP BY 1
    target: v_idle_time_weekly_agg

  - name: write_idle_time_weekly_agg_mv
    type: write
    source: v_idle_time_weekly_agg
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{gold_schema}"
      table: "idle_time_weekly_agg_mv"
