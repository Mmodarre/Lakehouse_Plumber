pipeline: domain_e_gold
flowgroup: return_shipment_quarterly_agg_mv
actions:
  - name: return_shipment_quarterly_agg_load
    type: load
    source:
      type: sql
      sql: |
        SELECT
          date_trunc('quarter', _etl_timestamp) as period,
          count(*) as record_count,
          current_timestamp() as _generated_at
        FROM {catalog}.{silver_schema}.return_shipment_fct
        GROUP BY 1
    target: v_return_shipment_quarterly_agg

  - name: write_return_shipment_quarterly_agg_mv
    type: write
    source: v_return_shipment_quarterly_agg
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{gold_schema}"
      table: "return_shipment_quarterly_agg_mv"
