pipeline: domain_e_gold
flowgroup: proof_of_delivery_weekly_agg_mv
actions:
  - name: proof_of_delivery_weekly_agg_load
    type: load
    source:
      type: sql
      sql: |
        SELECT
          date_trunc('week', _etl_timestamp) as period,
          count(*) as record_count,
          current_timestamp() as _generated_at
        FROM {catalog}.{silver_schema}.proof_of_delivery_dim
        GROUP BY 1
    target: v_proof_of_delivery_weekly_agg

  - name: write_proof_of_delivery_weekly_agg_mv
    type: write
    source: v_proof_of_delivery_weekly_agg
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{gold_schema}"
      table: "proof_of_delivery_weekly_agg_mv"
