pipeline: domain_e_gold
flowgroup: inspection_dashboard_mv
actions:
  - name: inspection_dashboard_sql
    type: load
    source:
      type: sql
      sql: |
        SELECT
          *,
          current_timestamp() as _report_generated_at
        FROM {catalog}.{silver_schema}.inspection_dim
    target: v_inspection_dashboard

  - name: write_inspection_dashboard_mv
    type: write
    source: v_inspection_dashboard
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{gold_schema}"
      table: "inspection_dashboard_mv"
