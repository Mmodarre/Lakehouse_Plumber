pipeline: domain_e_gold
flowgroup: weight_ticket_monthly_agg_mv
actions:
  - name: weight_ticket_monthly_agg_load
    type: load
    source:
      type: sql
      sql: |
        SELECT
          date_trunc('mon', _etl_timestamp) as period,
          count(*) as record_count,
          current_timestamp() as _generated_at
        FROM {catalog}.{silver_schema}.weight_ticket_dim
        GROUP BY 1
    target: v_weight_ticket_monthly_agg

  - name: write_weight_ticket_monthly_agg_mv
    type: write
    source: v_weight_ticket_monthly_agg
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{gold_schema}"
      table: "weight_ticket_monthly_agg_mv"
