pipeline: domain_e_gold
flowgroup: tariff_report_mv
actions:
  - name: tariff_report_sql
    type: load
    source:
      type: sql
      sql: |
        SELECT
          *,
          current_timestamp() as _report_generated_at
        FROM {catalog}.{silver_schema}.tariff_fct
    target: v_tariff_report

  - name: write_tariff_report_mv
    type: write
    source: v_tariff_report
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{gold_schema}"
      table: "tariff_report_mv"
