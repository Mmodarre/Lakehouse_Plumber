pipeline: domain_p_gold
flowgroup: biomarker_report_mv
actions:
  - name: biomarker_report_sql
    type: load
    source:
      type: sql
      sql: |
        SELECT
          *,
          current_timestamp() as _report_generated_at
        FROM {catalog}.{silver_schema}.biomarker_dim
    target: v_biomarker_report

  - name: write_biomarker_report_mv
    type: write
    source: v_biomarker_report
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{gold_schema}"
      table: "biomarker_report_mv"
