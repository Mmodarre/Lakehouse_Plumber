pipeline: domain_p_gold
flowgroup: petri_dish_dashboard_mv
actions:
  - name: petri_dish_dashboard_sql
    type: load
    source:
      type: sql
      sql: |
        SELECT
          *,
          current_timestamp() as _report_generated_at
        FROM {catalog}.{silver_schema}.petri_dish_dim
    target: v_petri_dish_dashboard

  - name: write_petri_dish_dashboard_mv
    type: write
    source: v_petri_dish_dashboard
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{gold_schema}"
      table: "petri_dish_dashboard_mv"
