pipeline: domain_p_gold
flowgroup: western_blot_monthly_agg_mv
actions:
  - name: western_blot_monthly_agg_load
    type: load
    source:
      type: sql
      sql: |
        SELECT
          date_trunc('mon', _etl_timestamp) as period,
          count(*) as record_count,
          current_timestamp() as _generated_at
        FROM {catalog}.{silver_schema}.western_blot_dim
        GROUP BY 1
    target: v_western_blot_monthly_agg

  - name: write_western_blot_monthly_agg_mv
    type: write
    source: v_western_blot_monthly_agg
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{gold_schema}"
      table: "western_blot_monthly_agg_mv"
