pipeline: domain_p_gold
flowgroup: pcr_run_daily_agg_mv
actions:
  - name: pcr_run_daily_agg_load
    type: load
    source:
      type: sql
      sql: |
        SELECT
          date_trunc('day', _etl_timestamp) as period,
          count(*) as record_count,
          current_timestamp() as _generated_at
        FROM {catalog}.{silver_schema}.pcr_run_fct
        GROUP BY 1
    target: v_pcr_run_daily_agg

  - name: write_pcr_run_daily_agg_mv
    type: write
    source: v_pcr_run_daily_agg
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{gold_schema}"
      table: "pcr_run_daily_agg_mv"
