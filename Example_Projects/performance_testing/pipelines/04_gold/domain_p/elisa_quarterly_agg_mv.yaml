pipeline: domain_p_gold
flowgroup: elisa_quarterly_agg_mv
actions:
  - name: elisa_quarterly_agg_load
    type: load
    source:
      type: sql
      sql: |
        SELECT
          date_trunc('quarter', _etl_timestamp) as period,
          count(*) as record_count,
          current_timestamp() as _generated_at
        FROM {catalog}.{silver_schema}.elisa_fct
        GROUP BY 1
    target: v_elisa_quarterly_agg

  - name: write_elisa_quarterly_agg_mv
    type: write
    source: v_elisa_quarterly_agg
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{gold_schema}"
      table: "elisa_quarterly_agg_mv"
