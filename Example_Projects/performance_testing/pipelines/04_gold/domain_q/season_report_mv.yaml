pipeline: perf_gold
flowgroup: season_report_mv
actions:
  - name: season_report_sql
    type: load
    source:
      type: sql
      sql: |
        SELECT
          *,
          current_timestamp() as _report_generated_at
        FROM {catalog}.{silver_schema}.season_dim
    target: v_season_report

  - name: write_season_report_mv
    type: write
    source: v_season_report
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{gold_schema}"
      table: "season_report_mv"
