pipeline: perf_gold
flowgroup: league_dashboard_mv
actions:
  - name: league_dashboard_sql
    type: load
    source:
      type: sql
      sql: |
        SELECT
          *,
          current_timestamp() as _report_generated_at
        FROM {catalog}.{silver_schema}.league_dim
    target: v_league_dashboard

  - name: write_league_dashboard_mv
    type: write
    source: v_league_dashboard
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{gold_schema}"
      table: "league_dashboard_mv"
