pipeline: domain_q_gold
flowgroup: coach_analysis_mv
actions:
  - name: coach_analysis_sql
    type: load
    source:
      type: sql
      sql: |
        SELECT
          *,
          current_timestamp() as _report_generated_at
        FROM {catalog}.{silver_schema}.coach_fct
    target: v_coach_analysis

  - name: write_coach_analysis_mv
    type: write
    source: v_coach_analysis
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{gold_schema}"
      table: "coach_analysis_mv"
