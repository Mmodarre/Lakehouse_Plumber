pipeline: domain_q_gold
flowgroup: merchandise_report_mv
actions:
  - name: merchandise_report_sql
    type: load
    source:
      type: sql
      sql: |
        SELECT
          *,
          current_timestamp() as _report_generated_at
        FROM {catalog}.{silver_schema}.merchandise_fct
    target: v_merchandise_report

  - name: write_merchandise_report_mv
    type: write
    source: v_merchandise_report
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{gold_schema}"
      table: "merchandise_report_mv"
