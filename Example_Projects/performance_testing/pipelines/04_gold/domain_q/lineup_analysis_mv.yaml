pipeline: perf_gold
flowgroup: lineup_analysis_mv
actions:
  - name: lineup_analysis_sql
    type: load
    source:
      type: sql
      sql: |
        SELECT
          *,
          current_timestamp() as _report_generated_at
        FROM {catalog}.{silver_schema}.lineup_dim
    target: v_lineup_analysis

  - name: write_lineup_analysis_mv
    type: write
    source: v_lineup_analysis
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{gold_schema}"
      table: "lineup_analysis_mv"
