pipeline: domain_q_gold
flowgroup: tv_deal_daily_agg_mv
actions:
  - name: tv_deal_daily_agg_load
    type: load
    source:
      type: sql
      sql: |
        SELECT
          date_trunc('day', _etl_timestamp) as period,
          count(*) as record_count,
          current_timestamp() as _generated_at
        FROM {catalog}.{silver_schema}.tv_deal_dim
        GROUP BY 1
    target: v_tv_deal_daily_agg

  - name: write_tv_deal_daily_agg_mv
    type: write
    source: v_tv_deal_daily_agg
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{gold_schema}"
      table: "tv_deal_daily_agg_mv"
