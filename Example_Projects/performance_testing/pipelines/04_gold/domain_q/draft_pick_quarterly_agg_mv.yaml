pipeline: domain_q_gold
flowgroup: draft_pick_quarterly_agg_mv
actions:
  - name: draft_pick_quarterly_agg_load
    type: load
    source:
      type: sql
      sql: |
        SELECT
          date_trunc('quarter', _etl_timestamp) as period,
          count(*) as record_count,
          current_timestamp() as _generated_at
        FROM {catalog}.{silver_schema}.draft_pick_dim
        GROUP BY 1
    target: v_draft_pick_quarterly_agg

  - name: write_draft_pick_quarterly_agg_mv
    type: write
    source: v_draft_pick_quarterly_agg
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{gold_schema}"
      table: "draft_pick_quarterly_agg_mv"
