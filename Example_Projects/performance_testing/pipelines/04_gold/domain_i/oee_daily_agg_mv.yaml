pipeline: domain_i_gold
flowgroup: oee_daily_agg_mv
actions:
  - name: oee_daily_agg_load
    type: load
    source:
      type: sql
      sql: |
        SELECT
          date_trunc('day', _etl_timestamp) as period,
          count(*) as record_count,
          current_timestamp() as _generated_at
        FROM {catalog}.{silver_schema}.oee_fct
        GROUP BY 1
    target: v_oee_daily_agg

  - name: write_oee_daily_agg_mv
    type: write
    source: v_oee_daily_agg
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{gold_schema}"
      table: "oee_daily_agg_mv"
