pipeline: perf_gold
flowgroup: defect_dashboard_mv
actions:
  - name: defect_dashboard_sql
    type: load
    source:
      type: sql
      sql: |
        SELECT
          *,
          current_timestamp() as _report_generated_at
        FROM {catalog}.{silver_schema}.defect_dim
    target: v_defect_dashboard

  - name: write_defect_dashboard_mv
    type: write
    source: v_defect_dashboard
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{gold_schema}"
      table: "defect_dashboard_mv"
