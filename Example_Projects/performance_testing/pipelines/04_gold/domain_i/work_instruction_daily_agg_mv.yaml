pipeline: domain_i_gold
flowgroup: work_instruction_daily_agg_mv
actions:
  - name: work_instruction_daily_agg_load
    type: load
    source:
      type: sql
      sql: |
        SELECT
          date_trunc('day', _etl_timestamp) as period,
          count(*) as record_count,
          current_timestamp() as _generated_at
        FROM {catalog}.{silver_schema}.work_instruction_dim
        GROUP BY 1
    target: v_work_instruction_daily_agg

  - name: write_work_instruction_daily_agg_mv
    type: write
    source: v_work_instruction_daily_agg
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{gold_schema}"
      table: "work_instruction_daily_agg_mv"
