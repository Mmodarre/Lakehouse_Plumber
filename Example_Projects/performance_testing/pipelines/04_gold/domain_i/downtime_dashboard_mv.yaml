pipeline: domain_i_gold
flowgroup: downtime_dashboard_mv
actions:
  - name: downtime_dashboard_sql
    type: load
    source:
      type: sql
      sql: |
        SELECT
          *,
          current_timestamp() as _report_generated_at
        FROM {catalog}.{silver_schema}.downtime_dim
    target: v_downtime_dashboard

  - name: write_downtime_dashboard_mv
    type: write
    source: v_downtime_dashboard
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{gold_schema}"
      table: "downtime_dashboard_mv"
