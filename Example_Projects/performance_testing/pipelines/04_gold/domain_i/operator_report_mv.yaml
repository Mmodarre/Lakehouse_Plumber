pipeline: perf_gold
flowgroup: operator_report_mv
actions:
  - name: operator_report_sql
    type: load
    source:
      type: sql
      sql: |
        SELECT
          *,
          current_timestamp() as _report_generated_at
        FROM {catalog}.{silver_schema}.operator_dim
    target: v_operator_report

  - name: write_operator_report_mv
    type: write
    source: v_operator_report
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{gold_schema}"
      table: "operator_report_mv"
