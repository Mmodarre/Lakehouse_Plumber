pipeline: domain_i_gold
flowgroup: spc_chart_weekly_agg_mv
actions:
  - name: spc_chart_weekly_agg_load
    type: load
    source:
      type: sql
      sql: |
        SELECT
          date_trunc('week', _etl_timestamp) as period,
          count(*) as record_count,
          current_timestamp() as _generated_at
        FROM {catalog}.{silver_schema}.spc_chart_fct
        GROUP BY 1
    target: v_spc_chart_weekly_agg

  - name: write_spc_chart_weekly_agg_mv
    type: write
    source: v_spc_chart_weekly_agg
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{gold_schema}"
      table: "spc_chart_weekly_agg_mv"
