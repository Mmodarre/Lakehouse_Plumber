pipeline: domain_i_gold
flowgroup: machine_summary_mv
actions:
  - name: machine_summary_sql
    type: load
    source:
      type: sql
      sql: |
        SELECT
          *,
          current_timestamp() as _report_generated_at
        FROM {catalog}.{silver_schema}.machine_fct
    target: v_machine_summary

  - name: write_machine_summary_mv
    type: write
    source: v_machine_summary
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{gold_schema}"
      table: "machine_summary_mv"
