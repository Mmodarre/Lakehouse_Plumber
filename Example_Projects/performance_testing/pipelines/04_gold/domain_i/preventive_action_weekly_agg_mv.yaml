pipeline: domain_i_gold
flowgroup: preventive_action_weekly_agg_mv
actions:
  - name: preventive_action_weekly_agg_load
    type: load
    source:
      type: sql
      sql: |
        SELECT
          date_trunc('week', _etl_timestamp) as period,
          count(*) as record_count,
          current_timestamp() as _generated_at
        FROM {catalog}.{silver_schema}.preventive_action_dim
        GROUP BY 1
    target: v_preventive_action_weekly_agg

  - name: write_preventive_action_weekly_agg_mv
    type: write
    source: v_preventive_action_weekly_agg
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{gold_schema}"
      table: "preventive_action_weekly_agg_mv"
