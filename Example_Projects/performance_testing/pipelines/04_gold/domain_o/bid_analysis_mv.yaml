pipeline: perf_gold
flowgroup: bid_analysis_mv
actions:
  - name: bid_analysis_sql
    type: load
    source:
      type: sql
      sql: |
        SELECT
          *,
          current_timestamp() as _report_generated_at
        FROM {catalog}.{silver_schema}.bid_dim
    target: v_bid_analysis

  - name: write_bid_analysis_mv
    type: write
    source: v_bid_analysis
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{gold_schema}"
      table: "bid_analysis_mv"
