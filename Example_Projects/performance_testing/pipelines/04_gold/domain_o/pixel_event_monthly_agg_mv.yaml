pipeline: domain_o_gold
flowgroup: pixel_event_monthly_agg_mv
actions:
  - name: pixel_event_monthly_agg_load
    type: load
    source:
      type: sql
      sql: |
        SELECT
          date_trunc('mon', _etl_timestamp) as period,
          count(*) as record_count,
          current_timestamp() as _generated_at
        FROM {catalog}.{silver_schema}.pixel_event_dim
        GROUP BY 1
    target: v_pixel_event_monthly_agg

  - name: write_pixel_event_monthly_agg_mv
    type: write
    source: v_pixel_event_monthly_agg
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{gold_schema}"
      table: "pixel_event_monthly_agg_mv"
