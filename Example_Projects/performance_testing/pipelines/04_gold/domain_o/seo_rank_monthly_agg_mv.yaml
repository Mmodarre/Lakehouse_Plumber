pipeline: perf_gold
flowgroup: seo_rank_monthly_agg_mv
actions:
  - name: seo_rank_monthly_agg_load
    type: load
    source:
      type: sql
      sql: |
        SELECT
          date_trunc('mon', _etl_timestamp) as period,
          count(*) as record_count,
          current_timestamp() as _generated_at
        FROM {catalog}.{silver_schema}.seo_rank_dim
        GROUP BY 1
    target: v_seo_rank_monthly_agg

  - name: write_seo_rank_monthly_agg_mv
    type: write
    source: v_seo_rank_monthly_agg
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{gold_schema}"
      table: "seo_rank_monthly_agg_mv"
