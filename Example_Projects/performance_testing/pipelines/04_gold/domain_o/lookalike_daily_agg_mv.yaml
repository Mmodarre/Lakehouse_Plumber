pipeline: perf_gold
flowgroup: lookalike_daily_agg_mv
actions:
  - name: lookalike_daily_agg_load
    type: load
    source:
      type: sql
      sql: |
        SELECT
          date_trunc('day', _etl_timestamp) as period,
          count(*) as record_count,
          current_timestamp() as _generated_at
        FROM {catalog}.{silver_schema}.lookalike_dim
        GROUP BY 1
    target: v_lookalike_daily_agg

  - name: write_lookalike_daily_agg_mv
    type: write
    source: v_lookalike_daily_agg
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{gold_schema}"
      table: "lookalike_daily_agg_mv"
