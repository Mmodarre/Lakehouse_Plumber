pipeline: domain_o_gold
flowgroup: landing_page_report_mv
actions:
  - name: landing_page_report_sql
    type: load
    source:
      type: sql
      sql: |
        SELECT
          *,
          current_timestamp() as _report_generated_at
        FROM {catalog}.{silver_schema}.landing_page_fct
    target: v_landing_page_report

  - name: write_landing_page_report_mv
    type: write
    source: v_landing_page_report
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{gold_schema}"
      table: "landing_page_report_mv"
