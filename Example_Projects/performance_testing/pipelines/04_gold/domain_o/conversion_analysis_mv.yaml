pipeline: perf_gold
flowgroup: conversion_analysis_mv
actions:
  - name: conversion_analysis_sql
    type: load
    source:
      type: sql
      sql: |
        SELECT
          *,
          current_timestamp() as _report_generated_at
        FROM {catalog}.{silver_schema}.conversion_dim
    target: v_conversion_analysis

  - name: write_conversion_analysis_mv
    type: write
    source: v_conversion_analysis
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{gold_schema}"
      table: "conversion_analysis_mv"
