pipeline: domain_o_gold
flowgroup: impression_dashboard_mv
actions:
  - name: impression_dashboard_sql
    type: load
    source:
      type: sql
      sql: |
        SELECT
          *,
          current_timestamp() as _report_generated_at
        FROM {catalog}.{silver_schema}.impression_fct
    target: v_impression_dashboard

  - name: write_impression_dashboard_mv
    type: write
    source: v_impression_dashboard
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{gold_schema}"
      table: "impression_dashboard_mv"
