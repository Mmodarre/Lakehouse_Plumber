pipeline: domain_o_gold
flowgroup: ad_group_analysis_mv
actions:
  - name: ad_group_analysis_sql
    type: load
    source:
      type: sql
      sql: |
        SELECT
          *,
          current_timestamp() as _report_generated_at
        FROM {catalog}.{silver_schema}.ad_group_dim
    target: v_ad_group_analysis

  - name: write_ad_group_analysis_mv
    type: write
    source: v_ad_group_analysis
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{gold_schema}"
      table: "ad_group_analysis_mv"
