pipeline: domain_o_gold
flowgroup: spam_report_daily_agg_mv
actions:
  - name: spam_report_daily_agg_load
    type: load
    source:
      type: sql
      sql: |
        SELECT
          date_trunc('day', _etl_timestamp) as period,
          count(*) as record_count,
          current_timestamp() as _generated_at
        FROM {catalog}.{silver_schema}.spam_report_fct
        GROUP BY 1
    target: v_spam_report_daily_agg

  - name: write_spam_report_daily_agg_mv
    type: write
    source: v_spam_report_daily_agg
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{gold_schema}"
      table: "spam_report_daily_agg_mv"
