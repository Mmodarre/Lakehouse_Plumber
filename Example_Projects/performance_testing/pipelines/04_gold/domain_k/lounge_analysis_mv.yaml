pipeline: domain_k_gold
flowgroup: lounge_analysis_mv
actions:
  - name: lounge_analysis_sql
    type: load
    source:
      type: sql
      sql: |
        SELECT
          *,
          current_timestamp() as _report_generated_at
        FROM {catalog}.{silver_schema}.lounge_dim
    target: v_lounge_analysis

  - name: write_lounge_analysis_mv
    type: write
    source: v_lounge_analysis
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{gold_schema}"
      table: "lounge_analysis_mv"
