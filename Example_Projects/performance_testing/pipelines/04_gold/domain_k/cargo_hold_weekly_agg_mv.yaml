pipeline: domain_k_gold
flowgroup: cargo_hold_weekly_agg_mv
actions:
  - name: cargo_hold_weekly_agg_load
    type: load
    source:
      type: sql
      sql: |
        SELECT
          date_trunc('week', _etl_timestamp) as period,
          count(*) as record_count,
          current_timestamp() as _generated_at
        FROM {catalog}.{silver_schema}.cargo_hold_dim
        GROUP BY 1
    target: v_cargo_hold_weekly_agg

  - name: write_cargo_hold_weekly_agg_mv
    type: write
    source: v_cargo_hold_weekly_agg
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{gold_schema}"
      table: "cargo_hold_weekly_agg_mv"
