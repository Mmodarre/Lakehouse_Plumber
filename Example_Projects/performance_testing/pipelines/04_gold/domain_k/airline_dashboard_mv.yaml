pipeline: perf_gold
flowgroup: airline_dashboard_mv
actions:
  - name: airline_dashboard_sql
    type: load
    source:
      type: sql
      sql: |
        SELECT
          *,
          current_timestamp() as _report_generated_at
        FROM {catalog}.{silver_schema}.airline_dim
    target: v_airline_dashboard

  - name: write_airline_dashboard_mv
    type: write
    source: v_airline_dashboard
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{gold_schema}"
      table: "airline_dashboard_mv"
