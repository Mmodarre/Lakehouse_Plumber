pipeline: perf_gold
flowgroup: charter_summary_mv
actions:
  - name: charter_summary_sql
    type: load
    source:
      type: sql
      sql: |
        SELECT
          *,
          current_timestamp() as _report_generated_at
        FROM {catalog}.{silver_schema}.charter_dim
    target: v_charter_summary

  - name: write_charter_summary_mv
    type: write
    source: v_charter_summary
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{gold_schema}"
      table: "charter_summary_mv"
