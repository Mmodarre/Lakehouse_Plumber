pipeline: domain_k_gold
flowgroup: fuel_tank_analysis_mv
actions:
  - name: fuel_tank_analysis_sql
    type: load
    source:
      type: sql
      sql: |
        SELECT
          *,
          current_timestamp() as _report_generated_at
        FROM {catalog}.{silver_schema}.fuel_tank_dim
    target: v_fuel_tank_analysis

  - name: write_fuel_tank_analysis_mv
    type: write
    source: v_fuel_tank_analysis
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{gold_schema}"
      table: "fuel_tank_analysis_mv"
