pipeline: domain_k_gold
flowgroup: control_tower_monthly_agg_mv
actions:
  - name: control_tower_monthly_agg_load
    type: load
    source:
      type: sql
      sql: |
        SELECT
          date_trunc('mon', _etl_timestamp) as period,
          count(*) as record_count,
          current_timestamp() as _generated_at
        FROM {catalog}.{silver_schema}.control_tower_dim
        GROUP BY 1
    target: v_control_tower_monthly_agg

  - name: write_control_tower_monthly_agg_mv
    type: write
    source: v_control_tower_monthly_agg
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{gold_schema}"
      table: "control_tower_monthly_agg_mv"
