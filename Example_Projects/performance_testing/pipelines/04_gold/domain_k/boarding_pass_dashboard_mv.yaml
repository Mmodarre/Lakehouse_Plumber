pipeline: domain_k_gold
flowgroup: boarding_pass_dashboard_mv
actions:
  - name: boarding_pass_dashboard_sql
    type: load
    source:
      type: sql
      sql: |
        SELECT
          *,
          current_timestamp() as _report_generated_at
        FROM {catalog}.{silver_schema}.boarding_pass_dim
    target: v_boarding_pass_dashboard

  - name: write_boarding_pass_dashboard_mv
    type: write
    source: v_boarding_pass_dashboard
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{gold_schema}"
      table: "boarding_pass_dashboard_mv"
