pipeline: perf_gold
flowgroup: diagnostic_report_mv
actions:
  - name: diagnostic_report_sql
    type: load
    source:
      type: sql
      sql: |
        SELECT
          *,
          current_timestamp() as _report_generated_at
        FROM {catalog}.{silver_schema}.diagnostic_dim
    target: v_diagnostic_report

  - name: write_diagnostic_report_mv
    type: write
    source: v_diagnostic_report
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{gold_schema}"
      table: "diagnostic_report_mv"
