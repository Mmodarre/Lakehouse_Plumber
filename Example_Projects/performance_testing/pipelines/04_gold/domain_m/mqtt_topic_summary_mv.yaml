pipeline: perf_gold
flowgroup: mqtt_topic_summary_mv
actions:
  - name: mqtt_topic_summary_sql
    type: load
    source:
      type: sql
      sql: |
        SELECT
          *,
          current_timestamp() as _report_generated_at
        FROM {catalog}.{silver_schema}.mqtt_topic_dim
    target: v_mqtt_topic_summary

  - name: write_mqtt_topic_summary_mv
    type: write
    source: v_mqtt_topic_summary
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{gold_schema}"
      table: "mqtt_topic_summary_mv"
