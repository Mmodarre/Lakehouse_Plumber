pipeline: domain_m_gold
flowgroup: schema_registry_quarterly_agg_mv
actions:
  - name: schema_registry_quarterly_agg_load
    type: load
    source:
      type: sql
      sql: |
        SELECT
          date_trunc('quarter', _etl_timestamp) as period,
          count(*) as record_count,
          current_timestamp() as _generated_at
        FROM {catalog}.{silver_schema}.schema_registry_dim
        GROUP BY 1
    target: v_schema_registry_quarterly_agg

  - name: write_schema_registry_quarterly_agg_mv
    type: write
    source: v_schema_registry_quarterly_agg
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{gold_schema}"
      table: "schema_registry_quarterly_agg_mv"
