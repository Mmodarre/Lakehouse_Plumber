pipeline: perf_gold
flowgroup: network_node_dashboard_mv
actions:
  - name: network_node_dashboard_sql
    type: load
    source:
      type: sql
      sql: |
        SELECT
          *,
          current_timestamp() as _report_generated_at
        FROM {catalog}.{silver_schema}.network_node_dim
    target: v_network_node_dashboard

  - name: write_network_node_dashboard_mv
    type: write
    source: v_network_node_dashboard
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{gold_schema}"
      table: "network_node_dashboard_mv"
