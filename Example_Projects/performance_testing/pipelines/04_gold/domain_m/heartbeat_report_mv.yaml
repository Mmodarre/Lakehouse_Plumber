pipeline: perf_gold
flowgroup: heartbeat_report_mv
actions:
  - name: heartbeat_report_sql
    type: load
    source:
      type: sql
      sql: |
        SELECT
          *,
          current_timestamp() as _report_generated_at
        FROM {catalog}.{silver_schema}.heartbeat_dim
    target: v_heartbeat_report

  - name: write_heartbeat_report_mv
    type: write
    source: v_heartbeat_report
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{gold_schema}"
      table: "heartbeat_report_mv"
