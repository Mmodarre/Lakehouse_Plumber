pipeline: domain_m_gold
flowgroup: archival_daily_agg_mv
actions:
  - name: archival_daily_agg_load
    type: load
    source:
      type: sql
      sql: |
        SELECT
          date_trunc('day', _etl_timestamp) as period,
          count(*) as record_count,
          current_timestamp() as _generated_at
        FROM {catalog}.{silver_schema}.archival_fct
        GROUP BY 1
    target: v_archival_daily_agg

  - name: write_archival_daily_agg_mv
    type: write
    source: v_archival_daily_agg
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{gold_schema}"
      table: "archival_daily_agg_mv"
