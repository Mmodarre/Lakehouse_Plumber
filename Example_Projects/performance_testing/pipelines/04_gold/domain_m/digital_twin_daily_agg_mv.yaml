pipeline: domain_m_gold
flowgroup: digital_twin_daily_agg_mv
actions:
  - name: digital_twin_daily_agg_load
    type: load
    source:
      type: sql
      sql: |
        SELECT
          date_trunc('day', _etl_timestamp) as period,
          count(*) as record_count,
          current_timestamp() as _generated_at
        FROM {catalog}.{silver_schema}.digital_twin_dim
        GROUP BY 1
    target: v_digital_twin_daily_agg

  - name: write_digital_twin_daily_agg_mv
    type: write
    source: v_digital_twin_daily_agg
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{gold_schema}"
      table: "digital_twin_daily_agg_mv"
