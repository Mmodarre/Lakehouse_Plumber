pipeline: domain_m_gold
flowgroup: firmware_dashboard_mv
actions:
  - name: firmware_dashboard_sql
    type: load
    source:
      type: sql
      sql: |
        SELECT
          *,
          current_timestamp() as _report_generated_at
        FROM {catalog}.{silver_schema}.firmware_fct
    target: v_firmware_dashboard

  - name: write_firmware_dashboard_mv
    type: write
    source: v_firmware_dashboard
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{gold_schema}"
      table: "firmware_dashboard_mv"
