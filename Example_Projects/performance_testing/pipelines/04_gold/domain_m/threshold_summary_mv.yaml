pipeline: perf_gold
flowgroup: threshold_summary_mv
actions:
  - name: threshold_summary_sql
    type: load
    source:
      type: sql
      sql: |
        SELECT
          *,
          current_timestamp() as _report_generated_at
        FROM {catalog}.{silver_schema}.threshold_dim
    target: v_threshold_summary

  - name: write_threshold_summary_mv
    type: write
    source: v_threshold_summary
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{gold_schema}"
      table: "threshold_summary_mv"
