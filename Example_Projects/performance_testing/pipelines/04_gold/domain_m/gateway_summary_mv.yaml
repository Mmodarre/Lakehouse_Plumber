pipeline: domain_m_gold
flowgroup: gateway_summary_mv
actions:
  - name: gateway_summary_sql
    type: load
    source:
      type: sql
      sql: |
        SELECT
          *,
          current_timestamp() as _report_generated_at
        FROM {catalog}.{silver_schema}.gateway_dim
    target: v_gateway_summary

  - name: write_gateway_summary_mv
    type: write
    source: v_gateway_summary
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{gold_schema}"
      table: "gateway_summary_mv"
