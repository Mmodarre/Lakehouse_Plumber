pipeline: domain_l_gold
flowgroup: wait_time_daily_agg_mv
actions:
  - name: wait_time_daily_agg_load
    type: load
    source:
      type: sql
      sql: |
        SELECT
          date_trunc('day', _etl_timestamp) as period,
          count(*) as record_count,
          current_timestamp() as _generated_at
        FROM {catalog}.{silver_schema}.wait_time_fct
        GROUP BY 1
    target: v_wait_time_daily_agg

  - name: write_wait_time_daily_agg_mv
    type: write
    source: v_wait_time_daily_agg
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{gold_schema}"
      table: "wait_time_daily_agg_mv"
