pipeline: domain_l_gold
flowgroup: waste_log_quarterly_agg_mv
actions:
  - name: waste_log_quarterly_agg_load
    type: load
    source:
      type: sql
      sql: |
        SELECT
          date_trunc('quarter', _etl_timestamp) as period,
          count(*) as record_count,
          current_timestamp() as _generated_at
        FROM {catalog}.{silver_schema}.waste_log_fct
        GROUP BY 1
    target: v_waste_log_quarterly_agg

  - name: write_waste_log_quarterly_agg_mv
    type: write
    source: v_waste_log_quarterly_agg
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{gold_schema}"
      table: "waste_log_quarterly_agg_mv"
