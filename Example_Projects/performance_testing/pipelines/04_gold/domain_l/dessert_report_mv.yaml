pipeline: perf_gold
flowgroup: dessert_report_mv
actions:
  - name: dessert_report_sql
    type: load
    source:
      type: sql
      sql: |
        SELECT
          *,
          current_timestamp() as _report_generated_at
        FROM {catalog}.{silver_schema}.dessert_dim
    target: v_dessert_report

  - name: write_dessert_report_mv
    type: write
    source: v_dessert_report
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{gold_schema}"
      table: "dessert_report_mv"
