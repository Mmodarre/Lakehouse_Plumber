pipeline: perf_gold
flowgroup: dish_dashboard_mv
actions:
  - name: dish_dashboard_sql
    type: load
    source:
      type: sql
      sql: |
        SELECT
          *,
          current_timestamp() as _report_generated_at
        FROM {catalog}.{silver_schema}.dish_dim
    target: v_dish_dashboard

  - name: write_dish_dashboard_mv
    type: write
    source: v_dish_dashboard
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{gold_schema}"
      table: "dish_dashboard_mv"
