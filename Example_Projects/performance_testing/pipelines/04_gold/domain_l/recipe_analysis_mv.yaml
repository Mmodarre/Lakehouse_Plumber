pipeline: perf_gold
flowgroup: recipe_analysis_mv
actions:
  - name: recipe_analysis_sql
    type: load
    source:
      type: sql
      sql: |
        SELECT
          *,
          current_timestamp() as _report_generated_at
        FROM {catalog}.{silver_schema}.recipe_dim
    target: v_recipe_analysis

  - name: write_recipe_analysis_mv
    type: write
    source: v_recipe_analysis
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{gold_schema}"
      table: "recipe_analysis_mv"
