pipeline: perf_gold
flowgroup: ingredient_summary_mv
actions:
  - name: ingredient_summary_sql
    type: load
    source:
      type: sql
      sql: |
        SELECT
          *,
          current_timestamp() as _report_generated_at
        FROM {catalog}.{silver_schema}.ingredient_dim
    target: v_ingredient_summary

  - name: write_ingredient_summary_mv
    type: write
    source: v_ingredient_summary
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{gold_schema}"
      table: "ingredient_summary_mv"
