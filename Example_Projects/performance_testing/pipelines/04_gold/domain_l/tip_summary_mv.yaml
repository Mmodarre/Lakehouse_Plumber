pipeline: perf_gold
flowgroup: tip_summary_mv
actions:
  - name: tip_summary_sql
    type: load
    source:
      type: sql
      sql: |
        SELECT
          *,
          current_timestamp() as _report_generated_at
        FROM {catalog}.{silver_schema}.tip_dim
    target: v_tip_summary

  - name: write_tip_summary_mv
    type: write
    source: v_tip_summary
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{gold_schema}"
      table: "tip_summary_mv"
