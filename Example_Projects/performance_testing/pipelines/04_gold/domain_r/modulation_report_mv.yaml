pipeline: perf_gold
flowgroup: modulation_report_mv
actions:
  - name: modulation_report_sql
    type: load
    source:
      type: sql
      sql: |
        SELECT
          *,
          current_timestamp() as _report_generated_at
        FROM {catalog}.{silver_schema}.modulation_dim
    target: v_modulation_report

  - name: write_modulation_report_mv
    type: write
    source: v_modulation_report
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{gold_schema}"
      table: "modulation_report_mv"
