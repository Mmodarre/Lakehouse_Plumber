pipeline: domain_r_gold
flowgroup: ground_station_report_mv
actions:
  - name: ground_station_report_sql
    type: load
    source:
      type: sql
      sql: |
        SELECT
          *,
          current_timestamp() as _report_generated_at
        FROM {catalog}.{silver_schema}.ground_station_dim
    target: v_ground_station_report

  - name: write_ground_station_report_mv
    type: write
    source: v_ground_station_report
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{gold_schema}"
      table: "ground_station_report_mv"
