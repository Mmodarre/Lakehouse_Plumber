pipeline: domain_r_gold
flowgroup: thermal_control_weekly_agg_mv
actions:
  - name: thermal_control_weekly_agg_load
    type: load
    source:
      type: sql
      sql: |
        SELECT
          date_trunc('week', _etl_timestamp) as period,
          count(*) as record_count,
          current_timestamp() as _generated_at
        FROM {catalog}.{silver_schema}.thermal_control_fct
        GROUP BY 1
    target: v_thermal_control_weekly_agg

  - name: write_thermal_control_weekly_agg_mv
    type: write
    source: v_thermal_control_weekly_agg
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{gold_schema}"
      table: "thermal_control_weekly_agg_mv"
