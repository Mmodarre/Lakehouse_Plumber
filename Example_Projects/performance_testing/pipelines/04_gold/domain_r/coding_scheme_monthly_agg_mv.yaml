pipeline: domain_r_gold
flowgroup: coding_scheme_monthly_agg_mv
actions:
  - name: coding_scheme_monthly_agg_load
    type: load
    source:
      type: sql
      sql: |
        SELECT
          date_trunc('mon', _etl_timestamp) as period,
          count(*) as record_count,
          current_timestamp() as _generated_at
        FROM {catalog}.{silver_schema}.coding_scheme_dim
        GROUP BY 1
    target: v_coding_scheme_monthly_agg

  - name: write_coding_scheme_monthly_agg_mv
    type: write
    source: v_coding_scheme_monthly_agg
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{gold_schema}"
      table: "coding_scheme_monthly_agg_mv"
