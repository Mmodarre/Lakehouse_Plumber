pipeline: domain_r_gold
flowgroup: encryption_key_quarterly_agg_mv
actions:
  - name: encryption_key_quarterly_agg_load
    type: load
    source:
      type: sql
      sql: |
        SELECT
          date_trunc('quarter', _etl_timestamp) as period,
          count(*) as record_count,
          current_timestamp() as _generated_at
        FROM {catalog}.{silver_schema}.encryption_key_fct
        GROUP BY 1
    target: v_encryption_key_quarterly_agg

  - name: write_encryption_key_quarterly_agg_mv
    type: write
    source: v_encryption_key_quarterly_agg
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{gold_schema}"
      table: "encryption_key_quarterly_agg_mv"
