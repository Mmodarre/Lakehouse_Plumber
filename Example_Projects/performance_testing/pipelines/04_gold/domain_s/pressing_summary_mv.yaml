pipeline: perf_gold
flowgroup: pressing_summary_mv
actions:
  - name: pressing_summary_sql
    type: load
    source:
      type: sql
      sql: |
        SELECT
          *,
          current_timestamp() as _report_generated_at
        FROM {catalog}.{silver_schema}.pressing_dim
    target: v_pressing_summary

  - name: write_pressing_summary_mv
    type: write
    source: v_pressing_summary
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{gold_schema}"
      table: "pressing_summary_mv"
