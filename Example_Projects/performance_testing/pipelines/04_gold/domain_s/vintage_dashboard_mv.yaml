pipeline: domain_s_gold
flowgroup: vintage_dashboard_mv
actions:
  - name: vintage_dashboard_sql
    type: load
    source:
      type: sql
      sql: |
        SELECT
          *,
          current_timestamp() as _report_generated_at
        FROM {catalog}.{silver_schema}.vintage_dim
    target: v_vintage_dashboard

  - name: write_vintage_dashboard_mv
    type: write
    source: v_vintage_dashboard
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{gold_schema}"
      table: "vintage_dashboard_mv"
