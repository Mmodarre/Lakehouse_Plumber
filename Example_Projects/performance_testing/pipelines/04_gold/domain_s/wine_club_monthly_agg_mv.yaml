pipeline: domain_s_gold
flowgroup: wine_club_monthly_agg_mv
actions:
  - name: wine_club_monthly_agg_load
    type: load
    source:
      type: sql
      sql: |
        SELECT
          date_trunc('mon', _etl_timestamp) as period,
          count(*) as record_count,
          current_timestamp() as _generated_at
        FROM {catalog}.{silver_schema}.wine_club_fct
        GROUP BY 1
    target: v_wine_club_monthly_agg

  - name: write_wine_club_monthly_agg_mv
    type: write
    source: v_wine_club_monthly_agg
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{gold_schema}"
      table: "wine_club_monthly_agg_mv"
