pipeline: domain_s_gold
flowgroup: auction_lot_weekly_agg_mv
actions:
  - name: auction_lot_weekly_agg_load
    type: load
    source:
      type: sql
      sql: |
        SELECT
          date_trunc('week', _etl_timestamp) as period,
          count(*) as record_count,
          current_timestamp() as _generated_at
        FROM {catalog}.{silver_schema}.auction_lot_fct
        GROUP BY 1
    target: v_auction_lot_weekly_agg

  - name: write_auction_lot_weekly_agg_mv
    type: write
    source: v_auction_lot_weekly_agg
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{gold_schema}"
      table: "auction_lot_weekly_agg_mv"
