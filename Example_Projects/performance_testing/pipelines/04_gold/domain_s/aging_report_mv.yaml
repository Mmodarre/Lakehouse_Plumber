pipeline: perf_gold
flowgroup: aging_report_mv
actions:
  - name: aging_report_sql
    type: load
    source:
      type: sql
      sql: |
        SELECT
          *,
          current_timestamp() as _report_generated_at
        FROM {catalog}.{silver_schema}.aging_dim
    target: v_aging_report

  - name: write_aging_report_mv
    type: write
    source: v_aging_report
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{gold_schema}"
      table: "aging_report_mv"
