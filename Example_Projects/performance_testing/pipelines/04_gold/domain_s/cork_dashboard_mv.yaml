pipeline: perf_gold
flowgroup: cork_dashboard_mv
actions:
  - name: cork_dashboard_sql
    type: load
    source:
      type: sql
      sql: |
        SELECT
          *,
          current_timestamp() as _report_generated_at
        FROM {catalog}.{silver_schema}.cork_dim
    target: v_cork_dashboard

  - name: write_cork_dashboard_mv
    type: write
    source: v_cork_dashboard
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{gold_schema}"
      table: "cork_dashboard_mv"
