pipeline: domain_s_gold
flowgroup: capsule_summary_mv
actions:
  - name: capsule_summary_sql
    type: load
    source:
      type: sql
      sql: |
        SELECT
          *,
          current_timestamp() as _report_generated_at
        FROM {catalog}.{silver_schema}.capsule_dim
    target: v_capsule_summary

  - name: write_capsule_summary_mv
    type: write
    source: v_capsule_summary
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{gold_schema}"
      table: "capsule_summary_mv"
