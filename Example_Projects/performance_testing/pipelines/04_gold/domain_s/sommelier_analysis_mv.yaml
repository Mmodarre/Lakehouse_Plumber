pipeline: perf_gold
flowgroup: sommelier_analysis_mv
actions:
  - name: sommelier_analysis_sql
    type: load
    source:
      type: sql
      sql: |
        SELECT
          *,
          current_timestamp() as _report_generated_at
        FROM {catalog}.{silver_schema}.sommelier_dim
    target: v_sommelier_analysis

  - name: write_sommelier_analysis_mv
    type: write
    source: v_sommelier_analysis
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{gold_schema}"
      table: "sommelier_analysis_mv"
