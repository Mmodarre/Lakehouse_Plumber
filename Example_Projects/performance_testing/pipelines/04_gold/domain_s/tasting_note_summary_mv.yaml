pipeline: perf_gold
flowgroup: tasting_note_summary_mv
actions:
  - name: tasting_note_summary_sql
    type: load
    source:
      type: sql
      sql: |
        SELECT
          *,
          current_timestamp() as _report_generated_at
        FROM {catalog}.{silver_schema}.tasting_note_dim
    target: v_tasting_note_summary

  - name: write_tasting_note_summary_mv
    type: write
    source: v_tasting_note_summary
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{gold_schema}"
      table: "tasting_note_summary_mv"
