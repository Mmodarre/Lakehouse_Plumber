pipeline: perf_gold
flowgroup: barrel_summary_mv
actions:
  - name: barrel_summary_sql
    type: load
    source:
      type: sql
      sql: |
        SELECT
          *,
          current_timestamp() as _report_generated_at
        FROM {catalog}.{silver_schema}.barrel_dim
    target: v_barrel_summary

  - name: write_barrel_summary_mv
    type: write
    source: v_barrel_summary
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{gold_schema}"
      table: "barrel_summary_mv"
