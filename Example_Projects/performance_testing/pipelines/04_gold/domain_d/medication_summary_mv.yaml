pipeline: perf_gold
flowgroup: medication_summary_mv
actions:
  - name: medication_summary_sql
    type: load
    source:
      type: sql
      sql: |
        SELECT
          *,
          current_timestamp() as _report_generated_at
        FROM {catalog}.{silver_schema}.medication_dim
    target: v_medication_summary

  - name: write_medication_summary_mv
    type: write
    source: v_medication_summary
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{gold_schema}"
      table: "medication_summary_mv"
