pipeline: perf_gold
flowgroup: allergy_analysis_mv
actions:
  - name: allergy_analysis_sql
    type: load
    source:
      type: sql
      sql: |
        SELECT
          *,
          current_timestamp() as _report_generated_at
        FROM {catalog}.{silver_schema}.allergy_dim
    target: v_allergy_analysis

  - name: write_allergy_analysis_mv
    type: write
    source: v_allergy_analysis
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{gold_schema}"
      table: "allergy_analysis_mv"
