pipeline: domain_d_gold
flowgroup: radiology_weekly_agg_mv
actions:
  - name: radiology_weekly_agg_load
    type: load
    source:
      type: sql
      sql: |
        SELECT
          date_trunc('week', _etl_timestamp) as period,
          count(*) as record_count,
          current_timestamp() as _generated_at
        FROM {catalog}.{silver_schema}.radiology_fct
        GROUP BY 1
    target: v_radiology_weekly_agg

  - name: write_radiology_weekly_agg_mv
    type: write
    source: v_radiology_weekly_agg
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{gold_schema}"
      table: "radiology_weekly_agg_mv"
