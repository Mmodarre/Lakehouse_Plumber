pipeline: domain_d_gold
flowgroup: prescription_dashboard_mv
actions:
  - name: prescription_dashboard_sql
    type: load
    source:
      type: sql
      sql: |
        SELECT
          *,
          current_timestamp() as _report_generated_at
        FROM {catalog}.{silver_schema}.prescription_fct
    target: v_prescription_dashboard

  - name: write_prescription_dashboard_mv
    type: write
    source: v_prescription_dashboard
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{gold_schema}"
      table: "prescription_dashboard_mv"
