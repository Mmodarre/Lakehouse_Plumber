pipeline: domain_d_gold
flowgroup: insurance_report_mv
actions:
  - name: insurance_report_sql
    type: load
    source:
      type: sql
      sql: |
        SELECT
          *,
          current_timestamp() as _report_generated_at
        FROM {catalog}.{silver_schema}.insurance_fct
    target: v_insurance_report

  - name: write_insurance_report_mv
    type: write
    source: v_insurance_report
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{gold_schema}"
      table: "insurance_report_mv"
