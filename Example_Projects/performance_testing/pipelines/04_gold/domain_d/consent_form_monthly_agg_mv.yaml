pipeline: domain_d_gold
flowgroup: consent_form_monthly_agg_mv
actions:
  - name: consent_form_monthly_agg_load
    type: load
    source:
      type: sql
      sql: |
        SELECT
          date_trunc('mon', _etl_timestamp) as period,
          count(*) as record_count,
          current_timestamp() as _generated_at
        FROM {catalog}.{silver_schema}.consent_form_dim
        GROUP BY 1
    target: v_consent_form_monthly_agg

  - name: write_consent_form_monthly_agg_mv
    type: write
    source: v_consent_form_monthly_agg
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{gold_schema}"
      table: "consent_form_monthly_agg_mv"
