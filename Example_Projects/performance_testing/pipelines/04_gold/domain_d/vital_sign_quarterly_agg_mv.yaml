pipeline: perf_gold
flowgroup: vital_sign_quarterly_agg_mv
actions:
  - name: vital_sign_quarterly_agg_load
    type: load
    source:
      type: sql
      sql: |
        SELECT
          date_trunc('quarter', _etl_timestamp) as period,
          count(*) as record_count,
          current_timestamp() as _generated_at
        FROM {catalog}.{silver_schema}.vital_sign_dim
        GROUP BY 1
    target: v_vital_sign_quarterly_agg

  - name: write_vital_sign_quarterly_agg_mv
    type: write
    source: v_vital_sign_quarterly_agg
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{gold_schema}"
      table: "vital_sign_quarterly_agg_mv"
