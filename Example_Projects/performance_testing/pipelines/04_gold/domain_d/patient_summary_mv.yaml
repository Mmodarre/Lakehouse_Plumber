pipeline: perf_gold
flowgroup: patient_summary_mv
actions:
  - name: patient_summary_sql
    type: load
    source:
      type: sql
      sql: |
        SELECT
          *,
          current_timestamp() as _report_generated_at
        FROM {catalog}.{silver_schema}.patient_dim
    target: v_patient_summary

  - name: write_patient_summary_mv
    type: write
    source: v_patient_summary
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{gold_schema}"
      table: "patient_summary_mv"
