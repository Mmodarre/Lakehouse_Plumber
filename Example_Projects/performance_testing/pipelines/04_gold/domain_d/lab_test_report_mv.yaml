pipeline: perf_gold
flowgroup: lab_test_report_mv
actions:
  - name: lab_test_report_sql
    type: load
    source:
      type: sql
      sql: |
        SELECT
          *,
          current_timestamp() as _report_generated_at
        FROM {catalog}.{silver_schema}.lab_test_dim
    target: v_lab_test_report

  - name: write_lab_test_report_mv
    type: write
    source: v_lab_test_report
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{gold_schema}"
      table: "lab_test_report_mv"
