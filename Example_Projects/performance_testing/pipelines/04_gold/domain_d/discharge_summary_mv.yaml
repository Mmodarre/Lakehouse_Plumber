pipeline: perf_gold
flowgroup: discharge_summary_mv
actions:
  - name: discharge_summary_sql
    type: load
    source:
      type: sql
      sql: |
        SELECT
          *,
          current_timestamp() as _report_generated_at
        FROM {catalog}.{silver_schema}.discharge_dim
    target: v_discharge_summary

  - name: write_discharge_summary_mv
    type: write
    source: v_discharge_summary
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{gold_schema}"
      table: "discharge_summary_mv"
