pipeline: perf_gold
flowgroup: medical_procedure_report_mv
actions:
  - name: medical_procedure_report_sql
    type: load
    source:
      type: sql
      sql: |
        SELECT
          *,
          current_timestamp() as _report_generated_at
        FROM {catalog}.{silver_schema}.medical_procedure_dim
    target: v_medical_procedure_report

  - name: write_medical_procedure_report_mv
    type: write
    source: v_medical_procedure_report
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{gold_schema}"
      table: "medical_procedure_report_mv"
