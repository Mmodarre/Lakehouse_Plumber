pipeline: domain_n_gold
flowgroup: medical_exam_monthly_agg_mv
actions:
  - name: medical_exam_monthly_agg_load
    type: load
    source:
      type: sql
      sql: |
        SELECT
          date_trunc('mon', _etl_timestamp) as period,
          count(*) as record_count,
          current_timestamp() as _generated_at
        FROM {catalog}.{silver_schema}.medical_exam_dim
        GROUP BY 1
    target: v_medical_exam_monthly_agg

  - name: write_medical_exam_monthly_agg_mv
    type: write
    source: v_medical_exam_monthly_agg
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{gold_schema}"
      table: "medical_exam_monthly_agg_mv"
