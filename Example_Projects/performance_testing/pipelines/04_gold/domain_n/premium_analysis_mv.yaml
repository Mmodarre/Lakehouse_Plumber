pipeline: perf_gold
flowgroup: premium_analysis_mv
actions:
  - name: premium_analysis_sql
    type: load
    source:
      type: sql
      sql: |
        SELECT
          *,
          current_timestamp() as _report_generated_at
        FROM {catalog}.{silver_schema}.premium_dim
    target: v_premium_analysis

  - name: write_premium_analysis_mv
    type: write
    source: v_premium_analysis
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{gold_schema}"
      table: "premium_analysis_mv"
