pipeline: domain_n_gold
flowgroup: catastrophe_monthly_agg_mv
actions:
  - name: catastrophe_monthly_agg_load
    type: load
    source:
      type: sql
      sql: |
        SELECT
          date_trunc('mon', _etl_timestamp) as period,
          count(*) as record_count,
          current_timestamp() as _generated_at
        FROM {catalog}.{silver_schema}.catastrophe_fct
        GROUP BY 1
    target: v_catastrophe_monthly_agg

  - name: write_catastrophe_monthly_agg_mv
    type: write
    source: v_catastrophe_monthly_agg
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{gold_schema}"
      table: "catastrophe_monthly_agg_mv"
