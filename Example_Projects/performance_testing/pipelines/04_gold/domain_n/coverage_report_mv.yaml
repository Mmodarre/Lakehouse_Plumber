pipeline: perf_gold
flowgroup: coverage_report_mv
actions:
  - name: coverage_report_sql
    type: load
    source:
      type: sql
      sql: |
        SELECT
          *,
          current_timestamp() as _report_generated_at
        FROM {catalog}.{silver_schema}.coverage_dim
    target: v_coverage_report

  - name: write_coverage_report_mv
    type: write
    source: v_coverage_report
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{gold_schema}"
      table: "coverage_report_mv"
