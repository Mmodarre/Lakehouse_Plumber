pipeline: perf_gold
flowgroup: reserve_analysis_mv
actions:
  - name: reserve_analysis_sql
    type: load
    source:
      type: sql
      sql: |
        SELECT
          *,
          current_timestamp() as _report_generated_at
        FROM {catalog}.{silver_schema}.reserve_dim
    target: v_reserve_analysis

  - name: write_reserve_analysis_mv
    type: write
    source: v_reserve_analysis
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{gold_schema}"
      table: "reserve_analysis_mv"
