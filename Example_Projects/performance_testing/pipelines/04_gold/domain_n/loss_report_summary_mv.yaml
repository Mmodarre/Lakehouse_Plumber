pipeline: perf_gold
flowgroup: loss_report_summary_mv
actions:
  - name: loss_report_summary_sql
    type: load
    source:
      type: sql
      sql: |
        SELECT
          *,
          current_timestamp() as _report_generated_at
        FROM {catalog}.{silver_schema}.loss_report_dim
    target: v_loss_report_summary

  - name: write_loss_report_summary_mv
    type: write
    source: v_loss_report_summary
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{gold_schema}"
      table: "loss_report_summary_mv"
