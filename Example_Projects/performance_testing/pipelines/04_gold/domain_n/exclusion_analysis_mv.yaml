pipeline: perf_gold
flowgroup: exclusion_analysis_mv
actions:
  - name: exclusion_analysis_sql
    type: load
    source:
      type: sql
      sql: |
        SELECT
          *,
          current_timestamp() as _report_generated_at
        FROM {catalog}.{silver_schema}.exclusion_dim
    target: v_exclusion_analysis

  - name: write_exclusion_analysis_mv
    type: write
    source: v_exclusion_analysis
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{gold_schema}"
      table: "exclusion_analysis_mv"
