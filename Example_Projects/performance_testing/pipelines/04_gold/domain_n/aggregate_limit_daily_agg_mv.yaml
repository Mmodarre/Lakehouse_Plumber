pipeline: domain_n_gold
flowgroup: aggregate_limit_daily_agg_mv
actions:
  - name: aggregate_limit_daily_agg_load
    type: load
    source:
      type: sql
      sql: |
        SELECT
          date_trunc('day', _etl_timestamp) as period,
          count(*) as record_count,
          current_timestamp() as _generated_at
        FROM {catalog}.{silver_schema}.aggregate_limit_dim
        GROUP BY 1
    target: v_aggregate_limit_daily_agg

  - name: write_aggregate_limit_daily_agg_mv
    type: write
    source: v_aggregate_limit_daily_agg
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{gold_schema}"
      table: "aggregate_limit_daily_agg_mv"
