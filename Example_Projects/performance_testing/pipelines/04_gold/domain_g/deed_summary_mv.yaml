pipeline: perf_gold
flowgroup: deed_summary_mv
actions:
  - name: deed_summary_sql
    type: load
    source:
      type: sql
      sql: |
        SELECT
          *,
          current_timestamp() as _report_generated_at
        FROM {catalog}.{silver_schema}.deed_dim
    target: v_deed_summary

  - name: write_deed_summary_mv
    type: write
    source: v_deed_summary
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{gold_schema}"
      table: "deed_summary_mv"
