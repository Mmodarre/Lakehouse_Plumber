pipeline: perf_gold
flowgroup: appraisal_summary_mv
actions:
  - name: appraisal_summary_sql
    type: load
    source:
      type: sql
      sql: |
        SELECT
          *,
          current_timestamp() as _report_generated_at
        FROM {catalog}.{silver_schema}.appraisal_dim
    target: v_appraisal_summary

  - name: write_appraisal_summary_mv
    type: write
    source: v_appraisal_summary
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{gold_schema}"
      table: "appraisal_summary_mv"
