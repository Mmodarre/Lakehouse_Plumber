pipeline: domain_g_gold
flowgroup: property_tax_monthly_agg_mv
actions:
  - name: property_tax_monthly_agg_load
    type: load
    source:
      type: sql
      sql: |
        SELECT
          date_trunc('mon', _etl_timestamp) as period,
          count(*) as record_count,
          current_timestamp() as _generated_at
        FROM {catalog}.{silver_schema}.property_tax_dim
        GROUP BY 1
    target: v_property_tax_monthly_agg

  - name: write_property_tax_monthly_agg_mv
    type: write
    source: v_property_tax_monthly_agg
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{gold_schema}"
      table: "property_tax_monthly_agg_mv"
