pipeline: domain_g_gold
flowgroup: unit_summary_mv
actions:
  - name: unit_summary_sql
    type: load
    source:
      type: sql
      sql: |
        SELECT
          *,
          current_timestamp() as _report_generated_at
        FROM {catalog}.{silver_schema}.unit_dim
    target: v_unit_summary

  - name: write_unit_summary_mv
    type: write
    source: v_unit_summary
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{gold_schema}"
      table: "unit_summary_mv"
