pipeline: perf_gold
flowgroup: eviction_analysis_mv
actions:
  - name: eviction_analysis_sql
    type: load
    source:
      type: sql
      sql: |
        SELECT
          *,
          current_timestamp() as _report_generated_at
        FROM {catalog}.{silver_schema}.eviction_dim
    target: v_eviction_analysis

  - name: write_eviction_analysis_mv
    type: write
    source: v_eviction_analysis
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{gold_schema}"
      table: "eviction_analysis_mv"
