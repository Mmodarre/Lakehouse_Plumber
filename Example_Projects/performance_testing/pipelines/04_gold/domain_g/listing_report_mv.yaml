pipeline: domain_g_gold
flowgroup: listing_report_mv
actions:
  - name: listing_report_sql
    type: load
    source:
      type: sql
      sql: |
        SELECT
          *,
          current_timestamp() as _report_generated_at
        FROM {catalog}.{silver_schema}.listing_dim
    target: v_listing_report

  - name: write_listing_report_mv
    type: write
    source: v_listing_report
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{gold_schema}"
      table: "listing_report_mv"
