pipeline: perf_gold
flowgroup: property_summary_mv
actions:
  - name: property_summary_sql
    type: load
    source:
      type: sql
      sql: |
        SELECT
          *,
          current_timestamp() as _report_generated_at
        FROM {catalog}.{silver_schema}.property_dim
    target: v_property_summary

  - name: write_property_summary_mv
    type: write
    source: v_property_summary
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{gold_schema}"
      table: "property_summary_mv"
