pipeline: domain_g_gold
flowgroup: condo_fee_weekly_agg_mv
actions:
  - name: condo_fee_weekly_agg_load
    type: load
    source:
      type: sql
      sql: |
        SELECT
          date_trunc('week', _etl_timestamp) as period,
          count(*) as record_count,
          current_timestamp() as _generated_at
        FROM {catalog}.{silver_schema}.condo_fee_fct
        GROUP BY 1
    target: v_condo_fee_weekly_agg

  - name: write_condo_fee_weekly_agg_mv
    type: write
    source: v_condo_fee_weekly_agg
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{gold_schema}"
      table: "condo_fee_weekly_agg_mv"
