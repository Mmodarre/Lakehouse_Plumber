pipeline: perf_gold
flowgroup: zoning_report_mv
actions:
  - name: zoning_report_sql
    type: load
    source:
      type: sql
      sql: |
        SELECT
          *,
          current_timestamp() as _report_generated_at
        FROM {catalog}.{silver_schema}.zoning_dim
    target: v_zoning_report

  - name: write_zoning_report_mv
    type: write
    source: v_zoning_report
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{gold_schema}"
      table: "zoning_report_mv"
