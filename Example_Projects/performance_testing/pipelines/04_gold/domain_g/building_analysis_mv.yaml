pipeline: perf_gold
flowgroup: building_analysis_mv
actions:
  - name: building_analysis_sql
    type: load
    source:
      type: sql
      sql: |
        SELECT
          *,
          current_timestamp() as _report_generated_at
        FROM {catalog}.{silver_schema}.building_dim
    target: v_building_analysis

  - name: write_building_analysis_mv
    type: write
    source: v_building_analysis
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{gold_schema}"
      table: "building_analysis_mv"
