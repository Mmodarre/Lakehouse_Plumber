pipeline: domain_a_gold
flowgroup: address_analysis_mv
actions:
  - name: address_analysis_sql
    type: load
    source:
      type: sql
      sql: |
        SELECT
          *,
          current_timestamp() as _report_generated_at
        FROM {catalog}.{silver_schema}.address_dim
    target: v_address_analysis

  - name: write_address_analysis_mv
    type: write
    source: v_address_analysis
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{gold_schema}"
      table: "address_analysis_mv"
