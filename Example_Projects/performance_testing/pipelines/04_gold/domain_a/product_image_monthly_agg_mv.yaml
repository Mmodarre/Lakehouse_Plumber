pipeline: domain_a_gold
flowgroup: product_image_monthly_agg_mv
actions:
  - name: product_image_monthly_agg_load
    type: load
    source:
      type: sql
      sql: |
        SELECT
          date_trunc('mon', _etl_timestamp) as period,
          count(*) as record_count,
          current_timestamp() as _generated_at
        FROM {catalog}.{silver_schema}.product_image_fct
        GROUP BY 1
    target: v_product_image_monthly_agg

  - name: write_product_image_monthly_agg_mv
    type: write
    source: v_product_image_monthly_agg
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{gold_schema}"
      table: "product_image_monthly_agg_mv"
