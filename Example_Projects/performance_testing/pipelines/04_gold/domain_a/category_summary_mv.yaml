pipeline: perf_gold
flowgroup: category_summary_mv
actions:
  - name: category_summary_sql
    type: load
    source:
      type: sql
      sql: |
        SELECT
          *,
          current_timestamp() as _report_generated_at
        FROM {catalog}.{silver_schema}.category_dim
    target: v_category_summary

  - name: write_category_summary_mv
    type: write
    source: v_category_summary
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{gold_schema}"
      table: "category_summary_mv"
