pipeline: perf_gold
flowgroup: promotion_analysis_mv
actions:
  - name: promotion_analysis_sql
    type: load
    source:
      type: sql
      sql: |
        SELECT
          *,
          current_timestamp() as _report_generated_at
        FROM {catalog}.{silver_schema}.promotion_dim
    target: v_promotion_analysis

  - name: write_promotion_analysis_mv
    type: write
    source: v_promotion_analysis
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{gold_schema}"
      table: "promotion_analysis_mv"
