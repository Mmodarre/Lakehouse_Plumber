pipeline: domain_a_gold
flowgroup: invoice_analysis_mv
actions:
  - name: invoice_analysis_sql
    type: load
    source:
      type: sql
      sql: |
        SELECT
          *,
          current_timestamp() as _report_generated_at
        FROM {catalog}.{silver_schema}.invoice_dim
    target: v_invoice_analysis

  - name: write_invoice_analysis_mv
    type: write
    source: v_invoice_analysis
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{gold_schema}"
      table: "invoice_analysis_mv"
