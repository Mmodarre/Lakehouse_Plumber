pipeline: perf_gold
flowgroup: subscription_quarterly_agg_mv
actions:
  - name: subscription_quarterly_agg_load
    type: load
    source:
      type: sql
      sql: |
        SELECT
          date_trunc('quarter', _etl_timestamp) as period,
          count(*) as record_count,
          current_timestamp() as _generated_at
        FROM {catalog}.{silver_schema}.subscription_dim
        GROUP BY 1
    target: v_subscription_quarterly_agg

  - name: write_subscription_quarterly_agg_mv
    type: write
    source: v_subscription_quarterly_agg
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{gold_schema}"
      table: "subscription_quarterly_agg_mv"
