pipeline: domain_a_gold
flowgroup: wishlist_dashboard_mv
actions:
  - name: wishlist_dashboard_sql
    type: load
    source:
      type: sql
      sql: |
        SELECT
          *,
          current_timestamp() as _report_generated_at
        FROM {catalog}.{silver_schema}.wishlist_fct
    target: v_wishlist_dashboard

  - name: write_wishlist_dashboard_mv
    type: write
    source: v_wishlist_dashboard
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{gold_schema}"
      table: "wishlist_dashboard_mv"
