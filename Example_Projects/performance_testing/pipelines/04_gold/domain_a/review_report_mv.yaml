pipeline: domain_a_gold
flowgroup: review_report_mv
actions:
  - name: review_report_sql
    type: load
    source:
      type: sql
      sql: |
        SELECT
          *,
          current_timestamp() as _report_generated_at
        FROM {catalog}.{silver_schema}.review_dim
    target: v_review_report

  - name: write_review_report_mv
    type: write
    source: v_review_report
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{gold_schema}"
      table: "review_report_mv"
