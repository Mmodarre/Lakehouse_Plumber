pipeline: perf_gold
flowgroup: order_analysis_mv
actions:
  - name: order_analysis_sql
    type: load
    source:
      type: sql
      sql: |
        SELECT
          *,
          current_timestamp() as _report_generated_at
        FROM {catalog}.{silver_schema}.order_dim
    target: v_order_analysis

  - name: write_order_analysis_mv
    type: write
    source: v_order_analysis
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{gold_schema}"
      table: "order_analysis_mv"
