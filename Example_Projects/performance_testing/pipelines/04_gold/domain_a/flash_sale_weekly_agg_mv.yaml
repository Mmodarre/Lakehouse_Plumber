pipeline: domain_a_gold
flowgroup: flash_sale_weekly_agg_mv
actions:
  - name: flash_sale_weekly_agg_load
    type: load
    source:
      type: sql
      sql: |
        SELECT
          date_trunc('week', _etl_timestamp) as period,
          count(*) as record_count,
          current_timestamp() as _generated_at
        FROM {catalog}.{silver_schema}.flash_sale_fct
        GROUP BY 1
    target: v_flash_sale_weekly_agg

  - name: write_flash_sale_weekly_agg_mv
    type: write
    source: v_flash_sale_weekly_agg
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{gold_schema}"
      table: "flash_sale_weekly_agg_mv"
