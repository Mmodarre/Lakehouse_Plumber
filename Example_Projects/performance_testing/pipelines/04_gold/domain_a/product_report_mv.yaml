pipeline: domain_a_gold
flowgroup: product_report_mv
actions:
  - name: product_report_sql
    type: load
    source:
      type: sql
      sql: |
        SELECT
          *,
          current_timestamp() as _report_generated_at
        FROM {catalog}.{silver_schema}.product_dim
    target: v_product_report

  - name: write_product_report_mv
    type: write
    source: v_product_report
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{gold_schema}"
      table: "product_report_mv"
