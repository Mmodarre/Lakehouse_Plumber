pipeline: domain_a_gold
flowgroup: barcode_item_quarterly_agg_mv
actions:
  - name: barcode_item_quarterly_agg_load
    type: load
    source:
      type: sql
      sql: |
        SELECT
          date_trunc('quarter', _etl_timestamp) as period,
          count(*) as record_count,
          current_timestamp() as _generated_at
        FROM {catalog}.{silver_schema}.barcode_item_fct
        GROUP BY 1
    target: v_barcode_item_quarterly_agg

  - name: write_barcode_item_quarterly_agg_mv
    type: write
    source: v_barcode_item_quarterly_agg
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{gold_schema}"
      table: "barcode_item_quarterly_agg_mv"
