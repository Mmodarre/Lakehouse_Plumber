pipeline: domain_j_gold
flowgroup: demand_response_monthly_agg_mv
actions:
  - name: demand_response_monthly_agg_load
    type: load
    source:
      type: sql
      sql: |
        SELECT
          date_trunc('mon', _etl_timestamp) as period,
          count(*) as record_count,
          current_timestamp() as _generated_at
        FROM {catalog}.{silver_schema}.demand_response_fct
        GROUP BY 1
    target: v_demand_response_monthly_agg

  - name: write_demand_response_monthly_agg_mv
    type: write
    source: v_demand_response_monthly_agg
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{gold_schema}"
      table: "demand_response_monthly_agg_mv"
