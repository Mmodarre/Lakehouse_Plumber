pipeline: perf_gold
flowgroup: grid_report_mv
actions:
  - name: grid_report_sql
    type: load
    source:
      type: sql
      sql: |
        SELECT
          *,
          current_timestamp() as _report_generated_at
        FROM {catalog}.{silver_schema}.grid_dim
    target: v_grid_report

  - name: write_grid_report_mv
    type: write
    source: v_grid_report
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{gold_schema}"
      table: "grid_report_mv"
