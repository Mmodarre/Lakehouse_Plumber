pipeline: domain_j_gold
flowgroup: meter_summary_mv
actions:
  - name: meter_summary_sql
    type: load
    source:
      type: sql
      sql: |
        SELECT
          *,
          current_timestamp() as _report_generated_at
        FROM {catalog}.{silver_schema}.meter_fct
    target: v_meter_summary

  - name: write_meter_summary_mv
    type: write
    source: v_meter_summary
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{gold_schema}"
      table: "meter_summary_mv"
