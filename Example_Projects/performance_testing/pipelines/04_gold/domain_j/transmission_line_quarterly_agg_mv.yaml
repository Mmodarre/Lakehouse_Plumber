pipeline: domain_j_gold
flowgroup: transmission_line_quarterly_agg_mv
actions:
  - name: transmission_line_quarterly_agg_load
    type: load
    source:
      type: sql
      sql: |
        SELECT
          date_trunc('quarter', _etl_timestamp) as period,
          count(*) as record_count,
          current_timestamp() as _generated_at
        FROM {catalog}.{silver_schema}.transmission_line_fct
        GROUP BY 1
    target: v_transmission_line_quarterly_agg

  - name: write_transmission_line_quarterly_agg_mv
    type: write
    source: v_transmission_line_quarterly_agg
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{gold_schema}"
      table: "transmission_line_quarterly_agg_mv"
