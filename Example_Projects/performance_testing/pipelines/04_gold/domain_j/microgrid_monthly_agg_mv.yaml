pipeline: domain_j_gold
flowgroup: microgrid_monthly_agg_mv
actions:
  - name: microgrid_monthly_agg_load
    type: load
    source:
      type: sql
      sql: |
        SELECT
          date_trunc('mon', _etl_timestamp) as period,
          count(*) as record_count,
          current_timestamp() as _generated_at
        FROM {catalog}.{silver_schema}.microgrid_dim
        GROUP BY 1
    target: v_microgrid_monthly_agg

  - name: write_microgrid_monthly_agg_mv
    type: write
    source: v_microgrid_monthly_agg
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{gold_schema}"
      table: "microgrid_monthly_agg_mv"
