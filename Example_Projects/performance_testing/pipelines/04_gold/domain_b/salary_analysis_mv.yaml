pipeline: perf_gold
flowgroup: salary_analysis_mv
actions:
  - name: salary_analysis_sql
    type: load
    source:
      type: sql
      sql: |
        SELECT
          *,
          current_timestamp() as _report_generated_at
        FROM {catalog}.{silver_schema}.salary_dim
    target: v_salary_analysis

  - name: write_salary_analysis_mv
    type: write
    source: v_salary_analysis
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{gold_schema}"
      table: "salary_analysis_mv"
