pipeline: domain_b_gold
flowgroup: certification_analysis_mv
actions:
  - name: certification_analysis_sql
    type: load
    source:
      type: sql
      sql: |
        SELECT
          *,
          current_timestamp() as _report_generated_at
        FROM {catalog}.{silver_schema}.certification_fct
    target: v_certification_analysis

  - name: write_certification_analysis_mv
    type: write
    source: v_certification_analysis
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{gold_schema}"
      table: "certification_analysis_mv"
