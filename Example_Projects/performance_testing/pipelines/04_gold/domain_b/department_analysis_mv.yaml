pipeline: perf_gold
flowgroup: department_analysis_mv
actions:
  - name: department_analysis_sql
    type: load
    source:
      type: sql
      sql: |
        SELECT
          *,
          current_timestamp() as _report_generated_at
        FROM {catalog}.{silver_schema}.department_dim
    target: v_department_analysis

  - name: write_department_analysis_mv
    type: write
    source: v_department_analysis
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{gold_schema}"
      table: "department_analysis_mv"
