pipeline: domain_b_gold
flowgroup: team_lead_monthly_agg_mv
actions:
  - name: team_lead_monthly_agg_load
    type: load
    source:
      type: sql
      sql: |
        SELECT
          date_trunc('mon', _etl_timestamp) as period,
          count(*) as record_count,
          current_timestamp() as _generated_at
        FROM {catalog}.{silver_schema}.team_lead_dim
        GROUP BY 1
    target: v_team_lead_monthly_agg

  - name: write_team_lead_monthly_agg_mv
    type: write
    source: v_team_lead_monthly_agg
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{gold_schema}"
      table: "team_lead_monthly_agg_mv"
