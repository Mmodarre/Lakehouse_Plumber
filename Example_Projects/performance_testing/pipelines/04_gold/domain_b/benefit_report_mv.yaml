pipeline: domain_b_gold
flowgroup: benefit_report_mv
actions:
  - name: benefit_report_sql
    type: load
    source:
      type: sql
      sql: |
        SELECT
          *,
          current_timestamp() as _report_generated_at
        FROM {catalog}.{silver_schema}.benefit_fct
    target: v_benefit_report

  - name: write_benefit_report_mv
    type: write
    source: v_benefit_report
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{gold_schema}"
      table: "benefit_report_mv"
