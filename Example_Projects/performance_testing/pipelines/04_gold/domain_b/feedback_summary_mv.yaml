pipeline: perf_gold
flowgroup: feedback_summary_mv
actions:
  - name: feedback_summary_sql
    type: load
    source:
      type: sql
      sql: |
        SELECT
          *,
          current_timestamp() as _report_generated_at
        FROM {catalog}.{silver_schema}.feedback_dim
    target: v_feedback_summary

  - name: write_feedback_summary_mv
    type: write
    source: v_feedback_summary
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{gold_schema}"
      table: "feedback_summary_mv"
