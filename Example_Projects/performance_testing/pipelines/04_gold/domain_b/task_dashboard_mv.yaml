pipeline: domain_b_gold
flowgroup: task_dashboard_mv
actions:
  - name: task_dashboard_sql
    type: load
    source:
      type: sql
      sql: |
        SELECT
          *,
          current_timestamp() as _report_generated_at
        FROM {catalog}.{silver_schema}.task_fct
    target: v_task_dashboard

  - name: write_task_dashboard_mv
    type: write
    source: v_task_dashboard
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{gold_schema}"
      table: "task_dashboard_mv"
