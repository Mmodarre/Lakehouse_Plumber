pipeline: perf_gold
flowgroup: offboarding_report_mv
actions:
  - name: offboarding_report_sql
    type: load
    source:
      type: sql
      sql: |
        SELECT
          *,
          current_timestamp() as _report_generated_at
        FROM {catalog}.{silver_schema}.offboarding_dim
    target: v_offboarding_report

  - name: write_offboarding_report_mv
    type: write
    source: v_offboarding_report
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{gold_schema}"
      table: "offboarding_report_mv"
