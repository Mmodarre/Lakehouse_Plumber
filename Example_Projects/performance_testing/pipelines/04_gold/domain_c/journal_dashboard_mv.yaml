pipeline: domain_c_gold
flowgroup: journal_dashboard_mv
actions:
  - name: journal_dashboard_sql
    type: load
    source:
      type: sql
      sql: |
        SELECT
          *,
          current_timestamp() as _report_generated_at
        FROM {catalog}.{silver_schema}.journal_fct
    target: v_journal_dashboard

  - name: write_journal_dashboard_mv
    type: write
    source: v_journal_dashboard
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{gold_schema}"
      table: "journal_dashboard_mv"
