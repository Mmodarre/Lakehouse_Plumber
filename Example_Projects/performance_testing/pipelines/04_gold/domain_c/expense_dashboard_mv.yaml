pipeline: domain_c_gold
flowgroup: expense_dashboard_mv
actions:
  - name: expense_dashboard_sql
    type: load
    source:
      type: sql
      sql: |
        SELECT
          *,
          current_timestamp() as _report_generated_at
        FROM {catalog}.{silver_schema}.expense_fct
    target: v_expense_dashboard

  - name: write_expense_dashboard_mv
    type: write
    source: v_expense_dashboard
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{gold_schema}"
      table: "expense_dashboard_mv"
