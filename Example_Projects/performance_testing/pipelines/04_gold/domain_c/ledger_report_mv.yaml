pipeline: perf_gold
flowgroup: ledger_report_mv
actions:
  - name: ledger_report_sql
    type: load
    source:
      type: sql
      sql: |
        SELECT
          *,
          current_timestamp() as _report_generated_at
        FROM {catalog}.{silver_schema}.ledger_dim
    target: v_ledger_report

  - name: write_ledger_report_mv
    type: write
    source: v_ledger_report
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{gold_schema}"
      table: "ledger_report_mv"
