pipeline: perf_gold
flowgroup: currency_report_mv
actions:
  - name: currency_report_sql
    type: load
    source:
      type: sql
      sql: |
        SELECT
          *,
          current_timestamp() as _report_generated_at
        FROM {catalog}.{silver_schema}.currency_dim
    target: v_currency_report

  - name: write_currency_report_mv
    type: write
    source: v_currency_report
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{gold_schema}"
      table: "currency_report_mv"
