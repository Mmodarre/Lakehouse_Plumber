pipeline: domain_c_gold
flowgroup: tax_report_mv
actions:
  - name: tax_report_sql
    type: load
    source:
      type: sql
      sql: |
        SELECT
          *,
          current_timestamp() as _report_generated_at
        FROM {catalog}.{silver_schema}.tax_fct
    target: v_tax_report

  - name: write_tax_report_mv
    type: write
    source: v_tax_report
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{gold_schema}"
      table: "tax_report_mv"
