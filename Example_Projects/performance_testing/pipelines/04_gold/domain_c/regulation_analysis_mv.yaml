pipeline: perf_gold
flowgroup: regulation_analysis_mv
actions:
  - name: regulation_analysis_sql
    type: load
    source:
      type: sql
      sql: |
        SELECT
          *,
          current_timestamp() as _report_generated_at
        FROM {catalog}.{silver_schema}.regulation_dim
    target: v_regulation_analysis

  - name: write_regulation_analysis_mv
    type: write
    source: v_regulation_analysis
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{gold_schema}"
      table: "regulation_analysis_mv"
