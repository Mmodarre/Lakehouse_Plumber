pipeline: perf_gold
flowgroup: asset_report_mv
actions:
  - name: asset_report_sql
    type: load
    source:
      type: sql
      sql: |
        SELECT
          *,
          current_timestamp() as _report_generated_at
        FROM {catalog}.{silver_schema}.asset_dim
    target: v_asset_report

  - name: write_asset_report_mv
    type: write
    source: v_asset_report
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{gold_schema}"
      table: "asset_report_mv"
