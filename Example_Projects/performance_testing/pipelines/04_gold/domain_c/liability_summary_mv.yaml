pipeline: perf_gold
flowgroup: liability_summary_mv
actions:
  - name: liability_summary_sql
    type: load
    source:
      type: sql
      sql: |
        SELECT
          *,
          current_timestamp() as _report_generated_at
        FROM {catalog}.{silver_schema}.liability_dim
    target: v_liability_summary

  - name: write_liability_summary_mv
    type: write
    source: v_liability_summary
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{gold_schema}"
      table: "liability_summary_mv"
