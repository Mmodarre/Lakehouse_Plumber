pipeline: domain_c_gold
flowgroup: budget_summary_mv
actions:
  - name: budget_summary_sql
    type: load
    source:
      type: sql
      sql: |
        SELECT
          *,
          current_timestamp() as _report_generated_at
        FROM {catalog}.{silver_schema}.budget_dim
    target: v_budget_summary

  - name: write_budget_summary_mv
    type: write
    source: v_budget_summary
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{gold_schema}"
      table: "budget_summary_mv"
