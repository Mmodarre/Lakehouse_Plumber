pipeline: perf_gold
flowgroup: account_analysis_mv
actions:
  - name: account_analysis_sql
    type: load
    source:
      type: sql
      sql: |
        SELECT
          *,
          current_timestamp() as _report_generated_at
        FROM {catalog}.{silver_schema}.account_dim
    target: v_account_analysis

  - name: write_account_analysis_mv
    type: write
    source: v_account_analysis
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{gold_schema}"
      table: "account_analysis_mv"
