pipeline: domain_c_gold
flowgroup: credit_note_weekly_agg_mv
actions:
  - name: credit_note_weekly_agg_load
    type: load
    source:
      type: sql
      sql: |
        SELECT
          date_trunc('week', _etl_timestamp) as period,
          count(*) as record_count,
          current_timestamp() as _generated_at
        FROM {catalog}.{silver_schema}.credit_note_fct
        GROUP BY 1
    target: v_credit_note_weekly_agg

  - name: write_credit_note_weekly_agg_mv
    type: write
    source: v_credit_note_weekly_agg
    write_target:
      type: materialized_view
      catalog: "{catalog}"
      schema: "{gold_schema}"
      table: "credit_note_weekly_agg_mv"
