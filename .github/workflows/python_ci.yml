# This workflow will install Python dependencies, run tests and lint with multiple versions of Python
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-python

name: Tests

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: read

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        python-version: ["3.12"]

    env:
      LHP_DISABLE_ANALYTICS: 1

    steps:
    - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
      with:
        python-version: ${{ matrix.python-version }}

    - name: Cache pip dependencies
      uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae  # v5.0.5
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ matrix.python-version }}-${{ hashFiles('**/requirements*.txt', '**/pyproject.toml') }}
        restore-keys: |
          ${{ runner.os }}-pip-${{ matrix.python-version }}-
          ${{ runner.os }}-pip-

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pytest pytest-cov
        # Install the package in development mode with dev extras
        # (syrupy for snapshot tests, plus the rest of the dev toolchain).
        pip install -e ".[dev]"
        # Install additional requirements if they exist
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
        if [ -f requirements-dev.txt ]; then pip install -r requirements-dev.txt; fi
      shell: bash

    - name: Lint and format check with ruff
      run: |
        pip install ruff
        # Scope is deliberately `src/ tests/` (not whole-repo like the old
        # repo-wide linter). This intentionally drops repo-root
        # vulture_whitelist.py from CI *lint*: its F821 whitelist stubs are
        # deliberate, and that file's purpose is preserved by the separate
        # `vulture` run.
        ruff check src/ tests/
        ruff format --check src/ tests/
      shell: bash

    - name: Run import-linter
      run: |
        pip install import-linter
        lint-imports
      shell: bash

    - name: Run constitution gates (file-size, placement, stability-drift, codegen-inline)
      run: |
        python scripts/check_file_sizes.py --all
        python scripts/check_stability_drift.py --all
        python scripts/check_placement.py --all
        python scripts/check_codegen_inline.py --all
      shell: bash

    - name: Type-check public API surface (mypy --strict)
      run: |
        pip install mypy
        mypy --strict src/lhp/api/
      shell: bash

    - name: Type-check webapp package (mypy)
      run: |
        pip install mypy
        mypy src/lhp/webapp/
      shell: bash

    # =========================================================================
    # Phase 6 skip-list — governed by §12bis of .claude/CODING_CONSTITUTION.md
    # (CI test-gate suspensions).
    #
    # Each GROUP below carries the §12bis-mandated 4-attribute comment cluster
    # (OWNER / ISSUE / EXPIRY / REDUCED-GATE) on adjacent lines BEFORE the
    # variable assignment that expands to its --deselect entries. The cluster
    # applies to every entry in that variable. EXPIRY dates force re-evaluation
    # before CI silently rots — failing the build past the date is the intent.
    # =========================================================================
    - name: Test with pytest
      run: |
        # ---- GROUP A — DI-refactor surfaces ----
        # Tests assert on orchestrator methods removed by the v0.0.9 DI refactor
        # (generate_pipeline_by_field / validate_pipeline_by_field / inline
        # service construction). Mechanical fix requires per-test rewrites to
        # the facade or build_facade_orchestrator path. Phase 7 scope.
        # OWNER: @mmodarre
        # ISSUE: https://github.com/Mmodarre/Lakehouse_Plumber/issues/wk6-di-refactor-test-surface
        # EXPIRY: 2026-08-01
        # REDUCED-GATE: pytest tests/test_pipeline_validator.py tests/test_validation_include_tests.py tests/test_readmode.py tests/test_orchestrator_include_tests.py tests/test_validate_lhp_error_ipc.py tests/test_flowgroup_processor_include_tests.py --collect-only
        DESELECT_A=" \
          --deselect tests/test_pipeline_validator.py \
          --deselect tests/test_validation_include_tests.py \
          --deselect tests/test_readmode.py::TestReadMode::test_orchestrator_integration \
          --deselect tests/test_orchestrator_include_tests.py \
          --deselect tests/test_validate_lhp_error_ipc.py \
          --deselect tests/test_flowgroup_processor_include_tests.py"

        # ---- GROUP B — DTO-shape drift ----
        # TestFacadeOnDeltaUnwrap asserts on `response.original_error` (an
        # LHPError instance), but the public GenerationResponse now exposes
        # `error: Optional[ValidationIssueView]` per §4.8 (no exception-typed
        # DTO fields). Rewriting the assertions to the new shape is Phase 7.
        # OWNER: @mmodarre
        # ISSUE: https://github.com/Mmodarre/Lakehouse_Plumber/issues/wk6-dto-shape-drift
        # EXPIRY: 2026-08-01
        # REDUCED-GATE: pytest tests/test_clean_architecture_layers.py --collect-only
        DESELECT_B=" \
          --deselect tests/test_clean_architecture_layers.py::TestFacadeOnDeltaUnwrap"

        # ---- GROUP C — Latent rename drift (discoverer→discovery etc.) ----
        # Single-line attribute/method renames surfaced when D4 buckets removed
        # the ActionOrchestrator constructor ValueError mask. Mechanical fixes
        # straightforward; deferred to keep Phase 6 scope bounded.
        # OWNER: @mmodarre
        # ISSUE: https://github.com/Mmodarre/Lakehouse_Plumber/issues/wk6-latent-rename-drift
        # EXPIRY: 2026-08-01
        # REDUCED-GATE: pytest tests/unit/test_source_path_index.py tests/test_blueprint_orchestrator.py tests/test_blueprint_discoverer.py tests/test_bundle_manager.py --collect-only
        DESELECT_C=" \
          --deselect tests/unit/test_source_path_index.py::TestGetIncludePatternsNoReload \
          --deselect tests/unit/test_source_path_index.py::TestDiscoverAndFilterPreDiscovered::test_falls_back_without_pre_discovered \
          --deselect tests/test_blueprint_orchestrator.py::test_discover_all_flowgroups_includes_blueprint_expansions \
          --deselect tests/test_blueprint_discoverer.py \
          --deselect tests/test_bundle_manager.py"

        # ---- GROUP D — generate/validate command + pipeline-executor residuals ----
        # CLI command tests that exercise generate/validate flow with mocks at
        # the old call layer. Migration to facade-level mocks pending.
        # OWNER: @mmodarre
        # ISSUE: https://github.com/Mmodarre/Lakehouse_Plumber/issues/wk6-cli-command-residuals
        # EXPIRY: 2026-08-01
        # REDUCED-GATE: pytest tests/test_generate_command.py tests/test_pipeline_executor.py tests/test_validate_command_parallel.py tests/test_validate_live_rendering.py tests/test_show_rendering.py tests/cli/test_validate_empty_pipelines_guard.py --collect-only
        DESELECT_D=" \
          --deselect tests/test_generate_command.py \
          --deselect tests/test_pipeline_executor.py \
          --deselect tests/test_validate_command_parallel.py \
          --deselect tests/test_validate_live_rendering.py \
          --deselect tests/test_show_rendering.py \
          --deselect tests/cli/test_validate_empty_pipelines_guard.py"

        # ---- GROUP E — Obsolete-premise tests ----
        # Tests whose ASSERTION PREMISE is obsolete post-refactor (not a
        # mechanical rename). Specifically: test_global_analysis_runs_first
        # asserts `mock_analyze.call_count == 3` (1 global + 2 per-job) but the
        # refactor replaced per-job re-analysis with a single global + partition.
        # Phase 7 will either delete or rewrite the test to assert on the
        # partition_result_by_job invariant.
        # OWNER: @mmodarre
        # ISSUE: https://github.com/Mmodarre/Lakehouse_Plumber/issues/wk6-obsolete-premise-tests
        # EXPIRY: 2026-08-01
        # REDUCED-GATE: pytest tests/test_dependency_analyzer_multi_job.py tests/test_dependency_output_manager.py tests/test_python38_compatibility.py --collect-only
        DESELECT_E=" \
          --deselect tests/test_dependency_analyzer_multi_job.py::test_global_analysis_runs_first \
          --deselect tests/test_dependency_output_manager.py \
          --deselect tests/test_python38_compatibility.py::TestPython38Compatibility::test_tuple_type_annotations_compatibility"

        if [ -d "tests" ]; then
          # webapp suite runs in the dedicated `webapp-tests` job below.
          pytest tests/ --ignore=tests/e2e -m "not webapp" \
            $DESELECT_A $DESELECT_B $DESELECT_C $DESELECT_D $DESELECT_E \
            --cov --cov-branch --junitxml=junit-unit.xml -o junit_family=legacy

          # E2E suite
          pytest tests/e2e -n auto \
            --cov --cov-append --cov-branch --cov-report=xml \
            --cov-fail-under=40 \
            --junitxml=junit-e2e.xml -o junit_family=legacy
        else
          echo "No tests directory found, skipping tests"
        fi
      shell: bash

    - name: Upload coverage reports to Codecov
      uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f  # v7.0.0
      if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.12'
      with:
        token: ${{ secrets.CODECOV_TOKEN }}
        slug: Mmodarre/Lakehouse_Plumber

    - name: Upload test results to Codecov
      if: ${{ !cancelled() }}
      uses: codecov/test-results-action@0fa95f0e1eeaafde2c782583b36b28ad0d8c77d3  # v1.2.1
      with:
        token: ${{ secrets.CODECOV_TOKEN }}

  # Webapp (FastAPI backend) test suite. Runs on its own job so the main unit
  # gate stays fast; the hermetic static fixtures in tests/webapp/conftest.py
  # cover both the built and unbuilt SPA modes in a single run, so no SPA build
  # step is needed here.
  webapp-tests:
    runs-on: ubuntu-latest

    env:
      LHP_DISABLE_ANALYTICS: 1

    steps:
    - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3

    - name: Set up Python 3.12
      uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
      with:
        python-version: "3.12"

    - name: Cache pip dependencies
      uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae  # v5.0.5
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-3.12-${{ hashFiles('**/requirements*.txt', '**/pyproject.toml') }}
        restore-keys: |
          ${{ runner.os }}-pip-3.12-
          ${{ runner.os }}-pip-

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e ".[dev,webapp]"
      shell: bash

    - name: Run webapp test suite
      run: pytest tests/webapp -q
      shell: bash

  # Web IDE frontend (React SPA) gate: lint, typecheck, unit tests (vitest),
  # generated-API-type drift, and a production build. Python is set up in this
  # job too: `npm run gen:api` dumps the OpenAPI schema by importing
  # lhp.webapp.app, so the package must be installed before the drift check.
  webapp-frontend:
    runs-on: ubuntu-latest

    env:
      LHP_DISABLE_ANALYTICS: 1

    steps:
    - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3

    - name: Set up Python 3.12
      uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
      with:
        python-version: "3.12"

    - name: Cache pip dependencies
      uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae  # v5.0.5
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-3.12-${{ hashFiles('**/requirements*.txt', '**/pyproject.toml') }}
        restore-keys: |
          ${{ runner.os }}-pip-3.12-
          ${{ runner.os }}-pip-

    - name: Install Python dependencies (required by gen:api)
      run: |
        python -m pip install --upgrade pip
        pip install -e ".[dev,webapp]"
      shell: bash

    - name: Set up Node.js
      uses: actions/setup-node@2028fbc5c25fe9cf00d9f06a71cc4710d4507903  # v6.0.0
      with:
        node-version: "22"
        cache: npm
        cache-dependency-path: web_app/package-lock.json

    - name: Install frontend dependencies
      run: npm ci
      working-directory: web_app
      shell: bash

    - name: Lint frontend (eslint)
      run: npm run lint
      working-directory: web_app
      shell: bash

    - name: Typecheck frontend (tsc -b)
      run: npx tsc -b
      working-directory: web_app
      shell: bash

    - name: Run frontend unit tests (vitest)
      run: npm run test -- --run
      working-directory: web_app
      shell: bash

    - name: Check generated API types are in sync
      run: |
        npm run gen:api
        git diff --exit-code src/types/api.generated.ts
      working-directory: web_app
      shell: bash

    - name: Build frontend
      run: npm run build
      working-directory: web_app
      shell: bash

    - name: Check bundle size budget (size-limit)
      run: npm run size
      working-directory: web_app
      shell: bash

  # Browser E2E suite (Playwright + axe-core) against a real uvicorn server
  # running lhp.webapp.app over a temp COPY of the Python-e2e fixture project
  # (plus a second, empty-root server for the init wizard). Covers the
  # browser-only acceptance items curl can't reach: editor loop, nav guard,
  # 412 conflict flow, run streaming, theme persistence, and a11y (critical).
  # Linux-only and non-matrix: browser automation adds nothing per-OS here.
  webapp-playwright:
    runs-on: ubuntu-latest

    env:
      LHP_DISABLE_ANALYTICS: 1

    steps:
    - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3

    - name: Set up Python 3.12
      uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
      with:
        python-version: "3.12"

    - name: Cache pip dependencies
      uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae  # v5.0.5
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-3.12-${{ hashFiles('**/requirements*.txt', '**/pyproject.toml') }}
        restore-keys: |
          ${{ runner.os }}-pip-3.12-
          ${{ runner.os }}-pip-

    - name: Install Python dependencies (lhp webapp server)
      run: |
        python -m pip install --upgrade pip
        pip install -e ".[dev,webapp]"
      shell: bash

    - name: Set up Node.js
      uses: actions/setup-node@2028fbc5c25fe9cf00d9f06a71cc4710d4507903  # v6.0.0
      with:
        node-version: "22"
        cache: npm
        cache-dependency-path: web_app/package-lock.json

    # build_webapp.sh owns npm ci + npm run build + staging dist/ into
    # src/lhp/webapp/static/, which the server under test serves.
    - name: Build web IDE SPA and stage server assets
      run: bash scripts/build_webapp.sh
      shell: bash

    - name: Install Playwright browser (chromium)
      run: npx playwright install --with-deps chromium
      working-directory: web_app
      shell: bash

    - name: Run browser E2E suite (playwright)
      run: npm run test:e2e
      working-directory: web_app
      shell: bash

    - name: Upload Playwright report on failure
      if: failure()
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
      with:
        name: playwright-report
        path: |
          web_app/e2e/.report
          web_app/e2e/.results
        retention-days: 7

  # Wheel-contents regression check.
  # Must live inside this workflow so publish.yml's workflow_run trigger
  # (which waits on "Tests" to succeed) gates PyPI publication on it.
  packaging-check:
    runs-on: ubuntu-latest

    env:
      LHP_DISABLE_ANALYTICS: 1

    steps:
    - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3

    - name: Set up Python 3.12
      uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
      with:
        python-version: "3.12"

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install build pytest
      shell: bash

    # The wheel-contents test builds a wheel via `python -m build`. The web IDE
    # SPA assets (src/lhp/webapp/static/, gitignored) must be staged BEFORE that
    # build so they ship in the wheel. build_webapp.sh is the single source of
    # truth for the npm ci / npm run build / static-sync sequence.
    - name: Set up Node.js
      uses: actions/setup-node@2028fbc5c25fe9cf00d9f06a71cc4710d4507903  # v6.0.0
      with:
        node-version: "22"
        cache: npm
        cache-dependency-path: web_app/package-lock.json

    - name: Build web IDE SPA and stage wheel assets
      run: |
        bash scripts/build_webapp.sh
      shell: bash

    - name: Run wheel-contents regression test
      run: |
        pytest -m slow tests/test_packaging.py -v
      shell: bash

  # Windows-specific e2e tests using native PowerShell
  test-e2e-windows:
    runs-on: windows-latest

    env:
      LHP_DISABLE_ANALYTICS: 1

    steps:
    - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3

    - name: Set up Python 3.12
      uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
      with:
        python-version: "3.12"

    - name: Cache pip dependencies
      uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae  # v5.0.5
      with:
        path: ~\AppData\Local\pip\Cache
        key: ${{ runner.os }}-pip-3.12-${{ hashFiles('**/requirements*.txt', '**/pyproject.toml') }}
        restore-keys: |
          ${{ runner.os }}-pip-3.12-
          ${{ runner.os }}-pip-

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pytest pytest-cov pytest-xdist
        pip install -e .
        if (Test-Path requirements.txt) { pip install -r requirements.txt }
        if (Test-Path requirements-dev.txt) { pip install -r requirements-dev.txt }

    - name: Test with pytest (e2e only)
      run: |
        if (Test-Path tests\e2e) {
          pytest tests\e2e -n auto --cov --cov-branch --cov-report=xml --junitxml=junit-e2e-windows.xml -o junit_family=legacy
        } else {
          Write-Host "No e2e tests directory found, skipping tests"
        }

  # Ensures pyproject.toml's version and CHANGELOG.md stay in sync.
  # Lives in this workflow because publish.yml gates PyPI on "Tests" succeeding.
  changelog-check:
    runs-on: ubuntu-latest

    env:
      LHP_DISABLE_ANALYTICS: 1

    steps:
    - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3
      with:
        fetch-depth: 0

    - name: Verify pyproject version has matching CHANGELOG header
      run: |
        version=$(grep -E '^version = ' pyproject.toml | sed 's/version = "\(.*\)"/\1/')
        if [ -z "$version" ]; then
          echo "::error file=pyproject.toml::Could not extract version line from pyproject.toml"
          exit 1
        fi
        if ! grep -qE "^## \[$version\] " CHANGELOG.md; then
          echo "::error file=CHANGELOG.md::pyproject.toml version is $version but CHANGELOG.md has no '## [$version] — YYYY-MM-DD' header. Either add an entry for $version or revert the version bump."
          exit 1
        fi
        echo "[OK] CHANGELOG.md has header for version $version"
      shell: bash

    - name: Verify CHANGELOG.md was updated if version bumped in this PR
      if: github.event_name == 'pull_request'
      run: |
        base="${{ github.event.pull_request.base.sha }}"
        head="${{ github.event.pull_request.head.sha }}"

        version_changed=false
        if git diff "$base" "$head" -- pyproject.toml | grep -qE '^[+-]version = '; then
          version_changed=true
        fi

        changelog_changed=false
        if git diff --name-only "$base" "$head" | grep -qx 'CHANGELOG.md'; then
          changelog_changed=true
        fi

        if [ "$version_changed" = "true" ] && [ "$changelog_changed" = "false" ]; then
          echo "::error file=CHANGELOG.md::pyproject.toml version was bumped in this PR but CHANGELOG.md was not updated. Add an entry for the new version (rename [Unreleased] to the new version, or add a new ## [X.Y.Z] block)."
          exit 1
        fi

        if [ "$version_changed" = "true" ]; then
          echo "[OK] Version bump detected and CHANGELOG.md was updated"
        else
          echo "[OK] No version bump in this PR; changelog sync gate not applicable"
        fi
      shell: bash

  # Separate job for testing import functionality across platforms
  test-import:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ["3.11", "3.12", "3.13"]

    env:
      LHP_DISABLE_ANALYTICS: 1

    steps:
    - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install package
      run: |
        python -m pip install --upgrade pip
        pip install -e .
      shell: bash

    - name: Test basic import and CLI
      run: |
        # Test that the package can be imported without syntax errors
        python -c "import lhp; print('[OK] Package imports successfully')"
        # Test that the CLI command works
        lhp --version || echo "CLI version check failed"
        lhp --help > /dev/null && echo "[OK] CLI help works" || echo "CLI help failed"
      shell: bash
